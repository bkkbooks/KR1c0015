  text: 欽定四庫全書經部三
  hash: sha256:cb15cdc798f7ad6d97c6a06d82684919eb432f17fa36f28d4b42e53a43363542
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1c0015_WYG_000-1a, image: WYG0072/WYG0072-0745a.png}
body:
  text: 詩集傳詩類提要臣等謹案詩集傳八卷宋朱子撰宋志作二十卷今本八卷蓋坊刻所併朱子注易凡兩易稿其初著之易傳宋志著録今已散佚不知其說之同異注詩亦兩易稿凡吕祖謙讀詩記所稱朱氏曰者皆其初稿其說全宗小序後乃改從鄭樵之說案朱子攻序用鄭樵說見于語録朱升以為用歐陽修之說誤也是為今本卷首自序作于淳熙四年中無一語斥小序蓋猶初稿序末時方輯詩傳是其證也其注孟子以柏舟為仁人不遇作白鹿洞賦以子襟為刺學校之廢周頌豐年篇小序辨說極言其誤而集傳乃仍用小序說前後不符亦舊稿之刪改未盡者也楊慎丹鉛録謂文公因吕成公大尊小序遂盡變其說雖臆度之詞或亦不無所因歟自是以後說詩者遂分攻序宗序兩家角立相爭而終不能以偏廢欽定詩經彚纂雖以集傳居先而序說亦皆附録允為持千古之平矣舊本附詩序辨說於後近時刋本皆刪去鄭元稱毛公以序分冠諸篇則毛公以前序本自為一卷隋志唐志亦與毛詩各見今已與辨說别著于録兹不重載其間經文訛異馮嗣京所校正者如鄘風終焉允臧然誤焉王風牛羊下括括誤栝齊風不能辰夜辰誤晨小雅求爾新特爾誤我朔月辛卯月誤日胡然厲矣然誤為家伯冡宰家誤冡如彼泉流泉流誤流泉爰其適歸爰誤奚大雅昊天滔德滔誤慆如彼泉流亦誤流泉商頌降豫卿士豫誤于凡十二條陳啓源所校正者召南無使尨也吠尨誤厖何彼禯矣禯誤穠衛風逺兄弟父母誤逺父母兄弟小雅言歸斯復斯誤思昊天大憮大誤泰楚茨以享以祀享誤饗福祿膍之膍誤畏不能趨趨誤趍不皇朝矣皇誤遑下二章同大雅淠彼涇舟淠誤淠以篤于周祜脫于字周頌既右饗之饗誤享魯頌其旗茷茷誤茷茷商頌來格祁祁誤祈祈凡十四條傳文訛異陳啓源所校正者召南騶虞篇豝牝豕也牝誤牡終南篇黻之狀丣象兩弓相背丣誤亞弓誤已南有嘉魚篇鯉質鱒鱗鱗誤鯽又衍肌字甫田篇或耘或耔引漢書苗生葉以上脫生字隤其上誤壝其土頍辨篇賦而比也誤增興又二字案此輔廣詩童子問所增小宛篇俗呼青雀雀誤觜文王有聲篇淢成溝也成訛城召旻篇池之竭矣章比也誤作賦閔豫小子篇引大招三公穆穆誤三公揖讓賚篇此頌文王之功王誤武駉篇此言魯侯牧馬之盛魯侯誤僖公凡十一條史榮所校正者王風伯兮篇傳曰女為悅已者容已下脫者字采葛篇蕭萩也萩誤荻唐風葛生篇域營域也營誤塋秦風蒹葭篇小渚曰沚小誤水小雅四牡篇今䳕鳩也誤蓼蕭篇在衝曰鸞衝誤鑣采芑篇即今苦蕒菜蕒誤藚正月篇申包胥曰人定則勝天定誤衆小辨篇江東呼為鵯鳥鵯悮鴨巧言篇君子不能堲讒堲誤塈凡十條蓋五經之中惟詩易讀習者十恆八九故書坊刋板亦最夥其輾轉傳訛亦為最甚今悉釐正之俾不失真至其音叶朱子初用吳棫詩補音案棫詩補音與所作韻補為兩書書録解題所載甚明經義考合為一書誤也其孫鑑又意為增損頗多舛忤史榮作風雅遺音已詳辨之兹不具論焉乾隆四十二年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀詩經集傳原序或有問於豫曰詩何為而作也豫應之曰人生而靜天之性也感於物而動性之欲也夫既有欲矣則不能無思既有思矣則不能無言既有言矣則言之所不能盡而發於咨嗟咏歎之餘者必有自然之音響節族音奏而不能已焉此詩之所以作也曰然則其所以教者何也曰詩者人心之感物而形於言之餘也心之所感有邪正故言之所形有是非惟聖人在上則其所感者無不正而其言皆足以為教其或感之之雜而所發不能無可擇者則上之人必思所以自反而因有以勸懲之是亦所以為教也昔周盛時上自郊廟朝廷而下逹於鄉黨閭巷其言粹然無不出於正者聖人固已協之聲律而用之鄉人用之邦國以化天下至於列國之詩則天子巡守亦必陳而觀之以行黜陟之典降自昭穆而後寖以陵夷至於東遷而遂廢不講矣孔子生於其時既不得位無以行勸懲黜陟之政於是特舉其籍而討論之去其重復正其紛亂而其善之不足以為法惡之不足以為戒者則亦刋而去之以從簡約示久遠使夫學者郎是而有以考其得失善者師之而惡者改焉是以其政雖不足以行於一時而其教實被於萬世是則詩之所以為教者然也曰然則國風雅頌之體其不同若是何也曰吾聞之凡詩之所謂風者多出於里巷歌謠之作所謂男女相與詠歌各言其情者也惟周南召南親被文王之化以成德而人皆有以得其性情之正故其發於言者樂而不過於淫哀而不及於傷是以二篇獨為風詩之正經自邶而下則其國之治亂不同人之賢否亦異其所感而發者有邪正是非之不齊而所謂先王之風者於此焉變矣若夫雅頌之篇則皆成周之世朝廷郊廟樂歌之辭其語和而莊其義寬而密其作者往往聖人之徒固所以為萬世法程而不可易者也至於雅之變者亦皆一時賢人君子閔時病俗之所為而聖人取之其忠厚惻怛之心陳善閉邪之意尤非後世能言之士所能及之此詩之為經所以人事浹於下天道備於上而無一理之不具也曰然則其學之也當奈何曰本之二南以求其端參之列國以盡其變正之於雅以大其規和之於頌以要其止此學詩之大㫖也於是乎章句以綱之訓詁以紀之諷詠以昌之涵濡以體之察之情性隱微之間審之言行樞機之始則修身及家平均天下之道其亦不待他求而得之於此矣問者唯唯而退余時方輯詩傳因悉次是語以冠其篇云淳熙四年丁酉冬十月戊子新安朱熹序
