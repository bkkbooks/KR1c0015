  text: 欽定四庫全書經部三
  hash: sha256:cb15cdc798f7ad6d97c6a06d82684919eb432f17fa36f28d4b42e53a43363542
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1c0015_WYG_000-1a, image: WYG0072/WYG0072-0745a.png}
body:
  text: 詩集傳詩類提要臣等謹案詩集傳八卷宋朱子撰宋志作二十卷今本八卷葢坊刻所併朱子註易凡兩易稿其初著之易傳宋志著錄今已散佚不知其說之同異註詩亦兩易稿凡吕祖謙讀詩記所稱朱氏曰者皆其初稾其説全宗小序後乃改從鄭樵之説案朱子攻序用鄭樵説見于語錄朱升以為用歐陽脩之説誤也是為今本卷首自序作于淳熈四年中無一語斥小序葢猶初稿序末時方輯詩傳是其證也其註孟子以柏舟為仁人不遇作白鹿洞賦以子衿為刺學校之廢周頌豐年篇小序辯説極言其誤而集傳乃仍用小序說前後不符亦舊稿之刪改未盡者也楊慎丹鉛録謂文公因吕成公大尊小序遂盡變其説雖臆度之詞或亦不無所因歟自是以後説詩者遂分攻序宗序両家角立相争而終不能以偏廢欽定詩經彚纂雖以集傳居先而序說亦皆附錄允為持千古之平矣舊本附詩序辯説於後近時刋本皆刪去鄭元稱毛公以序分冠諸篇則毛公以前序本自為一卷隋志唐志亦與毛詩各見今已與辯說别著于錄兹不重載其間經文訛異馮嗣京所校正者如鄘風終焉允臧然誤焉王風牛羊下括括誤栝齊風不能辰夜辰誤晨小雅求爾新特爾誤我朔月辛夘月誤日胡然厲矣然誤為家伯冡宰家誤冡如彼泉流泉流誤流泉爰其適歸爰誤奚大雅昊天滔徳滔誤慆如彼泉流亦誤流泉商頌降予卿士予悞于凡十二條陳啟源所校正者召南無使尨也吠尨誤厖何彼禯矣禯悞穠衛風逺兄弟父母悞逺父母兄弟小雅言歸斯復斯悞思昊天大憮大悞泰楚茨以享以祀享悞饗福禄膍之膍悞畏不能趨趨悞趍不皇朝矣皇悞遑下二章同大雅淠彼涇舟淠悞淠以篤于周祜脱于字周頌既右饗之饗悞享魯頌其旂茷茷誤茷茷商頌来格祁祁悞祈祈凡十四條傳文訛異陳啓源所校正者召南騶虞篇豝牝豕也牝誤牡終南篇黻之状丣象兩弓相背丣誤亞弓誤已南有嘉魚篇鯉質鱒鱗鱗誤鯽又衍肌字甫田篇或耘或耔引漢書苗生葉以上脱生字隤其上誤壝其土頍弁篇賦而比也悞増興又二字案此輔廣詩童子問所増小宛篇俗呼青雀雀誤觜文王有聲篇淢成溝也成訛城召旻篇池之竭矣章比也悞作賦閔予小子篇引大招三公穆穆悞三公揖讓賚篇此頌文王之功王悞武駉篇此言魯侯牧馬之盛魯侯悞僖公凡十一條史榮所校正者王風伯兮篇傳曰女為悦已者容已下脫者字采葛篇蕭萩也萩悞荻唐風葛生篇域營域也營悞塋秦風蒹葭篇小渚曰沚小誤水小雅四牡篇今䳕鳩也誤蓼蕭篇在衝曰鸞衝誤鑣采芑篇即今苦蕒菜蕒悞藚正月篇申包胥曰人定則勝天定悞衆小弁篇江東呼為鵯鳥鵯悮鴨巧言篇君子不能堲讒堲誤塈凡十條葢五經之中惟詩易讀習者十恒八九故書坊刋板亦最夥其輾轉傳訛亦為最甚今悉釐正之俾不失真至其音叶朱子初用吳棫詩補音案棫詩補音與所作韻補為兩書書錄解題所載甚明經義考合為一書悞也其孫鑑又意為増損頗多舛迕史榮作風雅遺音已詳辯之兹不具論焉乾隆四十二年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀詩經集傳原序或有問於予曰詩何為而作也予應之曰人生而静天之性也感於物而動性之欲也夫旣有欲矣則不能無思旣有思矣則不能無言旣有言矣則言之所不能盡而發於咨嗟咏歎之餘者必有自然之音響節族音奏而不能已焉此詩之所以作也曰然則其所以敎者何也曰詩者人心之感物而形於言之餘也心之所感有邪正故言之所形有是非惟聖人在上則其所感者無不正而其言皆足以為教其或感之之雜而所發不能無可擇者則上之人必思所以自反而因有以勸懲之是亦所以為教也昔周盛時上自郊廟朝廷而下逹於鄉黨閭巷其言粹然無不出於正者聖人固已協之聲律而用之鄉人用之邦國以化天下至於列國之詩則天子巡守亦必陳而觀之以行黜陟之典降自昭穆而後寖以陵夷至於東遷而遂廢不講矣孔子生於其時旣不得位無以行勸懲黜陟之政於是特舉其籍而討論之去其重複正其紛亂而其善之不足以為法惡之不足以為戒者則亦刋而去之以從簡約示久遠使夫學者郎是而有以考其得失善者師之而惡者改焉是以其政雖不足以行於一時而其敎實被於萬世是則詩之所以為敎者然也曰然則國風雅頌之體其不同若是何也曰吾聞之凡詩之所謂風者多出於里巷歌謠之作所謂男女相與詠歌各言其情者也惟周南召南親被文王之化以成德而人皆有以得其性情之正故其發於言者樂而不過於淫哀而不及於傷是以二篇獨為風詩之正經自邶而下則其國之治亂不同人之賢否亦異其所感而發者有邪正是非之不齊而所謂先王之風者於此焉變矣若夫雅頌之篇則皆成周之世朝廷郊廟樂歌之辭其語和而莊其義寛而密其作者徃徃聖人之徒固所以為萬世法程而不可易者也至於雅之變者亦皆一時賢人君子閔時病俗之所為而聖人取之其忠厚惻怛之心陳善閉邪之意尤非後世能言之士所能及之此詩之為經所以人事浹於下天道備於上而無一理之不具也曰然則其學之也當奈何曰本之二南以求其端參之列國以盡其變正之於雅以大其規和之於頌以要其止此學詩之大㫖也於是乎章句以綱之訓詁以紀之諷詠以昌之涵濡以體之察之情性隱微之間審之言行樞機之始則脩身及家平均天下之道其亦不待他求而得之於此矣問者唯唯而退余時方輯詩傳因悉次是語以冠其篇云淳熈四年丁酉冬十月戊子新安朱熹序
