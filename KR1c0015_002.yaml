body:
  text: 詩經集傳卷二宋朱子撰邶一之三邶鄘衛三國名在禹貢冀州西阻太行北逾衡漳東南跨河以及兗州桑土之野及商之季而紂都焉武王克商分自紂城朝歌而北謂之邶南謂之鄘東謂之衛以封諸侯邶鄘不詳其始封衛則武王弟康叔之國也衛本都河北朝歌之東淇水之北百泉之南其後不知何時並得邶鄘之地至懿公為狄所滅戴公東徥渡河野處漕邑文公又徙居于楚丘朝歌故城在今衛州衛縣西二十二里所謂殷墟衛故都即今衛縣漕楚丘皆在滑州大抵今懷衛澶相滑濮等州開封大名府界皆衛境也但邶鄘地既入衛其詩皆為衛事而猶繫其故國之名則不可曉而舊說以此下十三國皆為變風焉泛芳梵反彼柏舟亦泛其流耿耿古幸反不寐如有隱憂微我無酒以敖音翺以遊比也泛流貌柏木名耿耿小明憂之貌也隱痛也微猶非也婦人不得於其夫故以柏舟自比言以柏為舟堅緻牢實而不以乘載無所依薄但泛然於水中而已故其隱憂之深如此非為無酒可以敖遊而解之也列女傳以此為婦人之詩今考其辭氣卑順柔弱且居變風之首而與下篇相類豈亦莊姜之詩也歟我心匪鑒不可以茹音孺亦有兄弟不可以據薄言往訴逢彼之怒賦也鑒鏡茹度據依訴告也言我心既匪鑒而不能度物雖有兄弟而又不可依以為重故往告之而反遭其怒也我心匪石不可轉也我心匪席不可卷音捲也威儀棣棣不可選也賦也棣棣富而間習之貌選簡擇也言石可轉而我心不可轉席可卷而我心不可卷威儀無一不善又不可得而簡擇取舍皆自反而無闕之意憂心悄悄七小反愠于羣小覯音垢閔既多受侮不少靜言思之寤辟音闢有摽音殍賦也悄悄憂貌愠怒意羣小衆妾也言見怒於衆妾也覯見閔病也辟拊心也摽拊心貌日居月諸胡迭音垤而微心之憂矣如匪浣音緩衣靜言思之不能奮飛比也居諸語辭迭更微虧也匪浣衣謂垢汚不濯之衣奮飛如鳥奮翼而飛去也言日當常明月則有時而虧猶正嫡當尊衆妾當卑今衆妾反勝正嫡是日月更迭而虧是以憂之至於煩冤憒眊如衣不浣之衣恨不能奮起而飛去也柏舟五章章六句緑兮衣兮緑衣黃裏心之憂矣曷維其已比也緑蒼勝黃之閒色黃中央土之正色閒色賤而以為衣正色貴而以為裏言皆失其所也已止也莊公惑於嬖妾夫人莊姜賢而失位故作此詩言緑衣黃裏以比賤妾尊顯而正嫡幽微使我憂之不能自已也緑兮衣兮緑衣黃裳心之憂矣曷維其亡比也上曰衣下曰裳記曰衣正色裳閒色今以緑為衣而黃者自裏轉而為裳其失所益甚矣亡之為言忘也緑兮絲兮女音汝所治平聲兮我思古人俾無訧言尤叶于其反兮比也女指其君子而言也治謂理而織之也俾使訧遇也言緑方為絲而女又治之以比妾方少艾而女又嬖之也然則我將如之何哉亦思古人有嘗遭此而善處之者以自勵焉使不至於有過而已絺兮綌兮淒音妻其以風叶為愔反我思古人實獲我心比也淒寒風也絺綌而遇寒風猶已之過時而見棄也故思古人之善處此者真能先得我心之所求也緑衣四章章四句莊姜事見春秋傳此詩無所考姑從序說下三篇同燕燕于飛差初宜反池其羽之子于歸遠送于野瞻望弗及泣涕如雨興也燕鳦也謂之燕燕者重言之也差池不齊之貌之子指戴媯也歸大歸也莊姜無子以陳女戴媯之子完為已子莊公卒完即位嬖人之子州吁弒之故戴媯大歸于陳而莊姜送之作此詩也燕燕于飛頡與潔同之頏與杭同之之子于歸遠于將之瞻望弗及佇立以泣興也飛而上曰頡飛而下曰頏將送也佇立久立也燕燕于飛下上上聲其音之子于歸遠送于南瞻望弗及實勞我心興也鳴而上曰上音鳴而下曰下音送于南者陳在衛南仲氏任平聲只音䟡其心塞淵叶一均反終溫且惠淑愼其身先君之思以勗寡人賦也仲氏戴媯字也以恩相信曰任只語辭塞實淵深終竟溫和惠順淑善也先君謂莊公也勗勉也寡人寡德之人莊姜自稱也言戴媯之賢如此又以先君之思勉我使我常念之而不失其守也楊氏曰州吁之暴桓公之死戴媯之去皆夫人失位不見答於先君所致也而戴媯猶以先君之思勉其夫人真可謂溫且惠矣燕燕四章章六句日居月諸照臨下土乃如之人兮逝不古處胡能有定寧不我顧叶果五反賦也日居月諸呼而訴之也之人指莊公也逝發語辭古處未詳或云以古道相處也胡寧皆何也莊姜不見答於莊公故呼日月而訴之言日月之照臨下土久矣今乃有如是之人而不以古道相處是其心志回惑亦何能有定哉而何為其獨不我顧也見棄如此而猶有望之之意焉此詩之所以為厚也日居月諸下土是冒乃如之人兮逝不相好呼報反胡能有定寧不我報賦也冒覆也報答也日居月諸出自東方乃如之人兮德音無良胡能有定俾也可忘賦也日旦必出東方月望亦出東方德音美其辭無良醜其實也俾也可忘言何獨使我為可忘者邪日居月諸東方自出父兮母兮畜我不卒胡能有定報我不述賦也畜飬卒終也不得其夫而歎父母養我之不終蓋憂患疾痛之極必呼父母人之至情也述循也言不循義理也日月四章章六句此詩當在燕燕之前下篇放此終風且暴顧我則笑叶音燥謔許約反浪笑敖音傲中心是悼比也終風終日風也暴疾也謔戲言也浪放蕩也悼傷也莊公之為人狂蕩暴疾莊姜蓋不忍斥言之故但以終風且暴為比言雖其狂暴如此然亦有顧我則笑之時但皆出於戲慢之意而無愛敬之誠則又使我不敢言而心獨傷之耳蓋莊公暴慢無常而莊姜正靜自守所以忤其意而不見答也終風且霾與埋同惠然肯來莫往莫來悠悠我思比也霾雨土蒙霿也惠順也悠悠思之長也終風且霾以比莊公之狂惑也雖云狂惑然亦或惠然而肯來但又有莫往莫來之時則使我悠悠而思之望其君子之深厚之至也終風且曀與縊同不日有曀寤言不寐願言則嚏音帝同既比也隂而風曰曀有又也不日有曀言曀矣不旋日而又曀也亦比人之狂惑暫開而復蔽也願思也嚏鼽嚏也人氣感傷閉鬱又為風霿所襲則有是疾也曀曀其陰虺虺其靁寤言不寐願言則懷比也曀曀陰貌虺虺靁將發而未震之聲以比人之狂惑愈深而未已也懷思也終風四章章四句說見上擊鼓其鏜與湯同踊躍用兵土國城漕我獨南行賦也鏜擊鼓聲也踊躍坐作擊刺之狀也兵謂戈㦸之屬土土功也國國中也漕衛邑名衛人從軍者自言其所為因言衛國之民或役土功於國或築城於漕而我獨南行有鋒鏑死亡之憂危苦尤甚也從孫子仲平陳與宋不我以歸憂心有忡與充同賦也孫氏子仲字時軍帥也平和也合二國之好也舊說以此為春秋隱公四年州吁自立之時宋衛陳蔡伐鄭之事恐或然也以猶與也言不與我而歸也爰居爰處爰喪息浪反其馬于以求之于林之下賦也爰於也於是居於是處於是喪其馬而求之於林下見其失伍離次無鬬志也死生契與挈同闊與子成說執子之手與子偕老賦也契闊隔遠之意成說謂成其約誓之言從役者念其室家因言始為室家之時期以死生契闊不相忘棄又相與執手而期以偕老也于音吁下同嗟闊兮不我活兮于嗟洵音苟兮不我信師人反兮賦也于嗟歎辭也闊契闊也活生洵信也信與申同言昔者契闊之約如此而今不得活偕老之信如此而今不得伸意必死亡不復得與其室家遂前約之信也擊鼓五章章四句凱風自南吹彼棘心棘心夭夭與腰同母氏劬勞叶音僚比也南風謂之凱風長養萬物者也棘小木叢生多刺難長而心又其稚弱而未成者也夭夭少好貌劬勞病苦也衛之淫風流行雖有七子之母猶不能安其室故其子作此詩以凱風比母棘心比子之幼時蓋曰母生衆子幼而育之其劬勞甚矣本其始而言以起自責之端也凱風自南吹彼棘薪母氏聖善我無令人興也聖睿令善也棘可以為薪則成矣然非美材故以興子之壯大而無善也復以聖善稱其母而自謂無令人其自責也深矣爰有寒泉在浚之下叶後五反有子七人母氏勞苦興也浚衛邑諸子自責言寒泉在浚之下猶能有所滋益於浚而有子七人反不能事母而使母至於勞苦乎於是乃若微指其事而痛自刻責以感動其母心也母以淫風流行不能自守而諸子自責但以不能事母使母勞苦為辭婉辭幾諌不顯其親之惡可謂孝矣下章放此睍與演同睆與莞同黃鳥載好其音有子七人莫慰母心興也睍睆清和圓轉之意言黃鳥猶能好其音以悅人而我七子獨不能慰悅母心哉凱風四章章四句雄雉于飛泄泄與異同其羽我之懷矣自詒伊阻興也雉野雞雄者有冠長尾身有文采善鬬泄泄飛之緩也懷思詒遺阻隔也婦人以其君子從役于外故言雄雉之飛舒緩自得如此而我之所思者乃從役于外而自遺阻隔也雄雉于飛下上時掌反其音展矣君子實勞我心興也下上其音言其飛鳴自得也展誠也言誠又言實所以甚言此君子之勞我心也瞻彼日月悠悠我思叶新齎反道之云遠曷云能來叶陵之反賦也悠悠思之長也見日月之往來而思其君子從役之久也百爾君子不知德行下孟反叶户郎反不忮與至同不求何用不臧賦也百猶凡也忮害求貪臧善也言凡爾君子豈不知德行乎若能不忮害又不貪求則何所為而不善哉憂其逺行之犯患冀其善處而得全也雄雉四章章四句匏有苦葉濟有深涉深則厲淺則揭與器同之比也匏瓠也匏苦者不可食特可佩以渡水而已然今尚有葉則亦未可用之時也濟渡處也行渡水曰涉以衣而涉曰厲蹇衣而涉曰揭此刺淫亂之詩言匏未可用而渡處方深行者當量其淺深而後可渡以比男女之際亦當量度禮義而行也有瀰與米同濟盈有鷕以小反雉鳴濟盈不濡軌與晷同叶居有反雉鳴求其牡比也瀰水滿貌鷕雌雉聲軌車轍也飛曰雌雄走曰牝牡夫濟盈必濡其轍雉鳴當求其雄此常理也今濟盈而曰不濡軌雉鳴而反求其牡以比淫亂之人不度禮義非其配耦而犯禮以相求也雍雍鳴鴈叶魚旰反旭許玉反日始旦士如歸妻逮冰未泮賦也雍雍聲之和也鴈鳥名似鵝畏寒秋南春北旭日初出貌昏禮納采用鴈親迎以昏而納采請期以旦歸妻以冰泮而納采請期逮冰未泮之時言古人之於婚姻其求之不暴而節之以禮如此以深刺淫亂之人也招招音韶舟子叶奬里反人涉卬與昂同否叶蒲美反人涉卬否卬須我友叶羽軌反比也招招號召之貌舟子舟人主濟渡者卬我也舟人招人以渡人皆從之而我獨否者待我友之招而後從之也以比男女必待其配耦而相從而刺此人之不然也匏有苦葉四章章四句習習谷風以陰以雨黽勉同心不宜有怒叶緩五反采葑與封同采菲與匪同無以下體德音莫違及爾同死叶想止反比也習習和舒也東風謂之谷風葑蔓菁也菲似葍莖粗葉厚而長有毛下體根也葑菲根莖皆可食而其根則有時而美惡德音美譽也婦人為夫所棄故作此詩以叙其悲怨之情言陰陽和而後雨澤降如夫婦和而後家道成故為夫婦者當黽勉以同心而不宜至於有怒又言采葑菲者不可以其根之惡而棄其莖之美如為夫婦者不可以其顔色之衰而棄其德音之善但德音之不違則可以與爾同死矣行道遲遲中心有違不遠伊邇薄送我畿音祈誰謂荼音徒苦其甘如薺音泚宴爾新昏如兄如弟待禮反賦而比也遲遲舒行貌違相背也畿門內也荼苦菜蓼屬也詳見良耜薺甘菜宴樂也新昏夫所更娶之妻也言我之被棄行於道路遲遲不進蓋其足欲前而心有所不忍如相背然而故夫之送我乃不遠而甚邇亦至其門內而止耳又言茶雖甚苦反甘如薺以比已之見棄其苦有甚於荼而其夫方且宴樂其新昏如兄如弟而不見恤蓋婦人從一而終今雖見棄猶有望夫之情厚之至也涇以渭濁湜湜音殖其沚音止宴爾新昏不我屑以毋逝我梁毋發我苟與苟同我躬不閲遑恤我後胡口反比也涇渭二水名涇水出今原州百泉縣筓頭山東南至永興軍高陵入渭渭水出渭州渭源縣鳥鼠山至同州馮翊縣入河湜湜清貌沚水渚也屑潔以與逝之也梁堰石障水而空其中以通魚之往來者也笱以竹為器而承梁之空以取魚者也閲容也涇濁渭清然涇未屬渭之時雖濁而未甚見由二水既合而清濁益分然其别出之渚流或稍緩則猶有清處婦人以自比其容貌之衰久矣又以新昏形之益見憔悴然其心則固猶有可取者但以故夫之安於新昏故不以我為潔而與之耳又言毋逝我之梁毋發我之笱以比欲戒新昏毋居我之處毋行我之事而又自思我身且不見容何暇恤我已去之後哉知不能禁而絶意之辭也就其深矣方之舟之就其淺矣泳之游之何有何亡黽勉求之凡民有喪匍音蒲匐蒲卜反救叶居尤反之興也方桴舟船也潛行曰泳浮水曰游匍匐手足並行急遽之甚也婦人自陳其治家勤勞之事言我隨事盡其心力而為之深則方舟淺則泳游不計其有與亡而勉強以求之又周睦其鄰里鄉黨莫不盡其道也不我能慉與畜同反以我為讎既阻我德賈音古用不售與壽同叶市周反昔育恐育鞠與菊同及爾顚覆與福同既生既育比豫于毒賦也慉養阻却鞠窮也承上章言我於女家勤勞如此而女既不我養而反以我為仇讎惟其心既拒却我之善故雖勤勞如此而不見取如賈之不見售也因念其昔時相與為生惟恐其生理窮盡而及爾皆至於顛覆今既遂其生矣乃反比我於毒而棄之乎張子曰育恐謂生於恐懼之中育鞠謂生於困窮之際亦通我有㫖蓄敕六反亦以御音語冬宴爾新昏以我御窮有洸音光有潰音繪既詒我肄音異不念昔者伊余來塈興也旨美蓄聚御當也洸武貌潰怒色也肄勞塈息也又言我之所以蓄聚美菜者蓋欲以禦冬月乏無之時至於春夏則不食之矣今君子安於新昏而厭棄我是但使我禦其窮苦之時至於安樂則棄之也又言於我極其武怒而盡遺我以勤勞之事曾不念昔者我之來息時也追言其始見君子之時接禮之厚怨之深也谷風六章章八句式微式微胡不歸微君之故胡為乎中露賦也式發語辭微猶衰也再言之者言衰之甚也微猶非也中露露中也言有霑濡之辱而無所芘覆也舊說以為黎侯失國而寓於衛其臣勸之曰衰微甚矣何不歸哉我若非以君之故則亦胡為而辱於此哉式微式微胡不歸微君之躬胡為乎泥中賦也泥中言有陷溺之難而不見拯救也式微二章章四句此無所考姑從序說旄丘之葛叶居謁反兮何誕音憚之節兮叔兮伯叶音逼兮何多日也興也前高後下曰旄丘誕闊也叔伯衛之諸臣也舊說黎之臣子自言久寓於衛時物變矣故登旄丘之上見其葛長大而節疏闊因託以起興曰旄丘之葛何其節之闊也衛之諸臣何其多日而不見救也此詩本責衛君而但斥其臣可見其優柔而不迫也何其處也必有與也何其久叶舉里反也必有以也賦也處安處也與與國也以他故也因上章何多日也而言何其安處而不來意必有與國相俟而俱來耳又言何其久而不來意其或有他故而不得來耳詩之曲盡人情如此狐裘蒙戎匪車不東叔兮伯兮靡所與同賦也大夫狐蒼裘蒙戎亂貌言弊也又自言客久而裘弊矣豈我之車不東告於女乎但叔兮伯兮不與我同心雖往告之而不肯來耳至是始微諷切之或曰狐裘蒙戎指衛大夫而譏其憒亂之意匪車不東言非其車不肯東來救我也但其人不肯與俱來耳今按黎國在衛西前說近是瑣音鎖兮尾兮流離之子叶奬里反叔兮伯兮褎音又如充耳賦也瑣細尾末也流離漂散也褎多笑貌充耳塞耳也耳聾之人恆多笑言黎之君臣流離瑣尾若此其可憐也而衛之諸臣褎然如塞耳而無聞何哉至是然後盡其辭焉流離患難之餘而其言之有序而不迫如此其人亦可知矣旄丘四章章四句說同上篇簡兮簡兮方將萬舞日之方中在前上處上聲賦也簡簡易不恭之意萬者舞之總名武用干戚文用羽籥也日之方中在前上處言當明顯之處賢者不得志而仕於伶官有輕世肆志之心焉故其言如此若自譽而實自嘲也碩人俁俁音語公庭萬舞有力如虎執轡如組音祖賦也碩大也俁俁大貌轡今之韁也組織絲為之言其柔也御能使馬則轡柔如組矣又自譽其才之無所不備亦上章之意也左手執籥音藥右手秉翟音笛叶直角反赫如渥音握赭音者叶陟略反公言錫爵賦也執籥秉翟者文舞也籥如笛而六孔或曰三孔翟雉羽也赫赤貌渥厚漬也赭赤色也言其顔色之充盛也公言錫爵即儀禮燕飲而獻工之禮也以碩人而得此則亦辱矣乃反以其賚豫之親洽為榮而誇美之亦玩世不恭之意也山有榛音臻隰有苓音零云誰之思西方美人彼美人兮西方之人兮興也榛似栗而小下濕曰隰苓一名大苦葉似地黃即今甘草也西方美人託言以指西周之盛王如離騷亦以美人目其君也又曰西方之人者歎其遠而不得見之辭也賢者不得志於衰世之下國而思盛際之顯王故其言如此而意遠矣簡兮四章三章章四句一章六句舊三章章六句今改定張子曰為祿仕而抱關擊柝則猶恭其職也為伶官則雜於侏儒俳優之間不恭甚矣其得謂之賢者雖其迹如此而其中固有以過人又能卷而懷之是亦可以為賢矣東方朔似之毖音祕彼泉水亦流于淇有懷于衛靡日不思叶新齎反孌音臠彼諸姬聊與之謀叶謨悲反興也毖泉始出之貌泉水即今衛州共城之百泉也淇水出相州林慮縣東流泉水自西北而東南來注之孌好貌諸姬謂姪娣也衛女嫁於諸侯父母終思歸寧而不得故作此詩言毖然之泉水亦流于淇矣我之有懷于衛則亦無日而不思矣是以即諸姬而與之謀為歸衛之計如下兩章之云也出宿于泲音濟飲餞音踐于禰音你女子有行遠去聲父母兄弟問我諸姑遂及伯姊叶奬里反賦也泲地名飲餞者古之行者必有祖道之祭祭畢處者送之飲於其側而後行也禰亦地名皆自衛來時所經之處也諸姑伯姊即所謂諸姬也言始嫁來時則固已遠其父母兄弟矣况今父母既終而復可歸哉是以問於諸姑伯姊而謀其可否云耳鄭氏曰國君夫人父母在則歸寧沒則使大夫寧於兄弟出宿于干叶居焉反飲餞于言載脂載舝音轄叶下介反還音旋車言邁遄市專反臻于衛不瑕有害賦也干言地名適衛所經之地也脂以脂膏塗其舝使滑澤也舝車軸也不駕則脫之設之而後行也還回旋也旋其嫁來之車也遄疾臻至也瑕何古音相近通用言如是則其至衛疾矣然豈不害於義理乎疑之而不敢遂之辭也我思肥泉兹之永歎叶它涓反思須與漕叶徂侯反我心悠悠駕言出遊以寫我憂賦也肥泉水名須漕衛邑也悠悠思之長也寫除也於既不敢歸然其思衛地不能忘也安得出遊彼而寫其憂哉泉水四章章六句楊氏曰衛女思歸發乎情也其卒也不歸止乎禮義也聖人著之於經以示後世使知適異國者父母終無歸寧之義則能自克者知所處矣出自北門叶眉貧反憂心殷殷終窶音巨且貧莫知我艱叶居銀反已焉哉叶將其反下同天實為之謂之何哉比也北門背陽向隂殷殷憂也窶者貧而無以為禮也賦衛之賢者處亂世事暗君不得其志故因出北門而以自比又歎其貧窶人莫知之而歸之於天也王事適我政事一埤音琵益我我入自外室人交遍謫音責叶竹棘反我已焉哉天實為之謂之何哉賦也王事王命使為之事也適之也政事其國之政事也一猶皆也埤厚室家謫責也王事既適我矣政事又一切以埤益我其勞如此而窶貧又甚室人至無以自安而交遍謫我則其困於內外極矣王事敦叶都回反我政事一埤遺去聲叶夷回反我我入自外室人交遍摧徂回反我已焉哉天實為之謂之何哉賦也敦猶投擲也遺加摧沮也北門三章章七句楊氏曰忠信重祿所以勸士也衛之忠臣至於窶貧而莫知其艱則無勸士之道矣仕之所以不得志也先王視臣如手足豈有以事投遺之而不知其艱哉然不擇事而安之無懟憾之辭知其無可奈何而歸之於天所以為忠臣也北風其涼雨去聲雪其雱音滂惠而好去聲我攜手同行叶户郎反其虛其邪音徐下同既亟只音紙且音疽下同比也北風寒涼之風也涼寒氣也雱雪盛貌惠愛行去也虛寬貌邪一作徐緩也亟急也只且語助辭言北風雨雪以比國家危亂將至而氣象愁慘也故欲與其相好之人去而避之且曰是尚可以寬徐乎彼其禍亂之迫已甚而去不可不速矣北風其喈音皆叶居奚反雨雪其霏音非惠而好我攜手同歸其虛其邪既亟只且比也喈疾聲也霏雨雪分散之狀歸者去而不反之辭也莫赤匪狐莫黑匪烏惠而好我攜手同車其虛其邪既亟只且比也狐獸名似犬黃赤色烏鴉黑色皆不祥之物人所惡見者也所見無非此物則國將危亂可知同行同歸猶賤者也同車則貴者亦去矣北風三章章六句靜女其姝音樞俟我於城隅愛而不見搔音騷首踟音池蹰音廚賦也靜者閒雅之意姝美色也城隅幽僻之處不見者期而不至也踟蹰猶躑躅也此淫奔期㑹之詩也靜女其孌貽我彤音同管叶古兗反彤管有煒音偉說音悅懌音亦女美賦也孌好貌於是則見之矣彤管未詳何物蓋相贈以結殷勤之意耳煒赤貌言既得此物而又悅懌此女之美也自牧歸荑洵美且異匪女音汝之為美美人之貽與異同賦也牧外野也歸亦貽也荑茅之始生者洵信也女指荑而言也言靜女又贈我以荑而其荑亦美且異然非此荑之為美特以美人之所贈故其物亦美耳靜女三章章四句新臺有泚音此河水瀰瀰音米燕婉之求籧音蕖篨音除不鮮斯淺反叶想止反賦也泚鮮明也瀰瀰盛也燕安婉順也籧篨不能俯疾之醜者也蓋籧篨本竹席之名人或編以為囷其狀如人之擁腫而不能俯者故又因以名此疾也鮮少也舊說以為衛宣公為其子伋娶於齊而聞其美欲自娶之乃作新臺於河上而要之國人惡之而作此詩以刺之言齊女本求與伋為燕婉之好而反得宣公醜惡之人也新臺有灑音璀叶先典反河水浼浼音每叶美辨反燕婉之求籧篨不殄賦也灑高峻也浼浼平也殄絶也言其病不已也魚網之設鴻則離之燕婉之求得此戚施興也鴻鴈之大者離麗也戚施不能仰亦醜疾也言設魚網而反得鴻以興求燕婉而反得醜疾之人所得非所求也新臺三章章四句凡宣姜事首末見春秋傳然於詩則皆未有考也諸篇放此二子乘舟泛泛芳劎反其景叶舉兩反願言思子中心養養賦也二子謂伋壽也乘舟渡河如齊也景古影字養養猶漾漾憂不知所定之貌舊說以為宣公納伋之妻是為宣姜生壽及朔朔與宣姜訴伋於公公令伋之齊使賊先待於隘而殺之壽知之以告伋伋曰君命也不可以逃壽竊其節而先往賊殺之伋至曰君命殺我壽有何罪賊又殺之國人傷之而作是詩也二子乘舟泛泛其逝願言思子不瑕有害賦也逝往也不瑕疑辭義見泉水此則見其不歸而疑之也二子乘舟二章章四句太史公曰余讀世家言至於宣公之子以婦見誅弟壽爭死以相讓此與晉太子申生不敢明驪姬之過同俱惡傷父之志然卒死亡何其悲也或父子相殺兄弟相戮亦獨何哉邶十九篇七十二章三百六十三句鄘一之四說見上篇泛彼柏舟在彼中河髧音萏彼兩髦實維我儀叶牛何反之死矢靡它音拖母也天叶鐵因反只音紙下同不諒人只興也中河中於河也髧髮垂貌兩髦者剪髮夾囟子事父母之飾親死然後去之此蓋指共伯也我共姜自我也儀匹之至矢誓靡無也只語助辭諒信也舊說以為衛世子共伯蚤死其妻共姜守義父母欲奪而嫁之故共姜作此以自誓言柏舟則在彼中河兩髦則實我之匹雖至於死誓無它心母之於我覆育之恩如天罔極而何其不諒我之心乎不及父者疑時獨母在或非父意耳泛彼柏舟在彼河側髧彼兩髦實維我特之死矢靡慝音忒母也天只不諒人只興也特亦匹也慝邪也以是為慝則其絶之甚矣柏舟二章章七句牆有茨不可掃叶蘇后反也中冓音姤之言不可道叶徒厚反也所可道也言之醜也興也茨蒺藜也蔓生細葉子有三角刺人中冓謂舍之交積材木也道言醜惡也舊說以為宣公卒惠公幼其庶兄頑蒸於宣姜故詩人作此詩以刺之言其閨中之事皆醜惡而不可言理或然也牆有茨不可襄也中冓之言不可詳也所可詳也言之長也興也襄除也詳詳言之也言之長者不欲言而託以語長難竟也牆有茨不可束也中冓之言不可讀也所可讀也言之辱也興也束束而去之也讀誦言也辱猶醜也牆有茨三章章六句楊氏曰公子頑通乎君母閨中之言至不可讀其汚甚矣聖人何取焉而著之於經也蓋自古淫亂之君自以為密於閨門之中世無得而知者故自肆而不反聖人所以著之於經使後世為惡者知雖閨門之言亦無隱而不彰也其為訓戒深矣君子偕老副筓六珈音加叶居河反委委音威他他音駝如山如河象服是宜叶牛何反子之不淑云如之何賦也君子夫也偕老言偕生而偕死也女子之生以身事人則當與之同生與之同死故夫死稱未亡人言亦待死而已不當復有他適之志也副祭服之首飾編髮為之筓衡筓也垂于副之兩旁當耳其下以紞懸瑱珈之言加也以玉加於笄而為飾也委委他他雍容自得之貌如山安重也如河𢎞廣也象服法度之服也淑善也言夫人當與君子偕老故其服飾之盛如此而雍容自得安重寬廣又有以宜其象服今宣姜之不善乃如此雖有是服亦將如之何哉言不稱也玼音此兮玼兮其之翟叶去聲也鬒音軫髮如雲不屑髢音第也玉之瑱吐殿反也象之揥敕帝反也揚且音疽之晳音錫叶征例反也胡然而天也胡然而帝也賦也玼鮮盛貌翟衣祭服刻繒為翟雉之形而彩畫之以為飾也鬒黑也如雲言多而美也屑潔也髢髲髢也人少髮則以髢益之髮自美則不潔於髢而用之也瑱塞耳也象象骨也揥所以摘髮也揚眉上廣也且助語辭晳白也胡然而天胡然而帝言其服飾容貌之美見者驚猶鬼神也瑳上聲兮瑳兮其之展音戰叶諸延反也蒙彼皺音皺絺是紲音屑袢音半叶汾乾反也子之清揚揚且之顏叶魚堅反也展如之人兮邦之媛音院叶干權反也賦也瑳亦鮮盛貌展衣者以禮見於君及見賔客之服也蒙覆也皺絺絺之蹙蹙者當暑之服也紲袢束斂意以展衣蒙絺綌而為之紲袢所以自縳飭也或曰蒙謂加絺綌於䙝衣之上所謂表而出之也清視清明也揚眉上廣也顏額角豐滿也展誠也美女曰媛見其徒有美色而無人君之德也君子偕老三章一章七句一章九句一章八句東萊呂氏曰首章之末云子之不淑云如之何責之也二章之末云胡然而天也胡然而帝也問之也三章之末云展如之人兮邦之媛也惜之也辭益婉而意益深矣爰采唐矣沫音妹之鄉矣云誰之思美孟姜矣期我乎桑中叶諸良反要音腰我乎上宫叶居王反送我乎淇之上叶辰羊反矣賦也唐蒙菜也一名絲沫衛邑也書所謂妹邦者也孟長也姜齊女言貴族也桑中上宫淇上又沫鄉之中小地名也要猶迎也衛俗淫亂世族在位相竊妻妾故此人自言將采唐於沫而與其所思之人相期㑹迎送如此也爰采麥叶訖力反矣沫之北矣云誰之思美孟弋矣期我乎桑中要我乎上宫送我乎淇之上矣賦也麥穀名秋種夏熟者弋眷秋或作姒蓋杞女夏后氏之後亦貴族也爰采葑矣沫之東矣云誰之思美孟庸矣期我乎桑中要我乎上宫送我乎淇之上矣賦也葑蔓菁也庸未聞疑亦貴族也桑中三章章七句樂記曰鄭衛之音亂世之音也比於慢矣桑間濮上之音亡國之音也其政散其民流誣上行私而不可止也按桑間即此篇故小序亦用樂記之語鶉音純之奔奔鵲之彊彊音姜人之無良我以為兄叶虛王反興也鶉䳺屬奔奔彊彊居有常匹飛則相隨之貌人謂公子頑良善也衛人刺宣姜與頑非匹耦而相從也故為惠公之言以刺之曰人之無良鶉鵲之不若而我反以為兄何哉鵲之彊彊鶉之奔奔叶逋珉反人之無良我以為君興也人謂宣姜君小君也鶉之奔奔二章章四句范氏曰宣姜之惡不可勝道也國人疾而刺之或遠言焉或切言焉遠言之者君子偕老是也切言之者鶉之奔奔是也衛詩至此而人道盡天理滅矣中國無以異於夷狄人類無以異於禽獸而國隨以亡矣胡氏曰楊時有言詩載此篇以見衛為狄所滅之因也故在定之方中之前因以是說考於厯代凡淫亂者未有不至於殺身敗國而亡其家者然後知古詩垂戒之大而近世冇獻議乞於經筵不以國風進講者殊失聖經之㫖矣定音訂之方中作于楚宫揆之以日作于楚室樹之榛栗椅音醫桐梓漆爰伐琴瑟賦也定北方之宿營室星也此星昏而正中夏正十月也偃是時可以營制宮室故謂之營室楚宫楚丘之宫也揆度也樹八尺之臬而度其日之出入之景以定東西又參日中之景以正南北也楚室猶楚宫互文以協韻耳榛栗二木其實榛小栗大皆可供籩實椅梓實桐皮桐梧桐也梓楸之疏理白色而生子者漆木有液黏黑可飾器物四木皆琴瑟之材也爰於也衛為狄所滅文公徙居楚丘營立宫室國人悅之而作是詩以美之蘇氏曰種木者求用於十年之後其不求近功凡此類也升彼虛音嶇叶起呂反矣以望楚矣望楚與堂景山與京叶居良反降觀于桑卜云其吉終焉允臧賦也虛故城也楚楚丘也堂楚丘之旁邑也景測景以正方面也與既景乃岡之景同或曰景山名見商頌京高丘也桑木名葉可飼蠶者觀之以察其土宜也允信臧善也此章本其始之望景觀卜而言以至於終而果獲其善也靈雨既零命彼倌音官人星言夙駕說音稅于桑田叶徒因反匪直也人秉心塞淵叶一均反騋音來牝三千叶倉新反賦也靈善零落也倌人主駕者也星見星也說舍止也秉操塞實淵深也馬七尺以上為騋言方春時雨既降而農桑之務作文公於是命主駕者晨起駕車亟往而勞勸之然非獨此人所以操其心者誠實而淵深也蓋其所畜之馬七尺而牝者亦已至於三千之衆矣蓋人操心誠實而淵深則無所為而不成其致此富盛宜矣記曰問國君之富數馬以對今言騋牝之衆如此則生息之蕃可見而衛國之富亦可知矣此章又要其終而言也定之方中三章章七句按春秋傳衛懿公九年冬狄入衛懿公及狄人戰于熒澤而敗死焉宋桓公迎衛之遺民渡河而南立宣姜子申以廬于漕是為戴公是年卒立其弟燬是為文公於是齊桓公合諸侯以城楚丘而遷衛焉文公大布之衣大帛之冠務材訓農通商惠工敬教勸學授方任能元年革車三十乘季年乃三百乘蝃音帝蝀音凍在東莫之敢指女子有行遠去聲父母兄弟比也蝃蝀虹也日與雨交倐然成質似有血氣之類乃陰陽之氣不當交而交者蓋天地之淫氣也在東者莫虹也虹隨日所映故朝西而莫東也此刺淫奔之詩言蝃蝀在東而人不敢指以比淫奔之惡人不可道况女子有行又當遠其父母兄弟豈可不顧此而冒行乎朝隮音賫于西崇朝其雨女子有行遠兄弟父母叶滿補反比也隮升也周禮十輝九曰隮注以為虹蓋忽然而見如自下而升也崇終也從旦至食時為終朝言方雨而虹見則其雨終朝而止矣蓋淫慝之氣有害於陰陽之和也今俗謂虹能截雨信然乃如之人也懷昏姻也大無信叶斯人反也不知命叶彌并反也賦也乃如之人指淫奔者而言昏姻謂男女之欲程子曰女子以不自失為信命正理也言此淫奔之人但知思念男女之欲是不能自守其貞信之節而不知天理之正也程子曰人雖不能無欲然當有以制之無以制之而惟欲之從則人道廢而入於禽獸矣以道制欲則能順命蝃蝀三章章四句相去聲鼠有皮叶蒲何反人而無儀叶牛何反人而無儀不死何為叶吾何反興也相視也鼠蟲之可賤惡者言視彼鼠而猶必有皮可以人而無儀乎人而無儀則其不死亦何為哉相鼠有齒人而無止人而無止不死何俟叶羽已反又音始興也止容止也俟待也相鼠有體人而無禮人而無禮胡不遄死叶想止反興也體支體也遄速也相鼠三章章四句孑孑音結干旄在浚音峻之郊叶音高素絲紕音避之良馬四之彼姝音樞者子何以畀音庇之賦也孑孑特出之貌干旄以旄牛尾注於旗干之首而建之車後也浚衛邑名邑外謂之郊紕織組也蓋以素絲織組而維之也四之兩服兩驂凡四馬以載之也姝美也子指所見之人也畀與也言衛大夫乘此車馬建此旌旄以見賢者彼其所見之賢者將何以畀之而答其禮意之勤乎孑孑干旟在浚之都素絲組音祖之良馬五之彼姝者子何以豫音與之賦也旟州里所建烏隼之旗也上設旌旄其下繫斿斿下屬縿皆畫鳥隼也下邑曰都五之五馬言其盛也孑孑干旌在浚之城素絲祝之良馬六之彼姝者子何以告音谷之賦也析羽為旌干旌蓋析翟羽設於旗干之首也城都城也祝屬也六之六馬極其盛而言也干旄三章章六句此上三詩小序皆以為文公時詩蓋見其列於定中載馳之間故爾他無所考也然衛本以淫亂無禮不樂善道而亡其國今破滅之餘人心危懼正其有以懲創往事而興起善端之時也故其為詩如此蓋所謂生於憂患死於安樂者小序之言疑亦有所本云載馳載驅叶袪尤反歸唁衛侯驅馬悠悠言至於漕叶祖侯反大夫跋涉我心則憂賦也載則也弔失國曰唁悠悠遠而未至之貌草行曰跋水行曰涉宣姜之女為許穆公夫人閔衛之亡馳驅而歸將以唁衛侯於漕邑未至而許之大夫有奔走跋涉而來者夫人知其必將以不可歸之義來告故心以為憂也既而終不果歸乃作此詩以自言其意爾既不我嘉不能旋反視爾不臧我思不遠既不我嘉不能旋濟視爾不臧我思不閟賦也嘉臧皆善也遠猶忘也濟渡也自許歸衛必有所渡之水也閟閉也止也言思之不止也言大夫既至而果不以我歸為善則我亦不能旋反而濟以至於衛矣雖視爾不以我為善然我之所思終不能自己也陟彼阿丘言采其虻音盲叶謨郎反女子善懷亦各有行叶户郎反許人尤之衆稚音彘且狂賦也偏高曰阿丘虻貝母也主療鬱結之疾善懷多憂思也猶漢書云岸善崩也行道尤過也又言以其既不適衛而思終不止也故其在塗或什高以舒憂想之情或采虻以療鬱結之疾蓋女子所以善懷者亦各有道而許國之衆人以為過則亦少不更事而狂妄之人爾許人守禮非稚且狂也但以其不知己情之切至而言若是爾然而卒不敢違焉則亦豈真以為稚且狂哉我行其野芃芃音蓬其麥叶訖力反控于大邦誰因誰極大夫君子無我有尤叶于其反百爾所思叶新齎反不如我所之賦也芃芃麥盛長貌控持而告之也因如因魏莊子之因極至也大夫即跋涉之大夫君子謂許國之衆人也又言歸塗在野而涉芃芃之麥又自傷許國之小而力不能救故思欲為之控告于大邦而又未知其將何所因而何所至乎大夫君子無以我為有過雖爾所以處此百方然不如使我得自盡其心之為愈也載馳四章二章章六句二章章八句事見春秋傳舊說此詩五章一章六句二章三章四句四章六句五章八句蘇氏合二章三章以為一章按春秋傳叔孫豹賦載馳之四章而取其控于大邦誰因誰極之意與蘇說合今從之范氏曰先王制禮父母沒則不得歸寧者義也雖國滅君死不得往赴焉義重於亡故也鄘國十篇二十九章百七十六句衛一之五瞻彼淇奧音與郁同緑竹猗猗音醫叶於何反有匪君子如切如磋平聲如琢如磨瑟兮僴音限兮赫兮咺况晚反兮有匪君子終不可諼音喧叶况遠反兮興也淇水名奧隈也緑色也淇上多竹漢世猶然所謂淇園之竹是也猗猗始生柔弱而美盛也匪斐通文章著見之貌也君子指武公也治骨角者既切以刀斧而復磋以鑢鐋治玉石者既琢以槌鑿而復磨以沙石言其德之修飭有進而無已也瑟矜莊貌僴威嚴貌咺宣著貌諼忘也衛人美武公之德而以緑竹始生之美盛興其學問自修之進益也大學傳曰如切如磋者道學也如琢如磨者自修也瑟兮僴兮者恂栗也赫兮咺兮者威儀也有斐君子終不可諼兮者道盛德至善民之不能忘也瞻彼淇奧緑竹青青音精有匪君子充耳琇瑩音營㑹音怪辨如星瑟兮僴兮赫兮咺兮有匪君子終不可諼兮興也青青堅剛茂盛之貌充耳瑱也琇瑩美石也天子玉瑱諸侯以石㑹縫也辨皮辨也以玉飾皮辨之縫中如星之明也以竹之堅剛茂盛興其服飾之尊嚴而見其德之稱也瞻彼淇奧緑竹如簀音責叶側歷反有匪君子如金如錫如圭如璧寬兮綽兮猗音倚重平聲較音角兮善戲謔兮不為虐兮興也簀棧也竹之密比似之則盛之至也金錫言其煆錬之精純圭璧言其生質之溫潤寬宏裕也綽開大也猗歎辭也重較卿士之車也較兩輢上出軾者謂車兩旁也善戲謔不為虐者言其樂易而有節也以竹之至盛興其德之成就而又言其寬廣而自如和易而中節也蓋寬綽無斂束之意戲謔非莊厲之時皆常情所忽而易致過差之地也然猶可觀而必有節焉則其動容周旋之間無適而非禮亦可見矣禮曰張而不弛文武不能也弛而不張文武不為也一張一弛文武之道也此之謂也淇奧三章章九句按國語武公年九十有五猶針警于國曰自卿以下至於師長士苟在朝者無謂我老耄而舍我必恪恭於朝以交戒我遂作懿戒之詩以自警而賔之初筵亦武公悔過之作則其有文章而能聽規諫以禮自防也可知矣衛之他君蓋無足以及此者故序以此詩為美武公而今從之也考槃在㵎叶居賢反碩人之寬叶區權反獨寐寤言永矢弗諼音喧賦也考成也槃盤桓之意言成其隱處之室也陳氏曰考扣也槃器名蓋扣之以節歌如鼓盆拊缶之為樂也二說未知孰是山夾水曰澗碩大寬廣永長矢誓諼忘也詩人美賢者隱處㵎谷之間而碩大寬廣無戚戚之意雖獨寐而寤言猶自誓其不忘此樂也考槃在阿碩人之薖音科獨寐寤歌永矢弗過音戈賦也曲陵曰阿薖義未詳或云亦寬大之意也永矢弗過自誓所願不踰於此若將終身之意也考槃在陸碩人之軸獨寐寤宿永矢弗告音谷賦也高平曰陸軸盤桓不行之意寤宿已覺而猶臥也弗告者不以此樂告人也考槃三章章四句碩人其頎音祈衣去聲錦褧音熲衣齊侯之子衛侯之妻東宫之妹郉侯之姨談公維私賦也碩人指莊姜也頎長貌錦文衣也褧禪也錦衣而加褧焉為其文之太著也東宫太子所居之宫齊太子得臣也繫太子言之者明與同母言所生之貴也女子後生曰妹妻之姊妹曰姨姊妹之夫曰私邢侯談公皆莊姜姊妹之夫互言之也諸侯之女嫁於諸侯則尊同故歷言之莊姜事見邶風緑衣等篇春秋傳曰莊姜美而無子衛人為之賦碩人即謂此詩而其首章極稱其族類之貴以見其為正嫡小君所宜親厚而重歎莊公之昏惑也手如柔荑音啼膚如凝脂領如蝤音囚蠐音齊齒如瓠音互犀螓音秦首蛾眉巧笑倩兮美目盼叶匹見反兮賦也茅之始生曰荑言柔而白也凝脂脂寒而凝者亦言白也領頸也蝤蠐木蟲之白而長者瓠犀瓠中之子方正潔白而比次整齊也螓如蟬而小其額廣而方正蛾蠶蛾也其眉細而長曲倩口輔之美也盼黑白分明也此章言其容貌之美猶前章之意也碩人敖敖音翺說音稅于農郊叶音高四壯有驕音蹺叶音高朱幩鑣鑣音標翟茀音弗以朝音潮叶直豪反大夫夙退無使君勞賦也敖敖長貌說舍也農郊近郊也四牡車之四馬驕壯貌幩鑣飾也鑣者馬銜外鐵人君以朱纒之也鑣鑣盛也翟翟車也夫人以翟羽飾車茀蔽也婦人之車前後設蔽夙早也玉藻曰君日出而視朝退適路寢聽政使人視大夫大夫退然後適小寢釋服此言莊姜自齊來嫁舍止近郊乘是車馬之盛以入君之朝國人樂得以為莊公之配故謂諸大夫朝於君者宜早退無使君勞於政事不得與夫人相親而歎今之不然也河水洋洋北流活活音括叶户劣反施罛音孤濊濊呼活反叶許月反鱣音邅鮪音洧發發音撥叶方月反葭音加菼他覽反揭揭音孑庶姜孽孽庶士有朅音挈賦也河在齊西衛東北流入海洋洋盛太貌活活流貌施設也罛魚罟也濊濊罟入水聲也鱣魚似龍黃色鋭頭口在頷下背上腹下皆有甲大者千餘斤鮪似鱣而小色青黑發發盛貌菼薍也亦謂之荻揭揭長也庶姜謂姪娣孽孽盛飾也庶士謂媵臣朅武貌言齊地廣饒而夫人之來士女佼好禮儀盛備如此亦首章之意也碩人四章章七句氓之蚩蚩音癡抱布貿音茂絲叶新齊反匪來貿絲來即我謀叶謨悲反送子涉淇至于頓丘叶袪竒反匪我愆期子無良媒叶謨悲反將音槍子無怒秋以為期賦也氓民也蓋男子而不知其誰何之稱也蚩蚩無知之貌蓋怨而鄙之也布幣貿買也貿絲蓋初夏之時也頓丘地名愆過也將願也請也此淫婦為人所棄而自叙其事以道其悔恨之意也夫既與之謀而不遂往又責所無以難其事再為之約以堅其志此其計亦狡矣以御蚩蚩之氓宜其有餘而不免於見棄蓋一失其身人所賤惡始雖以欲而迷後必以時而悟是以無往而不困耳士君子立身一敗而萬事瓦裂者何以異此可不戒哉乘彼垝音鬼垣音袁以望復關叶圭員反不見復關泣涕漣漣音連既見復關載笑載言爾卜爾筮體無咎言以爾車來以我賄呼罪反遷賦也垝毁垣牆也復關男子之所居也不敢顯言其人故託言之耳龜曰卜蓍曰筮體兆卦之體也賄財遷徙也與之期矣故及期而乘垝垣以望之既見之矣於是問其卜筮所得卦兆之體若無凶咎之言則以爾之車來迎當以我之賄往遷也桑之未落其葉沃若于音吁下同嗟鳩兮無食桑椹音甚叶知林反于嗟女兮無與士耽叶持林反士之耽兮猶可說也女之耽兮不可說也比而興也沃若潤澤貌鳩鶻鳩也似山雀而小短尾青黑色多聲椹桑實也鳩食椹多則致醉耽相樂也說解也言桑之潤澤以比已之容色光麗然又念其不可恃此而從欲忘反故遂戒鳩無食桑椹以興下句戒女無與士耽也士猶可說而女不可說者婦人被棄之後深自愧悔之辭主言婦人無外事唯以貞信為節一失其正則餘無足觀爾不可便謂士之耽惑實無所妨也桑之落矣其黃而隕叶于貧反自我徂爾三歲食貧淇水湯湯音傷漸音尖車帷裳女也不爽叶師莊反士二其行去聲叶户郎反士也罔極二三其德比也隕落徂往也湯湯水盛貌漸漬也帷裳車飾亦名童容婦人之車則有之爽差極至也言桑之黃落以比已之容色凋謝遂言自我往之爾家而值爾之貧於是見棄復乘車而渡水以歸復自言其過不在此而在彼也三歲為婦靡室勞矣夙興夜寐靡有朝叶直豪反矣言既遂矣至于暴矣兄弟不知嘻音戲其笑叶音燥矣靜言思之躬自悼矣賦也靡不夙早興起也嘻笑貌言我三歲為婦盡心竭力不以室家之務為勞早起夜卧無有朝旦之暇與爾始相謀約之言既遂而爾遽以暴戾加我兄弟見我之歸不知其然但嘻然其笑而已蓋淫奔從人不為兄弟所齒故其見棄而歸亦不為兄弟所恤理固有必然者亦何所歸咎哉但自痛悼而已及爾偕老老使我怨淇則有岸叶魚戰反隰則有泮音畔叶匹見反總角之宴言笑晏晏叶伊佃反信誓旦旦叶得絹反不思其反叶孚絢反反是不思叶新齎反亦已焉哉叶將黎反賦而興也及與也泮涯也高下之判也總角女子未許嫁則未筓但結髮為飾也晏晏和柔也旦旦明也言我與汝本期偕老不知老而見棄如此徒使我怨也淇則有岸矣隰則有泮矣而我總角之時與爾宴樂言笑成此信誓曾不思其反復以至於此也此則興也既不思其反復而至此矣則亦如之何哉亦已而已矣傳曰思其終也思其復也思其反之謂也氓六章章十句籊籊音笛竹竿以釣于淇豈不爾思遠莫致之賦也籊籊長而殺也竹衛物淇衛地也衛女嫁於諸侯思歸寧而不可得故作此詩言思以竹竿釣于淇水而遠不可致也泉源在左淇水在右叶羽軌反女子有行遠去聲父母兄弟叶滿彼反賦也泉源即百泉也在衛之西北而東南流入淇故曰在左淇在衛之西南而東流與泉源合故曰在右思二水之在衛而自歎其不如也淇水在右泉源在左巧笑之瑳上聲佩玉之儺乃可反賦也瑳鮮白色笑而見齒其色瑳然猶所謂粲然皆笑也儺行有度也承上章言二水在衛而自恨其不得笑語遊戲於其間也淇水悠悠音由檜楫松舟駕言出遊以寫我憂賦也悠悠流貌檜木名似柏楫所以行舟也與泉水之卒章同意竹竿四章章四句芄音丸蘭之支童子佩觿音畦雖則佩觿能不我知容兮遂兮垂帶悸其季反兮興也芄蘭草一名蘿摩蔓生斷之有白汁可啖支枝同觿錐也以象骨為之所以解結成人之佩非童子之飾也知猶智也言其才能不足以知於我也容遂舒緩放肆之貌悸帶下垂之貌芄蘭之葉童子佩韘雖則佩韘能不我甲容兮遂兮垂帶悸兮興也韘決也以象骨為之著右手大指所以鉤弦闓體鄭氏曰沓也即大射所謂朱極三是也以朱韋為之用以彄沓右手食指將指無名指也甲長也言其才能不足以長於我也芄蘭二章章六句此詩不知所謂不敢強解誰謂河廣一葦音偉杭之誰謂宋遠跂音企豫望叶武方反之賦也葦蒹葭之屬杭度也衛在河北宋在河南宣姜之女為宋桓公夫人生襄公而出歸于衛襄公即位夫人思之而義不可往蓋嗣君承父之重與祖為體母出與廟絶不可以私反故作此詩言誰謂河廣乎但以一葦加之則可以渡矣誰謂宋國遠乎但一跂足而望則可以見矣明非宋遠而不可至也乃義不可而不得往耳誰謂河廣曾不容刀誰謂宋遠曾不崇朝賦也小船曰刀不容刀言小也崇終也行不終朝而至言近也河廣二章章四句范氏曰夫人之不往義也天下豈有無母之人歟有千乘之國而不得養其母則人之不幸也為襄公者將若之何生則致其孝沒則盡其禮而已衛有婦人之詩自共姜至於襄公之母六人焉皆止於禮義而不敢過也夫以衛之政教淫僻風俗傷敗然而女子乃有知禮而畏義如此者則以先王之化猶有存焉故也伯兮朅音挈兮邦之桀兮伯也執殳音殊為去聲王前驅賦也伯婦人目其夫之字也朅武貌桀才過人也殳長丈二而無刃婦人以夫久從征役而作是詩言其君子之才之美如是今方執殳而為王前驅也自伯之東首如飛蓬豈無膏沐誰適音的為容賦也蓬草名其華如柳絮聚而飛如亂髮也膏所以澤髮者沐滌首去垢也適主也言我髮亂如此非無膏沐可以為容所以不為者君子行役無所主而為之故也傳曰女為說已容其雨其雨杲杲古老反出日願言思伯甘心首疾比也其者冀其將然之辭冀其將雨而杲然日出以比望其君子之歸而不歸也是以不堪憂思之苦而寧甘心於首疾也焉音煙得諼音萱草言樹之背音佩願言思伯使我心痗音妹賊也諼忘也諼草合歡食之令人忘憂者背北堂也痗病也言焉得忘憂之草樹之北堂以忘吾憂乎然終不忍忘也是以寧不求此草而但願言思伯雖至於心痗而不辭爾心痗則其病益深非特首疾而已也伯兮四章章四句范氏曰居而相離則思期而不至則憂此人之情也文王之遣戍役周公之勞歸士皆叙其室家之情男女之思以閔之故其民悅而忘死聖人能通天下之志是以能成天下之務兵者毒民於死者也孤人之子寡人之妻傷天地之和召水旱之災故聖王重之如不得已而行則告以歸期念其勤勞哀傷慘怛不啻在已是以治世之詩則言其君上閔恤之情亂世之詩則録其室家怨思之苦以為人情不出乎此也有狐綏綏在彼淇梁心之憂矣之子無裳比也狐者妖媚之獸綏綏獨行求匹之貌石絶水曰梁在梁則可以裳矣國亂民散喪其妃耦有寡婦見鰥夫而欲嫁之故託言有狐獨行而憂其無裳也有狐綏綏在彼淇厲心之憂矣之子無帶叶丁計反比也厲深水可涉處也帶所以申束衣也在厲則可以帶矣有狐綏綏在彼淇側心之憂矣之子無服叶蒲北反比也濟乎水則可以服矣有狐三章章四句投我以木瓜叶攻乎反報之以瓊琚音居匪報也永以為好去聲也比也木瓜楙木也實如小瓜酢可食瓊玉之美者琚佩玉名言人有贈我以微物我當報之以重寶而猶未足以為報也但欲其長以為好而不忘耳疑亦男女相贈答之辭如靜女之類投我以木桃報之以瓊瑤匪報也永以為好也比也瑤美玉也投我以木李報之以瓊玖音久叶舉里反匪報也永以為好也比也玖亦玉名也木瓜三章章四句衛國十篇三十四章二百三句張子曰衛國地濵大河其地土薄故其人氣輕浮其地平下故其人質柔弱其地肥饒不費耕耨故其人心怠惰其人情性如此則其聲音亦淫靡故聞其樂使人懈慢而有邪僻之心也鄭詩放此王一之六王謂周東都洛邑王城畿內方六百里之地在禹貢豫州大華外方之間北得河陽漸冀州之南也周室之初文王居豐武王居鎬至成王周公始營洛邑為時㑹諸侯之所以其土中四方來者道里均故也自是謂豐鎬為西都而洛邑為東都至幽王嬖褒姒生伯服廢申后及太子宜臼宜臼奔申申侯怒與犬戎攻宗周弒幽王于戲晉文侯鄭武公迎宜臼于申而立之是為平王徙居東都王城於是王室遂卑與諸侯無異故其詩不為雅而為風然其王號未替也故不曰周而曰王其地則今河南府及懷孟等州是也彼黍離離彼稷之苗行邁靡靡中心搖搖知我者謂我心憂不知我者謂我何求悠悠蒼天叶鐡因反此何人哉賦而興也黍穀名苗似蘆高丈餘穗黑色實圓重離離垂貌稷亦穀也一名穄似黍而小或曰粟也邁行也靡靡猶遲遲也搖搖無所定也悠悠遠貌蒼天者據遠而視之蒼蒼然也周既東遷大夫行役至于宗周過故宗廟宫室盡為禾黍閔周室之顛覆倣徨不忍去故賦其所見黍之離離與稷之苗以興行之靡靡心之搖搖既歎時人莫識已意又傷所以致此者果何人哉追怨之深也彼黍離離彼稷之穗音遂行邁靡靡中心如醉知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉賦而興也穗秀也稷穗下垂如心之醉故以起興彼黍離離彼稷之實行邁靡靡中心如噎音咽叶於悉反知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉賦而興也噎憂深不能喘息如噎之然稷之實如心之噎故以起興黍離三章章十句元城劉氏曰常人之情於憂樂之事初遇之則其心變焉次遇之則其變少衰三遇之則其心如常矣至於君子忠厚之情則不然其行役往來固非一見也初見稷之苗矣又見稷之穗矣又見稷之實矣而所感之心終始如一不少變而愈深此則詩人之意也君子于役不知其期曷至哉叶將黎反雞棲音西于塒音時日之夕矣羊牛下來叶陵之反君子于役如之何勿思叶新齎反賦也君子婦人日其夫之辭鑿牆而棲曰塒日夕則羊先歸而牛次之大夫久役于外其室家思而賦之曰君子行役不知其反還之期且今亦何所至哉雞則棲于塒矣日則夕矣牛羊則下來矣是則畜産出入尚有旦暮之節而行役之君子乃無休息之時使我如何而不思也哉君子于役不日不月曷其有佸音括叶户劣反雞棲于桀日之夕矣羊牛下括音聒叶古劣反君子于役苟無飢渴叶巨列反賦也佸㑹桀杙括至苟且也君子行役之久不可計以日月而又不知其何時可以來㑹也亦庶幾其免於飢渴而已矣此憂之深而思之切也君子于役二章章八句君子陽陽左執簧音黃右招我由房其樂音洛只音止且音疽賦也陽陽得志之貌簧笙竽管中金葉也蓋笙竽皆以竹管植於匏中而竅其管底之側以薄金葉障之吹則鼓之而出聲所謂簧也故笙竽皆謂之簧笙十三簧或十此九簧竽三十六簧也由從也房東房也只且語助辭詩疑亦前篇婦人所作蓋其夫既歸不以行役為勞而安於貧賤以自樂其家人又識其意而深歎美之皆可謂賢矣豈非先王之澤哉或曰序說亦通宜更詳之君子陶陶左執翿音桃右招我由敖音翺其樂只且賦也陶陶和樂之貌翿舞者所持羽旄之屬敖舞位也君子陽陽二章章四句揚之水不流束薪彼其音記之子不與我戍申懷叶胡威反哉懷哉曷月豫還音旋歸哉興也揚悠揚也水緩流之貌彼其之子戍人指其室家而言也戍屯兵以守也申姜姓之國平王之母家也在今鄧州信陽軍之境懷思曷何也平王以申國近楚數被侵伐故遣畿內之民戍之而戍者怨思作此詩也興取之不二字如小星之例揚之水不流束楚彼其之子不與我戍甫懷哉懷哉曷月豫還歸哉興也楚木也甫即呂也亦姜姓書呂刑禮記作甫刑而孔氏以為吕侯後為甫侯是也當時蓋以申故而并戍之今未知其國之所在計亦不遠於申許也揚之水不流束蒲叶滂古反彼其之子不與我戍許懷哉懷哉曷月豫還歸哉興也蒲蒲柳春秋傳云董澤之蒲杜氏云蒲楊柳可以為箭者是也許國名亦姜姓今潁昌府許昌縣是也揚之水三章章六句申侯與犬戎攻宗周而弒幽王則申侯者王法必誅不赦之賊而平王與其臣庶不共戴天之讎也今平王知有母而不知有父知其立已為有德而不知其弒父為可怨至使復讎討賊之師反為報施酬恩之舉則其忘親逆理而得罪於天已甚矣又况先王之制諸侯有故則方伯連帥以諸侯之師討之王室有故則方伯連帥以諸侯之師救之天子鄉遂之民供貢賦衛王室而已今平王不能行其威令於天下無以保其母家乃勞天子之民遠為諸侯戌守故周人之戍申者又以非其職而怨思焉則其衰懦微弱而得罪於民又可見矣嗚呼詩亡而後春秋作其不以此也哉中谷有蓷吐雷反暵音罕其乾矣有女仳音痞離慨其嘆音癱矣慨其嘆矣遇人之艱難矣興也蓷隼也葉似萑方莖白華華生節閒即今益母草也暵燥仳别也慨歎聲艱難窮厄也凶年饑饉室家相棄婦人覽物起興而自述其悲歎之辭也中谷有蓷暵其修叶式竹反矣有女仳離條其嘯叶息六反矣條其嘯矣遇人之不淑矣興也修長也或曰乾也如脯之謂修也條條然嘯貌嘯蹙口出聲也悲恨之深不止於嘆矣淑善也古者謂死喪饑饉皆曰不淑蓋以吉慶為善事凶禍為不善事雖今人語猶然也曾氏曰凶年而遽相棄背蓋衰薄之甚者而詩人乃曰遇斯人之艱難遇斯人之不淑而無怨懟過甚之辭焉厚之至也中谷有蓷暵其濕矣有女仳離啜張劣反其泣矣啜其泣矣何嗟及矣興也暵濕者旱甚則草之生於濕者亦不免也啜泣貌何嗟及矣言事已至此末如之何窮之甚也中谷有蓷三章章六句范氏曰世治則室家相保者上之所養也世亂則室家相棄者上之所殘也其使之也勤其取之也厚則夫婦日以衰薄而凶年不免於離散矣伊尹曰匹夫匹婦不獲自盡民主罔與成厥功故讀詩者於一物失所而知王政之惡一女見棄而知人民之困周之政荒民散而將無以為國於此亦可見矣有兔爰爰雉離于羅我生之初尚無為叶吾禾反我生之後逢此百罹叶良何反尚寐無吪比也兔性隂狡爰爰緩意雉性耿介離麗羅網尚猶罹憂也尚庶幾也吪動也周室衰微諸侯肯叛君子不樂其生而作此詩言張羅夲以取兔今兔狡得脫而雉以耿介反離于羅以比小人致亂而以巧計幸免君子無辜而以忠直受禍也為此詩者蓋猶及見西周之盛故曰方我生之初天下尚無事及我生之後而逢時之多難如此然既無如之何則但庶幾寐而不動以死耳或曰興也以兔爰興無為以雉離興百罹也下章放此有兔爰爰雉離于罦音孚叶步廟反我生之初尚無造我生之後逢此百憂叶一笑反尚寐無覺音教叶居笑反比也罦覆車也可以掩兔造亦為也覺寤也有兔爰爰雉離于罿音衝我生之初尚無庸我生之後逢此百凶尚寐無聰比也罿罬也即罦也或曰施羅於車上也庸用聰聞也無所聞則亦死耳兔爰三章章七句綿綿葛藟音壘在河之滸音虎終遠去聲兄弟謂他人父謂他人父亦莫我顧叶果五反興也綿綿長而不絶之貌岸上曰滸世衰民散有去其鄉里家族而流離失所者作此詩以自歎言綿綿葛藟則在河之滸矣今乃終遠兄弟而謂他人為已父已雖謂彼為父而彼亦不我顧則其窮也甚矣綿綿葛藟在河之涘音俟叶矣始二音終遠兄弟謂他人母叶滿彼反謂他人母亦莫我有叶羽已反興也水涯曰涘謂他人父者其妻則母也有識有也春秋傳曰不有寡君綿綿葛藟在河之漘音脣終遠兄弟謂他人昆叶古勻反謂他人昆亦莫我聞叶微勻反興也夷上灑下曰漘漘之為言脣也昆兄也聞相聞也葛藟三章章六句彼采葛叶音謁兮一日不見如三月兮賦也采葛所以為絺綌蓋淫奔者託以行也故因以指其人而言思念之深未久而似久也彼采蕭叶疏鳩反兮一日不見如三秋兮賦也蕭荻也白葉莖粗科生有香氣祭則􅌊以報氣故采之曰三秋則不止三月矣彼采艾兮一日不見如三嵗本與艾叶兮賦也艾蒿屬乾之可灸故采之曰三嵗則不止三秋矣采葛三章章三句大車檻檻毳尺鋭反衣如菼吐敢反豈不爾思畏子不敢賦也大車大夫車檻檻車行聲也毳衣天子大夫之服菼蘆之始生也毳衣之屬衣繪而裳繡五色皆備其青者如菼爾淫奔者相命之辭也子大夫也不敢不敢奔也周衰大夫猶有能以刑政治其私邑者故淫奔者畏而歌之如此然其去二南之化則遠矣此可以觀世變也大車啍啍音吞毳衣如璊音門豈不爾思畏子不奔賦也啍啍重遲之貌璊玉赤色五色備則有赤穀則異室死則同穴叶户橘反謂豫不信有如皎音皎日賦也穀生穴壙皎白也民之欲相奔者畏其大夫自以終身不得如其志也故曰生不得相奔以同室庶幾死得合葬以同穴而已謂豫不信有如皎日約誓之辭也大車三章章四句丘中有麻彼留子嗟彼留子嗟將音槍其來施施叶蛇賦也麻穀名子可食皮可績為布者子嗟男子之字也將願也施施喜悅之意婦人望其所與私者而不來故疑丘中有麻之處復有與之私而留之者今安得其施施然而來乎丘中有麥彼留子國彼留子國將其來食賦也子國亦男子字也來食就我而食也丘中有李彼留之子叶奬里反彼留之子貽我佩玖叶舉里反賦也之子并指前二人也貽我佩玖冀其冇以贈已也丘中有麻三章章四句王國十篇二十八章百六十二句詩經集傳卷二
