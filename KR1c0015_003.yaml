body:
  text: 詩經集傳卷三宋朱子撰鄭一之七鄭邑名本在西都畿内咸休之地宣王以封其弟友為采地後為幽王司徒而死於夫戎之難是為桓公其子武公掘突定平王於東都亦為司徒又得虢檜之地乃徙其封而施舊號於新邑是為新鄭咸林在今華州鄭縣新鄭即今之鄭州是也其封域山川詳見檜風緇衣之宜兮敝予又改為兮適子之館叶古玩反兮還予授子之粲兮賦也緇黑色緇衣卿大夫居私朝之服也宜稱改更適之館舍粲餐也或曰粲粟之精鑿者舊説鄭桓公武公相繼為周司徒善於其職周人愛之故作是詩言子之服緇衣也甚宜敝則我將為子更為之且將適子之館既還而又授子以粲言好之無已也緇衣之好兮敝予又改造叶在早反兮適子之館兮還予授子之粲兮賦也好猶宜也緇衣之蓆叶祥籥反兮敝予又改作兮適子之館兮還予授子之粲兮賦也蓆大也程子曰蓆有安舒之義服稱其德則安舒也緇衣三章章四句記曰好賢如緇衣又曰於緇衣見好賢之至將音槍仲子兮無踰我里無折音哲我樹杞豈敢愛之畏我父母叶滿彼反仲可懷叶胡威反也父母之言亦可畏叶於非反也賦也將請也仲子男子之字也我女子自我也里二十五家所居也杞柳屬也生水旁樹如柳葉麤而白色理微赤蓋里之地域溝樹也莆田鄭氏曰此滛奔者之辭將仲子兮無踰我牆無折我樹桑豈敢愛之畏我諸兄叶虚陽反仲可懷也諸兄之言亦可畏也賦也牆垣也古者樹牆下以桑將仲子兮無踰我園無折我樹檀叶徒沿反豈敢愛之畏人之多言仲可懷也人之多言亦可畏也賦也園者圃之藩其内可種木也檀皮青滑澤材彊韌可為車將仲子三章章八句叔于田叶池因反巷無居人豈無居人不如叔也洵美且仁賦也叔莊公弟共叔段也事見春秋田取禽也巷里塗也洵信美好也仁愛人也段不義而得衆國人愛之故作此詩言叔出而田則所居之巷若無居人矣非實無居人也雖有而不如叔之美且仁是以若無人耳或疑此亦民間男女相悦之辭也叔于狩叶始九反巷無飲酒豈無飲酒不如叔也洵美且好叶許厚反賦也冬獵曰狩叔適野叶上與反巷無服馬叶滿補反豈無服馬不如叔也洵美且武賦也適之也郊外曰野服乘也叔于田三章章五句叔于田乘乘下去聲馬叶滿補反執轡如組音祖兩驂如舞叔在藪音叟叶素苦反火烈具舉襢音但裼音錫暴虎獻于公所將音槍叔無狃音紐叶女古反戒其傷女音汝賦也叔亦段也車衡外兩馬曰驂如舞謂諧和中節皆言御之善也藪澤也火焚而射也烈熾盛貌具俱也襢裼肉袒也暴空手摶獸也公莊公也狃習也國人戒之曰請叔無習此事恐其或傷汝也蓋叔多材好勇而鄭人愛之如此叔于田乘乘黄兩服上襄兩驂鴈行音杭叔在藪火烈具揚叔善射忌音記又良御叶魚駕反忌抑磬音慶控口貢反忌抑縱送忌賦也乘黄四馬皆黄也衡下夾轅兩馬曰服襄駕也馬之上者為上駕猶言上駟也鴈行者驂少次服後如鴈行也揚起也忌抑皆語助辭騁馬曰磬止馬曰控舍㧞曰縱覆彇曰送叔于田乘乘鴇音保叶補苟反兩服齊首兩驂如手叔在藪火烈具阜叔馬慢叶黄半反忌叔發罕叶虚旰反忌抑釋掤音冰忌抑鬯音暢弓叶姑𢎞反忌賦也驪白雜毛曰鴇今所謂烏驄也齊首如手兩服並首在前而兩驂在旁稍次其後如人之兩手也阜盛慢遲也發發矢也罕希釋解也掤矢筩蓋春秋傳作冰鬯弓囊也與韔同言其田事將畢而從容整暇如此亦喜其無傷之辭也大叔于田三章章十句陸氏曰首章作大叔于田者誤蘇氏曰二詩皆曰叔于田故加大以别之不知者乃以叚有大叔之號而讀曰泰又加大於首章失之矣清人在彭叶普郎反駟介旁旁音崩叶補岡反二矛重平聲英叶於良反河上乎翺翔賦也清邑名清人清邑之人也彭河上地名駟介四馬而被甲也旁旁馳驅不息之貌二矛酋矛夷矛也英以朱羽為矛飾也酋矛長二丈夷矛長二丈四尺並建於車上則其英重疊而見翺翔遊戲之貌鄭文公惡髙克使將清邑之兵禦狄於河上久而不召師散而歸鄭人為之賦此詩言其師出之久無事而不得歸但相與遊戲如此其勢必至於潰散而後已爾清人在消駟介麃麃音標二矛重喬河上乎逍遥賦也消亦河上地名麃麃武貌矛之上句曰喬所以懸英也英弊而盡所存者喬而已清人在軸叶音冑駟介陶陶叶徒候反左旋右抽叶敕救反中軍作好叶許候反賦也軸亦河上地名陶陶樂而自適之貌左謂御在將車之左執轡而御馬者也旋還車也右謂勇力之士在將車之右執兵以擊刺者也抽拔刃也中軍謂將在鼓下居車之中即高克也好謂容好也東萊吕氏曰言師久而不歸無所聊賴姑遊戲以自樂必潰之勢也不言已潰而言將潰其情深其辭危矣清人三章章四句事見春秋胡氏曰人君擅一國之名寵生殺予奪惟我所制耳使高克不臣之罪已著按而誅之可也情狀未明黜而退之可也愛惜其才以禮馭之亦可也烏可假以兵權委諸竟上坐視其離散而莫之䘏乎春秋書曰鄭棄其師其責之深矣羔裘如濡叶而朱而由二反洵直且侯叶洪姑洪鉤二反彼其音記之子舍音赦命不渝叶容朱容周二反賦也羔裘大夫服也如濡潤澤也洵信直順侯美也其語助辭舍處渝變也言此羔裘潤澤毛順而美彼服此者當生死之際又能以身居其所受之理而不可奪蓋美其大夫之辭然不知其所指矣羔裘豹飾孔武有力彼其之子邦之司直賦也飾緣袖也禮君用純物臣下之故羔裘而以豹皮為飾也孔甚也豹甚武而有力故服其所飾之裘者如之司主也羔裘晏兮三英粲兮彼其之子邦之彦叶魚旰反兮賦也晏鮮盛也三英裘飾也未詳其制粲光明也彦者士之美稱羔裘三章章四句遵大路兮摻所覽反執子之袪叶起據反兮無我惡去聲兮不寁音昝故也賦也遵循摻擥袪袂寁速故舊也滛婦為人所棄故於其去也擥其袪而留之曰子無惡我而不留故舊不可以遽絶也宋玉賦有遵大路兮攬子袪之句亦男女相説之辭也遵大路兮摻執子之手兮無我魗音讎叶齒九反兮不寁好叶許口反也賦也魗與醜同欲其不以已為醜而棄之也好情好也遵大路二章章四句女曰雞鳴士曰昧旦子興視夜明星有爛將翶將翔弋鳧音符與鴈賦也昧晦旦明也昧旦天欲旦昧晦未辨之際也明星啓明之星先日而出者也弋繳射謂以生絲繫矢而射也鳧水鳥如鴨青色背上有文此詩人述賢夫婦相警戒之詞言女曰雞鳴以警其夫而士曰昧旦則不止於雞鳴矣婦人又語其夫曰若是則子可以起而視夜之如何意者明星已出而爛然則當翺翔而往弋取鳧鴈而歸矣其相與警戒之言如此則不留於宴昵之私可知矣弋言加叶居之居何二反之與子宜叶魚竒魚何二反之宜言飲酒與子偕老叶吕吼反琴瑟在御莫不静好叶許厚反賦也加中也史記所謂以弱弓微繳加諸鳧鴈之上是也宜和其所宜也内則所謂鴈宜麥之屬是也射者男子之事而中饋婦人之職故婦謂其夫既得鳧鴈以歸則我當為子和其滋味之所宜以之飲酒相樂期於偕老而琴瑟之在御者亦莫不安静而和好其和樂而不淫可見矣知子之來叶六直反之雜佩以贈叶音則之知子之順之雜佩以問之知子之好去聲之雜佩以報之賦也來之致其來者如所謂脩文德以來之雜佩者左右佩玉也上横曰珩下繫三組貫以蠙珠中組之半貫一大珠曰瑀末懸一玉兩端皆鋭曰衝牙兩旁組半各懸一玉長博而方曰琚其末各懸一玉如半璧而内向曰璜又以兩組貫珠上繫珩兩端下交貫於瑀而下繫於兩璜行則衝牙觸璜而有聲也吕氏曰非獨玉也觽燧箴管凡可佩者皆是也贈送順愛問遺也婦又語其夫曰我苟知子之所致而來及所親愛者則當解此雜佩以送遺報答之蓋不惟治其門内之職又欲其君子親賢友善結其驩心而無所愛於服飾之玩也女曰雞鳴三章章六句有女同車顔如舜華叶芳無反將翺將翔佩玉瓊琚彼美孟姜洵美且都賦也舜木槿也樹如李其華朝生暮落孟字姜姓洵信都閑雅也此疑亦淫奔之詩言所與同車之女其美如此而又歎之曰彼美色之孟姜信美矣而又都也有女同行叶户郎反顔如舜英叶於良反將翺將翔佩玉將將音鏘彼美孟姜德音不忘賦也英猶華也將將聲也德音不忘言其賢也有女同車二章章六句山有扶蘇隰有荷華叶芳無反不見子都乃見狂且音疽興也扶蘇扶胥小木也荷華芙蕖也子都男子之美者也狂狂人也且語辭也淫女戲其所私者曰山則有扶蘇矣隰則冇荷華矣今乃不見子都而見此狂人何哉山有橋松隰有游龍不見子充乃見狡童興也上竦無枝曰橋亦作喬游枝葉放縱也龍紅草也一名馬蓼葉大而色白生水澤中高丈餘子充猶子都也狡童狡獪之小兒也山有扶蘇二章章四句蘀音托兮蘀兮風其吹女音汝叔兮伯兮倡去聲予和去聲叶户圭反女興也蘀木槁而將落者也女指蘀而言也叔伯男子之字也予女子自予也女叔伯也此淫女之辭言蘀兮蘀兮則風將吹女矣叔兮伯兮則盍倡予而予將和女矣蘀兮蘀兮風其漂女叔兮伯兮倡予要音腰女興也漂飄同要成也蘀兮二章章四句彼狡童兮不與我言兮維子之故使我不能餐七丹反叶七宣反兮賦也此亦淫女是絶而戲其人之詞言悦已者衆子雖見絶未至於使我不能餐也彼狡童兮不與我食兮維子之故使我不能息兮賦也息安也狡童二章章四句子惠思我褰裳涉溱音臻子不我思豈無他人狂童之狂也且音疽賦也惠愛也溱鄭水名狂童猶狂且狡童也且語辭也淫女語其所私者曰子惠然而思我則將褰裳而渉溱以從子子不我思則豈無他人之可從而必於子哉狂童之狂也且亦謔之之辭子惠思我褰裳涉洧叶于已反子不我思豈無他士狂童之狂也且賦也洧亦鄭水名士未娶者之稱褰裳二章章五句子之丰音風叶芳用反兮俟我乎巷叶胡貢反兮悔予不送兮賦也丰豐滿也巷門外也婦人所期之男子已俟乎巷而婦人以有異志不從既則悔之而作是詩也子之昌兮俟我乎堂兮悔予不將兮賦也昌盛壯貌將亦送也衣去聲錦褧絅同衣裳錦褧裳叔兮伯兮駕予與行叶户郎反賦也褧襌也叔伯或人之字也婦人既悔其始之不送而失此人也則曰我之服飾既盛備矣豈無駕車以迎我而偕行者乎裳錦褧裳衣錦褧衣叔兮伯兮駕予與歸賦也婦人謂嫁曰歸丰四章二章章三句二章章四句東門之墠音善叶上演反茹音如藘音閭在阪音反叶孚臠反其室則邇其人甚遠賦也東門城東門也墠除地町町者茹藘茅蒐也一名茜可以染絳陂者曰阪門之旁有墠墠之外有阪阪之上有草識其所與淫者之居也室邇人遠者思之而未得見之辭東門之栗有踐家室豈不爾思子不我即賦也踐行列貌門之旁有栗栗之下有成行列之家室亦識其處也即就也東門之墠二章章四句風雨淒淒音妻雞鳴喈喈音皆叶居奚反既見君子云胡不夷賦也淒淒寒涼之氣喈喈雞鳴之聲風雨晦冥蓋淫奔之時君子指所期之男子也夷平也淫奔之女言當此之時見其所期之人而心悦也風雨瀟瀟雞鳴膠膠叶音驕既見君子云胡不瘳叶憐蕭反賦也瀟瀟風雨之聲膠膠猶喈喈也瘳病愈也言積思之病至此而愈也風雨如晦叶呼洧反雞鳴不已既見君子云胡不喜賦也晦昏已止也風雨三章章四句青青子衿音金悠悠我心縱我不往子寧不嗣音賦也青青純緣之色具父母衣純以青子男子也衿領也悠悠思之長也我女子自我也嗣音繼續其聲問也此亦淫奔之詩青青子佩叶蒲眉反悠悠我思叶新齎反縱我不往子寧不來叶陵之反賦也青青組綬之色佩佩玉也挑兮達音獺叶他悦反兮在城闕兮一日不見如三月兮賦也挑輕儇跳躍之貌達放恣也子衿三章章四句揚之水不流束楚終鮮上聲兄弟維子與女女汝同無信人之言人實迋音誑女興也兄弟婚姻之稱禮所謂不得嗣為兄弟是也子女男女自相謂也人他人也迋與誑同淫者相謂言揚之水則不流束楚矣終鮮兄弟則維子與女矣豈可以他人離閒之言而疑之哉彼人之言特誑女耳揚之水不流束薪終鮮兄弟維予二人無信人之言人實不信叶斯人反興也揚之水二章章六句出其東門有女如雲雖則如雲匪我思存縞音杲衣綦音其巾聊樂音洛我員音云賦也如雲美且衆也縞白色綦蒼艾色縞衣綦巾女服之貧陋者此人自目其室家也員與云同語辭也人見淫奔之女而作此詩以為此女雖美且衆而非我思之所存不如已之室家雖貧且陋而聊可以自樂也是時淫風大行而其間乃有如此之人亦可謂能自好而不為習俗所移矣羞惡之心人皆有之豈不信哉出其闉音因闍音都有女如荼音徒雖則如荼匪我思且音疽縞衣茹藘聊可與娛賦也闉曲城也闍城臺也荼茅華輕白可愛者也且語助辭茹藘可以染絳故以名衣服之色娛樂也出其東門二章章六句野有蔓草零露漙音團叶上兗反兮有美一人清揚婉兮邂逅相遇適我願叶五遠反兮賦而興也蔓延也漙露多貌清揚眉目之間婉然美也邂逅不期而㑹也男女相遇於野田草露之閒故賦其所在以起興言野有蔓草則零露漙矣有美一人則清揚婉矣邂逅相遇則得以適我願矣野有蔓草零露瀼瀼有美一人婉如清揚邂逅相遇與子偕臧賦而興也瀼瀼亦露多貌臧美也與子偕臧言各得其所欲也野有蔓草二章章六句溱與洧方渙渙叶于元反兮士與女方秉蕳音閒叶古賢反兮女曰觀乎士曰既且音疽且往觀乎洧之外洵訏音吁且樂音洛維士與女伊其相謔贈之以勺藥賦而興也渙渙春水盛貌蓋冰解而水散之時也蕳蘭也其莖葉似澤蘭廣而長節節中赤高四五尺且語辭洵信訏大也勺藥亦香草也三月開花芳色可愛鄭國之俗三月上已之辰采蘭水上以祓除不祥故其女問於士曰盍往觀乎士曰吾既往矣女復要之曰且往觀乎蓋洧水之外其地信寛大而可樂也於是士女相與戲謔且以勺藥為贈而結恩情之厚也此詩淫奔者自叙之辭溱與洧瀏音留其清矣士與女殷其盈矣女曰觀乎士曰既且且往觀乎洧之外洵訏且樂維士與女伊其將謔贈之以勺藥賦而興也瀏深貌殷衆也將當作相聲之誤也溱洧二章章十二句鄭國二十一篇五十三章二百八十三句鄭衛之樂皆為淫聲然以詩考之衛詩三十有九而淫奔之詩才四之一鄭詩二十有一而淫奔之詩已不翅七之五衛猶為男悦女之辭而鄭皆為女惑男之語衛人猶多刺譏懲創之意而鄭人幾於蕩然無復羞愧悔悟之萌是則鄭聲之淫有甚於衛矣故夫子論為邦獨以鄭聲為戒而不及衛蓋舉重而言固自有次第也詩可以觀豈不信哉齊一之八齊國名本少昊時爽鳩氏所居之地在禹貢為青州之域周武王以封太公望東至于海西至于河南至于穆陵北至于無棣太公姜姓本四岳之後既封於齊通工商之業便魚鹽之利民多歸之故為大國今青齊淄濰德棣等州是其地也雞既鳴矣朝音潮既盈矣匪雞則鳴蒼蠅之聲賦也言古之賢妃御於君所至於將旦之時必告君曰雞既鳴矣㑹朝之臣既已盈矣欲令君早起而視朝也然其實非雞之鳴也乃蒼蠅之聲也蓋賢妃當夙興之時心常恐晚故聞其似者而以為真非其心存警畏而不留於逸欲何以能此故詩人叙其事而美之也東方明叶謨郎反矣朝既昌矣匪東方則明月出之光賦也東方明則日將出矣昌盛也此再告也蟲飛薨薨甘與子同夢叶莫縢反㑹且歸矣無庶予子憎賦也蟲飛夜將旦而百蟲作也甘樂㑹朝也此三告也言當此時我豈不樂與子同寢而夢哉然羣臣之㑹於朝者俟君不出將散而歸矣無乃以我之故而并以子為憎乎雞鳴三章章四句子之還音旋兮遭我乎峱音鐃之閒叶居賢反兮並驅從兩肩兮揖我謂我儇許全反兮賦也還便捷之貌峱山名也從逐也獸三歲曰肩儇利也獵者交錯於道路且以便捷輕利相稱譽如此而不自知其非也則其俗之不美可見而其來亦必有所自矣子之茂叶莫口反兮遭我乎峱之道叶徒厚反兮並驅從兩牡兮揖我謂我好叶許厚反兮賦也茂美也子之昌兮遭我乎峱之陽兮並驅從兩狼兮揖我謂我臧兮賦也昌盛也山南曰陽狼似犬銳頭白頰髙前廣後臧善也還三章章四句俟我於著音宁叶直居反乎而充耳以素叶孫租反乎而尚之以瓊華叶芳無反乎而賦也俟待也我嫁者自謂也著門屏之閒也充耳以纊懸瑱所謂紞也尚加也瓊華美石似玉者即所以為瑱也東萊吕氏曰昏禮壻往婦家親迎既奠鴈御輪而先歸俟於門外婦至則揖以入時齊俗不親迎故女至壻門始見其俟已也俟我於庭乎而充耳以青乎而尚之以瓊瑩音榮乎而賦也庭在大門之内寢門之外瓊瑩亦美石似玉者吕氏曰此昏禮所謂壻道婦及寢門揖入之時也俟我於堂乎而充耳以黄乎而尚之以瓊英叶於良反乎而賦也瓊英亦美石似玉者吕氏曰升階而後至堂此昏禮所謂升自西階之時也著三章章三句東方之日兮彼姝音樞者子在我室兮在我室兮履我即兮興也履躡即就也言此女躡我之跡而相就也東方之月兮彼姝者子在我闥叶宅悦反兮在我闥兮履我發叶方月反兮興也闥門内也發行去也言躡我而行去也東方之日二章章五句東方未明叶謨郎反顛倒上聲衣裳顛之倒叶都妙反之自公召之賦也自從也羣臣之朝别色始入此詩人刺其君興居無節號令不時言東方未明而顛倒其衣裳則既早矣而又已有從君所而來召之者焉蓋猶以為晚也或曰所以然者以有自公所而召之者故也東方未晞顛倒裳衣倒之顛叶典因反之自公令去聲叶力呈反之賦也晞明之始升也令號令也折音哲柳樊圃叶博故反狂夫瞿瞿音句不能辰夜叶羊茹反不夙則莫音慕比也柳楊之下垂者柔脆之木也樊藩也圃菜圜也瞿瞿驚顧之貌夙早也折柳樊圃雖不足恃然狂夫見之猶驚顧而不敢越以比辰夜之限甚明人所易知今乃不能知而不失之早則失之莫也東方未明三章章四句南山崔崔音摧雄狐綏綏魯道有蕩齊子由歸既曰歸止曷又懷叶胡威反止比也南山齊南山也崔崔高大貌狐邪媚之獸綏綏求匹之貌魯道適魯之道也蕩平易也齊子襄公之妹魯桓公夫人文姜襄公通焉者也由從也婦人謂嫁曰歸懐思也止語辭言南山有狐以比襄公居高位而行邪行且文姜既從此道歸於魯矣襄公何為而復思之乎葛屨五兩如字又音亮冠緌音㽔雙叶所終反止魯道有蕩齊子庸止既曰庸止曷又從止比也兩二屨也緌冠上飾也屨必兩緌必雙物各有耦不可亂也庸用也用此道以嫁於魯也從相從也蓺麻如之何衡音横從音宗其畆取去聲妻如之何必告音谷父母既曰告止曷又鞠音菊止興也蓺樹鞠窮也欲樹麻者必先縱横耕治其田畝欲娶妻者必先告其父母今魯桓公既告父母而娶矣又曷為使之得窮其欲而至此哉析薪如之何匪斧不克取妻如之何匪媒不得既曰得止曷又極止興也克能也極亦窮也南山四章章六句春秋桓公十八年公與夫人姜氏如齊公薨於齊傳曰公將有行遂與姜氏如齊申繻曰女有家男有室無相瀆也謂之有禮易此必敗公㑹齊侯于濼遂及文姜如齊齊侯通焉公謫之以告夏四月享公使公子彭生乘公公薨于車此詩前二章刺齊襄後二章刺魯桓也無田音佃甫田維莠音酉驕驕叶音髙無思遠人勞心忉忉音刀比也田謂耕治之也甫大也莠害苖之草也驕驕張王之意忉忉憂勞也言無田甫田也田甫田而力不給則草盛矣無思遠人也思遠人而人不至則心勞矣以戒時人厭小而務大忽近而圖遠將徒勞而無功也無田甫田維莠桀桀無思遠人勞心怛怛叶旦悦反比也桀桀猶驕驕也怛怛猶忉忉也婉兮孌叶龍眷反兮總角丱音慣叶古縣反兮未幾上聲見兮突而弁兮比也婉孌少好貌丱兩角貌未幾未多時也突忽然髙出之貌弁冠名言總角之童見之未久而忽然戴弁以出者非其躐等而强求之也蓋循其序而勢有必至耳此又以明小之可大邇之可遠能循其序而脩之則可以忽然而至其極若躐等而欲速則反有所不達矣甫田三章章四句盧令令音零其人美且仁賦也盧田犬也令令犬頷下環聲此詩大意與還略同盧重平聲環其人美且鬈音權賦也重環子母環也鬈鬚鬢好貌盧重鋂音梅其人美且偲音鰓賦也鋂一環貫二也偲多鬚之貌春秋傳所謂于思即此字古通用耳盧令三章章二句敝笱在梁其魚魴鰥音關叶古倫反齊子歸止其從去聲如雲比也敝壞笱罟也魴鰥大魚也歸歸齊也如雲言衆也齊人以敝笱不能制大魚比魯莊公不能防閑文姜故歸齊而從之者衆也敝笱在梁其魚魴鱮音序齊子歸止其從如雨比也鱮似魴厚而頭大或謂之鰱如雨亦多也敝笱在梁其魚唯唯上聲齊子歸止其從如水比也唯唯行出入之貌如水亦多也敝笱三章章四句按春秋魯莊公二年夫人姜氏㑹齊侯于禚四年夫人姜氏享齊侯于祝丘五年夫人姜氏如齊師七年夫人姜氏㑹齊侯于防又㑹齊侯千穀載驅薄薄音粕簟茀朱鞹音擴魯道有蕩齊子發夕叶祥龠反賦也薄薄疾驅聲簟方文席也茀車後户也朱朱漆也鞹獸皮之去毛者蓋車革質而朱漆也夕猶宿也發夕謂離於所宿之舍齊人刺文姜乘此車而來㑹襄公也四驪音離濟濟上聲垂轡濔濔音你魯道有蕩齊子豈音愷弟叶待禮反賦也驪馬黒色也濟濟美貌濔濔柔貌豈弟樂易也言無忌憚羞恥之意也汶音問水湯湯音傷行人彭彭音邦魯道有蕩齊子翺翔賦也汶水名在齊南魯北二國之竞湯湯水盛貌彭彭多貌言行人之多亦以見其無恥也汶水滔滔音叨行人儦􅟡音標叶音褒魯道有蕩齊子遊敖賦也滔滔流貌儦儦衆貌遊敖猶翺翔也載驅四章章四句猗嗟昌兮頎音祈而長兮抑若揚兮美目揚兮巧趨蹌兮射則臧兮賦也猗嗟歎辭昌盛也頎長貌抑而若揚美之盛也揚目之動也蹌趨翼如也臧善也齊人極道魯莊公威儀技藝之美如此所以刺其不能以禮防閑其母若曰惜乎其獨少此耳猗嗟名兮美目清兮儀既成兮終日射音石侯不出正音征兮展我甥叶桑經反兮賦也名猶稱也言其威儀技藝之可名也清目清明也儀既成言其終事而禮無違也侯張布而射之者也正設的於侯中而射之者也大射則張皮侯而設鵠賔射則張布侯而設正展誠也姊妹之子曰甥言稱其為齊之甥而又以明非齊侯之子此詩人之微辭也按春秋桓公三年夫人姜氏至自齊六年九月子同生即莊公也十八年桓公乃與夫人如齊則莊公誠非齊侯之子矣猗嗟孌叶龍眷反兮清揚婉叶許願反兮舞則選去聲兮射則貫叶扃縣反兮四矢反叶孚絢反兮以禦亂叶靈眷反兮賦也孌好貌清目之美也揚眉之美也婉亦好貌選異於衆也或曰齊於樂節也貫中而貫革也四矢禮射每發四矢反復也中皆得其故處也言莊公射藝之精可以禦亂如以金僕姑射南宫長萬可見猗嗟三章章六句或曰子可以制母乎趙子曰夫死從子通乎其下况國君乎君者人神之主風教之本也不能正家如正國何若莊公者哀痛以思父誠敬以事母威刑以馭下車馬僕從莫不俟命夫人徒往乎夫人之往也則公哀敬之不至威命之不行耳東萊呂氏曰此詩三章譏刺之意皆在言外嗟歎再三則莊公所犬闕者不言可見矣齊國十一篇三十四章一百四十三句魏一之九魏國名本舜禹故都在禹貢冀州雷首之北析城之西南枕河曲北涉汾水其地陿隘而民貧俗儉蓋有聖賢之遺風焉周初以封同姓後為晉獻公所滅而取其地今河中府解州即其地也蘇氏曰魏地入晉久矣其詩疑皆為晉而作故列於唐風之前猶邶鄘之於衛也今按篇中公行公路公族皆晉官疑實晉詩又恐魏亦嘗有此官蓋不可考矣糾糾音﨣葛屨可以履霜摻摻音纖女手可以縫裳要音腰之襋音棘之好人服叶蒲北反之興也糾糾繚戾寒涼之意夏葛屨冬皮屨摻摻猶纖纖也女婦未廟見之稱也娶婦三月廟見然後執婦功要裳要襋衣領好人猶大人也魏地陿隘其俗儉嗇而褊急故以葛屨履霜起興而刺其使女縫裳又使治其要襋而遂服之也此詩疑即縫裳之女所作好人提提宛然左辟音避佩其象揥維是褊心是以為刺叶音砌賦也提提安舒之意宛然讓之貌也讓而辟者必左揥所以摘髮用象為之貴者之飾也其人如此若無有可刺矣所以刺之者以其褊迫急促如前章之云耳葛屨二章一章六句一章五句廣漢張氏曰夫子謂與其奢也寧儉則儉雖失中本非惡德然而儉之過則至於吝嗇迫隘計較分毫之閒而謀利之心始急矣葛屨汾沮洳園有桃三詩皆言其急廹瑣碎之意彼汾音焚沮去聲洳音孺言采其莫音慕彼其音記之子美無度美無度殊異乎公路興也汾水名出太原晉陽山西南入河沮洳水浸處下濕之地莫菜也似柳葉厚而長有毛刺可為羮無度言不可以尺寸量也公路者掌公之路車晉以卿大夫之庶子為之此亦刺儉不中禮之詩言若此人者美則美矣然其儉嗇褊急之態殊不似貴人也彼汾一方言采其桑彼其之子美如英叶於良反美如英殊異乎公行音杭興也一方彼一方也史記扁鵲視見垣一方人英華也公行即公路也以其主兵車之行列故謂之公行也彼汾一曲言采其藚音續彼其之子美如玉美如玉殊異乎公族興也一曲謂水曲流處藚水舄也葉如車前草公族掌公之宗族晉以卿大夫之適子為之汾沮洳三章章六句園有桃其實之殽心之憂矣我歌且謡音遥不知我者謂我士也驕彼人是哉叶將黎反子曰何其音基心之憂矣其誰知之其誰知之蓋亦勿思叶新齎反興也殽食也合曲曰歌徒歌曰謡其語辭詩人憂其國小而無政故作是詩言園有桃則其實之殽矣心冇憂則我歌且謠矣然不知我之心者見其歌謠而反以為驕且曰彼之所為已是矣而子之言獨何為哉蓋舉國之人莫覺其非而反以憂之者為驕也於是憂者重嗟歎之以為此之可憂初不難知彼之非我特未之思耳誠思之則將不暇非我而自憂矣園有棘其實之食心之憂矣聊以行國叶于逼反不知我者謂我士也罔極彼人是哉子曰何其心之憂矣其誰知之其誰知之蓋亦勿思興也棘棗之短者聊且略之辭歌謠之不足則出遊於國中而寫憂也極至也罔極言其心縱恣無所至極園有桃二章章十二句陟彼岵音户兮瞻望父兮父曰嗟予子行役夙夜無已上慎旃哉猶來無止賦也山無草木曰岵上猶尚也孝子行役不忘其親故登山以望其父之所在因想像其父念已之言曰嗟乎我之子行役夙夜勤勞不得止息又祝之曰庶幾慎之哉猶可以來歸無止於彼而不來也蓋生則必歸死則止而不來矣或曰止獲也言無為人所獲也陟彼屺音起兮瞻望母叶滿彼反兮母曰嗟予季行役夙夜無寐上慎旃哉猶來無棄賦也山有草木曰屺季少子也无憐愛少子者婦人之情也無寐亦言其勞之甚也棄謂死而棄其尸也陟彼岡兮瞻望兄叶虚王反兮兄曰嗟予弟行役夙夜必偕叶舉里反上慎旃哉猶來無死叶想止反賦也山脊曰岡必偕言與其儕同作同止不得自如也陟岵三章章六句十畝之閒叶居賢反兮桑者閑閑叶胡田反兮行與子還叶音旋兮賦也十畝之閒郊外所受場圃之地也閑閑往來者自得之貌行猶將也還猶歸也政亂國危賢者不樂仕於其朝而思與其友歸於農圃故其辭如此十畝之外叶五墜反兮桑者泄泄音異兮行與子逝兮賦也十畝之外鄰圃也泄泄猶閑閑也逝往也十畝之閒二章章三句坎坎伐檀叶徒沿反兮寘之河之干叶居焉反兮河水清且漣音連猗音醫不稼不穡胡取禾三百廛直連反兮不狩不獵胡瞻爾庭有縣音𤣥貆音暄兮彼君子兮不素餐叶七宣反兮賦也坎坎用力之聲檀木可為車者寘與置同干厓也漣風行水成文也猗與兮同語辭也書斷斷猗大學作兮莊子亦云而我猶為人猗是也種之曰稼斂之曰穡胡何也一夫所居曰廛狩亦獵也貆貉類素空餐食也詩人言有人於此用力伐檀將以為車而行陸也今乃寘之河干則河水清漣而無所用雖欲自食其力而不可得矣然其志則自以為不耕則不可以得禾不獵則不可以得獸是以甘心窮餓而不悔也詩人述其事而歎之以為是真能不空食者後世若徐稺之流非其力不食其厲志蓋如此坎坎伐輻音福叶筆力反兮寘之河之側叶莊力反兮河水清且直猗不稼不穡胡取禾三百億兮不狩不獵胡瞻爾庭有縣特兮彼君子兮不素食兮賦也輻車輻也伐木以為輻也直波文之直也十萬曰億蓋言禾秉之數也獸三歳曰特坎坎伐輪兮寘之河之漘音唇兮河水清且淪猗不稼不穡胡取禾三百囷丘倫反兮不狩不獵胡瞻爾庭有縣鶉音純兮彼君子兮不素飱音孫叶素倫反兮賦也輪車輪也伐木以為輪也淪小風水成文轉如輪也囷圓倉也鶉䳺屬熟食曰飱伐檀三章章九句碩鼠碩鼠無食我黍三歲貫音慣女音汝莫我肯顧叶果五反逝將去女適彼樂音洛下同土樂土樂土爰得我所比也碩大也三歲言其久也貫習顧念逝往也樂土有道之國也爰於也民困於貪殘之政故託言大䑕害已而去之也碩䑕無䑕無食我麥叶訖力反三歲貫女莫我肯德逝將去女適彼樂國叶于逼反樂國樂國爰得我直比也德歸恩也直猶宜也碩䑕碩䑕無食我苗叶音毛三歲貫女莫我肯勞逝將去女適彼樂郊叶音高樂郊樂郊誰之永號音毫比也勞勤苦也謂不以我為勤勞也永號長呼也言既往樂郊則無復有害已者當復為誰而永號乎碩䑕三章章八句魏國七篇十八章一百二十八句唐一之十唐國名本帝堯舊都在禹貢冀州之域大行恒山之西大原大岳之野周成王以封弟叔虞為唐侯南有晉水至子燮乃改國號曰晉後徙曲沃又徙居絳其地土瘠民貧勤儉質朴憂深思遠有堯之遺風焉其詩不謂之晉而謂之唐蓋仍其始封之舊號耳唐叔所都在今大原府曲沃及絳皆在今絳州蟋蟀在堂歲聿其莫音慕今我不樂音洛下同日月其除去聲無已大音泰康職思其居叶音據好去聲樂無荒良士瞿瞿音句賦也蟋蟀蟲名似蝗而小正黑有光澤如漆有角翅或謂之促織九月在堂聿遂莫晚除去也大康過於樂也職主也瞿瞿却顧之貌唐俗勤儉故其民閒終歲勞苦不敢少休及其歲晚務閒之時乃敢相與燕飲為樂而言今蟋蟀在堂而歲忽已晚矣當此之時而不為樂則日月將舍我而去矣然其憂深而思遠也故方燕樂而又遽相戒曰今雖不可以不為樂然不已過於樂乎盍亦顧念其職之所居者使其雖好樂而無荒若彼良士之長慮而却顧焉則可以不至於危亡也蓋其民俗之厚而前聖遺風之遠如此蟋蟀在堂歲聿其逝今我不樂日月其邁叶力制反無已大康職思其外叶五墜反好樂無荒良士蹶蹶賦也逝邁皆去也外餘也其所治之事固當思之而所治之餘亦不敢忽蓋其事變或出於平常思慮之所不及故當過而備之也蹶蹶動而敏於事也蟋蟀在堂役車其休今我不樂日月其慆音叨叶佗侯反無已大康職思其憂好樂無荒良士休休賦也庶人乘役車歲晚則百工皆休矣慆過也休休安閑之貌樂而有節不至於淫所以安也蟋蟀三章章八句山有樞隰有榆子有衣裳弗曵弗婁子有車馬弗馳弗驅宛其死矣他人是愉興也樞荎也今刺榆也楡白枌也婁亦曵也馳走驅䇿也宛坐見貌愉樂也此詩蓋亦答前篇之意而解其憂故言山則有樞矣隰則有榆矣子有衣裳車馬而不服不乘則一旦宛然以死而他人取之以為已樂矣蓋言不可不及時為樂然其憂愈深而意愈蹙矣山有栲音考叶去九反隰有杻音紐子有廷内弗洒弗埽叶蘇后反子有鐘鼓弗鼓弗考叶去九反宛其死矣他人是保叶補苟反興也栲山樗也似樗色小白葉差狹杻檍也葉似杏而尖白色皮正赤其理多曲少直材可為弓弩榦者也考擊也保居有也山有漆音七隰有栗子有酒食何不日鼓瑟且以喜樂音洛且以永日宛其死矣他人入室興也君子無故琴瑟不離於側永長也人多憂則覺日短飲食作樂可以永長此日也山有樞三章章八句揚之水白石鑿鑿音作素衣朱襮音博從子于沃叶鬱鎛反既見君子云何不樂音洛比也鑿鑿巉巖貌襮領也諸侯之服繡黼領而丹朱純也子指桓叔也沃曲沃也晉昭侯封其叔父成師于曲沃是為桓叔其後沃盛强而晉微弱國人將叛而歸之故作此詩言水緩弱而石巉巖以比晉衰而沃盛故欲以諸侯之服從桓叔于曲沃且自喜其見君子而無不樂也揚之水白石皓皓叶胡暴反素衣朱繡叶先妙反從子于鵠叶居號反既見君子云何其憂叶一笑反比也朱繡即朱襮也鵠曲沃邑也揚之水白石粼粼我聞有命叶彌并反不敢以告人比也粼粼水清石見之貌聞其命而不敢以告人者為之隱也桓叔將以傾晉而民為之隱蓋欲其成矣李氏曰古者不軌之臣欲行其志必先施小惠以收衆情然後民翕然從之田氏之於齊亦猶是也故其召公子陽生於魯國人皆知其已至而不言所謂我聞有命不敢以告人也揚之水三章二章章六句一章四句椒聊之實蕃衍盈升彼其音記之子碩大無朋椒聊且音疽逺條且興而此也椒樹似茱萸有針刺其實味辛而香烈聊語助也朋比也且歎辭逺條長枝也椒之蕃盛則采之盈升矣彼其之子則碩大而無朋矣椒聊且遠條且歎其枝遠而實益蕃也此不知其所指序亦以為沃也椒聊之實蕃衍盈匊音菊彼其之子實大且篤椒聊且遠條且興而比也兩手曰匊篤厚也椒聊二章章六句綢音儔繆平聲束薪三星在天叶鐵因反今夕何夕見此良人子兮子兮如此良人何興也綢繆猶纏綿也三星心也在天昏始見於東方建辰之月也良人夫稱也國亂民貧男女有失其時而後得遂其婚姻之禮者詩人叙其婦語夫之辭曰方綢繆以束薪也而仰見三星之在天今夕不知其何夕也而忽見良人之在此既又自謂曰子兮子兮其將奈此良人何哉喜之甚而自慶之辭也綢繆束芻叶側九反三星在隅叶語口反今夕何夕見此邂音械逅音候叶狼口反子兮子兮如此邂逅何興也隅東南隅也昏見之星至此則夜久矣邂逅相遇之意此為夫婦相語之辭也綢繆束楚三星在户今夕何夕見此粲者叶章與反子兮子兮如此粲者何興也户室户也户必南出昏見之星至此則夜分矣粲美也此為夫語婦之辭也或曰女三為粲一妻二妾也綢繆三章章六句有杕音第之杜其葉湑湑上聲獨行踽踽音矩豈無他人不如我同父嗟行之人胡不比音鼻焉人無兄弟胡不佽音次焉興也杕特也杜赤棠也湑湑盛貌踽踽無所親之貌同父兄弟也比輔佽助也此無兄弟者自傷其孤特而求助於人之辭言杕然之杜其葉猶湑湑然人無兄弟則獨行踽踽曾杜之不如矣然豈無他人之可與同行也哉特以其不如我兄弟是以不免於踽踽耳於是嗟歎行路之人何不閔我之獨行而見親憐我之無兄弟而見助乎有杕之杜其葉菁菁音精獨行睘睘音瓊豈無他人不如我同姓叶桑經反嗟行之人胡不比焉人無兄弟胡不佽焉興也菁菁亦盛貌睘睘無所依貌杕杜二章章九句羔裘豹袪音嶇自我人居居豈無他人維子之故賦也羔裘君純羔大夫以豹飾袪袂也居居未詳羔裘豹褎音袖自我人究究豈無他人維子之好去聲叶呼候反賦也褎猶袪也究究亦未詳羔裘二章章四句此詩不知所謂不敢强解肅肅鴇羽集于苞栩音許王事靡盬音古不能蓺稷黍父母何怙音户悠悠蒼天曷其有所比也肅肅羽聲鴇鳥名似鴈而大無後趾集止也苞叢生也栩柞櫟也其子為皁斗殻可以染皁者是也盬不攻緻也蓺樹怙恃也民從征役而不得養其父母故作此詩言鴇之性不樹止而今乃飛集于苞栩之上如民之性本不便於勞苦今乃久從征役而不得耕田以供子職也悠悠蒼天何時使我得其所乎肅肅鴇翼集于苞棘王事靡盬不能蓺黍稷父母何食悠悠蒼天曷其有極比也極已也肅肅鴇行音杭集于苞桑王事靡盬不能蓺稻粱父母何嘗悠悠蒼天曷其有常比也行列也稻即今南方所食稻米水生而色白者也粱粟類也有數色嘗食也常復其常也鴇羽三章章七句豈曰無衣七兮不如子之衣安且吉兮賦也侯伯七命其車旗衣服皆以七為節子天子也史記曲沃桓叔之孫武公伐晉滅之盡以其寶器賂周釐王王以武公為晉君列於諸侯此詩蓋述其請命之意言我非無是七章之衣也而必請命者蓋以不如天子之命服之為安且吉也蓋當是時周室雖衰典刑猶在武公既負弑君簒國之罪則人得討之而無以自立於天地之間故賂王請命而為説如此然其倨慢無禮亦已甚矣釐王貪其寳玩而不思天理民彝之不可廢是以誅討不加而爵命行焉則王綱於是乎不振而人紀或幾乎絶矣嗚呼痛哉豈曰無衣六兮不如子之衣安且燠音郁兮賦也天子之卿六命變七言六者謙也不敢以當侯伯之命得受六命之服比於天子之卿亦幸矣燠煖也言其可以久也無衣二章章三句有杕之杜生于道左彼君子兮噬音逝肯適我中心好去聲之曷飲食音嗣之比也左東也噬發語辭曷何也此人好賢而恐不足以致之故言此杕然之杜生于道左其䕃不足以休息如已之寡弱不足恃賴則彼君子者亦安肯顧而適我哉然其中心好之則不已也但無自而得飲食之耳夫以好賢之心如此則賢者安有不至而何寡弱之足患哉有杕之杜生于道周彼君子兮噬肯來遊中心好之曷飲食之比也周曲也有杕之杜二章章六句葛生蒙楚蘞音廉蔓于野吁上與反予美亡此誰與獨處興也蘝草名似栝樓葉盛而細蔓延也予美婦人指其夫也婦人以其夫久從征役而不歸故言葛生而䝉于楚蘝生而蔓于野各有所依託而予之所美者獨不在是則誰與而獨處於此乎葛生蒙棘蘞蔓于域予美亡此誰與獨息興也域塋域也息止也角枕粲兮錦衾爛兮予美亡此誰與獨旦賦也粲爛華美鮮明之貌獨旦獨處至旦也夏之日冬之夜叶羊茹反百歲之後歸于其居叶姬御反賦也夏日永冬夜永居墳墓也夏日冬夜獨居憂思於是為切然君子之歸無期不可得而見矣要死而相從耳鄭氏曰言此者婦人專一義之至情之盡蘇氏曰思之深而無異心此唐風之厚也冬之夜同上夏之日百歲之後叶音户歸于其室賦也室壙也葛生五章章四句采苓采苓首陽之巔叶典因反人之為言苟亦無信叶斯人反舍音捨旃舍旃苟亦無然人之為言胡得焉比也首陽首山之南也巔山頂也旃之也此刺聽讒之詩言子欲采苓於首陽之巔乎然人之為是言以告子者未可遽以為信也姑舍置之而無遽以為然徐察而審聽之則造言者無所得而讒止矣或曰興也下章放此采苦采苦首陽之下叶後五反人之為言苟亦無與舍旃舍旃苟亦無然人之為言胡得焉比也苦苦菜也生山田及澤中得霜甜脆而美與許也采葑采葑首陽之東人之為言苟亦無從舍旃舍旃苟亦無然人之為言胡得焉比也從聽也采苓三章章八句唐國十二篇三十三章二百三句秦一之十一秦國名其地在禹貢雍州之域近鳥䑕山初伯益佐禹治水有功賜姓嬴氏其後中潏居西戎以保西垂六世孫大駱生成及非子非子事周孝王養馬於汧渭之閒馬大繁息孝王封為附庸而邑之秦至宣王時犬戎滅成之族宣王遂命非子曾孫秦仲為大夫誅西戎不克見殺及幽王為西戎犬戎所殺平王東遷秦仲孫襄公以兵送之王封襄公為諸侯曰能逐犬戎即有岐豐之地襄公遂有周西都畿内八百里之地至𤣥孫德公又徙於雍秦即今之秦州雍今京兆府興平縣是也有車鄰鄰有馬白顛叶典因反未見君子寺人之令平聲賦也鄰鄰衆車之聲白顛額有白毛今謂之的顙君子指秦君寺人内小臣也令使也是時秦君始冇車馬及此寺人之官將見者必先使寺人通之故國人創見而誇美之也阪音反有漆隰有栗既見君子並坐鼓瑟今者不樂音洛逝者其耊音垤叶地一反興也八十曰耊阪則有漆矣隰則有栗矣既見君子則並坐鼓瑟矣失今不樂則逝者其耊矣阪有桑隰有楊既見君子並坐鼓簧今者不樂逝者其亡興也簧笙中金葉吹笙則鼓動之以出聲者也車鄰三章一章四句二章章六句駟驖音鐵孔阜六轡在手公之媚子從公于狩叶始九反賦也駟驖四馬皆黑色如鐵也孔甚也阜肥大也六轡者兩服兩驂各兩轡而驂馬内兩轡納之於觖故惟六轡在手也媚子所親愛之人也此亦前篇之意也奉時辰牡辰牡孔碩叶常灼反公曰左之舍音捨拔音鈸則獲叶黄郭反賦也時是辰時也牡獸之牡者也辰牡者冬獻狼夏獻麋春秋獻鹿豕之類奉之者虞人翼以待射也碩肥大也公曰左之者命御者使左其車以射獸之左也蓋射必中其左乃為中殺五御所謂逐禽左者為是故也拔矢括也曰左之而舍拔無不獲者言獸之多而射御之善也遊于北園四馬既閑叶胡田反輶音由車鸞鑣音標載獫音殮歇驕音囂賦也田事已畢故遊于北園閑調習也輶輕也鸞鈴也效鸞鳥之聲鑣馬銜也驅逆之車置鸞於馬銜之兩旁乘車則鸞在衡和在軾也獫歇驕皆田犬名長喙曰獫短喙曰歇驕以車載犬蓋以休其足力也韓愈畫記有騎擁田犬者亦此類駟驖三章章四句小戎俴音踐收五楘音木梁輈音舟游環脅驅叶俱懼反又居錄反隂靷音𦙍鋈音沃續叶辭屢反又如字文茵音因暢轂叶又去聲駕我騏音其馵音注又之錄反言念君子溫其如玉在其板屋亂我心曲賦也小戎兵車也俴淺也收軫也謂車前後兩端横木所以收斂所載者也凡車之制廣皆六尺六寸其平地任載者為大車則軫深八尺兵車則軫深四尺四寸故曰小戎俴收也五五束也楘歴錄然文章之貌也梁輈從前軫以前稍曲而上至衡則向下鉤之衡横於輈下而輈形穹隆上曲如屋之梁又以皮革五處束之其文章歴錄然也游環靷環也以皮為環當兩服馬之背上游移前却無定處引兩驂馬之外轡貫其中而執之所以制驂馬使不得外出左傳曰如驂之有靳是也脅驅亦以皮為之前係於衡之兩端後係於軫之兩端當服馬脅之外所以驅驂馬使不得内入也隂揜軓也軓在軾前而以板横側揜之以其隂暎此軓故謂之隂也靷以皮二條前係驂馬之頸後係隂版之上也鋈續隂版之上有續靷之處消白金沃灌其環以為飾也蓋車衡之長六尺六寸止容二服驂馬之頸不當於衡故别為二靷以引車亦謂之靳左傳曰兩靷將絶是也文茵車中所坐虎皮褥也暢長也轂者車輪之中外持輻内受軸者也大車之轂一尺有半兵車之轂長三尺二寸故兵車曰暢轂騏騏文也馬左足白曰馵君子婦人目其夫也温其如玉美之之辭也板屋者西戎之俗以版為屋心曲心中委曲之處也西戎者秦之臣子所與不共戴天之讎也襄公上承天子之命率其國人往而征之故其從役者之家人先誇車甲之盛如此而後及其私情蓋以義興師則雖婦人亦知勇於赴敵而無所怨矣四牡孔阜六轡在手騏駵音留是中叶諸仍反騧音瓜驪是驂叶疏簪反龍盾之合鋈以觼音厥軜音納言念君子溫其在邑叶於合反方何為期胡然我念之賦也赤馬黑鬛曰駵中兩服馬也黄馬黑喙曰騧驪黑色也盾干也畫龍於盾合而載之以為車上之衛必載二者備破毁也觼環之有舌者軜驂内轡也置觼於軾前以係軜故謂之觼軜亦消沃白金以為飾也邑西鄙之邑也方將也將以何時為歸期乎何為使我思念之極也俴駟孔羣厹音求矛鋈錞音隊叶朱倫反蒙伐有苑叶音氳虎韔音暢鏤音漏膺交韔二弓叶姑𢎞反竹閉緄音袞縢音滕言念君子載寢載興厭厭平聲良人秩秩徳音卟一陵反賦也俴駟四馬皆以淺薄之金為甲欲其輕而易於馬之旋習也孔甚羣和也厹矛三隅矛也鋈錞以白金沃矛之下端平底者也蒙雜也伐中干也盾之别名苑文貌畫雜羽之文於盾上也虎韔以虎皮為弓室也鏤膺鏤金以飾馬當胷帶也交韔交二弓於韔中謂顛倒安置之必二弓以備壊也閉弓檠也儀禮作䪐緄繩縢約也以竹為閉而以繩約之於弛弓之裏檠弓體使正也載寢載興言思之深而起居不寧也厭厭安也秩秩有序也小戎三章章十句蒹音兼葭音加蒼蒼白露為霜所謂伊人在水一方遡音素洄音回從之道阻且長遡游從之宛在水中央賦也蒹似萑而細高數尺又謂之薕葭蘆也兼葭未敗而露始為霜秋水時至百川灌河之時也伊人猶言彼人也一方彼一方也遡洄逆流而上也遡游順流而下也宛然坐見貌在水之中央言近而不可至也言秋水方盛之時所謂彼人者乃在水之一方上下求之而皆不可得然不知其何所指也蒹葭淒淒白露未晞所謂伊人在水之湄遡洄從之道阻且躋遡游從之宛在水中坻音遲賦也淒淒猶蒼蒼也晞乾也湄水草之交也躋升也言難至也小渚曰坻蒹葭采采叶此禮反白露未巳所謂伊人在水之涘叶以始二音遡洄從之道阻且右叶羽軌反遡游從之宛在水中沚賦也采采言其盛而可采也已止也右不相直而出其右也小渚曰沚蒹葭三章章八句終南何有有條有梅叶莫悲反君子至止錦衣狐裘叶渠之反顔如渥音握丹其君也哉叶將黎反興也終南山名在今京兆府南條山楸也皮葉白色亦白材理好宜為車版君子指其君也至止至終南之下也錦衣狐裘諸侯之服也玉藻曰君衣狐白裘錦衣以禓之渥漬也其君也哉言容貌衣服稱其為君也此秦人美其君之辭亦車鄰駟驖之意也終南何有有紀有堂君子至止黻音弗衣繡裳佩玉將將音鎗壽考不忘興也紀山之亷角也堂山之寛平處也黻之状亞兩已相戾也繡刺繡也將將佩玉聲也壽考不忘者欲其居此位服此服長久而安寧也終南二章章六句交交黄鳥止于棘誰從穆公子車奄息維此奄息百夫之特臨其穴叶户橘反惴惴其慄彼蒼者天叶鐵因反殱音尖我良人如可贖兮人百其身興也交交飛而往來之貌從穆公從死也子車氏奄息名特傑出之稱穴壙也惴惴懼貌慄懼殲盡良善贖貿也秦穆公卒以子車氏之三子為殉皆秦之良也國人哀之為之賦黄鳥事是春秋傳即此詩也言交交黄鳥則止于棘矣誰從穆公則子車奄息也蓋以所見起興也臨穴而惴慄蓋生納之壙中也三子皆國之良而一旦殺之若可貿以他人則人皆願百其身以易之矣交交黄鳥止于桑誰從穆公子車仲行音杭維此仲行百夫之防臨其穴惴惴其慄彼蒼者天殲我良人如可贖兮人百其身興也防當也言一人可以當百夫也交交黄鳥止于楚誰從穆公子車鍼音拑虎維此鍼虎百夫之禦臨其穴惴惴其慄彼蒼者天殲我良人如可贖兮人百其身興也禦猶當也黄鳥三章章十二句春秋傳曰君子曰秦穆公之不為盟主也宜哉死而棄民先王違世猶貽之法而况奪之善人乎今縱無法以遺後嗣而又收其良以死難以在上矣君子是以知秦之不復東征也愚按穆公於此其罪不可逃矣但或以為穆公遺命如此而三子自殺以從之則三子亦不得為無罪今觀臨穴惴慄之言則是康公從父之亂命迫而納之於壙其罪有所歸矣又按史記秦武公卒初以人從死死者六十六人至穆公遂用百七十七人而三良與焉蓋其初特出於戎翟之俗而無明王賢伯以討其罪於是習以為常則雖以穆公之賢而不免論其事者亦徒閔三良之不幸而歎秦之衰至於王政不綱諸侯擅命殺人不忌至於如此則莫知其為非也嗚呼俗之弊也久矣其後始皇之葬後宫皆令從死工匠生閉墓中尚何怪哉鴥音聿彼晨風叶孚愔反鬱彼北林未見君子憂心欽欽如何如何忘我實多興也鴥疾飛貌晨風鸇也鬱茂盛貌君子指其夫也欽欽憂而不忘之貌婦人以夫不在而言鴥彼晨風則歸於鬱然之北林矣故我未見君子而憂心欽欽也彼君子者如之何而忘我之多乎此與扊扅之歌同意蓋秦俗也山有苞櫟音歴叶歴各反隰有六駁音剝未見君子憂心靡樂音洛如何如何忘我實多興也駁梓榆也其皮青白如駁山則有苞櫟矣隰則有六駁矣未見君子則憂心靡樂矣靡樂則憂之甚也山有苞棣隰有樹檖未見君子憂心如醉如何如何忘我實多興也棣唐棣也檖赤羅也實似梨而小酢可食如醉則憂又甚矣晨風三章章六句豈曰無衣與子同袍叶步謀反王于興師脩我戈矛與子同仇賦也袍襺也戈長六尺六寸矛長二丈王于興師以天子之命而興師也秦俗强悍樂於戰鬬故其人平居而相謂曰豈以子之無衣而與子同袍乎蓋以王于興師則將脩我戈矛而與子同仇也其懽愛之心足以相死如此蘇氏曰秦本周地故其民猶思周之盛時而稱先王焉或曰興也取與子同三字為義後章放此豈曰無衣與子同澤叶徒洛反王于興師脩我矛㦸叶訖約反與子偕作賦也澤裏衣也以其親膚近於垢澤故謂之澤㦸車㦸也長丈六尺豈曰無衣與子同裳王于興師脩我甲兵叶蒲芒反與子偕行叶户郎反賦也行往也無衣三章章五句秦人之俗大抵尚氣槩先勇力忘生輕死故其見於詩如此然本其初而論之岐豐之地文王用之以興二南之化如彼其忠且厚也秦人用之未幾而一變其俗至於如此則已悍然有招八州而朝同列之氣矣何哉雍州土厚水深其民厚重質直無鄭衛驕惰浮靡之習以善導之則易以興起而篤於仁義以猛驅之則其强毅果敢之資亦足以强兵力農而成富强之業非山東諸國所及也嗚呼後世欲為定都立國之計者誠不可不監乎此而凡為國者其於導民之路尤不可不審其所之也我送舅氏曰至渭陽何以贈之路車乘去聲黄賦也舅氏秦康公之舅晉公子重耳也出亡在外穆公召而納之時康公為太子送之渭陽而作此詩渭水名秦時都雍至渭陽者蓋東行送之於咸陽之地也路車諸侯之車也乘黄四馬皆黄也我送舅氏悠悠我思叶新齎反何以贈之瓊瑰音嬀玉佩叶蒲眉反賦也悠悠長也序以為時康公之母穆姬已卒故康公送其舅而念母之不見也或曰穆姬之卒不可考此但别其舅而懷思耳瓊瑰石而次玉渭陽二章章四句按春秋傳晉獻公烝於齊姜生秦穆夫人太子申生娶犬戎胡姬生重耳小戎子生夷吾驪姬生奚齊其娣生卓子驪姬譖申生申生自殺又譖二公子二公子皆出奔獻公卒奚齊卓子繼立皆為大夫里克所弑秦穆公納夷吾是為惠公卒子圉立是為懐公立之明年秦穆公又召重耳而納之是為文公王氏曰至渭陽者送之遠也悠悠我思者思之長也路車乘黄瓊瑰玉佩者贈之厚也廣漢張氏曰康公為太子送舅氏而念母之不見是固良心也而卒不能自克於令狐之役怨欲害乎良心也使康公知循是心養其端而充之則怨欲可消矣於我乎夏屋渠渠今也每食無餘于音吁嗟乎不承權輿賦也夏大也渠渠深廣貌承繼也權輿始也此言其君始有渠渠之夏屋以待賢者而其後禮意寖衰供億寖薄至於賢者每食而無餘於是歎之言不能繼其始也於我乎每食四簋叶已有反今也每食不飽叶捕苟反于嗟乎不承權輿賦也簋瓦器容斗二升方曰簠圓曰簋簠盛稻粱簋盛黍稷四簋禮食之盛也權輿二章章五句漢楚元王敬禮申公白生穆生穆生不嗜酒元王每置酒嘗為穆生設醴及王戊即位常設後忘設焉穆生退曰可以逝矣醴酒不設王之意怠不去楚人將鉗我於市遂稱疾申公白生强起之曰獨不念先王之德歟今王一旦失小禮何足至此穆生曰先王之所以禮吾三人者為道之存故也今而忽之是忘道也忘道之人胡可與久處豈為區區之禮哉遂謝病去亦此詩之意也秦國十篇二十七章一百八十一句陳一之十二陳國名大皥伏羲氏之墟在禹貢豫州之東其地廣平無名山大川西望外方東不及孟諸周武王時帝舜之冑有虞閼父為周陶正武王賴其利器用與其神明之後以元女大姬妻其子滿而封之于陳都于宛丘之側與黄帝帝堯之後共為三恪是為胡公大姬婦人尊貴好樂巫覡歌舞之事其民化之今之陳州即其地也子之湯音蕩兮宛丘之上兮洵音荀有情兮而無望兮賦也子指遊蕩之人也湯蕩也四方高中央下曰宛丘洵信也望人所瞻望也國人見此人常遊蕩於宛丘之上故敘其事以刺之言雖信有情思而可樂矣然無威儀可瞻望也坎其擊鼓宛丘之下叶後户反無冬無夏叶與下同值音治其鷺羽賦也坎擊鼓聲值植也鷺舂鉏今鷺鷥好而潔白頭上有長毛十數枚羽以其羽為翳舞者持以指麾也言無時不出遊而鼓舞於是也坎其擊缶音否宛丘之道叶徒厚反無冬無夏值其鷺翿音導叶殖有反賦也缶瓦器可以節樂翿翳也宛丘三章章四句東門之枌音文宛丘之栩音許子仲之子婆娑音梭其下叶後五反賦也枌白榆也先生葉郤著莢皮色白子仲之子子仲氏之女也婆娑舞貌此男女聚㑹歌舞而賦其事以相樂也穀旦于差音釵叶七何反南方之原不績其麻叶莫婆反市也婆娑賦也穀善差擇也既差擇善旦以㑹于南方之原於是棄其業以舞於市而往㑹也穀旦于逝越以鬷音宗邁叶刀制反視爾如荍音翹貽我握椒賦也逝往越於鬷衆也邁行也荍芘芣也又名荆葵紫色椒芬芳之物也言又以善旦而往於是以其衆行而男女相與道其慕悦之辭曰我視爾顔色之美如芘芣之華於是遺我以一握之椒而交情好也東門之枌三章章四句衡門之下可以棲音西遲泌音祕之洋洋可以樂音洛飢賦也衡門横木為門也門之深者有阿塾堂宇此惟横木為之棲遲遊息也泌泉水也洋洋水流貌此隱居自樂而無求者之辭言衡門雖淺陋然亦可以遊息泌水雖不可飽然亦可以玩樂而忘飢也豈其食魚必河之魴音房豈其取音娶妻必齊之姜賦也姜齊姓豈其食魚必河之鯉豈其取妻必宋之子叶奬里反賦也子宋姓衡門三章章四句東門之池可以漚烏豆反麻叶謨婆反彼美淑姬可與晤音悞歌興也池城池也漚漬也治麻者必先以水漬之晤猶解也此亦男女㑹遇之辭蓋因其㑹遇之地所見之物以起興也東門之池可以漚紵音苧彼美淑姬可與晤語興也紵麻屬東門之池可以漚菅音閒叶居賢反彼美淑姬可與晤言興也菅葉似茅而滑澤莖有白粉柔韌宜為索也東門之池三章章四句東門之楊其葉牂牂音臧昏以為期明星煌煌興也東門相期之地也楊柳之揚起者也牂牂盛貌明星啓明也煌煌大明貌此亦男女期㑹而有負約不至者故因其所見以起興也東門之楊其葉肺肺音霈昏以為期明星晳晳音制興也肺肺猶牂牂也晳晳猶煌煌也東門之楊二章章四句墓門有棘斧以斯之夫也不良國人知之知而不已誰昔然矣興也墓門凶僻之地多生荆棘斯析也夫指所刺之人也誰昔昔也猶言疇昔也言墓門有棘則斧以斯之矣此人不良則國人知之矣國人知之猶不自改則自疇昔而已然非一日之積矣所謂不良之人亦不知其何所指也墓門有梅有鴞萃止夫也不良歌以訊叶息悴反之訊予不顧叶果五反顛倒思予叶演女反興也鴟鴞惡聲之烏也萃集訊告也顛倒狼狽之狀墓門有梅則有鴞萃之矣夫也不良則有歌其惡以訊之者矣訊之而不予顧至於顛倒然後思予則豈有所及哉或曰訊予之予疑當依前章作而字墓門二章章六句防有鵲巢卭音窮有旨苕音條叶徒刀反誰侜音周予美心焉忉忉音刀興也防人所築以捍水者卭丘旨美也苕苕饒也莖如勞豆而細葉似蒺藜而青其莖葉綠色可生食如小荳藿也侜侜張也猶鄭風之所謂迋也予美指所與私者也忉忉憂貌此男女之有私而憂或閒之之辭故曰防則有鵲巢矣卭則有旨苕矣今此何人而侜張予之所美使我憂之而至於忉忉乎中唐有甓音闢卭有旨鷊音逆誰侜予美心焉惕惕音剔興也廟中路謂之唐甓瓴甋也鷊小草雜色如綬惕惕猶忉忉也防有鵲巢二章章四句月出皎兮佼音絞人僚音了兮舒窈音杳紏音矯兮勞心悄兮興也皎月光也佼人美人也僚好貌窈幽遠也糾愁結也悄憂也此亦男女相悦而相念之辭言月出則皎然矣佼人則僚然矣安得見之而舒窈糾之情乎是以為之勞心而悄然也月出皓音昊兮佼人懰音柳叶朗老反兮舒懮音黝受叶時倒反兮勞心慅音草兮興也懰好貌懮受憂思也慅猶悄也月出照兮佼人燎音料兮舒夭上聲紹音邵兮勞心慘當作懆七弔反兮興也燎明也天紹糾緊之意慘憂也月出三章章四句胡為乎株林從夏上聲南叶尼心反下同匪適株林從夏南賦世株林夏氏邑也夏南徵舒字也靈公淫於夏徵舒之母朝夕而徃夏氏之邑故其民相與語曰君胡為乎株林乎曰從夏南耳然則非適株林也特以從夏南故耳蓋淫乎夏姬不可言也故以從其子言之詩人之忠厚如此駕我乘去聲馬叶滿補反説音税于株野叶上與反乘平聲我乘駒朝食于株賦也説舍也馬六尺以下曰駒株林二章章四句春秋傳夏姬鄭穆公之女也嫁於陳大夫夏御叔靈公與其大夫孔寧儀行父通焉洩冶諫不聽而殺之後卒為其子徵舒所弑而徵舒復為楚莊王所誅彼澤之陂叶音波有蒲與荷音何有美一人傷如之何寤寐無為涕泗音四滂沱興也陂澤障也蒲水草可為席者荷芙蕖也自目曰涕自鼻曰泗此詩之㫖與月出相類言彼澤之陂則有蒲與荷矣有美一人而不可見則雖憂傷而如之何哉寤寐無為涕泗滂沱而已矣彼澤之陂有蒲與蕑音閒叶居賢反有美一人碩大且卷音權寤寐無為中心悁悁音娟美興也蕑蘭也卷鬢髮之也悁悁猶悒悒也彼澤之陂有蒲䓿萏叶待檢反有美一人碩大且儼寤寐無為輾轉伏枕叶知險反興也䓿萏荷華也儼矜莊貌輾轉伏枕臥而不寐思之深且久也澤陂三章章六句陳國十篇二十六章一百一十四句東萊吕氏曰變風終於陳靈其閒男女夫婦之詩一何多邪曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義冇所錯男女者三綱之本萬事之先也正風之所以為正者舉其正者以勸之也變風之所以為變者舉其不正者以戒之也道之升降時之治亂俗之汙隆民之死生於是乎在錄之煩悉篇之重複亦何疑哉檜一之十三檜國名高辛氏火正祝融之墟在禹貢豫州外方之北滎波之南居溱洧之閒其君妘姓祝融之後周衰為鄭桓公所滅而遷國焉今之鄭州即其地也蘇氏以為檜詩皆為鄭作如邶鄘之於衛也未知是否羔裘逍遥狐裘以朝音潮叶直勞反豈不爾思勞心忉忉音刀賦也緇衣羔裘諸侯之朝服錦衣狐裘其朝天子之服也舊説懀君好潔其衣服逍遥遊宴而不能自强於政治故詩人憂之羔裘翺翔狐裘在堂豈不爾思我心憂傷賦也翺翔猶逍遙也堂公堂也羔裘如膏去聲日出有曜叶羊號反豈不爾思中心是悼賦也膏脂所漬也日出有曜日照之則有光也羔裘三章章四句庶見素冠兮棘人欒欒音鸞兮勞心慱慱音圑兮賦也庶幸也縞冠素紕既祥之冠也黑經白緯曰縞緣邊曰紕棘急也喪事欲其總總爾哀遽之狀也欒欒瘠貌慱慱憂勞之貌祥冠祥則冠之禫則除之今人皆不能行三年之喪矣安得見此服乎當時賢者庶幾見之至於憂勞也庶見素衣兮我心傷悲兮聊與子同歸兮賦也素冠則素衣矣與子同歸愛慕之辭也庶見素韠音畢兮我心蘊上聲結叶訖力反兮聊與子如一兮賦也韠蔽膝也以韋為之冕服謂之韍其餘曰韠韠從裳色素衣素裳則素韠矣蘊結思之不解也與子如一甚於同歸矣素冠三章章三句按喪禮為父為君斬衰三年昔宰予欲短喪夫子曰子生三年然後免於父母之懐予也有三年之愛於其父母乎三年之喪天下之通喪也傳曰子夏三年之喪畢見於夫子援琴而弦衎衎而樂作而曰先王制禮不敢不及夫子曰君子也閔子騫三年之喪畢見於夫子援琴而弦切切而哀作而曰先王制禮不敢過也夫子曰君子也子路曰敢問何謂也夫子曰子夏哀已盡能引而致之於禮故曰君子也閔子騫哀未盡能自割以禮故曰君子也夫三年之喪賢者之所輕不肖者之所勉隰有萇音長楚猗音娿儺音娜其枝夭平聲之沃沃樂音洛子之無知賦也萇楚銚弋今羊桃也子如小麥亦似桃猗儺柔順也夭少好貌沃沃光澤貌子指萇楚也政煩賦重人不堪其苦歎其不如草木之無知而無憂也隰有萇楚猗儺其華夭之沃沃樂子之無家賦也無家言無累也隰有萇楚猗儺其實夭之沃沃樂子之無室賦也無室猶無家也隰有萇楚三章章四句匪風發叶方月反兮匪車偈音挈兮顧瞻周道中心怛叶旦月反兮賦也發飄揚貌偈疾驅貌周道適周之路也怛傷也周室衰微賢人憂歎而作此詩言常時風發而車偈則中心怛然今非風發也非車偈也特顧瞻周道而思王室之陵遲故中心為之怛然耳匪風飄叶匹妙反兮匪車嘌音漂叶匹妙反兮顧瞻周道中心弔兮賦也回風曰飄嘌漂摇不安之貌弔亦傷也誰能亨魚溉音蓋之釜鬵音尋誰將西歸懷之好音興也溉滌也鬵釜屬西歸歸於周也誰能亨魚乎有則我願為之溉其釜鬵誰將西歸乎冇則我願慰之以好音以見思之之甚但有西歸之人即思有以厚之也匪風三章章四句檜國四篇十二章四十五句曹一之十四曹國名其地在禹貢兗州陶丘之北雷夏菏澤之野周武王以封其弟振鐸今之曹州即其地也蜉蝣之羽衣裳楚楚叶創舉反心之憂矣於我歸處比也蜉蝣渠略也似蛣蜣身狹而長有角黄黑色朝生暮死楚楚鮮明貌此詩盖以時人有玩細娛而忘遠慮者故以蜉蝣為比而刺之言蜉蝣之羽翼猶衣裳之楚楚可愛也然其朝生暮死不能久存故我心憂之而欲其於我歸處耳序以為刺其君或然而未有考也蜉蝣之翼采采衣服叶蒲北反心之憂矣於我歸息比也采采華飾也息止也蜉蝣掘求勿反閲麻衣如雪心之憂矣於我歸説音税叶輸爇反比也掘閲未詳説舍息也蜉蝣三章章四句彼候人兮何上聲戈與祋都律都外二反彼其音記之子三百赤芾音弗興也候人道路迎送賔客之官何揭祋殳也之子指小人芾冕服之韠也一命縕芾黝珩再命赤芾黝珩三命赤芾葱珩大夫以上赤芾乘軒此刺其君遠君子而近小人之辭言彼侯人而何戈與祋者宜也彼其之子而三百赤芾何哉晉文公入曹數其不用禧負羈而乘軒者三百人其謂是歟維鵜音啼在梁不濡其翼彼其之子不稱去聲其服叶蒲北反興也鵜洿澤水鳥俗所謂淘河也維鵜在梁不濡其咮音晝彼其之子不遂其媾音垢興也咮喙遂稱媾寵也遂之為稱猶今人謂遂意為稱意薈音穢兮蔚音畏兮南山朝隮音賫婉兮孌兮季女斯飢比也薈蔚草木盛多之貌朝隮雲氣升騰也婉少貌孌好貌薈蔚朝隮言小人衆多而氣燄盛也季女婉孌自保不妄從人而反飢困言賢者守道而反貧賤也候人四章章四句鳲鳩在桑其子七兮淑人君子其儀一兮其儀一兮心如結叶訖力反兮興也鳲鳩秸鞠也亦名戴勝今之布穀也飼子朝從上下暮從下上平均如一也如結如物之固結而不散也詩人美君子之用心均平專一故言鳲鳩在桑則其子七矣淑人君子則其儀一矣其儀一則心如結矣然不知其何所指也陳氏曰君子動容貌斯逺暴慢正顔色斯近信出辭氣斯逺鄙倍其見於威儀動作之閒者有常度矣豈固為是拘拘者哉蓋和順積中而英華發外是以由其威儀一於外而心如結於内者從可知也鳲鳩在桑其子在梅叶莫悲反淑人君子其帶伊絲叶新齎反其帶伊絲其弁伊騏音其興也鳲鳩常言在桑其子每章異木子自飛去母常不移也帶大帶也大帶用素絲有雜色飾焉弁皮弁也騏馬之青黑色者弁之色亦如此也書云四人騏弁今作綦矣言鳲鳩在桑則其子在梅矣淑人君子則其帶伊絲其帶伊絲則其弁伊騏矣言有常度不差忒也鳲鳩在桑其子在棘淑人君子其儀不忒其儀不忒正是四國叶于逼反興也有常度而其心一故儀不忒儀不忒則足以正四國矣大學傳曰其為父子兄弟足法而後民法之也鳲鳩在桑其子在榛淑人君子正是國人正是國人胡不萬年叶尼因反興也儀不忒故能正國人胡不萬年願其壽考之辭也鳲鳩四章章六句冽音列彼下泉浸彼苞稂音郎愾苦愛反我寤嘆念彼周京叶居良反比而興也冽寒也下泉泉下流者也苞草叢生也稂童粱莠屬也愾歎息之聲也周京天子所居也王室陵夷而小國困弊故以寒泉下流而苞稂見傷為比遂興其愾然以念周京也冽彼下泉浸彼苞蕭叶疎鳩反愾我寤嘆念彼京周比而興也蕭蒿也京周猶周京也冽彼下泉浸彼苞蓍音尸愾我寤嘆念彼京師叶霜夷反比而興也蓍筮草也京師猶京周也詳見大雅公劉篇芃芃音蓬黍苗隂雨膏去聲之四國有王郇音荀伯勞去聲之比而興也芃芃美貌郇伯郇侯文王之後嘗為州伯治諸侯有功言黍苗既芃芃然矣又有隂雨以膏之四國既有王矣而又有郇伯以勞之傷今之不然也下泉四章章四句程子曰易剝之為卦也諸陽消剝已盡獨有上九一爻尚存如碩大之果不見食將有復生之理上九亦變則純隂矣然陽無可盡之理變於上則生於下無閒可容息也隂道極盛之時其亂可知亂極則自當思治故衆心願戴於君子君子得輿也詩匪風下泉所以居變風之終也陳氏曰亂極而不治變極而不正則天理滅矣人道絶矣聖人於變風之極則係之以思治之詩以示循環之理以言亂之可治變之可正也曹國四篇十五章六十八句豳一之十五豳國名在禹貢雍州岐山之北原隰之野虞夏之際棄為后稷而封於邰及夏之衰棄稷不務棄子不窋失其官守而自竄於戎狄之閒不窋生鞠陶鞠陶生公劉能復脩后稷之業民以富實乃相土地之宜而立國於豳之谷焉十世而大王徙居岐山之陽十二世而文王始受天命十三世而武王遂為天子武王崩成王立年幼不能莅阼周公旦以冢宰攝政乃述后稷公劉之化作詩一篇以戒成王謂之豳風而後人又取周公所作及凡為周公而作之詩以附焉豳在今邠州三水縣邰在今京兆府武功縣七月流火叶虎委反九月授衣叶上聲一之日觱音必發叶芳吠反二之日栗烈叶力制反無衣無褐音曷叶許例反何以卒歲三之日于耜叶羊里反四之日舉趾同我婦子叶奬里反饁音嘩彼南畝叶滿彼反田畯音俊至喜賦也七月斗建申之月夏之七月也後凡言月者放此流下也火大火心星也以六月之昏加於地之南方至七月之昏則下而西流矣九月霜降始寒而蠶績之功亦成故授人以衣使禦寒也一之日謂斗建子一陽之月二之日謂斗建丑二陽之月也變月言日言是月之日也後凡言日者放此蓋周之先公已用此以紀候故周有天下遂以為一代之正朔也觱發風寒也栗烈氣寒也褐毛布也歲夏正之歲也于往也耜田器也于耜言往脩田器也舉趾舉足而耕也我家長自我也饁餉田也田畯田大夫勸農之官也周公以成王未知稼穡之艱難故陳后稷公劉風化之所由使瞽矇朝夕諷誦以教之此章首言七月暑退將寒故九月而授衣以禦之蓋十一月以後風氣日寒不如是則無以卒歲也正月則往脩田器二月則舉趾而耕少者既皆出而在田故老者率婦子而餉之治田早而用力齊是以田畯至而喜之也此章前叚言衣之始後叚言食之始二章至五章終前段之意六章至八章終後段之意七月流火九月授衣春日載陽有嗚倉庚叶古郎反女執懿筐遵彼微行叶户郎反爰求柔桑春日遲遲采蘩祁祁女心傷悲殆及公子同歸賦也載始也陽溫和也倉庚黄鸝也懿深美也遵循也微行小徑也柔桑稺桑也遲遲日長而暄也蘩白蒿也所以生蠶今人猶用之蓋蠶生未齊未可食桑故以此啖之也祁祁衆多也或曰徐也公子豳公之子也再言流火授衣者將言女功之始故又本於此遂言春日始和有鳴倉庚之時而蠶始生則執深筐以求稺桑然又有生而未齊者則采蘩者衆而此治蠶之女感時而傷悲蓋是時公子猶娶於國中而貴家大族連姻公室者亦無不力於蠶桑之務故其許嫁之女預以將及公子同歸而遠其父母為悲也其風俗之厚而上下之情交相忠愛如此後章凡言公子者放此七月流火八月萑音完葦音偉蠶月條音挑桑取彼斧斨音槍以伐遠揚猗音伊彼女桑七月鳴鵙音決八月載績載𤣥載黄我朱孔陽為公子裳賦也萑葦即蒹葭也蠶月治蠶之月條桑枝落之采其葉也斧隋銎斨方銎遠揚遠枝揚起者也取葉存條曰猗女桑小桑也小桑不可條取故取其葉而存其條猗猗然耳鵙伯勞也績緝也𤣥黑而有赤之色朱赤色陽明也言七月暑退將寒而是歲禦冬之備亦庶幾其成矣又當預擬來歲治蠶之用故於八月萑葦既成之際而收蓄之將以為曲薄至來歲治蠶之月則采桑以供蠶食而大小畢取見蠶盛而人力至也蠶事既備又於鳴鵙之後麻熟而可績之時則績其麻以為布而凡此蠶績之所成者皆染之或𤣥或黄而其朱者无為鮮明皆以供上而為公子之裳言勞於其事而不自愛以奉其上蓋至誠慘怛之意上以是施之下以是報之也以上二章專言蠶績之事以終首章前段無衣之意四月秀葽音腰五月鳴蜩音條八月其穫音鑊十月隕蘀音託一之日于貉音鶴取彼狐狸為公子裘叶渠之反二之日其同載纘武功言私其豵音宗獻豜音堅于公賦也不榮而實曰秀葽草名蜩蟬也穫禾之早者可穫也隕墜蘀落也謂草木隕落也貉狐狸也于貉猶言于耜謂徃取狐狸也同竭作以狩也纘習而繼之也豵一歲豕豜三歲豕言自四月純陽而歴一隂四隂以至純隂之月則大寒之候將至雖蠶桑之功無所不備猶恐其不足以禦寒故于貉而取狐狸之皮以為公子之裘也獸之小者私之以為已冇而大者則獻之於上亦愛其上之無已也此章專言狩獵以終首章前段無褐之意五月斯螽音終動股六月莎音蓑雞振羽七月在野叶上與反八月在宇九月在户十月蟋蟀入我牀下叶後五反穹起弓反窒珍悉反熏許云反䑕塞入聲向墐音覲户嗟我婦子叶兹五反曰為改歲入此室處賦也斯螽莎雞蟋蟀一物隨時變化而異其名動股始躍而以股鳴也振羽能飛而以翅鳴也宇簷下也暑則在野寒則依人穹空隙也窒塞也向北出牖也墐塗也庶人蓽户冬則塗之東萊呂氏曰十月而曰改歲三正之通於民俗尚矣周特舉而迭用之耳言覩蟋蟀之依人則知寒之將至矣於是室中空隙者塞之熏䑕使不得穴於其中塞向以當北風墐户以禦寒氣而語其婦子曰歲將改矣天既寒而事亦已可以入此室處矣此見老者之愛也此章亦以終首章前段禦寒之意六月食鬱及薁音郁七月亨音烹葵及菽音叔八月剝棗音走十月穫稻叶徒苟反為此春酒以介眉壽叶殖酉反七月食瓜叶音孤八月斷壺九月叔苴音疽采荼音徒薪樗敕書反食音嗣我農夫賦也鬱棣屬薁蘡薁也葵菜名菽豆也剝擊也穫稻以釀酒也介助也介眉壽者頌禱之辭也壺瓠也食瓜斷壺亦去圃為場之漸也叔拾也苴麻子也荼苦菜也樗惡木也自此至卒章皆言農圃飲食祭祀燕樂以終首章後段之意而此章果酒嘉蔬以供老疾奉賔祭瓜瓠苴荼以為常食少長之義豐儉之節然也九月築場圃音布十月納禾稼叶古護反黍稷重平聲穋音六叶六直反禾麻菽麥叶訖力反嗟我農夫我稼既同上入執宫功晝爾于茅宵爾索綯音陶亟音棘其乗屋其始播百穀賦也場圃同地物生之時則耕治以為圃而種菜茹物成之際則築堅之以為場而納禾稼蓋自田而納之於場也禾者穀連藳秸之總名禾之秀實而在野曰稼先種後熟曰重後種先熟曰穋再言禾者稻秫苽梁之屬皆禾也同聚也宫邑居之宅也古者民受五畝之宅二畝半為廬在田春夏居之二畝半為宅在邑秋冬居之功葺治之事也或曰公室官府之役也古者用民之力歲不過三日是也索絞也綯索也乘升也言納於場者無所不備則我稼同矣可以上入都邑而執治宫室之事矣故晝往取茅夜而絞索亟升其屋而治之蓋以來歲將復始播百穀而不暇於此故也不待督責而自相警戒不敢休息如此呂氏曰此章終始農事以極憂勤艱難之意二之日鑿冰沖沖三之日納于凌音另隂叶於容反四之日其蚤音早獻羔祭韭音九叶已小反九月肅霜十月滌音笛場朋酒斯饗叶虚良反曰殺羔羊躋音賫彼公堂稱彼兕觥音肱叶古黄反萬壽無疆賦也鑿冰謂取冰於山也沖沖鑿冰之意周禮正歲十二月令斬冰是也納藏也藏冰所以備暑也凌隂冰室也豳土寒多正月風未解凍故冰猶可藏也蚤蚤朝也韭菜名獻羔祭韭而後啓之月令仲春獻羔開冰先薦寢廟是也蘇氏曰古者藏冰發冰以節陽氣之盛夫陽氣之在天地譬猶火之著於物也故常有以解之十二月陽氣蘊伏錮而未發其盛在下則納冰於地中至於二月四陽作蟄蟲起陽始用事則亦始啓冰而廟薦之至於四月陽氣畢達隂氣將絶則冰於是大發食肉之祿老病喪浴冰無不及是以冬無愆陽夏無伏隂春無淒風秋無苦雨雷出不震無災霜雹癘疾不降民不夭札也胡氏曰藏冰開冰亦聖人輔相燮調之一事耳不專恃此以為治也肅霜氣肅而霜降也滌場者農事畢而埽場地也兩尊曰朋鄉飲酒之禮兩尊壺于房户閒是也躋升也公堂君之堂也稱舉也疆竟也張子曰此章見民忠愛其君之甚既勸趨其藏冰之役又相戒速畢場功殺羊以獻於公舉酒而祝其壽也七月八章章十一句周禮籥章中春晝擊土鼔龡豳詩以逆暑中秋夜迎寒亦如之即謂此詩也王氏曰仰觀星日霜露之變俯察昆蟲草木之化以知天時以授民事女服事乎内男服事乎外上以誠愛下下以忠利上父父子子夫夫婦婦養老而慈幼食力而助弱其祭祀也時其燕饗也節此七月之義也鴟鴞鴟鴞既取我子又叶入聲無毁我室又叶上聲恩斯勤斯鬻音育子之閔叶眉貧反斯比也為鳥言以自比也鴟鴞鵂鶹惡鳥攫鳥子而食者也室鳥自名其巢也恩情愛也勤篤厚也鬻養閔憂也武王克商使弟管叔鮮蔡叔度監于紂子武庚之國武王崩成王立周公相之而二叔以武庚叛且流言于國曰周公將不利于孺子故周公東征二年乃得管叔武庚而誅之而成王猶未知周公之意也公乃作此詩以貽王託為鳥之愛巢者呼鴟鴞而謂之曰鴟鴞鴟鴞爾既取我之子矣無更毁我之室也以我情愛之心篤厚之意鬻養此子誠可憐憫今既取之其毒甚矣况又毁我室乎以比武庚既敗管蔡不可更毁我王室也迨天之未陰雨徹彼桑土音杜綢音儔繆平聲牖户今女音汝下民或敢侮予叶演女反比也迨及徹取也桑土桑根也綢繆纒綿也牖巢之通氣處户其出入處也亦為鳥言我及天未隂雨之時而往取桑根以纒綿巢之隙穴使之堅固以備隂雨之患則此下土之民誰敢有侮予者亦以比已深愛王室而預防其患難之意故孔子贊之曰為此詩者其知道乎能治其國家誰敢侮之予手拮音吉据音居予所捋力活反荼予所蓄租子胡反予口卒瘏音徒曰予未有室家叶古胡反比也拮据手口共作之貌捋取也荼萑苕可藉巢者也蓄積租聚卒盡瘏病也室家巢也亦為鳥言作巢之始所以拮据以捋荼蓄租勞苦而至於盡病者以巢之未成也以比已之前日所以勤勞如此者以王室之新造而未集故也予羽譙譙音樵予尾翛翛音消予室翹翹風雨所漂搖予維音嘵嘵音囂比也譙譙殺也翛翛敝也翹翹危也嘵嘵急也亦為鳥言羽殺尾敝以成其室而未定也風雨又從而漂摇之則我之哀鳴安得而不急哉以比已既勞悴王室又未安而多難乘之則其作詩以喻王亦不得而不汲汲也鴟鴞四章章五句事見書金縢篇我徂東山慆慆音滔不歸我來自東零雨其濛我東曰歸我心西悲制彼裳衣勿士行音杭枚叶謨悲反蜎蜎音娟者蠋音蜀烝在桑野叶上與反敦音堆彼獨宿亦在車下叶後五反賦也東山所征之地也慆慆言久也零落也濛雨貌裳衣平居之服也勿士行枚未詳其義鄭氏曰士事也行陣也枚如箸銜之有繣結項中以止語也蜎蜎動貌蠋桑蟲如蠶者也烝發語辭敦獨處不移之貌此則興也成王既得鴟鴞之詩又感雷風之變始悟而迎周公於是周公東征已三年矣既歸因作此詩以勞歸士蓋為之述其意而言曰我之東征既久而歸塗又有遇雨之勞因追言其在東而言歸之時心已西嚮而悲於是制其平居之服而以為自今可以勿為行陳銜枚之事矣及其在塗則又覩物起興而自歎曰彼蜎蜎者蠋則在彼桑野矣此敦然而獨宿者則亦在此車下矣我徂東山慆慆不歸我來自東零雨其濛果臝力果反之實亦施音異于宇伊威在室蠨音蕭蛸音筲在户町音廷畽他短反鹿場熠音翊燿以照反宵行户郎反亦可畏叶於非反也伊可懷叶胡威反也賦也果臝栝樓也施延也蔓生延施于宇下也伊威鼠婦也室不埽則有之蠨蛸小蜘蛛也户無人出入則結網當之町畽舍旁隙地也無人焉故鹿以為場也熠燿明不定貌宵行蟲名如蠶夜行喉下有光如螢章首四句言其往來之勞在外之久故每章重言見其感念之深遂言已東征而室廬荒廢至於如此亦可畏矣然豈可畏而不歸哉亦可懐思而已此則述其歸未至而思家之情也我徂東山慆慆不歸我來自東零雨其濛鸛鳴于垤叶地一反婦嘆于室洒埽穹窒我征聿至叶入聲有敦音堆瓜苦烝在栗薪自我不見于今三年叶尼因反賦也鸛水鳥似鶴者也垤蟻塚也穹窒見七月將隂雨則穴處者先知故蟻出垤而鸛就食之遂鳴于其上也行者之妻亦思其夫之勞苦而嘆息於家於是洒埽穹窒以待其歸而其夫之行忽已至矣因見苦瓜繫於栗薪之上而曰自我之不見此亦已三年矣栗周土所宜木與苦瓜皆微物也見之而喜則其行久而感深可知矣我徂東山慆慆不歸我來自東零雨其濛倉庚于飛熠燿其羽之子于歸皇駁音剝其馬叶滿補反親結其縭叶離羅二音九十其儀叶宜俄二音其新孔嘉叶居宜居何二反其舊如之何叶奚何二音賦而興也倉庚飛昏姻時也熠燿鮮明也黄白曰皇駵白曰駁縭婦人之褘也母戒女而為之施衿結帨也九其儀十其儀言其儀之多也賦時物以起興而言東征之歸士未有室家者及時而昏姻既甚美矣其舊有室家者相見而喜當如何邪東山四章章十二句序曰一章言其完也二章言其思也三章言其室家之望女也四章樂男女之得及時也君子之於人序其情而閔其勞所以説也説以使民民忘其死其惟東山乎愚謂完謂全師而歸無死傷之苦思謂未至而思有愴恨之懐至於室家望女男女及時亦皆其心之所願而不敢言者上之人乃先其未發而歌詠以勞苦之則其歡欣感激之情為如何哉蓋古之勞詩皆如此其上下之際情志交孚雖家人父子之相語無以過之此其所以維持鞏固數十百年而無一旦土崩之患也既破我斧又缺我斨音槍周公東征四國是皇哀我人斯亦孔之將賦也隋銎曰斧方銎曰斨征伐之用也四國四方之國也皇匡也將大也從軍之士以前篇周公勞已之勤故言此以答其意曰東征之役既破我斧而缺我斨其勞甚矣然周公之為此舉蓋將使四方莫敢不一於正而後已其哀我人也豈不大哉然則雖有破斧缺斨之勞而義有所不得辭矣夫管蔡流言以謗周公而公以六軍之衆往而征之使其心一有出於自私而不在於天下則撫之雖勤勞之雖至而從役之士豈能不怨也哉今觀此詩固足以見周公之心大公至正天下信其無有一毫自愛之私抑又以見當是之時雖被堅執鋭之人亦皆能以周公之心為心而不自為一身一家之計蓋亦莫非聖人之徒也學者於此熟玩而有得焉則其心正大而天地之情真可見矣既破我斧又缺我錡音竒叶巨何反周公東征四國是吪音哦哀我人斯亦孔之嘉叶居何反賦也錡鑿屬吪化嘉善也既破我斧又缺我銶音求周公東征四國是遒音囚哀我人斯亦孔之休賦也銶木屬遒歛而固之也休美也破斧三章章六句范氏曰象日以殺舜為事舜為天子也則封之管蔡啓商以叛周公之為相也則誅之迹雖不同其道則一也蓋象之禍及於舜而已故舜封之管蔡流言將危周公以間王室得罪於天下故周公誅之非周公誅之天下之所當誅也周公豈得而私之哉伐柯如何匪斧不克取去聲妻如何匪媒不得比也柯斧柄也克能也媒通二姓之言者也周公居東之時東人言此以比平日欲見周公之難伐柯伐柯其則不遠我遘音姤之子籩豆有踐上聲比也則法也我東人自我也之子指其妻而言也籩竹豆也豆木豆也踐行列之貌言伐柯而有斧則不過即此舊斧之柯而得其新柯之法娶妻而有媒則亦不過即此見之而成其同牢之禮矣東人言此以比今日得見周公之易深喜之之辭也伐柯二章章四句九罭音域之魚鱒音尊魴我覯之子袞衣繡裳興也九罭九囊之網也鱒似鯶而鱗細眼赤魴已見上皆魚之美者也我東人自我也之子指周公也袞衣裳九章一曰龍二曰山三曰華蟲雉也四曰火五曰宗彜虎蜼也皆繢於衣六曰藻七曰粉米八曰黼九曰黻皆繡於裳天子之龍一升一降上公但有降龍以龍首卷然故謂之袞也此亦周公居東之時東人喜得見之而言九罭之網則有鱒魴之魚矣我覯之子則見其袞衣繡裳之服矣鴻飛遵渚公歸無所於女音汝信處興也遵循也渚小洲也女東人自相女也再宿曰信東人聞成王將迎周公又自相謂而言鴻飛則遵渚矣公歸豈無所乎今特於女信處而已鴻飛遵陸公歸不復於女信宿興也高平曰陸不復言將留相王室而不復來東也是以有袞衣兮無以我公歸兮無使我心悲兮賦也承上二章言周公信處信宿於此是以東方有此服袞衣之人又願其且留於此無遽迎公以歸歸則將不復來而使我心悲也九罭四章一章四句三章章三句狼跋其胡載疐音致其尾公孫音遜碩膚赤舄音昔几几興也跋躐也胡頷下懸肉也載則疐跲也老狼有胡進而躐其胡則退而跲其尾公周公也孫讓碩大膚美也赤舄冕服之舄也几几安重貌周公雖遭疑謗然所以處之不失其常故詩人美之言狼跋其胡則疐其尾矣公遭流言之變而其安肆自得乃如此蓋其道隆德盛而安土樂天有不足言者所以遭大變而不失其常也夫公之被毁以管蔡之流言也而詩人以為此非四國之所為乃公自讓其大美而不居耳蓋不使讒邪之口得以加乎公之忠聖此可見其愛公之深敬公之至而其立言亦有法矣狼疐其尾載跋其胡公孫碩膚德音不瑕叶洪孤反興也德音猶令聞也瑕疪病也程子曰周公之處已也夔夔然存恭畏之心其存誠也蕩蕩然無顧慮之意所以不失其聖而德音不瑕也狼跋二章章四句范氏曰神龍或潛或飛能大能小其變化不測然得而畜之若犬羊然有欲故也唯其可以畜之是以亦得醢而食之凡有欲之類莫不可制焉唯聖人無欲故天地萬物不能易也富貴貧賤死生如寒暑晝夜相代乎前吾豈有二其心乎哉亦順受之而已矣舜受堯之天下不以為泰孔子阨於陳蔡而不以為戚周公遠則四國流言近則王不知而赤舄几几德音不瑕其致一也豳國七篇二十七章二百三句程元問於文中子曰敢問豳風何風也曰變風也元曰周公之際亦有變風乎曰君臣相誚其能正乎成王終疑周公則風遂變矣非周公至誠其孰卒正之哉元曰居變風之末何也曰夷王以下變風不復正矣夫子蓋傷之也故終之以豳風言變之可正也惟周公能之故係之以正變而克正危而克扶始終不失其本其惟周公乎係之豳遠矣哉籥章龡豳詩以逆暑迎寒已見於七月之篇矣又曰祈年于田祖則龡豳雅以樂田畯祭蜡則龡豳頌以息老物則考之於詩未見其篇章之所在故鄭氏三分七月之詩以當之其道情思者為風正禮節者為雅樂成功者為頌然一篇之詩首尾相應乃剟取其一節而偏用之恐無此理故王氏不取而但謂本有是詩而亡之其説近是或者又疑但以七月全篇隨事而變其音節或以為風或以為雅或以為頌則於理為通而事亦可行如又不然則雅頌之中凡為農事而作者皆可冠以豳號其説具於大田良耜諸篇讀者擇焉可也詩經集傳卷三
