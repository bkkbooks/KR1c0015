body:
  text: 詩經集傳卷五宋朱子撰彤弓之什二之三彤弓弨音超兮受言藏之我有嘉賔中心貺叶虛王反之鐘鼓既設一朝饗叶虛良反之賦也彤弓朱弓也弨弛貌貺與也大飲賔曰饗此天子燕有功諸侯而錫以弓矢之樂歌也東萊呂氏曰受言藏之言其重也弓人所獻藏之王府以待有功不敢輕與人也中心貺之言其誠也中心實欲貺之非由外也一朝饗之言其速也以王府寶藏之弓一朝舉以畀人未嘗有遲留顧惜之意也後世視府藏為已私分至有以武庫兵賜弄臣者則與受言藏之者異矣賞賜非出於利誘則迫於事勢至有朝賜鐵券而暮屠戮者則與中心貺之者異矣屯膏吝賞功臣解體至有印刓而不忍豫者則與一朝饗之者異矣彤弓弨兮受言載叶子利反之我有嘉賔中心喜叶去聲之鐘鼓既設一朝右音又叶于記反之賦也載抗之也喜樂也右勸也尊也彤弓弨兮受言櫜音髙叶古號反之我有嘉賔中心好去聲之鐘鼓既設一朝酬音酬叶大到反之賦也櫜韜好說酬報也飲酒之禮主人獻賔賔酢主人主人又酌自飲而遂酌以飲賔謂之酬酬猶厚也勸也彤弓三章章六句春秋傳寧武子曰諸侯敵王所愾而獻其功於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴注曰愾恨怒也覺明也謂諸侯有四夷之功王賜之弓矢又為歌彤弓以明報功宴樂鄭氏曰凡諸侯賜弓矢然後專征伐東萊呂氏曰所謂專征者如四夷入邊臣子篡弒不容待報者其他則九伐之法乃大司馬所職非諸侯所專也與後世强臣拜表輒行者異矣菁菁音精者莪在彼中阿既見君子樂音洛且有儀叶五何反興也菁菁盛貌莪蘿蒿也中阿阿中也大陵曰阿君子指賔客也此亦燕飲賔客之詩言菁菁者莪則在彼中阿矣既見君子則我心喜樂而有禮儀矣或曰比也以菁菁者莪比君子容貌威儀之盛也下章放此菁菁者莪在彼中沚音止既見君子我心則喜興也中沚沚中也喜樂也菁菁者莪在彼中陵既見君子錫我百朋興也中陵陵中也古者貨貝五貝為朋錫我百朋者見之而喜如得重貨之多也泛泛芳劒反楊舟載沉載浮既見君子我心則休比也楊舟楊木為舟也載則也載沉載浮猶言載清載濁載馳載驅之類以比未見君子而心不定也休者休休然言安定也菁菁者莪四章章四句六月棲棲音西戎車既飭音敕四牡騤騤音逵載是常服叶蒲北反玁狁孔熾我是用急叶音棘王于出征以匡王國叶于逼反賦也六月建未之月也棲棲猶遑遑不安之貌戎車兵車也飭整也騤騤强貌常服戎事之常服以韎韋為辨又以為衣而素裳白舄也玁狁即獫狁北狄也孔甚熾盛匡正也成康既沒周室寖衰八世而厲王胡暴虐周人逐之出居于彘玁狁內侵逼近京邑王崩子宣王靖即位命尹吉甫帥師伐之有功而歸詩人作歌以序其事如此司馬法冬夏不興師今乃六月而出師者以玁狁甚熾其事危急故不得已而王命於是出征以正王國也比去聲物四驪間之維則維此六月既成我服叶蒲北反我服既成于三十里王于出征以佐天子叶奬里反賦也比物齊其力也凡大事祭祀朝覲㑹同毛馬而頒之凡軍事物馬而頒之毛馬齊其色物馬齊其力吉事尚文武事尚强也則法也服戎服也三十里一舍也古者吉行日五十里師行日三十里既比其物而曰四驪則其色又齊可以見馬之有餘矣間習之而皆中法則又可以見教之有素矣於是此月之中即成我服既成我服即日引道不徐不疾盡舍而止又見其應變之速從事之敏而不失其常度也王命於此而出征欲其冇以敵王所愾而佐天子耳四牡修廣其大有顒玉容反薄伐玁狁以奏膚公有嚴有翼共音恭武之服叶蒲北反其武之服以定王國叶于逼反賦也修長廣大也顒大貌奏薦膚大公功嚴威翼敬也其與供同服事也言將帥皆嚴敬以共武事也玁狁匪茹音孺整居焦穫音護侵鎬音浩及方至于涇陽織音志文鳥章白旆央央於良反元戎十乘去聲以先啓行叶户郎反賦也茹度整齊也焦穫鎬方皆地名焦未詳所在穫郭璞以為瓠中則今在耀州三原縣也鎬劉向以為千里之鎬則非鎬京之鎬矣亦未詳其所在也方疑即朔方也涇陽涇水之北在豐鎬之西北言其深入為寇也織幟字同烏章烏隼之章也白旆繼旐者也央央鮮明貌元大也戎戎車也軍之前鋒也啓開行道也猶言發程也言玁狁不自度量深入為寇如此是以建此旌旗選鋒鋭進聲其罪而致討焉直而壯律而臧有所不戰戰必勝矣戎車既安叶於連反如輊音致如軒四牡既佶音吉既佶且間叶胡田反薄伐玁狁至于大音泰原文武吉甫萬邦為憲叶許言反賦也輊車之覆而前也軒車之却而後也凡車從後視之如輊從前視之知軒然後適調也佶壯健貌大原地名亦曰大鹵今在大原府陽曲縣至于大原言逐出之而已不窮追也先王治戎狄之法如此吉甫尹吉甫此時大將也憲法也非文無以附衆非武無以威敵能文能武則萬邦以之為法矣吉甫燕喜既多受祉來歸自鎬我行永久叶舉里反飲去聲御諸友叶羽已反炮音庖鱉膾鯉侯誰在矣張仲孝友叶同上賦也祉福御進侯維也張仲吉甫之友也善父母曰孝善兄弟曰友此言吉甫燕飲喜樂多受福祉蓋以其歸自鎬而行永久也是以飲酒進饌於朋友而孝友之張仲在焉言其所與宴者之賢所以賢吉甫而善是燕也六月六章章八句薄言采芑音起于彼新田于此菑音緇畝叶每彼反方叔涖音利止其車三千師干之試叶詩止反方叔率止乘其四騏四騏翼翼路車有奭音肸簟笰音弗魚服叶蒲北反鉤膺鞗音條革叶訖力反興也芑苦菜也青白色摘其葉有白汁出肥可生食亦可蒸為茹即今苦蕒菜宜馬食軍行采之人馬皆可食也田一歲曰菑二歲曰新田三歲曰畬方叔宣王卿士受命為將者也涖臨也其車三千法當用三十萬衆蓋兵車一乘甲士三人步卒七十二人又二十五人將重車在後凡百人也然此亦極其盛而言未必實有此數也師衆干扞也試肄習也言衆且練也率總率之也翼翼順序貌路車戎車也奭赤貌簟笰以方文竹簟為車蔽也鉤膺馬婁頷有鉤而在膺有樊有纓也樊馬大帶纓鞅也鞗革見蓼蕭篇宣王之時蠻荆背叛王命方叔南征軍行采芑而食故賦其事以起興曰薄言采芑則于彼新田于此菑畝矣方叔涖止則其車三千師干之試矣又遂言其車馬之美以見軍容之盛也薄言采芑于彼新田于此中鄉方叔涖止其車三千旗旐央央方叔率止約軧音祗錯衡叶户郎反八鸞瑲瑲音倉服其命服朱芾音弗斯皇有瑲葱珩音衡叶户郎反興也中鄉民居其田尤治約束軧轂也以皮纏束兵車之轂而朱之也錯文也鈴在鑣曰鸞馬口兩旁各一四馬故八也瑲瑲聲也命服天子所命之服也朱芾黃朱之芾也皇猶煌煌也瑲玉聲葱蒼色如葱者也珩佩首橫玉也禮三命赤芾葱珩鴥音聿彼飛隼息允反其飛戾天亦集爰止方叔涖止其車三千師干之試方叔率止鉦音征人伐鼓陳師鞠音菊旅顯允方叔伐鼓淵淵叶於巾反振旅闐闐音田叶徒鄰反興也隼鷂屬急疾之鳥也戾至爰於也鉦鐃也鐲也伐擊也鉦以靜之鼓以動之鉦鼓各有人而言鉦人伐鼓互文也鞠告也二千五百人為師五百人為旅此言將戰陳其師旅而誓告之也陳師鞠旅亦互文耳淵淵鼓聲和平不暴怒也謂戰時進士衆也振止旅衆也言戰罷而止其衆以入也春秋𫝊曰出曰治兵入曰振旅是也闐闐亦鼓聲也或曰盛貌程子曰振旅亦以鼓行金止言隼飛戾天而亦集於所止以興師衆之盛而進退有節如下文所云也蠢爾蠻荆大邦為讎方叔元老克壯其猶方叔率止執訊音信獲醜叶尺由反戎車嘽嘽音癱嘽嘽焞焞音推如霆如雷顯允方叔征伐玁狁蠻荆來威叶音隈賦也蠢者動而無知之貌蠻荆荊州之蠻也大邦猶言中國也元大猶謀也言方叔雖老而謀則壯也嘽嘽衆也焞焞盛也霆疾雷也方權蓋嘗與於北伐之功者是以蠻荆聞其名而皆來畏服也采芑四章章十二句我車既攻我馬既同四牡龐龐音籠駕言徂東賦也攻堅同齊也傳曰宗廟齊豪尚純也戎事齊力尚强也田獵齊足尚疾也龐龐充實也東東都洛邑也周公相成王營洛邑為東都以朝諸侯周室既衰久廢其禮至于宣王內得政事外攘夷狄復文武之競土修車馬備器械復㑹諸侯於東都因田獵而選車徒焉故詩人作此以美之首章泛言將往東都也田車既好叶許厚反四牡孔阜東有甫草叶此苟反駕言行狩叶始苟反賦也田車田獵之車好善也阜盛大也甫草甫田也後為鄭地今開封府中牟縣西圃田澤是也宣王之時未有鄭國圃田屬東都畿內故往田也此章指言將往狩于圃田也之子于苗叶音毛選徒囂囂音翶建旐設旄搏音博獸于敖賦也之子有司也苖狩獵之通名也選數也囂囂聲衆盛也數車徒者其聲囂囂則車徒之衆可知且車徒不譁而惟數者有聲又見其靜治也敖近滎陽地名也此章言至東都而選徒以獵也駕彼四牡四牡奕奕赤芾金舄㑹同有繹賦也奕奕連絡布散之貌赤芾諸侯之服金舄赤舄而加金飾亦諸侯之服也時見曰㑹殷見曰同繹陳列聯屬之貌也此章言諸侯來㑹朝於東都也決拾既佽音次與柴叶弓矢既調讀如同與同叶射夫既同助我舉柴音恣賦也決以象骨為之著於右手大指所以鉤弦開體拾以皮為之著於左臂以遂弦故亦名遂佽比也調謂弓强弱與矢輕重相得也射夫蓋諸侯來㑹者同協也柴說文作㧘謂積禽也使諸侯之人助而舉之言獲多也此章言既㑹同而田獵也四黃既駕兩驂不猗音意叶於箇反不失其馳叶徒臥反舍音捨矢如破叶普過反賦也猗偏倚不正也馳馳驅之法也舍矢如破巧而力也蘇氏曰不善射御者詭遇則獲不然不能也今御者不失其馳驅之法而射者舍矢如破則可謂善射御矣此章言田獵而見其射御之善也蕭蕭馬鳴悠悠旆旌徒御不驚大庖不盈賦也蕭蕭悠悠皆間暇之貌徒步卒也御車御也驚如漢書夜軍中驚之驚不驚言比卒事不喧譁也大庖君庖也不盈言取之有度不極欲也蓋古者田獵獲禽面傷不獻踐毛不獻不成禽不獻擇取三等自左膘而射之達於右腢為上殺以為乾豆奉宗廟逹右耳本者次之以為賔客射左髀逹於右䯚為下殺以充君庖每禽取三十焉每等得十其餘以與士大夫習射於澤宫中者取之是以獲雖多而君庖不盈也張子曰饌雖多而無餘者均及於衆而有法耳凡事有法則何患乎不均也舊說不驚驚也不盈盈也亦通此章言其終事嚴而頒禽均也之子于征有聞音問無聲允矣君子展也大成賦也允信展誠也聞師之行而不聞其聲言至肅也信矣其君子也誠哉其大成也此章總叙其事之始終而深美之車攻八章章四句以五章以下考之恐當作四章章八句吉日維戊叶莫口反既伯既禱叶丁口反田車既好叶許口反四牡孔阜升彼大阜從其羣醜賦也戊剛日也伯馬祖也謂天駟房星之神也醜衆也謂禽獸之羣衆也此亦宣王之詩言田獵將用馬力故以吉日祭馬祖而禱之既祭而車牢馬健於是可以厯險而從禽也以下章推之是日也其戊辰與吉日庚午既差我馬叶滿浦反獸之所同麀音憂鹿虞虞音語漆沮平聲之從天子之所賦也庚午亦剛日也差擇齊其足也同聚也鹿牝曰麀麌麋衆多也漆沮水名在西都畿內涇渭之北所謂洛水今自延韋流入鄘坊至同州入河也戊辰之日既禱矣越三日庚午遂擇其馬而乘之視獸之所聚麀鹿最多之處而從之惟漆沮之旁為盛宜為天子田獵之所也瞻彼中原其祁孔有叶羽已反儦儦音標俟俟叶于紀反或羣或友叶羽已反悉率左右叶羽已反以燕天子叶奬里反賦也中原原中也祁大也趣則儦儦行則俟俟獸三曰羣二曰友燕樂也言從王者視彼禽獸之多於是率其同事之人各共其事以樂天子也既張我弓既挾我矢發彼小豝音巴殪音意此大兕以御賔客且以酌醴賦也發發矢也豕牝曰豝一矢而死曰殪兕野牛也言能中微而制大也御進也醴酒名周官五齊二曰醴齊注曰醴成而汁滓相將如今甜酒也言射而獲禽以為爼實進於賔客而酌醴也吉日四章章六句東萊呂氏曰車攻吉日所以為復古者何也蓋搜狩之禮可以見王賦之復焉可以見軍實之盛焉可以見師律之嚴焉可以見上下之情焉可以見綜理之周焉欲明文武之功業者此亦足以觀矣鴻鴈于飛肅肅其羽之子于征劬勞于野叶上與反爰及矜人哀此鰥寡叶果五反興也大曰鴻小曰鴈肅肅羽聲也之子流民自相謂也征行也劬勞病苦也矜憐也老而無妻曰鰥老而無夫曰寡舊說周室中衰萬民離散而宣王能勞來還定安集之故流民喜之而作此詩追敘其始而言曰鴻鴈于飛則肅肅其羽矣之子于征則劬勞于野矣且其劬勞者皆鰥寡可哀憐之人也然今亦未有以見其為宣王之詩後三篇放此鴻鴈于飛集于中澤叶徒洛反之子于垣音袁百堵皆作雖則劬勞其究安宅叶逹各反興也中澤澤中也一丈為板五板為堵究終也流民自言鴻鴈集于中澤以興已之得其所止而築室以居今雖勞苦而終獲安定也鴻鴈于飛哀鳴嗷嗷音翺維此哲人謂我劬勞維彼愚人謂我宣驕叶音髙比也流民以鴻鴈哀鳴自比而作此歌也哲知宣示也知者聞我歌知其出於劬勞不知者謂我閒睱而宣驕也韓詩云勞者歌其事魏風亦云我歌且謡不知我者謂我士也驕大抵歌多出於勞苦而不知者常以為驕也鴻鴈三章章六句夜如何其音基夜未央庭燎之光君子至止鸞聲將將音槍賦也其語辭央中也庭燎大燭也諸侯將朝則司烜以物百枚并而束之設於門內也君子諸侯也將將鸞鑣聲王將起視朝不安於寢而問夜之早晚曰夜如何哉夜雖未央而庭燎光矣朝者至而聞其鸞聲矣夜如何其夜未艾叶音乂庭燎晣晣音制與艾叶君子至止鸞聲噦噦音諱賦也艾盡也晣晣小明也噦噦近而聞其徐行聲有節也夜如何其夜鄉音向晨庭燎有輝音熏君子至止言觀其旗叶渠斤反賦也鄉晨近曉也輝火氣也天欲明而見其煙光相雜也既至而觀其旗則辨色矣庭燎三章章五句沔音免彼流水朝音潮宗于海叶虎洧反鴥惟必反彼飛隼載飛載止嗟我兄弟邦人諸友叶羽軌反莫肯念亂誰無父母叶滿洧反興也沔水流滿也諸侯春見天子曰朝夏見曰宗此憂亂之詩言流水猶朝宗于海飛隼猶或有所止而我之兄弟諸友乃無肯念亂者誰獨無父母乎亂則憂或及之是豈可以不念哉沔彼流水其流湯湯音傷鴥彼飛隼載飛載揚念彼不蹟音迹載起載行叶户郎反心之憂矣不可弭忘興也湯湯波流盛貌不蹟不循道也載起載行言憂念之深不遑寧處也弭止也水盛隼揚以興憂念之不能忘也鴥彼飛隼率彼中陵民之訛言寧莫之懲我友敬矣讒言其興興也率循訛僞懲止也隼之髙飛猶循彼中陵而民之訛言乃無懲止之者然我之友誠能敬以自持矣則讒言何自而興乎始憂於人而卒反諸已也沔水三章二章章八句一章六句疑當作三章章八句卒章脫前兩句耳鶴鳴于九臯聲聞音問于野叶上與反魚潛在淵或在于渚樂音洛彼之園爰有樹檀叶徒沿反其下維蘀音託他山之石可以為錯入聲比也鶴鳥名長頸竦身髙腳頂赤身白頸尾黑其鳴髙亮聞八九里臯澤中水溢出所為坎從外數至九喻深逺也蘀落也錯礪石也此詩之作不可知其所由然必陳善納誨之辭也蓋鶴鳴于九臯而聲聞于野言誠之不可掩也魚潛在淵而或在于渚言理之無定在也園有樹檀而其下維蘀言愛當知其惡也他山之石而可以為錯言憎當知其善也由是四者引而伸之觸類而長之天下之理其庶幾乎鶴鳴于九臯聲聞于天叶鐵因反魚在于渚或潛在淵叶一均反樂彼之園爰有樹檀其下維榖他山之石可以攻玉比也榖一名楮惡木也攻錯也程子曰玉之溫潤天下之至美也石之粗厲天下之至惡也然兩玉相磨不可以成器以石磨之然後玉之為器得以成焉猶君子之與小人處也橫逆侵加然後修省畏避動心忍性增益預防而義理生焉道德成焉吾聞諸邵子云鶴鳴二章章九句彤弓之什十篇四十章二百五十九句疑脫兩句當為二百六十一句祈父之什二之四祈父音甫豫王之爪牙叶五胡反胡轉豫于恤靡所止居賦也祈父司馬也職掌封圻之兵甲故以為號酒誥曰圻父薄違是也豫六軍之士也或曰司右虎賁之屬也爪牙鳥獸所用以為威者也恤憂也軍士怨於久役故呼祈父而告之曰豫乃王之爪牙汝何轉我於憂恤之地使我無所止居乎祈父豫王之爪士胡轉豫于恤靡所底音扺止賦也爪士爪牙之士也底至也祈父亶不聰胡轉豫于恤有母之尸饔賦也亶誠尸主也饔熟食也言不得奉養而使母反主勞苦之事也東萊呂氏曰越句踐伐吳冇父母耆老而無昆弟者皆遣歸魏公子無忌救趙亦令獨子無兄弟者歸養則古者有親老而無兄弟其當免征役必有成法故責司馬之不聰其意謂此法人皆聞之汝獨不聞乎乃驅吾從戎使吾親不免薪水之勞也責司馬者不敢斥王也祈父三章章四句序以為刺宣王之詩說者又以為宣王三十九年戰于千畝王師敗績于姜氏之戎故軍士怨而作此詩東萊呂氏曰太子晉諫靈王之辭曰自我先王厲宣幽平而貪天禍至于今未弭宣王中興之主也至與幽厲並數之其辭雖過觀是詩所刺則子晉之言豈無所自歟但今考之詩文未冇以見其必為宣王耳下篇放此皎皎白駒食我場苗縶音執之維之以永今朝所謂伊人於焉逍遙賦也皎皎潔白也駒馬之未壯者謂賢者所乘也場圃也縶絆其足維繫其靷也永久也伊人指賢者也逍遙遊息也為此詩者以賢者之去而不可留也故託以其所乘之駒食我場苖而縶維之庶幾以永今朝使其人得以於此逍遙而不去若後人留客而投其轄於井中也皎皎白駒食我場藿音霍縶之維之以永今夕叶羊籥反所謂伊人於焉嘉客叶克各反賦也藿猶苖也夕猶朝也嘉客猶逍遙也皎皎白駒賁音閟音奔然來叶云俱反思爾公爾侯叶洪孤反逸豫無期慎爾優游叶汪胡反勉爾遁思叶新齎反賦也賁然光采之貌也或以為來之疾也思語辭也爾指乘駒之賢人也慎勿過也勉毋決也遁思猶言去意也言此乘白駒者若其肯來則以爾為公以爾為侯而逸樂無期矣猶言橫來大者王小者侯也豈可以過於優游決於遁思而終不我顧哉蓋愛之切而不知好爵之不足縻留之苦而不恤其志之不得遂也皎皎白駒在彼空谷生芻楚俱反一束其人如玉母金玉爾音而有遐心賦也賢者必去而不可留矣於是歎其乘白駒入空谷束生芻以秣之而其人之德美如玉也蓋已邈乎其不可親矣然猶冀其相聞而無絶也故語之曰毋貴重爾之音聲而有逺我之心也白駒四章章六句黃鳥黃鳥無集于榖無啄音卓我粟此邦之人不我肯榖言旋言歸復我邦族比也榖木名榖善旋回復反也民適異國不得其所故作此詩託為呼其黃鳥而告之曰爾無集于榖而啄我之粟苟此邦之人不以善道相與則我亦不久於此而將歸矣黃鳥黃鳥無集于桑無啄我梁此邦之人不可與明叶謨郎反言旋言歸復我諸兄叶虛王反比也黃鳥黃鳥無集于栩音許無啄我黍此邦之人不可與處言旋言歸復我諸父比也黃鳥三章章七句東萊呂氏曰宣王之末民有失所者意他國之可居也及其至彼則又不若故鄉焉故思而欲歸使民如此亦異於還定安集之時矣今按詩文未見其為宣王之世下篇亦然我行其野蔽芾音沸其樗音樞昏姻之故言就爾居爾不我畜復我邦家叶古胡反賦也樗惡木也壻之父婦之父相謂曰昏姻畜養也民適異國依其昏姻而不見收恤故作此詩言我行於野中依惡木以自蔽於是思昏姻之故而就爾居而爾不我畜也則將復我之邦家矣我行其野言采其蓫音逐昏姻之故言就爾宿爾不我畜言歸思復賦也蓫牛蘈惡菜也今人謂之羊蹄菜我行其野言采其葍音福叶筆力反不思舊姻求爾新特成不以富亦秪音支以異叶逸織反賦也葍䔰惡菜也特匹也言爾之不思舊姻而求新匹也雖實不以彼之富而厭我之貧亦秪以其新而異於故耳此詩人責人忠厚之意我行其野三章章六句王氏曰先王躬行仁義以道民厚矣猶以為未也又建官置師以孝友睦姻任恤六行教民為其有父母也故教以孝為其有兄弟也故教以友為其有同姓也故教以睦為其有異姓也故教以姻為鄰里鄉黨相保相愛也故教以任相賙相救也故教以恤以為徒教之或不率也故使官師以時書其德行而勸之以為徒勸之或不率也於是乎有不孝不睦不姻不弟不任不恤之刑焉方是時也安有如此詩所刺之民乎秩秩斯干叶居焉反幽幽南山叶所旃反如竹苞叶補苟反矣如松茂叶莫口反矣兄及弟矣式相好去聲叶許厚反矣無相猶叶余久反矣賦也秩秩有序也斯此也干水涯也南山終南之山也苞叢生而固也猶謀也此築室既成而燕飲以落之因歌其事言此室臨水而面山其下之固如竹之苞其上之密如松之茂又言居是室者兄弟相好而無相謀則頌禱之辭猶所謂聚國族於斯者也張子曰猶似也人情大抵施之不報則輟故思不能終兄弟之閒各盡已之所宜施者無學其不相報而廢恩也君臣父子朋友之閒亦莫不用此道盡己而已愚按此於文義或未必然然意則善矣或曰猶當作尤似續妣音比祖築室百堵西南其户爰居爰處爰笑爰語賦也似嗣也妣先於祖者協下韻爾或曰謂姜嫄后稷也西南其户天子之宮其室非一在東者西其户在北者南其户猶言南東其畝也爰於也約之閣閣椓音卓之橐橐音託風雨攸除去聲鳥鼠攸去君子攸芋音吁叶王遇反賦也約束板也閣閣上下相乘也椓築也橐橐杵聲也除亦去也無風雨鳥鼠之害言其上下四旁皆牢密也芋尊大也君子之所居以為尊且大也如跂音企斯翼如矢斯棘如鳥斯革叶訖力反如翬音輝斯飛君子攸躋音賫賦也跂竦立也翼敬也棘急也矢行緩則枉急則直也革變翬雉躋升也言其大勢嚴正如人之竦立而其恭翼翼也其廉隅整飭如矢之急而直也其棟宇峻起如鳥之警而革也其簷阿華采而軒翔如翬之飛而矯其翼也蓋其堂之美如此而君子之所升以聽事也殖殖音湜其庭有覺其楹噲噲音快其正叶音征噦噦音嘒其冥君子攸寧賦也殖殖平正也庭宮寢之前庭也覺髙大而直也楹柱也噲噲猶快快也正向明之處也噦噦深廣之貌冥奧窔之聞也言其室之美如此而君子之所休息以安身也下莞音官上簟叶徒檢徒錦二反乃安斯寢叶千檢千錦二反乃寢乃興乃占我夢叶彌登反吉夢維何維熊維羆音碑叶彼何反維虺音毁維蛇叶于其土何二反賦也莞蒲席也竹葦曰簟羆似熊而長頭髙腳猛憨多力能拔樹虺蛇屬細頸大頭色如文綬大者長七八尺之祝其君安其室居夢兆而有祥亦頌禱辭也下章放此大音泰人占之維熊維羆男子之祥維虺維蛇女子之祥賦也大人大卜之屬占夢之官也熊羆陽物在山彊力壯毅男子之祥也虺蛇隂物穴處柔弱隱伏女子之祥也或曰夢之有占何也曰人之精神與天地隂陽流通故晝之所為夜之所夢其善惡吉凶各以類至是以先王建官設屬使之觀天地之㑹辨隂陽之氣以日月星辰占六夢之吉凶獻吉夢贈惡夢其於天人相與之際察之詳而敬之至矣故曰王前巫而後史宗祝瞽侑皆在左右王中心無為也以守至正乃生男子載寢之牀載衣去聲之裳載弄之璋其泣喤喤音橫叶胡光反朱芾音沸斯皇室家君王賦也半圭曰璋喤大聲也芾天子純朱諸侯黃朱皇猶煌煌也君諸侯也寢之於牀尊之也衣之以裳服之盛也弄之以璋尚其德也言男子之生於是室者皆將服朱芾煌煌然有室有家為君為王矣乃生女子載寢之地載衣之裼音替載弄之瓦叶魚位反無非無儀叶音義唯酒食是議無父母詒音遺罹叶音麗賦也裼褓也瓦紡磚也儀善罹憂也寢之於地卑之也衣之以褓即其用而無加也弄之以瓦習其所有事也有非非婦人也有善非婦人也蓋女子以順為正無非足矣有善則亦非其吉祥可願之事也唯酒食是議而無遺父母之憂則可矣易曰無攸遂在中饋貞吉而孟子之母亦曰婦人之禮精五飯冪酒漿養舅姑縫衣裳而已矣故有閨門之修而無境外之志此之謂也斯于九章四章章七句五章章五句舊說厲王既流于彘宮室圯壞故宣王即位更作宮室既成而落之今亦未有以見其必為是時之詩也或曰儀禮下管新宮春秋傳宋元公賦新宮恐即此詩然亦未有明證誰謂爾無羊三百維羣誰謂爾無牛九十其犉音淳爾羊來思其角濈濈音戢爾牛來思其耳濕濕賦也黃牛黑唇曰犉羊以三百為羣其羣不可數也牛之犉者九十非犉者尚多也聚其角而息濈濈然呞而動其耳濕濕然王氏曰濈濈和也羊以善觸為患故言其和謂聚而不相觸也濕濕潤澤也牛病則耳燥安則潤澤也此詩言牧事有成而牛羊衆多也或降于阿或飲于池叶唐何反或寢或訛爾牧來思何上聲蓑音梭何笠音立或負其餱音侯三十維物叶微律反爾牲則具叶居律反賦也訛動何揭也蓑笠所以備雨三十維物齊其色而别之几為色三十也言牛羊無驚畏而牧人持雨具齎飲食從其所適以順其性是以生養蕃息至於其色無所不備而於用無所不有也爾牧來思以薪以蒸以雌以雄叶于陵反爾羊來思矜矜兢兢不騫不崩麾之以肱畢來既升賦也粗曰薪細曰蒸雌雄禽獸也矜矜兢兢堅强也騫虧也崩羣疾也肱臂也既盡也升入牢也言牧人有餘力則出取薪蒸摶禽獸其羊亦馴擾從人不假箠楚但以手麾之使來則畢來使升則既升也牧人乃夢衆維魚矣旐音兆維旟音餘矣大人占之衆維魚矣實維豐年叶尼因反旐維旟矣室家溱溱賦也占夢之說未詳溱溱衆也或曰衆謂人也旐郊野所建統人少旟州里所建統人多蓋人不如魚之多旐所統不如旟所統之衆故夢人乃是魚則為豐年旐乃是旟則為人衆無羊四章章八句節音截彼南山維石巖巖赫赫師尹民具爾瞻叶側銜反憂心如惔音談不敢戲談國既卒子律反斬叶側銜反何用不監平聲興也節髙峻貌巖巖積石貌赫赫顯盛貌師尹大師尹氏也大師三公尹氏蓋吉甫之後春秋書尹氏卒公羊子以為譏世卿者即此也具俱瞻視惔燔卒終斬絶監視也此詩家父所作刺王用尹氏以致亂言節彼南山則維石巖巖矣赫赫師尹則民具爾瞻矣而其所為不善使人憂心如火燔灼又畏其威而不敢言也然則國既終斬絶矣汝何用而不察哉節彼南山有實其猗音醫叶於何反赫赫師尹不平謂何天方薦音荐瘥音嵯喪去聲亂𢎞多民言無嘉叶居何反憯音慘莫懲嗟叶遭哥反興也有實其猗未詳其義傳曰實滿猗長也箋云猗倚也言草木滿其旁倚之畎谷也或以為草木之實猗猗然皆不甚通薦荐通重也瘥病𢎞大憯曾懲創也節彼南山則有實其猗矣赫赫師尹而不平其心則謂之何哉蘇氏曰為政者不平其心則下之榮瘁勞佚有大相絶者矣是以神怒而重之以喪亂人怨而謗讟其上然尹氏曾不懲創咨嗟求所以自改也尹氏大音泰師維周之氐音底叶都黎反秉國之均四方是維天子是毗音琵俾民不迷不弔昊天不宜空我師叶霜夷反賦也氐本均平維持毗輔弔愍空窮師衆也言尹氏大師維周之氐而秉國之均則是宜有以維持四方毗輔天子而使民不迷乃其職也今乃不平其心而既不見愍弔於昊天矣則不宜久在其位使天降禍亂而我衆并及空窮也弗躬弗親庶民弗信叶斯人反弗問弗仕勿罔君子叶奬里反式夷式已無小人殆叶養里反瑣瑣姻亞則無膴音武仕賦也仕事罔欺也君子指王也夷平已止殆危也瑣瑣小貌壻之父曰姻雨壻相謂曰亞膴厚也言王委政於尹氏尹氏又委政於姻亞之小人而以其未嘗問未嘗事者欺其君也故戒之曰汝之弗躬弗親庶民已不信矣其所弗問弗事則豈可以罔君子哉當平其心視所任之人有不當者則已之無以小人之故而至於危殆其國也瑣瑣姻亞而必皆膴仕則小人進矣昊天不傭敕龍反降此鞠音菊訩音凶昊天不惠降此大戾君子如屆音戒叶居例反俾民心闋音缺叶苦桂反君子如夷惡去聲怒是違賦也傭均鞠窮訩亂戾乖屆至闋息違逺也言昊天不均而降此窮極之亂昊天不順而降此乖戾之變然所以靖之者亦在夫人而已君子無所苟而用其至則必躬必親而民之亂心息矣君子無所偏而平其心則式夷式已而民之惡怒逺矣傷王與尹氏之不能也夫為政不平以召禍亂者人也而詩人以為天實為之者蓋無所歸咎而歸之天也抑有以見君臣隱諱之義焉有以見天人合一之理焉後皆放此不弔昊天叶鐵因反亂靡有定叶唐丁反式月斯生叶桑經反俾民不寧憂心如酲音呈誰秉國成不自為政叶諸盈反卒勞百姓叶桑經反賦也酒病曰酲成平卒終也蘇氏曰天不之恤故亂未有所止而禍患與歲月增長君子憂之曰誰秉國成者乃不自為政而以付之姻亞之小人其卒使民為之受其勞弊以至此也駕彼四牡四牡項領我瞻四方蹙蹙音蹴靡所騁音逞賦也項大也蹙蹙縮小之貌亂言駕四牡而四牡項領可以騁矣而視四方則皆昏蹙蹙然無可往之所亦將何所騁哉東萊呂氏曰本根病則枝葉皆瘁是以無可往之地也方茂爾惡相去聲爾矛矣既夷既懌如相酬音酬矣賦也茂盛相視懌悅也言方盛其惡以相加則視其矛㦸如欲戰鬭及既夷平悅懌則相與歡然如賔主而相酬酢不以為怪也蓋小人之性無常而習於鬭亂其喜怒之不可期如此是以君子無所適而可也昊天不平我王不寧不懲其心覆音福怨其正叶諸盈反賦也尹氏之不平若天使之故曰昊天不平若是則我王亦不得寧矣然尹氏猶不自懲創其心乃反怨人之正已者則其為惡何時而已哉家父音甫作誦叶疾容反以究王訩式訛爾心以畜萬邦叶卜工反賦也家氏父字周大夫也究窮訛化畜養也改家父自言作為此誦以窮究王政昏亂之所由冀其心易慮以畜養萬邦也陳氏曰尹氏厲威使人不得戲談而家父作詩乃復自表其出於已以身當尹氏之怒而不辭者蓋家父周之世臣義與國俱存亡故也東萊呂氏曰篇終矣故窮其亂本而歸之王心焉致亂者雖尹氏而用尹氏者則王心之蔽也李氏曰孟子曰人不足與適也政不足與閒也惟大人為能格君心之非蓋用人之失政事之過雖皆君之非然不必先論也惟格君心之非則政事無不善矣用人皆得其當矣節南山十章六章章八句四章章四句序以此為幽王之詩而春秋桓十五年有家父來求車於周為桓王之世上距幽王之終已七十五年不知其人之同異大抵序之時世皆不足信今姑闕焉可也正音政月繁霜我心憂傷民之訛言亦孔之將念我獨兮憂心京京叶居良反哀我小心癙音鼠憂以癢音羊賦也正月夏之四月謂之正月者以純陽用事為正陽之月也繁多訛僞將大也京京亦大也癙憂幽憂也癢病也此詩亦大夫所作言霜降失節不以其時既使我心憂傷矣而造為姦僞之言以惑羣聽者又方甚大然衆人莫以為憂故我獨憂之以至於病也父母生我胡俾我愈音庾不自我先不自我後叶下五反好言自口叶孔五反莠音酉言自口憂心愈愈是以有侮賦也愈病自從莠醜也愈愈益甚之意疾痛故呼父母而傷已適丁是時也訛言之人虛僞反覆言之好醜皆不出於心而但出於口是以我之憂心益甚而反見侵侮也憂心惸惸音㷀念我無祿民之無辜并去聲其臣僕哀我人斯于何從祿瞻烏爰止于誰之屋賦也惸惸憂意也無祿猶言不幸爾辜罪并俱也古者以罪人為臣僕亡國所虜亦以為臣僕箕子所謂商其淪喪我罔為臣僕是也言不幸而遭國之將亡與此無罪之民將俱被囚虜而同為臣僕未知將復從何人而受祿如視烏之飛不知其將止于誰之屋也瞻彼中林侯薪侯蒸民今方殆視天夢夢音蒙叶莫登反既克有定靡人弗勝音升有皇上帝伊誰云憎興也中林林中也侯維殆危也夢夢不明也皇大也上帝天之神也程子曰以其形體謂之天以其主宰謂之帝言瞻彼中林則維薪維蒸分明可見也民今方危殆疾痛號訴於天而視天反夢夢然若無意於分别善惡者然此特值其未定之時爾及其既定則未有不為天所勝者也夫天豈有所憎而禍之乎福善禍淫亦自然之理而已申包胥曰人衆則勝天天定亦能勝人疑出於此謂山蓋卑為岡為陵民之訛言寧莫之懲召彼故老訊音信之占夢叶莫登反具曰豫聖誰知烏之雌雄叶胡陵反賦也山脊曰岡廣平曰陵懲止也故老舊臣也訊問也占夢官名掌占夢者也具俱也烏之雌雄相似而難辨者也謂山蓋卑而其實則岡陵之崇也今民之訛言如此矣而王猶安然莫之止也及其詢之故老訊之占夢則又皆自以為聖人亦誰能别其言之是非乎子思言於衛侯曰君之國事將日非矣公曰何故對曰有由然焉君出言自以為是而卿大夫莫敢矯其非卿大夫出言亦自以為是而士庶人莫敢矯其非君臣既自賢矣而羣下同聲賢之賢之則順而有福矯之則逆而有禍如此則善安從生詩曰具曰豫聖誰知鳥之雌雄抑亦似君之君臣乎謂天蓋髙不敢不局叶居亦反謂地蓋厚不敢不蹐音積維號音毫斯言有倫有脊哀今之人胡為虺音毁蜴音易賦也局曲也蹐纍足也號長言之也脊理蜴螈也虺蜴皆毒螫之蟲也言遭世之亂天雖高而不敢不局地雖厚而不敢不蹐其所號呼而為此言者又皆有倫理而可考也哀今之人胡為肆毒以害人而使之至此乎瞻彼阪音反田有菀音鬱其特天之扤音兀我如不我克彼求我則如不我得執我仇仇亦不我力興也阪田崎嶇墝埆之處菀茂盛之貌特特生之苖也扤動也力謂用力瞻彼阪田猶有菀然之特而天之扤我如恐其不我克何哉亦無所歸咎之辭也夫始而求之以為法則惟恐不我得也及其得之則又執我堅固如仇讎然然終亦莫能用也求之甚艱而棄之甚易其無常如此心之憂矣如或結之今兹之正胡然厲叶力桀反矣燎之方揚寧或滅之赫赫宗周褒姒音似滅呼悅反之賦也正政也厲暴惡也火田為燎揚盛也宗周鎬京也褒姒幽王之嬖妾褒國女姒姓也滅亦滅也言我心之憂如結者為國政之暴惡故也燎之方盛之時則寧冇能撲而滅之者乎然赫赫然之宗周而一褒姒足以滅之蓋傷之也時宗周未滅以褒姒淫妒讒諂而王惑之知其必滅周也或曰此東遷後詩也時宗周已滅矣其言褒姒滅之有監戒之意而無憂懼之情似亦道已然之事而非慮其將然之辭今亦未能必其然否也終其永懷又窘隂雨其車既載音在乃棄爾輔叶扶雨反載如字輸爾載音在將音槍伯助豫叶演汝反比也隂雨則泥濘而車易以陷也載車所載也輔如今人縛杖於輻以防輔車也輸墮也將請也伯或者之字也蘇氏曰王為淫虐譬如行險而不知止君子永思其終知其必有大難故曰終其永懷又窘隂雨王又不虞難之將至而棄賢臣焉故曰乃棄爾輔君子求助於未危故難不至苟其載之既墮而後號伯以助豫則無及矣無棄爾輔員音云于爾輻叶筆力反屢顧爾僕不輸爾載叶節力反終踰絶險曾是不意叶乙力反比也員益也輔所以益輻也屢數顧視也僕將車者也此承上章言若能無棄爾輔以益其輻而又數數顧視其僕則不墮爾所載而踰於絶險若初不以為意者蓋能謹其初則厥終無難也一說王曾不以是為意乎魚在于沼叶音灼亦匪克樂音洛潛雖伏矣亦孔之照音灼憂心慘慘念國之為虐比也沼池也照明易見也魚在于沼其為生已蹙矣其潛雖深然亦照然而易見言禍亂之及無所逃也彼有㫖酒又有嘉殽音爻洽比音鼻其鄰昏姻孔云念我獨兮憂心殷殷賦也洽比皆合也云旋也殷殷疾痛也言小人得志有㫖酒嘉殽以合比其鄰里怡懌其昏姻而我獨憂心至於疾痛也昔人有言燕雀處堂母子相安自以為樂也突決棟焚而怡然不知禍之將及其此之謂乎佌佌音此彼有屋蔌蔌音速方有榖民今之無祿天夭音腰是椓音卓叶都木反哿音可矣富人哀此惸獨賦也佌佌小貌蔌蔌窶陋貌指王所用之小人也榖祿夭禍椓害哿可獨單也佌佌然之小人既已有屋矣蔌蔌窶陋者又將有榖矣而民今獨無祿者是天禍椓喪之耳亦無所歸怨之辭也亂至於此富人猶或可勝惸獨甚矣此孟子所以言文王發政施仁必先鰥寡孤獨也正月十三章八章章八句五章章六句十月之交朔日辛卯叶莫後反日有食之亦孔之醜彼月而微此日而微今此下民亦孔之哀叶於希反賦也十月以夏正言之建亥之月也交日月交㑹謂晦朔之閒也歷法周天三百六十五度四分度之一左旋於地一晝一夜則其行一周而又過一度日月皆右行於天一書一夜則日行一度月行十三度十九分度之七故日一歲而一周天月二十九日有竒而一周天又逐及於日而與之㑹一歲凡十二㑹方㑹則月光都盡而為晦已㑹則月光復蘇而為朔朔後晦前各十五日日月相對則月光正滿而為望晦朔而日月之合東西同度南北同道則月掩日而日為之食望而日月之對同度同道則月亢日而月為之食是皆有常度矣然王者修德行政用賢去奸能使陽盛足以勝隂隂衰不能侵陽則日月之行雖或當食而月常避日故其遲速髙下必有參差而不正相合不正相對者所以當食而不食也若國無政不用善使臣子背君父妾婦乘其夫小人陵君子夷狄侵中國則隂盛陽微當食必食雖曰行有常度而實為非常之變矣蘇氏曰日食天變之大者也然正陽之月古尤忌之夏之四月為純陽故謂之正月十月純隂疑其無陽故謂之陽月純陽而食陽弱之甚也純隂而食隂壯之甚也微虧也彼月則宜有時而虧矣此日不宜虧而今亦虧是亂亡之兆也日月告凶不用其行叶户郎反四國無政不用其良彼月而食則維其常此日而食于何不臧賦也行道也凡日月之食皆有常度矣而以為不用其行者月不避日失其道也然其所以然者則以四國無政不用善人故也如此則日月之食皆非常矣而以月食為其常日食為不臧者隂亢陽而不勝猶可言也隂勝陽而掩之不可言也故春秋日食必書而月食則無紀焉亦以此爾燁燁音曄震電不寧不令叶盧經反百川沸騰山冢崒崩髙岸為谷深谷為陵哀今之人胡憯音慘莫懲賦也燁燁電光貌震雷也寧安徐也令善沸出騰乘也山頂曰冢崒崔嵬也髙岸崩陷故為谷深谷填塞故為陵憯曾也言非但日食而已十月而雷電山崩水溢亦災異之甚者是宜恐懼修省改紀其政而幽王曾莫之懲也董子曰國家將有失道之敗而天乃先出災異以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至此見天心仁愛人君而欲止其亂也皇父音甫卿士番維司徒家伯冢宰仲允膳夫棸音鄒子內史蹶音愧維趣七圥反馬叶滿補反楀音矩維師氏豔音艷妻煽音肩方處賦也皇父家伯仲允皆字也番棸蹶楀皆氏也卿士六卿之外更為都官以總六官之事也或曰卿士蓋卿之士周禮太宰之屬有上中下士公羊所謂宰士左氏所謂周公以蔡仲為已卿士是也蓋以宰屬而兼總六官位卑而權重也司徒掌邦教冢宰掌邦治皆卿也膳夫上士掌王之飲食膳羞者也內史中大夫掌爵祿廢置殺生豫奪之法者也趣馬中士掌王馬之政者也師氏亦中大夫掌司朝得失之事者也美色曰豔豔妻即褒姒也煽熾也方處方居其所未變徙也言所以致變異者由小人用事於外而嬖妾蠱惑王心於內以為之主故也抑此皇父豈曰不時胡為我作不即我謀叶謨悲反徹我牆屋田卒汙音烏萊叶陵之反曰豫不戕音牆禮則然矣叶於姬反賦也抑發語辭時農隙之時也作動即就卒盡也汙停水也萊草穢也戕害也言皇父不自以為不時欲動我以徙而不與我謀乃遽徹我牆屋使我田不獲治卑者汙而髙者萊又曰非我戕汝乃下供上役之常禮耳皇父音甫孔聖作都于向去聲擇三有事亶侯多藏去聲不憖魚覲反遺一老俾守我王叶于放反擇有車馬以居徂向賦也孔甚也聖通明也都大邑也周禮畿內大都方百里小都方五十里皆天子公卿所封也向地名在東都畿內今孟州河陽縣是也三有事三卿也亶信侯維藏蓄也憖者心不欲而自强之辭有車馬者亦富民也徂往也言皇父自以為聖而作都則不求賢而但取富人以為卿又不自强留一人以衛天子但有車馬者則悉與俱往不忠於上而但知貪利以自私也黽音敏勉從事不敢告勞無罪無辜讒口囂囂音翺下民之孽音蘖匪降自天叶鐵因反噂音撙沓音遝背音佩憎職競由人賦也囂衆多貌孽災害也噂聚也沓重復也職主競力也言黽勉從皇父之役未嘗敢告勞也猶且無罪而遭讒然下民之孽非天之所為也噂噂沓沓多言以相說而背則相憎專力為此者皆由讒口之人耳悠悠我里亦孔之痗音妹叶呼洧反四方有羡徐面反我獨居憂民莫不逸我獨不敢休天命不徹叶直質反我不敢效我友自逸賦也悠悠憂也里居痗病羡餘逸樂徹均也當是之時天下病矣而獨憂我里之甚病且以為四方皆有餘而我獨憂衆人皆得逸豫而我獨勞者以皇父病之而被禍尤甚故也然此乃天命之不均吾豈敢不安於所遇而必效我友之自逸哉十月之交八章章八句浩浩昊天不駿其德降喪去聲饑饉音覲斬伐四國叶于逼反旻天疾威弗慮弗圖舍音赦彼有罪既伏其辜若此無罪淪胥以鋪平聲賦也浩浩廣大也昊亦廣大之意駿大德惠也榖不熟曰饑蔬不熟曰饉疾威猶暴虐也慮圖皆謀也舍置淪陷胥相鋪遍也此時饑饉之後羣臣離散其不去者作詩以責去者故推本而言昊天不大其惠降此饑饉而殺伐四國之人如何旻天曾不思慮圖謀而遽為此乎彼有罪而饑死則是既伏其辜矣舍之可也此無罪者亦相與而陷於死亡則如之何哉周宗既滅靡所止戾正大夫離居莫知我勩音異三事大夫莫肯夙夜叶弋灼反邦君諸侯莫肯朝夕叶祥籥反庶曰式臧覆音福出為惡賦也宗族姓也戾定也正長也周官八職一曰正謂六官之長皆上大夫也離居蓋以饑饉散去而因以避讒譖之禍也我不去者自我也勩勞也三事三公也大夫六卿及中下大夫也臧善覆反也言將有易姓之禍其兆已見而天變人離又如此庶幾曰王改而為善乃覆出為惡而不悛也或曰疑此亦東遷後詩也如何昊天叶鐵因反辟言不信叶斯人反如彼行邁則靡所臻凡百君子各敬爾身胡不相畏不畏于天賦也如何昊天呼天而訴之也辟法臻至也凡百君子指羣臣也言如何乎昊天也法度之言而不聽信則如彼行往而無所底至也然几百君子豈可以王之為惡而不敬其身哉不敬爾身不相畏也不相畏不畏天也戎成不退叶吐類反饑成不遂曾音層我暬音薛御憯憯音慘日瘁音悴凡百君子莫肯用訊叶息悴反聽言則答譖言則退賦也戎兵遂進也易曰不能退不能遂是也暬御近侍也國語曰尻寢有暬御之針蓋如漢侍中之官也憯憯憂貌瘁病訊告也言兵寇已成而王之為惡不退饑饉已成而王之遷善不遂使我暬御之臣憂之而慘慘日瘁也几百君子莫肯以是告王者雖王有問而欲聽其言則亦答之而已不敢盡言也一有譖言及已則皆退而離居莫肯夙夜朝夕於王矣其意若曰王雖不善而君臣之義豈可以若是恝乎哀哉不能言匪舌是出音脆維躬是瘁哿音可矣能言巧言如流俾躬處休賦也出出之也瘁病哿可也言之忠者當世之所謂不能言者也故非但出諸口而適以瘁其躬佞人之言當世所謂能言者也故巧好其言如水之流無所凝滯而使其身處於安樂之地蓋亂世昏主惡忠直而好諛佞類如此詩人所以深歎之也維曰于仕孔棘且殆叶養里反云不可使得罪于天子叶奬里反亦云可使怨及朋友叶羽已反賦也于往棘急殆危也蘇氏曰人皆曰往仕耳曾不知仕之急且危也當是之時直道者王之所謂不可使而枉道者工之所謂可使也直道者得罪于君而枉道者見怨于友此仕之所以難也謂爾遷于王都曰豫未有室家叶古胡反鼠思去聲泣血叶虛屈反無言不疾昔爾出居誰從作爾室賦也爾謂離居者鼠思猶言癙憂也當是時言之難能而仕之多患如此故羣臣有去者有居者居者不忍王之無臣已之無徒則告去者使復還于正都去者不聽而托於無家以拒之至於憂思泣血有無言而不痛疾者蓋其懼禍之深至於如此然所謂無家者則非其情也故詰之曰昔爾之去也誰為爾作室者而今以是辭我哉雨無正七章二章章十句二章章八句三章章六句歐陽公曰古之人於詩多不命題而篇名往往無義例其或冇命名者則必述詩之意如巷伯常武之類是也今雨無正之名據序所言與詩絶異當闕其所疑元城劉氏曰嘗讀韓詩有雨無極篇序云雨無極正大夫刺幽王也至其詩之文則比毛詩篇首多雨無其極傷我稼穡八字愚按劉說似有理然第一二章本皆十句今遽增之則長短不齊非詩之例又此詩實正大夫離居之後暬御之臣所作其曰正大夫刺幽王者亦非是且其為幽王詩亦未有所考也祈父之什十篇六十四章四百二十六句小旻之什二之五旻天疾威敷于下土謀猶回遹音聿何日斯沮上聲謀臧不從不臧覆用叶于封反我視謀猶亦孔之卭音笻賦也旻幽逺之意敷布猶謀回邪遹辟沮止臧善覆反卭病也大夫以王惑於邪謀不能斷以從善而作此詩言旻天之疾威布于下土使王之謀猶邪辟無日而止謀之善者則不從而其不善者反用之故我視其謀猶亦甚病也潝潝音吸訿訿音紫亦孔之哀叶於希反謀之其臧則具是違謀之不臧則具是依我視謀猶伊于胡底音抵叶都黎反也賦也潝潝相和訿訿相詆也具俱底至也言小人同而不和其慮深矣然於謀之善者則違之其不善者則從之亦何能有所定乎我龜既厭不我告猶叶于救反謀夫孔多是用不集叶疾救反發言盈庭誰敢執其咎叶巨又反如匪行邁謀是用不得于道叶徒候反賦也集成也卜筮數則瀆而龜厭之故不復告其所圖之吉凶謀夫衆則是非相奪而莫適所從故所謀終亦不成蓋發言盈庭各是其是無肯任其責而決之者猶不行不邁而坐謀所適謀之雖審而亦何得於道路哉哀哉為猶匪先民是程匪大猶是經維邇言是聽叶平聲維邇言是爭叶側陘反如彼築室于道謀是用不潰于成賦也先民古之聖賢也程法猶道經常潰遂也言哀哉今之為謀不以先民為法不以大道為常其所聽而爭者皆淺末之言以是相持如將築室而與行道之人謀之人人得為異論其能有成也哉古語曰作舍道邊三年不成蓋出於此國雖靡止或聖或否叶補美反民雖靡膴音呼或哲或謀叶莫徒反或肅或艾音乂如彼泉流無淪胥以敗叶蒲寐反賦也止定也聖通明也膴大也多也艾與乂同治也淪陷胥相也言國論雖不定然有聖者焉有否者焉民雖不多然有哲者焉有謀者焉有肅者焉有艾者焉但王不用善則雖有善者不能自存將如泉流之不反而淪胥以至於敗矣聖哲謀肅艾即洪範五事之德豈作此詩者亦傳箕子之學也與不敢暴虎不敢馮叶皮冰反河人知其一莫知其他音拖戰戰兢兢如臨深淵叶一均反如履薄冰賦也徒搏曰暴徒涉曰馮如馮几然也戰戰恐也兢兢戒也如臨深淵恐墜也如履薄冰恐陷也衆人之慮不能及逺暴虎馮河之患近而易見則知避之喪國亡家之禍隱於無形則不知以為憂也故曰戰戰兢兢如臨深淵知履薄冰懼及其禍之辭也小旻六章三章章八句三章章七句蘇氏曰小旻小宛小辨小明四詩皆以小名篇所以别其為小雅也其在小雅者謂之小故其在大雅者謂之召旻大明獨宛辨闕焉意者孔子剛之矣雖去其大而其小者猶謂之小蓋即用其舊也宛音苑彼鳴鳩翰飛戾天叶鐵因反我心憂傷念昔先人明發不寐有懷二人興也宛小貌鳴鳩斑鳩也翰羽戾至也明發謂將旦而光明開發也二人父母也此大夫遭時之亂而兄弟相戒以免禍之詩故言彼宛然之小鳥亦翰飛而至於天矣則我心之憂傷豈能不念昔之先人哉是以明發不寐而有懷乎父母也言此以為相戒之端人之齊聖飲酒溫克彼昏不知一醉日富叶筆力反各敬爾儀天命不又叶夷益反賦也齊肅也聖通明也克勝也富猶甚也又復也言齊聖之人雖醉猶溫恭自持以勝所謂不為酒困也彼昏然而不知者則一於醉而日甚矣於是言各敬謹爾之威儀天命已去將不復來不可以不恐懼也時王以酒敗德臣下化之故此兄弟相戒首以為說中原有菽音叔庶民采叶此禮反之螟音冥蛉音零有子蜾音果螺音裸負叶蒲美反之教誨爾子式榖似叶養里反之興也中原原中也菽大豆也螟蛉桑上小青蟲也似步屈蜾螺土蜂也似蜂而小腰取桑蟲負之於木空中七日而化為其子式用榖善也中原有菽則庶民采之矣以興善道人皆可行也螟蛉有子則蜾螺負之以興不似者可教而似也教誨爾子則用善而似之可也善也似也終上文兩句所興而言也戒之以不惟獨善其身又當教其子使為善也題音涕彼脊令音零載飛載鳴我日斯邁而月斯征夙興夜寐無忝爾所生叶桑經反興也題視也脊令飛則鳴行則搖載則而汝忝辱也視彼脊令則且飛而且鳴矣我既日斯邁則汝亦月斯征矣言當各務努力不可暇逸取禍恐不及相救恤也夙興夜寐各求無辱於父母而已交交桑扈音户率場啄粟哀我填音顛寡宜岸宜獄握粟出卜自何能榖興也交交往來之貌桑扈竊脂也俗呼青觜肉食不食粟填與癲同病也岸亦獄也韓詩作犴鄉亭之繫曰犴朝廷曰獄扈不食粟而今則率場啄粟矣病寡不宜岸獄今則宜岸宜獄矣言王不恤鰥寡喜陷之於刑辟也然不可不求所以自善之道故握持其粟出而卜之曰何自而能善乎言握粟以見其貧窶之甚溫溫恭人如集于木惴惴音贅小心如臨于谷戰戰兢兢如履薄冰賦也溫溫和柔貌如集于木恐隊也如臨于谷恐隕也小宛六章章六句此詩之辭最為明白而意極懇至說者必欲為刺王之言故其說穿鑿破碎無理尤甚今悉改定讀者詳之辨音盤彼鸒音豫斯叶先齎反歸飛提提音匙民莫不榖我獨于罹何辜于天我罪伊何心之憂矣云如之何興也辨飛拊翼貌鸒雅烏也小而多羣腹下白江東呼為鴨烏斯語辭也提提羣飛安閒之貌榖善罹憂也舊說幽王太子宜臼被廢而作此詩言辨彼鸒斯則歸飛提提矣民莫不善而我獨于憂則鸒斯之不如也何辜于天我罪伊何者怨而慕也舜號泣于旻天曰父母之不我愛於我何哉蓋如此矣心之憂矣云如之何則知其無可奈何而安之之辭也踧踧音笛周道叶徒苟反鞠音菊為茂草叶此苟反我心憂傷惄音溺焉如搗音搗叶丁口反假寐永歎維憂用老叶魯口反心之憂矣疢音趂如疾首興也踧踧平易也周道大道也鞠窮惄思搗舂也不脫衣冠而寐曰假寐瘐猶疾也踧踧周道則將鞠為茂草矣我心憂傷則惄焉如搗矣精神憒眊至於假寐之中而不忘永歎憂之之深是以未老而老也瘐如疾首則又憂之甚矣維桑與梓叶奬里反必恭敬止靡瞻匪父靡依匪母叶滿彼反不屬音燭于毛不離于裏天之生我我辰安在叶此里反興也桑梓二木古者五畝之宅樹之牆下以遺子孫給蠶食具器用者也瞻者尊而仰之依者親而倚之屬連也毛膚體之餘氣末屬也離麗也裏心腹也辰猶時也言桑梓父母所植尚且必加恭敬况父母至尊至親宜莫不瞻依也然父母之不我愛豈我不屬于父母之毛乎豈我不離于父母之裏乎無所歸咎則推之於天曰豈我生時不善哉何不祥至是也菀音鬱彼柳斯嗚蜩音條嘒嘒有漼千罪反者淵萑音丸葦淠淠音譬譬彼舟流不知所屆音戒心之憂矣不遑假寐興也菀茂盛貌蜩蟬也嘒嘒聲也漼深貌淠淠衆也屆至遑暇也菀彼柳斯則鳴蜩嘒嘒矣有漼者淵則萑葦淠淠矣今我獨見棄逐如舟之流於水中不知其何所至乎是以憂之之深昔猶假寐而今不暇也鹿斯之奔維足伎伎音祈雉之朝雊音姤尚求其雌叶千西反譬彼壞音瘣木疾用無枝心之憂矣寧莫之知興也伎伎舒貌宜疾而舒留其羣也雊雉鳴也壞傷病也寧猶何也鹿斯之奔則足伎伎然雉之朝雊亦知求其妃匹今我獨見棄逐如傷病之木憔悴而無枝是以憂之而人莫之知也相去聲彼投兔尚或先去聲叶蘇晉反之行有死人尚或墐音覲之君子秉心維其忍之心之憂矣涕既隕音蘊之興也相視投奔行道墐埋秉執隕墜也相彼被逐而投人之兔尚或有哀其窮而先脫之者道有死人尚或有哀其暴露而埋藏之者蓋皆有不忍之心焉今王信讒棄逐其子曾視投兔死人之不如則其秉心亦忍矣是以心憂而涕隕也君子信讒如或酬叶市救反之君子不惠不舒究之伐木掎音已叶居何反矣析薪杝音侈叶湯何反矣舍音捨彼有罪豫之他音唾叶湯何反矣賦而興也酬報惠愛舒緩究察也掎倚也以物倚其巔也杝隨其理也他加也言王惟讒是聽如受酬爵得即飲之曾不加惠愛舒緩而究察之夫苟舒緩而究察之則讒者之情得矣伐木者尚倚其巔析薪者尚隨其理皆不妄挫折之今乃舍彼有罪之譖人而加我以非其罪曾伐木析薪之不若也此則興也莫髙匪山叶所旃反莫浚音濬匪泉君子無易去聲由言耳屬音燭于垣無逝我梁無發我笱我躬不閲遑恤我後賦而比也山極髙矣而或陟其巔泉極深矣而或入其底故君子不可易於其言恐耳屬于垣者有所觀望左右而生讒譖也王於是卒以褒姒為后伯服為太子故告之曰無逝我梁無發我笱我躬不閲遑恤我後蓋比辭也東萊呂氏曰唐德宗將廢太子而立舒王李泌諫之且曰願陛下還宫勿露此意左右聞之將樹功於舒王太子危矣此正君子無易由言耳屬于垣之謂也小辨之作太子既廢矣而猶云爾者蓋推本亂之所由生言語以為階也小辨八章章八句幽王娶于中生太子宜臼後得褒姒而惑之生子伯服信其讒黜申后逐宜臼而宜臼作此以自怨也序以為太子之傅述太子之情以為是詩不知其何所據也傳曰髙子曰小辨小人之詩也孟子曰何以言之曰怨曰固哉髙叟之為詩也有人於此越人關弓而射之則已談笑而道之無他疏之也其兄關弓而射之則已垂涕泣而道之無他戚之也小辨之怨親親也親親仁也固矣夫髙叟之為詩也曰凱風何以不怨曰凱風親之過小者也小辨親之過大者也親之過大而不怨是愈疏也親之過小而怨是不可磯也愈疏不孝也不可磯亦不孝也孔子曰舜其至孝矣五十而慕悠悠昊天曰父母且音疽無罪無辜亂如此憮音呼昊天已威叶紆胃反豫慎無罪叶音悴昊天泰憮豫慎無辜賦也悠悠逺大之貌且語辭憮大也已泰皆甚也慎審也大夫傷於讒無所控告而訴之於天曰悠悠昊天為人之父母胡為使無罪之人遭亂如此其大也昊天之威已甚矣我審無罪也昊天之威甚大矣我審無辜也此訴而求免之辭也亂之初生僭音譖始既涵音含亂之又生君子信讒君子如怒叶奴五反亂庶遄音椽沮上聲君子如祉音恥亂庶遄已賦也僭始不信之端也涵容受也君子指王也遄疾沮止也祉猶喜也言亂之所以生者由讒人以不信之言始入而王涵容不察其真僞也亂之又生者則既信其讒言而用之矣君子見讒人之言若怒而責之則亂庶幾遄沮矣見賢者之言若喜而納之則亂庶幾遄已矣今涵容不斷讒信不分是以讒者益勝而君子益病也蘇氏曰小人為讒於其君必以漸入之其始也進而嘗之君容之而不拒知言之無忌於是復進既而君信之然後亂成君子屢盟叶莫郎反亂是用長上聲叶直良反君子信盜亂是用暴盜言孔甘亂是用餤音談匪其止共音恭維王之卭音笻賦也屢數也盟邦國有疑則殺牲㰱血告神以相要束也盜指讒人也餤進卭病也言君子不能已亂而屢盟以相要則亂是用長矣君子不能堲讒而信盜以為虐則亂是用暴矣讒言之美如食之甘使人嗜之而不厭則亂是用進矣然此讒人不能供其職事徒以為王之病而已夫良藥苦口而利於病忠言逆耳而利於行維其言之甘而悅焉則其國豈不殆哉奕奕寢廟君子作之秩秩大猷聖人莫之他人有心豫忖度之躍躍音笛毚音殘兔遇犬獲叶黃郭反之興而比也奕奕大也秩秩序也猷道莫定也躍躍跳疾貌毚狡也奕奕寢廟則君子作之秩秩大猷則聖人莫之以興他人有心則豫得而忖度之而又以躍躍毚兔遇犬獲之比焉反覆興比以見讒人之心我皆得之不能隱其情也荏音飪染柔木君子樹叶上主反之往來行言心焉數之蛇蛇音移碩言出自口叶孔五反矣巧言如簧顔之厚叶胡五反矣興也荏染柔貌柔木桐梓之屬可用者也行言行道之言也數辨也蛇蛇安舒貌碩大也謂善言也顔厚者頑不知恥也荏染柔木則君子樹之矣往來行言則心能辨之矣若善言出於口者宜也巧言如簧則豈可出於口哉言之徒可羞愧而彼顔之厚不知以為恥也孟子曰為機變之巧者無所用恥焉其斯人之謂與彼何人斯居河之麋音眉無拳音權無勇職為亂階叶居奚反既微且腫市勇反爾勇伊何為猶將多爾居徒幾音紀何賦也何人斥讒人也此必有所指矣賤而惡之故為不知其姓名而曰何人也斯語辭也水草交謂之麋拳力階梯也骭痬為微腫足為腫猶謀將大也言此讒人居下濕之地雖無拳勇可以為亂而讒口交鬬專為亂之階梯又有微腫之疾亦何能勇哉而為讒謀則大且多如此是必有助之者矣然其所與居之徒衆幾何人哉言亦不能甚多也巧言六章章八句以五章巧言二字名篇彼何人斯其心孔艱叶居銀反胡逝我梁不入我門叶眉貧反伊誰云從維暴之云賦也何人亦若不知其姓名也孔甚艱險也我舊說以為蘇公也暴暴公也皆畿內諸侯也舊說暴公為卿士而譖蘇公故蘇公作詩以絶之然不欲直斥暴公故但指其從行者而言彼何人者其心甚險胡為往我之梁而不入我之門乎既而問其所從則暴公也夫以從暴公而不入我門則暴公之譖已也明矣但舊說於詩無明文可考未敢信其必然耳二人從行誰為此禍胡逝我梁不入唁我始者不如今云不我可賦也二人暴公與其徒也唁弔失位也言二人相從而行不知誰譖已而禍之乎既使我得罪矣而其逝我梁也又不入而唁我汝始者與我親厚之時豈嘗如今不以我為可乎彼何人斯胡逝我陳我聞其聲不見其身不愧于人不畏于天叶鐵因反賦也陳堂塗也堂下至門之徑也在我之陳則又近矣聞其聲而不見其身言其蹤跡之詭祕也不愧于人則以人為可欺也天不可欺女獨不畏于天乎奈何其譖我也彼何人斯其為飄風叶孚愔反胡不自北胡不自南叶尼心反胡逝我梁祗音支攪音絞我心賦也飄風暴風也攪擾亂也言其往來之疾若飄風然自北自南則與我不相值也今則逝我之梁則適所以攪亂我心而已爾之安行亦不遑舍叶商居反爾之亟音棘行遑脂爾車一者之來云何其旴音吁賦也安徐遑暇舍息亟疾旴望也字林云旴張日也易曰旴豫悔三都賦云旴衡而語是也言爾平時徐行猶不暇息而况亟行則何暇脂其車哉今脂其車則非亟也乃託以亟行而不入見我則非其情矣何不一來見我如何使我望女之切乎爾還而入我心易去聲叶以支反也還而不入否難知也一者之來俾我祗也賦也還反易說祗安也言爾之往也既不入我門矣儻還而入則我心猶庶乎其說也還而不入則爾之心我不可得而知矣何不一來見我而使我心安乎董氏曰是詩至此其辭益緩若不知其為譖矣伯氏吹塤音塤仲氏吹篪音池及爾如貫諒不我知出此三物以詛側助反爾斯叶先齎反賦也伯仲兄弟也俱為王臣則有兄弟之義矣樂器土曰塤大如鵝子鋭上平底似稱錘六孔竹曰篪長尺四寸圍三寸七孔一孔上出徑三分凡八孔橫吹之如貫如繩之貫物也言相連屬也諒誠也三物犬豕雞也刺其血以詛盟也伯氏吹塤而仲氏吹篪言其心相親愛而聲相應和也與汝如物之在貫豈誠不我知而譖我哉苟曰誠不我知則出此三物以詛之可也為鬼為蜮音域則不可得有靦音腆面目視人罔極作此好歌以極反側賦也蜮短狐也江淮水皆有之能含沙以射水中人影其人輒病而不見其形也靦面見人之貌也好善也反側反覆不正直也言汝為鬼為蜮則不可得而見矣女乃人也靦然有面目與人相視無窮極之時豈其情終不可測哉是以作此好歌以究極爾反側之心也何人斯八章章六句此詩與上篇文意相似疑出一手但上篇先刺聽者此篇專責讒人耳王氏曰暴公不忠於君不義於友所謂大故也故蘇公絶之然其絶之也不斥暴公言其從行而已不著其譖也示以所疑而已既絶之矣而猶告以一者之來俾我祗也蓋君子之處已也忠其遇人也恕使其由此悔悟更以善意從我固所願也雖其不能如此我固不為已甚豈若小丈夫然哉一與人絶則醜詆固拒唯恐其復合也萋音妻兮斐兮成是具錦彼譖人者亦已大音泰甚比也萋斐小文之貌貝水中介蟲也有文彩似錦時有遭讒而被宫刑為巷伯者作此詩言因萋斐之形而文致之以成貝錦以比讒人者因人之小過而飾成大罪也彼為是者亦已大甚矣哆昌者反兮侈兮成是南箕彼譖人者誰適音的與謀叶謨悲反比也哆侈微張之貌南箕四星二為踵二為舌其踵狹而舌廣則大張矣適主也誰適與謀言其謀之閟也緝緝翩翩音篇叶批賔反謀欲譖人慎爾言也謂爾不信叶斯人反賦也緝緝口舌聲或曰緝緝人之罪也或曰有條理貌皆通翩翩往來貌譖人者自以為得意矣然不慎爾言聽者有時而悟且將以爾為不信矣捷捷幡幡音翻叶芬邅反謀欲譖言豈不爾受既其女音汝遷賦也捷捷儇利貌幡幡反覆貌王氏曰上好譖則固將受女然好譖不已則遇譖之禍亦既遷而及女矣曾氏曰上章及此皆忠告之辭驕人好好勞人草草蒼天蒼天叶鐵因反視彼驕人矜此勞人賦也好好樂也草草憂也驕人譖行而得意勞人遇譖而失度其狀如此彼譖人者叶掌與反誰適與謀叶滿補反取彼譖人投畀豺虎豺虎不食投畀有北有北不受叶承呪反投畀有昊叶許侯反賦也再言彼譖人者誰適與謀者甚嫉之故重言之也或曰衍文也投棄也北北方寒涼不毛之地也不食不受言讒譖之人物所共惡也昊昊天也投畀吳天使制其罪此皆設言以見欲其死亡之甚也故曰好賢如緇衣惡惡如巷伯楊園之道猗音倚于畝丘叶袪竒反寺人孟子作為此詩凡百君子敬而聽之興也楊園下地也猗加也畝丘髙地也寺人內小臣蓋以讒被宮而為此官也孟子其字也楊園之道而猗于畝丘以興賤者之言或有補於君子也蓋譖始於微者而其漸將及於大臣故作詩使聽而謹之也劉氏曰其後王后太子及大夫果多以讒廢者巷伯七章四章章四句一章五句一章八句一章六句巷是宫內道名秦漢所謂永巷是也伯長也主宫內道官之長即寺人也故以名篇班固司馬遷贊云迹其所以自傷悼小雅巷伯之倫其意亦謂巷伯本以被譖而遭刑也而楊氏曰寺人內侍之微者出入於王之左右親近於王而日見之宜無閒之可伺矣今也亦傷於讒則疏逺者可知故其詩曰几百君子敬而聽之使在位知戒也其說不同然亦有理姑存於此云習習谷風維風及雨將恐將懼維豫與女音汝將安將樂音洛女轉棄豫叶演女反興也習習和調貌谷風東風也將且也恐懼謂危難憂患之時也此朋友相怨之詩故言習習谷風則維風及雨矣將恐將懼之時則維豫與女矣奈何將安將樂而女轉棄豫哉習習谷風維風及頽將恐將懼置豫于懷卟胡隈反將安將樂棄豫如遺叶遺回反興也頽風之焚輪者也置與置同置于懷親之也如遺忘去而不復存省也習習谷風維山崔嵬無草不死無木不萎叶於回反忘我大德思我小怨比也崔嵬山巔也習習谷風維山崔嵬則風之所被者廣矣然猶無不死之草無不萎之木况於朋友豈可以忘大德而思小怨乎或口興也谷風三章章六句蓼蓼音六者莪匪莪伊蒿哀哀父母生我劬勞比也蓼蓼長大貌莪美菜也蒿賤草也人民勞苦孝子不得終養而作此詩言昔謂之莪而今非莪也特蒿而已以比父母生我以為美材可賴以終其身而今乃不得其養以死於是乃言父母生我之劬勞而重自哀傷也蓼蓼者莪匪莪伊蔚音尉哀哀父母生我勞瘁比也蔚牡菣也三月始生七月始華如胡麻華而紫赤八月為角似小豆角鋭而長瘁病也瓶之罄矣維罍之恥鮮上聲民之生不如死之久叶舉里反矣無父何怙無母何恃出則銜恤入則靡至比也瓶小罍大皆酒器也罄盡鮮寡恤憂靡無也言瓶資於罍而罍資瓶猶父母與子相依為命也故瓶罄矣乃罍之恥猶父母不得其所乃子之責所以窮獨之民生不如死也蓋無父則無所怙無母則無所恃是以出則中心銜恤入則知無所歸也父兮生我母兮鞠我拊音撫我畜音旭我長上聲我育我顧我復我出入腹我欲報之德昊天罔極賦也生者本其氣也鞠畜皆養也拊拊循也育覆育也顧旋視也復反覆也腹懷抱也罔無極窮也言父母之恩如此欲報之以德而其恩之大如天無窮不知所以為報也南山烈烈飄風發發民莫不榖我獨何害叶音曷興也烈烈髙大貌發發疾貌榖善也南山烈烈則飄風發發矣民莫不善而我獨何為遭此害也哉南山律律飄風弗弗叶分聿反民莫不榖我獨不卒興也律律猶烈烈也弗弗猶發發也卒終也言終養也蓼莪六章四章章四句二章章八句晉王裒以父死非罪每讀詩至哀哀父母生我劬勞未嘗不三復流涕受業者為廢此篇詩之感人如此有饛音蒙簋音軌飱音孫有救音求棘匕音比周道如砥音紙其直如矢君子所履小人所視叶善止反眷音眷言顧之澘音山焉出涕音體興也饛滿簋貌飱熟食也救曲貌棘匕以棘為匕所以載鼎肉而升之於俎也砥礪石言平也矢言直也君子在位履行小人下民也眷反顧也澘涕下貌序以為東國困於役而傷於財談大夫作此以告病言有饛簋飱則有救棘匕周道如砥則其直如矢是以君子履之而小人視焉今乃顧之而出涕者則以東方之賦役莫不由是而西輪於周也小東大東叶都郎反杼音佇柚音逐其空叶枯郎反糾糾葛屨可以履霜佻佻音挑公子行彼周行叶户郎反既往既來叶六直反使我心疚叶訖力反賦也小東大東東方小大之國也自周視之則諸侯之國皆在東方杼持緯者也柚受經者也空盡也佻輕薄不奈勞苦之貌公子諸侯之貴臣也周行大路也疚病也言東方小大之國杼柚皆已空矣至於以葛屨履霜而其貴戚之臣奔走往來不勝其勞使我心憂而病也有冽音列氿音軌泉叶才勻反無浸穫薪契契音器寤歎哀我憚丁佐反人薪是穫薪尚可載叶節力反也哀我憚人亦可息也興也冽寒意也側出曰氿泉穫艾也契契憂苦也憚勞也尚庶幾也載載以歸也蘇氏曰薪已穫矣而復漬之則腐民已勞矣而復事之則病故已艾則庶其載而畜之已勞則庶其息而安之東人之子職勞不來音賚叶六直反西人之子粲粲衣服叶蒲北反舟人之子熊羆是裘叶渠之反私人之子百僚是試叶申之反賦也東人諸侯之人也職專主也來慰撫也西人京師人也粲粲鮮盛貌舟人舟楫之人也熊羆是裘言富也私人私家皂隸之屬也僚官試用也舟人私人皆西人也此言賦役不均羣小得志也或以其酒不以其漿鞙鞙音琄佩璲音遂不以其長維天有漢監音鑒亦有光跂彼織女終日七襄賦也鞙鞙長貌璲瑞也漢天河也跂隅貌織女星名在漢旁三星跂然如隅也七襄未詳傳曰反也箋云駕也駕謂更其肆也蓋天有十二次日月所止舍所謂肆也經星一晝一夜左旋一周而有餘則終日之閒自卯至酉當更七次也言東人或餽之以酒而西人曾不以為漿東人或與之以鞙然之佩而西人曾不以為長維天之有漢則庶乎其有以監我而織女之七襄則庶乎其能成文章以報我矣無所赴訴而言維天庶乎其恤我耳雖則七襄不成報章睆音莞彼牽牛不以服箱東有啓明叶謨郎反西有長庚叶古郎反有救天畢載施之行音杭賦也睆明星貌牽牛星名服駕也箱車箱也啓明長庚皆金星也以其先日而出故謂之啓明以其後日而入故謂之長庚蓋金水二星常附日行而或先或後但金大水小故獨以金星為言也天畢畢星也狀如掩兔之畢行行列也言彼織女不能成報我之章牽牛不可以服我之箱而啓明長庚天畢者亦無實用但施之行列而已至是則知天亦無若我何矣維南有箕不可以簸波我反揚維北有斗不可以挹音揖酒漿維南有箕載翕音吸其舌維北有斗西柄之揭音訐賦也箕斗二星以夏秋之閒見於南方云北斗者以其在箕之北也或曰北斗常見不隱者也翕引也舌下二星也南斗柄固指西若北斗而西柄則亦秋時也言南箕既不可以簸揚糠粃北斗既不可以挹酌酒漿而箕引其舌反若有所吞噬斗西揭其柄反若有所挹取於東是天非徒無若我何乃亦若助西人而見困甚怨之辭也大東七章章八句四月維夏叶後五反六月徂暑先祖匪人胡寧忍豫叶演女反興也徂往也四月六月亦以夏正數之建已建未之月也此亦遭亂自傷之詩言四月維夏則六月徂署矣我先祖豈非人乎何忍使我遭此禍也無所歸咎之辭也秋日淒淒百卉具腓亂離瘼音莫矣奚其適歸興也淒淒涼風也卉草腓病離憂瘼病奚何適之也秋日淒淒則百卉俱腓矣亂離瘼矣則我將何所適歸乎哉冬日烈烈飄風發發民莫不榖我獨何害音曷善也興也烈烈猶栗烈也發發疾貌榖夏則暑秋則病冬則烈言禍亂日進無時而息也山有嘉卉侯栗侯梅叶莫悲反廢為殘賊莫知其尤叶于其反興也嘉善侯維廢變尤過也山有嘉卉則維栗與梅矣在位者變為殘賊則誰之過哉相去聲彼泉水載清載濁叶殊玉反我日構禍曷云能榖興也相視載則構合也相彼泉水猶有時而清有時而濁而我乃日日遭害則曷云能善乎滔滔江漢南國之紀盡瘁以仕寧莫我有叶羽已反興也滔滔大水貌江漢二水名紀綱紀也謂經帶包絡之也瘁病也有識有也滔滔江漢猶為南國之紀今也盡瘁以仕而王何其不我有哉匪鶉音團匪鳶音沿叶以旬反翰飛戾天叶鐵因反匪鱣音氊匪鮪潛逃于淵叶一均反賦也鶉鵰也鳶亦鷙鳥也其飛上薄雲漢鱣鮪大魚也鶉鳶則能翰飛戾天鱣鮪則能潛逃于淵我非是四者則亦無所逃矣山有蕨薇隰有杞桋音夷君子作歌維以告哀叶於希反興也杞枸檵也桋赤栜也樹葉細而岐鋭皮理錯戾好叢生山中可為車輞山則有蕨薇隰則有杞桋君子作歌則維以告哀而已四月八章章四句小旻之什十篇六十五章四百十四句北山之什二之六陟彼北山言采其杞偕偕士子叶奬里反朝夕從事叶上止反王事靡盬憂我父母叶滿彼反賦也偕偕强壯貌士子詩人自謂也大夫行役而作此詩自言陟北山而采杞以食者皆强壯之人而朝夕從事者也蓋以王事不可以不勤是以貽我父母之憂耳溥音普天之下叶後五反莫非王土率土之濵莫非王臣大夫不均我從事獨賢叶下珍反賦也溥大率循濵涯也言土之廣臣之衆而王不均平使我從事獨勞也不斥王而曰大夫不言獨勞而曰獨賢詩人之忠厚如此四牡彭彭叶鋪郎反王事傍傍音崩叶布光反嘉我未老鮮我方將旅力方剛經營四方賦也彭彭然不得息也傍傍然不得已也嘉善鮮少也以為少而難得也將壯也旅與膂同言王之所以使我者善我之未老而方壯旅力可以經營四方爾猶上章之言獨賢也或燕燕居息或盡瘁事國叶越逼反或息偃在牀或不已于行叶户郎反賦也燕燕安息貌瘁病已止也言役使之不均也下章放此或不知叫號音毫或慘慘劬勞或棲音西遲偃仰或王事鞅音怏掌賦也不知叫號深居安逸不聞人聲也鞅掌失容也言事煩勞不暇為儀容也或湛音耽樂飲酒或慘慘畏咎或出入風音諷議叶魚羈反或靡事不為賦也咎猶罪過也出入風議言親信而從容也北山六章三章章六句三章章四句無將大車祗音支自塵兮無思百憂祗自疧兮興也將扶進也大車平地任載之車駕牛者也祗適疧病也此亦行役勞苦而憂思者之作言將大車則塵汚之思百憂則病及之也無將大車維塵冥冥叶莫逈反無思百憂不出于熲音耿興也冥冥昏晦也熲與耿同小明也在憂中耿耿然不能出也無將大車維塵雍上平二聲兮無思百憂祗自重上平二聲兮興也雍猶蔽也重猶纍也無將大車三章章四句明明上天照臨下土我征徂西至于艽音求野叶上與反二月初吉載離寒暑心之憂矣其毒大音泰苦念彼共音恭人涕零如雨豈不懷歸畏此罪罟音古賦也征行徂往也艽野地名蓋逺荒之地也二月亦以夏正數之建卯月也初吉朔日也毒言心中如有藥毒也共人僚友之處者也懷思罟網也大夫以二月西征至於歲暮而未得歸故呼天而訴之復念其僚友之處者且自言其畏罪而不敢歸也昔我往矣日月方除去聲曷云其還歲聿云莫念我獨兮我事孔庶心之憂矣憚丁佐反我不暇叶胡顧反念彼共人眷眷音眷懷顧豈不懷歸畏此譴怒賦也除除舊生新也謂二月初吉也庶衆憚勞也眷眷勤厚之意譴怒罪責也言昔以是時往今未知何時可還而歲已暮矣蓋身獨而事衆是以勤勞而不暇也昔我往矣日月方奧音郁曷云其還政事愈蹙音蹴歲聿云莫采蕭穫菽心之憂矣自詒伊戚叶子六反念彼共人興言出宿豈不懷歸畏此反覆音福賦也奧暖蹙急詒遺戚憂興起也反覆傾側無常之意也言以政事愈急是以至此歲暮而猶不得歸又自咎其不能見幾逺去而自遺此憂至於不能安寢而出宿於外也嗟爾君子無恆安處靖共爾位正直是與神之聽之式榖以女音汝賦也君子亦指其僚友也恆常也靖與靜同與猶助也榖祿也以猶與也上章既自傷悼此章又戒其僚友曰嗟爾君子無以安處為常言當有勞時勿懷安也當靖共爾位惟正直之人是助則神之聽之而以榖祿與女矣嗟爾君子無恆安息靖共爾位好去聲是正直神之聽之介爾景福叶筆力反賦也息猶處也好是正直愛此正直之人也介景皆大也小明五章三章章十二句二章章六句鼓鐘將將音搶淮水湯湯憂心且傷淑人君子懷允不忘賦也將將聲也淮水出信陽軍桐柏山至楚州漣水軍入海湯湯沸騰之貌淑善懷思允信也此詩之義未詳王氏曰幽王鼓鐘淮水之上為流連之樂久而忘反聞者憂傷而思古之君子不能忘也鼓鐘喈喈音皆叶居奚反淮水湝湝音諧叶賢雞反憂心且悲淑人君子其德不回叶乎為反賦也喈喈猶將將湝湝猶湯湯悲猶傷也回邪也鼓鐘伐鼛音髙叶居尤反淮有三洲憂心且妯音抽淑人君子其德不猶賦也鼛大鼓也周禮作臯云臯鼓尋有四尺三洲淮上地蘇氏曰始言湯湯水盛也中言湝湝水流也終言三洲水落而洲見也言幽王之久於淮上也妯動猶若也言不若今王之荒亂也鼓鐘欽欽鼓瑟鼓琴笙磬同音以雅以南叶尼心反以籥音藥不僭叶七心反賦也欽欽亦聲也磬樂器以石為之琴瑟在堂笙磬在下同音言其和也雅二雅也南二南也籥籥舞也僭亂也言三者皆不僭也蘇氏曰言幽王之不德豈其樂非古歟樂則是而人則非也鼓鐘四章章五句此詩之義有不可知者今姑釋其訓詁名物而略以王氏蘇氏之說解之未敢信其必然也楚楚者茨言抽其棘自昔何為我藝音藝黍稷我黍與與音餘我稷翼翼我倉既盈我庾維億以為酒食以享以祀叶逸織反以妥以侑音又叶夷益反以介景福叶音璧賦也楚楚盛密貌茨蒺藜也抽除也我為有田祿而奉祭祀者之自稱也與與翼翼皆蕃盛貌露積曰庾十萬曰億享獻也妥安坐也禮曰詔妥尸蓋祭祀筮族人之子為尸既奠迎之使處神坐而拜以安之也侑勸也恐尸或未飽祝侑之曰皇尸未實也介大也景亦大也此詩述公卿有田祿者力於農事以奉其宗廟之祭故言蒺藜之地冇抽除其棘者古人何乃為此事乎蓋將使我於此藝黍稷也故我之黍稷既盛倉庾既實則為酒食以享祀妥侑而介大福也濟濟上聲蹌蹌音槍潔爾牛羊以往蒸嘗或剝或亨音烹叶鋪郎反或肆或將祝祭于祊音崩叶補光反祀事孔明叶謨郎反先祖是皇神保是饗叶虛良反孝孫有慶叶袪羊反報以介福萬壽無疆賦也濟濟蹌蹌言有容也冬祭曰蒸秋祭曰嘗剝解剝其皮也亨煮熟之也肆陳之也將奉持而進之也祊廟門內也孝子不知神之所在故使祝博求之於門內待賔客之處也孔甚也明猶備也著也皇大也君也保安也神保蓋尸之嘉號楚辭所謂靈保亦以巫降神之稱也孝孫主祭之人也慶猶福也執爨音竄踖踖音積叶七略反為俎孔碩叶常約反或燔音煩或炙音隻叶陟略反君婦莫莫音麥叶木各反為豆孔庶叶陟略反為賔為客叶克各反獻酬交錯禮儀卒度叶徒洛反笑語卒獲叶黃郭反神保是格叶剛鶴反報以介福萬壽攸酢賦也爨竈也踖踖敬也俎所以載牲體也碩大也燔燒肉也炙炙肝也皆所以從獻也特牲主人獻尸賔長以肝從主婦獻尸兄弟以燔從是也君婦主婦也莫莫清靜而敬至也豆所以盛內羞庶羞主婦薦之也庶多也賔客筮而戒之使助祭者既獻尸而遂與之相獻酬也主人酌賔曰獻賔飲主人曰酢主人又自飲而復飲賔曰酬賔受之奠於席前而不舉至旅而後少長相勸而交錯以遍也卒盡也度法度也獲得其宜也格來酢報也我孔熯音善矣式禮莫愆叶起巾反工祝致告徂賚孝孫叶須倫反苾音邲芬孝祀叶逸織反神嗜飲食卜爾百福叶筆力反如幾音機如式既齊既稷既匡既敕永錫爾極時萬時億賦也熯竭也善其事曰工苾芬香也卜豫也幾期也春秋傳曰易幾而哭是也式法齊整稷疾匡正敕戒極至也禮行既久筋力竭矣而式禮莫愆敬之至也於是祝致神意以嘏主人曰爾飲食芳潔故報爾以福祿使其來如幾其多如法爾禮容莊敬故報爾以衆善之極使爾無一事而不得乎此各隨其事而報之以其類也少牢嘏辭曰皇尸命工祝承致多福無疆于女孝孫來女孝孫使女受祿于天宜稼于田眉壽萬年勿替引之此大夫之禮也禮儀既備叶蒲北反鐘鼓既戒叶訖力反孝孫徂位叶力入反工祝致告叶古得反神具醉止皇尸載起鼓鐘送尸神保聿歸諸宰君婦廢徹不遲諸父兄弟備言燕私叶息夷反賦也戒告也徂位祭事既畢主人往阼階下西而之位也致告祝傳尸意告利成於主人言孝子之利養成畢也於是神醉而尸起送尸而神歸矣曰皇尸者尊稱之也鼓鐘者尸出入奏肆夏也鬼神無形言其醉而歸者誠敬之至如見之也諸宰家宰非一人之稱也廢去也不遲以疾為敬亦不留神惠之意也祭畢既歸賔客之俎同姓則留與之燕以盡私恩所以尊賔客親骨肉也樂具入奏音族以綏後祿爾殽既將莫怨具慶叶祛羊反既醉既飽叶補苟反小大稽首神嗜飲食使君壽考叶去九反孔惠孔時維其盡叶子忍反之子子孫孫勿替引之賦也凡廟之制前廟以奉神後寢以藏衣冠祭於廟而燕於寢故於此將燕而祭時之樂皆入奏於寢也且於祭既受祿矣故以燕為將受後祿而綏之也爾殽既進與燕之人無有怨者而皆歡慶醉飽稽首而言曰向者之祭神既嗜君之飲食矣是以使君壽考也又言君之祭祀甚順甚時無所不盡子子孫孫當不廢而引長之也楚茨六章章十二句呂氏曰楚茨極言祭祀所以事神受福之節致詳致備所以推明先王致力於民者盡則致力於神者詳觀其威儀之盛物品之豐所以交神明逮羣下至於受福無疆者非德盛政修何以致之信彼南山維禹甸音殿叶徒鄰反之畇畇音勻原隰曾孫田叶地因反之我疆我理南東其畝叶滿彼反賦也南山終南山也甸治也畇畇墾辟貌曾孫主祭者之稱曾重也自曽祖以至無窮皆得稱之也疆者為之大界也理者定其溝塗也畝壟也長樂劉氏曰其遂東入於溝則其畝南矣其遂南入於溝則其畝東矣此詩大指與楚茨略同此即其篇首四句之意也言信乎此南山者本禹之所治故其原隰墾闢而我得田之於是為之疆理而順其地勢水勢之所宜或南其畝或東其畝也上天同雲雨去聲雪氛氛益之以霡音麥霂音木既優既渥叶烏谷反既霑既足生我百榖賦也同雲雲一色也將雪之侯如此氛氛雪貌霡霂小雨貌優渥霑足皆饒洽之意也冬有積雪春而益之以小雨潤澤則饒洽矣疆埸音亦翼翼黍稷彧彧音郁叶于逼反曾孫之穡以為酒食畀音祕我尸賔壽考萬年叶尼因反賦也埸畔也翼翼整飭貌彧彧茂盛貌畀與也言其田整飭而榖茂盛者皆曾孫之穡也於是以為酒食而獻之於尸及賔客也隂陽和萬物遂而人心歡悅以奉宗廟則神降之福故壽考萬年也中田有廬疆場音亦有瓜叶公乎反是剝是菹側居反獻之皇祖曾孫壽考叶孔五反受天之祜音户賦也中田田中也菹酢菜也祜福也一井之田其中百畝為公田內以二十畝分八家為廬舍以便田事於畔上種瓜以盡地利爪成剝削淹漬以為菹而獻皇祖貴四時之異物順孝子之心也祭以清酒從以騂音觪牡享于祖考叶去久反執其鸞刀以啓其毛取其血膋音聊叶音勞賦也清酒清潔之酒鬱鬯之屬也騂赤色周所尚也祭禮先以鬱鬯灌地求神於隂然後迎牲執者主人親執也鸞刀刀有鈴也膋脂膏也啓其毛以告純也取其血以告殺也取其膋以升臭也合之黍稷實之於蕭而燔之以求神於陽也記曰周人尚臭灌用鬯臭鬱合鬯臭隂逹於淵泉灌以圭璋用玉氣也既灌然後迎牲致隂氣也蕭合黍稷臭陽逹於牆屋故既奠然後焫蕭合羶薌凡祭慎諸此魂氣歸於天形魄歸於地故祭求諸隂陽之義也是蒸是享叶虛良反苾苾芬芬祀事孔明叶謨郎反先祖是皇報以介福萬壽無疆賦也蒸進也或曰冬祭名信南山六章章六句倬音卓彼甫田叶地因反歲取十千叶倉新反我取其陳食音嗣我農人自古有年叶泥因反今適南畝叶滿彼反或耘或耔音子叶奬里反黍稷薿薿音蟻攸介攸止蒸我髦音毛士賦也倬明貌甫大也十千謂一成之田地方十里為田九萬畝而以其萬畝為公田蓋九一之法也我食祿主祭之人也陳舊粟也農人私百畝而養公田者也有年豐年也適往也耘除草也耔雍本也蓋后稷為田一畝三畎廣尺深尺而播種於其中苖葉以上稍耨壠草因壝其土以附苖根壠盡畎平則根深而能風與旱也薿茂盛貌介大蒸進髦俊也俊士秀民也古者士出於農而工商不與焉管仲曰農之子恆為農野處而不昵其秀民之能為士者必足賴也即謂此也此詩述公卿有田祿者力於農事以奉方社田祖之祭故言於此大田歲取萬畝之入以為祿食及其積之久而有餘則又存其新而散其舊以食農人補不足助不給也蓋以自古有年是以陳陳相因所積如此然其用之之節又合宜而有序如此所以粟雖甚多而無紅腐不可食之患也又言自古既有年矣今適南畝農人方且或耘或耔而其黍稷又已茂盛則是又將復有年矣故於其所美大止息之處進我髦士而勞之也以我齊音咨明叶謨郎反與我犧羊以社以方我田既臧農夫之慶叶祛羊反琴瑟擊鼓以御牙嫁反田祖以祈甘雨以介我稷黍以榖我士女賦也齊與粢同曲禮曰稷曰明粢此言齊明便文以協韻耳犧羊純色之羊也社后土也以句龍氏配方秋祭四方報成萬物周禮所謂羅斃獻禽以祀祊是也臧善慶福御迎也田祖先嗇也謂始耕田者即神農也周禮籥章几國祈年於田祖則吹豳雅擊土鼓以樂田畯是也榖養也又曰善也言倉廪實而知禮節也言奉其齊盛犧牲以祭方社而曰我田之所以善者非我之所能致也乃賴農夫之福而致之耳又作樂以祭田祖而祈雨庶有以大其稷黍而養其民人也曾孫來止以其婦子叶奬里反饁音瞱彼南畝叶滿彼反田畯音俊至喜攘音穰其左右叶羽已反嘗其㫖否叶補美反禾易長畝終善且有叶羽已反曾孫不怒農夫克敏叶母鄙反賦也曾孫主祭者之稱非獨宗廟為然曲禮外事曰曾孫某侯某武王禱名山大川曰冇道曾孫周王發是也饁餉攘取㫖美易治長竟有多敏疾也曾孫之來適見農夫之婦子來饁耘者於是與之偕至其所而田畯亦至而喜之乃取其左右之饋而嘗其㫖否言其上下相親之甚也既又見其禾之易治竟畝如一而知其終當善而且多是以曾孫不怒而其農夫益以敏於其事也曾孫之稼如茨如梁曾孫之庾如坻音池如京叶居良反乃求千斯倉乃求萬斯箱黍稷稻粱農夫之慶叶袪羊反報以介福萬壽無疆賦也茨屋蓋言其密比也梁車梁言其穹隆也坻水中之髙地也京髙丘也箱車箱也此言收成之後禾稼既多則求倉以處之求車以載之而言凡此黍稷稻梁皆賴農夫之慶而得之是宜報以大福使之萬壽無疆也其歸美於下而欲厚報之如此甫田四章章十句大田多稼既種上聲既戒既備乃事叶上止反以我覃音剡耜叶養里反俶載南畝叶滿彼反播厥百榖叶工洛反既庭且碩叶常約反曾孫是若賦也種擇其種也戒飭其具也覃利俶始載事庭直碩大若順也蘇氏曰田大而種多故於今歲之冬具來歲之種戒來歲之事凡既備矣然後事之取其利耜而始事於南畝既耕而播之其耕之也勤而種之也時故其生者皆直而大以順曾孫之所欲此詩為農夫之辭以頌美其上若以答前篇之意也既方既皂叶子苟反既堅既好叶許苟反不稂音郎不莠音酉去上聲其螟音冥螣音特及其蟊賊無害我田稚音租田祖有神秉畀炎火叶虎委反賊也方房也謂孚甲始生而未合䝰也實未堅者曰皂稂童粱莠似苖皆害苖之草也食心曰螟食葉曰螣食根曰蟊食節曰賊皆害苖之蟲也稚幼禾也言其苖既盛矣又必去此四蟲然後可以無害田中之禾然非人力所及也故願田祖之神為我持此四蟲而付之炎火之中也姚崇遣使捕蝗引此為證夜中設火火邊掘坑且焚且瘞蓋古之遺法知此有淹音掩萋萋音妻興雨祁祁雨我公田遂及我私叶息夷反彼有不穫稚此有不斂穧音嚌彼有遺秉此有滯穗伊寡婦之利賦也淹雲興貌萋萋盛貌祁祁徐也雲欲盛盛則多雨雨欲徐徐則入土公田者方里而井井九百畝其中為公田八家皆私百畝而同養公田也穧東秉把也滯亦遺棄之意也言農夫之心先公後私故望此雲雨而曰天其雨我公田而遂及我之私田乎冀怙君德而蒙其餘惠使收成之際彼有不及穫之稚禾此有不及斂之穧東彼有遺棄之禾把此有滯漏之禾穗而寡婦尚得取之以為利也此見其豐成有餘而不盡取又與鰥寡共之既足以為不費之惠而亦不棄於地也不然則粒米狼戾不殆於輕視天物而慢棄之乎曾孫來止以其婦子饁彼南畝田畯至喜來方禋音因祀叶逸識反以其騂黑與其黍稷以享以祀同上以介景福叶筆力反賦也精意以享謂之禋農夫相告曰曾孫來矣於是與其婦子饁彼南畝之穫者而田畯亦至而喜之也曽孫之來又禋祀四方之神而賽禱焉四方各用其方色之牲此言騂黑舉南北以見其餘也以介景福農夫欲曾孫之受福也大田四章二章章八句二章章九句前篇有擊鼓以御田祖之文故或疑此楚茨信南山甫田大田四篇即為豳雅其詳見於豳風之末亦未知其是否也然前篇上之人以我田既臧為農夫之慶而欲報之以介福此篇農夫以雨我公田遂及我私而欲其享祀以介景福上下之情所以相賴而相報者如此非盛德其孰能之瞻彼洛矣維水泱泱音秧君子至止福祿如茨韎音昧韐音閣有奭音赩以作六師賦也洛水名在東都㑹諸侯之處也泱泱深廣也君子指天子也茨積也韎茅搜所染色也韐韠也合韋為之周官所謂韋辨兵事之服也奭赤貌作猶起也六師六軍也天子六軍此天子㑹諸侯於東都以講武事而諸侯美天子之詩言天子至此洛水之上御戎服而起六師也瞻彼洛矣維水泱泱君子至止鞞補頂反琫音菶有珌音必君子萬年保其家室賦也鞞容刀之鞞今刀鞘也琫上飾珌下飾亦戎服也瞻彼洛矣維水泱泱君子至止福祿既同君子萬年保其家邦叶卜工反賦也同猶聚也瞻彼洛矣三章章六句裳裳者華其葉湑上聲兮我覯之子我心寫叶想與反兮我心寫兮是以有譽處兮興也裳裳猶堂堂董氏曰古本作常常棣也湑盛貌覯見處安也此天子美諸侯之辭蓋以答瞻彼洛矣也言裳裳者華則其葉湑然而美盛矣我覯之子則其心傾寫而悅樂之矣夫能使見者悅樂之如此則其有譽處宜矣此章與蓼蕭首章文勢全相似裳裳者華藝其黃矣我覯之子維其有章矣維其冇章矣是以有慶叶虛羊反矣興也藝黃盛也章文章也有文章斯有福慶矣裳裳者華或黃或白叶僕各反我覯之子乘其四駱乘其四駱六轡沃若興也言其車馬威儀之盛左叶祖戈反之左同上之君子宜叶牛何反之右叶羽已反之右同上之君子有叶羽已反之維其有同上之是以似叶養里反之賦也言其才全德備以左之則無所不宜以右之則無所不冇維其有之於內是以形之於外者無不似其所冇也裳裳者華四章章六句北山之什十篇四十六章三百三十四句桑扈之什二之七交交桑扈音户有鶯其羽君子樂音洛胥叶思呂反受天之祜音户興也交交飛往來之貌桑扈竊脂也鶯然冇文章也君子指諸侯胥語辭祜福也此亦天子燕諸侯之詩言交交桑扈則冇鶯其羽矣君子樂胥則受天之祜矣頌禱之辭也交交桑扈有鶯其領君子樂胥萬邦之屏音丙興也領頸屏蔽也言其能為小國之藩衛蓋任方伯連帥之職者也之屏之翰叶胡見反百辟音璧為憲不戢音緝不難叶乃多反受福不那賦也翰幹也所以當牆兩邊障土者也辟君憲法也言其所統之諸侯皆以之為法也戢斂難慎那多也不戢戢也不難難也不那那也蓋曰豈不斂乎豈不慎乎其受福豈不多乎古語聲急而然也後放此兕觥其觩音求㫖酒思柔彼交匪敖去聲萬福來求賦也兕觥爵也觩角上曲貌㫖美也思語辭也敖傲通交際之閒無所傲慢則我無事於求福而福反來求我矣桑扈四章章四句鴛鴦于飛畢之羅之君子萬年福祿宜叶牛何反之興也鴛鴦匹鳥也畢小罔長柄者也羅罔也君子指天子也此諸侯所以答桑扈也鴛鴦于飛則畢之羅之矣君子萬年則福祿宜之矣亦頌禱之辭也鴛鴦在梁戢其左翼君子萬年宜其遐福叶筆力反興也石絶水為梁戢斂也張子曰禽鳥並棲一正一倒戢其左翼以相依於內舒其右翼以防患於外蓋左不用而右便故也遐逺也久也乘去聲馬在廄音抆摧音銼之秣音末叶莫佩反之君子萬年福祿艾叶魚肺反之興也摧莝秣栗艾養也蘇氏曰艾老也言以福祿終其身也亦通乘馬在廄則摧之秣之矣君子萬年則福祿艾之矣乘馬在廄秣之摧叶如字又音銼之君子萬年福祿綏叶如字又土果反之興也綏安也鴛鴦四章章四句有頍音跬者辨實維伊何爾酒既㫖爾殽既嘉叶居何反豈伊異人兄弟匪他音拖蔦音鳥與女蘿音羅施音異于松柏叶逋莫反未見君子憂心奕奕叶弋灼反既見君子庶幾說音悅懌叶弋灼反賦而興又比也頍辨貌或曰舉首貌辨皮辨嘉㫖皆美也匪他非他人也蔦寄生也葉似當盧子如覆盆子赤黑甜美女蘿兔絲也蔓連草上黃赤如金此則比也君子兄弟為賔者也奕奕憂心無所薄也此亦燕兄弟親戚之詩故言冇頍者辨實維伊何乎爾酒既㫖爾殽既嘉則豈伊異人乎乃兄弟而匪他也又言蔦蘿施于木上以比兄弟親戚纒綿依附之意是以未見而憂既見而喜也有頍者辨實維何期爾酒既㫖爾殽既時豈伊異人兄弟具來叶陵之反蔦與女蘿施于松上叶時亮反未見君子憂心怲怲音柄叶兵旺反既見君子庶幾有臧叶才浪反賦而興又比也何期猶伊何也時善具俱也怲怲憂盛滿也臧善也有頍者辨實維在首爾酒既㫖爾殽既阜豈伊異人兄弟甥舅如彼雨去聲雪先集維霰音線死喪去聲無日無幾音已相見樂酒今夕君子維宴賦而興又比也阜猶多也甥舅謂母姑姊妹妻族也霰雪之始凝者也將大雨雪必先微溫雪自上下遇溫氣而搏謂之霰久而寒勝則大雪矣言霰集則將雪之候以比老至則將死之徵也故卒言死喪無日不能久相見矣但當樂飲以盡今夕之歡篤親親之意也頍辨三章章十二句閒關車之舝兮思孌音臠季女逝兮匪飢匪渴德音來括雖無好友叶羽已反式燕且喜賦也閒關設舝聲也舝車軸頭鐵也無事則脫行則設之昏禮親迎者乘車孌美貌逝往括㑹也此燕樂其新昏之詩故言閒關然設此車舝者蓋思彼孌然之季女故乘此車往而迎之也匪飢也匪渴也望其德音來括而心如飢渴耳雖無他人亦當燕飲以相喜樂也依彼平林有集維鷮音驕辰彼碩女令德來教叶居爻反式燕且譽好去聲爾無射音亦叶都故反興也依茂木貌鷮雉也微小於翟走而且鳴其尾長肉甚美辰時碩大也爾即季女也射厭也依彼平林則有集維鷮辰彼碩女則以令德來配已而教誨之是以式燕且譽而悅慕之無厭也雖無㫖酒式飲庶幾雖無嘉殽式食庶幾雖無德與女音汝式歌且舞賦也㫖嘉皆美也女亦指季女也言我雖無㫖酒嘉殽美德以與女女亦當飲食歌舞以相樂也陟彼髙岡析音錫其柞音昨薪叶音襄析其柞薪其葉湑上聲兮鮮我覯爾我心寫叶想羽反兮興也陟登柞櫟湑盛鮮少覯見也陟岡而析薪則其葉湑兮矣我得見爾則我心寫兮矣髙山仰叶五剛反止景行行叶户郎反止四牡騑騑音霏六轡如琴覯爾新昏以慰我心興也仰瞻望也景行大道也如琴謂六轡調和如琴瑟也慰安也髙山則可仰景行則可行馬服御良則可以迎季女而慰我心也此又舉其始終而言也表記曰小雅曰髙山仰止景行行止子曰詩之好仁如此鄉道而行中道而廢忘身之老也不知年數之不足也俯焉日冇孶孶斃而後已車舝五章章六句營營青蠅止于樊音煩叶焚乾反豈弟君子無信讒言比也營營往來飛聲亂人聽也青蠅汙穢能變白黑樊藩也君子謂王也詩人以王好聽讒言故以青蠅飛聲比之而戒王以勿聽也營營青蠅止于棘讒人罔極交亂四國叶越逼反興也棘所以為藩也極猶已也營營青蠅止于榛讒人罔極構音姤我二人興也構合也猶交亂也已與聽者為二人青蠅三章章四句賔之初筵左右秩秩籩豆有楚殽核維旅酒既和㫖飲酒孔偕音皆叶舉里反鐘鼓既設叶書質反舉酬音酬逸逸大侯既抗叶居郎反弓矢斯張射夫既同獻爾發功發彼有的叶丁藥反以祈爾爵賦也初筵初即席也左右筵之左右也秩秩有序也楚列貌殽豆實也核籩實也旅陳也和㫖調美也孔甚也偕齊一也設宿設而又遷于下也大射樂人宿縣厥明將射乃遷樂于下以避射位是也舉酬舉所奠之酬爵也逸逸往來有序也大侯君侯也天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕天子侯身一丈其中三分居一白質畫熊其外則丹地畫以雲氣抗張也凡射張侯而不繫左下綱中掩束之至將射司馬命張侯弟子脫束遂繫下綱也大侯張而弓矢亦張節也射夫既同比其耦也射禮選羣臣為三耦三耦之外其餘各自取匹謂之衆耦獻猶奏也發發矢也的質也祈求也爵射不中者飲豐上之觶也衛武公飲酒悔過而作此詩此章言因射而飲者初筵禮儀之盛酒既調美而飲者齊一至於設鐘鼓舉酬爵抗大侯張弓矢而衆耦拾發各心競云我以此求爵汝也籥舞笙鼓樂既和奏叶宗五反蒸衎音看烈祖以洽百禮百禮既至有壬冇林錫爾純嘏子孫其湛音耽叶持林反其湛曰樂音洛各奏爾能叶奴金反賔載手仇音拘叶音求其室人入又叶音由怡酌彼康爵以奏爾時叶音酬賦也籥舞文舞也蒸進衎樂烈業洽合也百禮言其備也壬大林盛也言禮之盛大也錫神錫之也爾主祭者也嘏福湛樂也各奏爾能謂子孫各酌獻尸尸酢而卒爵也仇讀曰㪺室人冇室中之事者謂佐食也又復也賔手挹酒室人復酌為加爵也康安也酒所以安體也或曰康讀曰抗記曰崇坫康圭此亦謂坫上之爵也時時祭也蘇氏曰時物也此言因祭而飲者始時禮樂之盛如此也賔之初筵溫溫其恭其未醉止威儀反反叶分邅反曰既醉止威儀幡幡叶分邅反舍音捨其坐遷屢舞仙仙其未醉止威儀抑抑曰既醉止威儀怭怭音弼是曰既醉不知其秩賦也反反顧禮也幡幡輕數也遷徙屢數也仙仙軒舉之狀抑抑慎密也怭怭媟嫚也秋常也此言凡飲酒者常始乎治而卒乎亂也賔既醉止載號音毫載呶音鐃亂我籩豆屢舞僛僛音欺是曰既醉不知其郵叶于其反側辨之俄屢舞傞傞音娑既醉而出並受其福叶筆力反醉而不出是謂伐德飲酒孔嘉叶居何反維其令儀叶牛何反賦也號呼呶歡也廝廝傾側之狀郵與尤同過也側傾也俄傾貌傞傞不止也出去伐害孔甚令善也此章極言醉者之狀因言賔醉而出則與主人俱有美譽醉至若此是害其德也飲酒之所以甚美者以其有令儀爾今若此則無復有儀矣凡此飲酒或醉或否叶補美反既立之監或佐之史彼醉不臧不醉反恥式勿從謂無俾大音泰怠叶養里反匪言勿言匪由勿語由醉之言俾出童羖音古三爵不識叶音失志矧敢多又叶夷益夷䜴二反賦也監史司正之屬燕禮鄉射恐有解倦失禮者立司正以監之察儀法也謂告由從也童羖無角之羖羊必無之物也識記也言飲酒者或醉或不醉故既立監而佐之以史則彼醉者所為不善而不自知使不醉者反為之羞愧也安得從而告之使勿至於大怠乎告之若曰所不當言者勿言所不當從者勿語醉而妄言則將罰汝使出童羖矣設言必無之物以恐之也汝飲至三爵已昏然無所記矣况敢又多飲乎又丁寧以戒之賔之初筵五章章十四句毛氏序曰衛武公刺幽王也韓氏序曰衛武公飲酒悔過也今按此詩意與大雅抑戒相類必武公自悔之作當從韓義魚在在藻有頒音焚其首王在在鎬豈音愷樂音洛飲酒興也藻水草也頒大首貌豈亦樂也此天子燕諸侯而諸侯美天子之詩也言魚何在乎在乎藻也則有頒其首矣王何在乎在乎鎬京也則豈樂飲酒矣魚在在藻有莘其尾王在在鎬飲酒樂豈叶去幾反興也莘長也魚在在藻依于其蒲王在在鎬有那其居興也那安居處也魚藻三章章四句采菽采菽筐音匡之筥音舉之君子來朝音潮何錫豫音與之雖無豫之路車乘去聲馬叶滿補反又何豫之𤣥袞及黼音甫興也菽大豆也君子諸侯也路車金路以賜同姓象路以賜異姓也𤣥袞𤣥衣而畫以卷龍也黼如斧形刺之於裳也周制諸公袞冕九章已見九罭篇侯伯鷩冕七章則自華蟲以下子男毳冕五章衣自宗彞以下而裳黼黻孤卿絺冕三章則衣粉米而裳黼黻大夫𤣥冕則𤣥衣黻裳而已此天子所以答魚藻也采菽采菽則必以筐筥盛之君子來朝則必有以錫豫之又言今雖無以子之然已冇路車乘馬𤣥袞及黼之賜矣其言如此者好之無已意猶以為薄也觱音必沸音弗檻胡覽反泉叶才勻反言采其芹音勤君子來朝言觀其旗音祈叶巨斤反其旗淠淠音譬鸞聲嘒嘒載驂載駟君子所屆叶居氣反興也觱沸泉出貌檻泉正出也芹水草可食淠淠動貌嘒嘒聲也屆至也觱沸檻泉則言采其芹諸侯來朝則言觀其旗見其旗聞其鸞聲又見其馬則知君子之至於是也赤芾音弗在股邪幅在下叶後五反彼交匪紓音舒叶上與反天子所豫音與樂音洛只音止君子天子命叶彌并反之樂只君子福祿申之賦也脛本曰股邪幅逼也邪纒於足如今行縢所以束脛在股下也交交際也紓緩也言諸侯服此芾逼見於天子恭敬齊遬不敢紓緩則為天子所與而申之以福祿也維柞之枝其葉蓬蓬樂只君子殿多見反天子之邦叶上工反樂只君子萬福攸同平平音楩左右亦是率從興也柞見車舝篇蓬蓬盛貌殿鎮也平平辨治也左右諸侯之臣也率循也維柞之枝則其葉蓬蓬然樂只君子則宜殿天子之邦而為萬福之所聚又言其左右之臣亦從之而至此也泛泛芳劎反楊舟紼音弗纚音黎維之樂只君子天子葵之樂只君子福祿膍音琵之優哉游哉亦是戾叶郎之反矣興也紼縴也纚維皆繫也言以大索纚其舟而繫之也葵揆也揆猶度也膍厚戾至也泛泛楊舟則必以紼纚維之樂只君子則天子必葵之福祿必膍之於是又歎其優游而至於此也采菽五章章八句騂騂音觪角弓翩音篇其反叶分邅反矣兄弟昏姻無胥逺叶於圓反矣興也騂騂弓調和貌角弓以角飾弓也翩反貌弓之為物張之則內向而來弛之則外反而去有似兄弟昏姻親疏逺近之意胥相也此刺王不親九族而好讒佞使宗族相怨之詩言騂騂角弓既翩然而反矣兄弟昏姻則豈可以相逺哉爾之逺同前矣民胥然矣爾之教矣民胥效矣賦也爾王也上之所為下必有甚者此令兄弟綽綽有裕預與二音不令兄弟交相為愈同上賦也令善綽寬裕饒愈病也言雖王化之不善然此善兄弟則綽綽有裕而不變彼不善之兄弟則由此而交相病矣蓋指讒己之人而言也民之無良相怨一方受爵不讓叶如羊反至于巳斯亡賦也一方彼一方也相怨者各據其一方耳若以責人之心責已愛已之心噯人使彼已之閒交見而無蔽則豈有相怨者哉况兄弟相怨相讒以取爵位而不知遜讓終亦必亡而已矣老馬反為駒叶去聲不顧其後叶下故反如食音嗣宜飫音飫如酌孔取叶音娶比也飫飽孔甚也言其但知讒害人以取爵位而不知其不勝任如老馬憊矣而反自以為駒不顧其後將有不勝任之患也又如食之已多而宜飽矣酌之所取亦已甚矣母教猱升木如塗塗附君子有徽猷小人與屬音蜀叶殊遇反比也猱獼猴也性善升木不待教而能也塗泥附著徽美猷道屬附也言小人骨肉之恩本薄王又好讒佞以來之是猶教猱升木又如於泥塗之上加以泥塗附之也苟王冇美道則小人將反為善以附之不至於如此矣雨去聲雪瀌瀌音標見晛音現曰消莫肯下去聲遺式居婁音慮驕比也瀌瀌盛貌晛日氣也張子曰讒言遇明者當自止而王甘信之不肯貶下而遺棄之更益以長慢也雨雪浮浮見晛曰流如蠻如髦叶莫侯反我是用憂比也浮浮猶瀌瀌也流流而去也蠻南蠻也髦夷髦也書作髳言其無禮義而相殘賊也角弓八章章四句有菀音鬱者柳不尚息焉上帝甚蹈無自昵焉俾豫靖之後豫極焉比也柳茂木也尚庶幾也上帝指王也蹈當作神言威靈可畏也昵近靖定也極求之盡也王者暴虐諸侯不朝而作此詩言彼有莞然茂盛之柳行路之人豈不庶幾欲就止息乎以比人誰不欲朝事王者而王甚威神使人畏之而不敢近耳使我朝而事之以靖王室後必將極其所欲以求於我蓋諸侯皆不朝而已獨至則王必責之無己如齊威王朝周而後反為所辱也或曰興也下章放此有菀者柳不尚愒音器焉上帝甚蹈無自瘵音債叶子例反焉俾豫靖之後豫邁叶力制反焉比也愒息瘵病也邁過也求之過其分也有鳥髙飛亦傅音附于天叶鐵因反彼人之心于何其臻曷豫靖之居以凶矜興也傅臻皆至也彼人斥王也居猶徒然也凶矜遭凶禍而可憐也鳥之髙飛極至于天耳彼王之心於何所極乎言其貪縱無極求責無己人不知其所至也如此則豈豫能靖之乎乃徒然自取凶矜耳菀柳三章章六句桑扈之什十篇四十三章二百八十二句都人士之什二之八彼都人士狐裘黃黃其容不改出言有章行歸于周萬民所望叶音亡賦也都王都也黃黃狐裘色也不改有常也章文章也周鎬京也亂離之後人不復見昔日都邑之盛人物儀容之美而作此詩以歎惜之也彼都人士臺笠緇撮叶租悅反彼君子女綢直如髮叶方月反我不見兮我心不說音悅賦也臺夫須也緇撮緇布冠也其制小僅可撮其髻也君子女都人貴家之女也綢直如髮未詳其義然以四章五章推之亦言其髮之美耳彼都人士充耳琇音秀實彼君子女謂之尹吉我不見兮我心苑音韞結叶繳質反賦也琇美石也以美石為瑱尹吉未詳鄭氏曰吉讀為姞尹氏姞氏周之婚姻舊姓也人見都人之女咸謂尹氏姞氏之女言其有禮法也李氏曰所謂尹吉猶晉言王謝唐言崔盧也苑猶屈也積也彼都人士垂帶而厲叶落蓋反彼君子女卷音權髮如蠆音瘥我不見兮言從之邁賦也厲垂帶之貌卷髮鬢旁短髮不可斂者曲上卷然以為飾也蠆螫蟲也尾末揵然似髮之曲上者邁行也蓋曰是不可得見也得見則我從之邁矣思之甚也匪伊垂之帶則有餘匪伊卷之髮則冇旟我不見兮云何旴音吁矣賦也旟揚也盱望也說見何人斯篇此言士之帶非故垂之也帶自有餘耳女之髮非故卷之也髮自有旟耳言其自然閒美不假修飾也然不可得而見矣則如何而不望之乎都人士五章章六句終朝采緑不盈一掬音菊豫髮曲局薄言歸沐賦也自旦及食時為終朝緑王芻也兩手曰掬局卷也猶言首如飛蓬也婦人思其君子而言終朝采緑而不盈一掬者思念之深不專於事也又念其髮之曲局於是舍之而歸沐以待其君子之還也終朝采藍不盈一襜尺占反叶都甘反五日為期六日不詹音占叶多甘反賦也藍染草也衣蔽前謂之襜即蔽膝也詹與瞻同五日為期去時之約也六日不詹過期而不見也之子于狩音獸言韔音暢其弓叶姑𢎞反之子于釣言綸之繩賦也之子謂其君子也理絲曰綸言君子若歸而欲往狩耶我則為之韔其弓欲往釣耶我則為之綸其繩望之切思之深欲無往而不與之俱也其釣維何維魴音房及鱮音敘叶音湑維魴及鱮薄言觀者叶掌與反賦也於其釣而有獲也又將從而觀之亦上章之意也采緑四章章四句芃芃音蓬黍苗隂雨膏去聲之悠悠南行召伯勞去聲之興也芃芃長大貌悠悠逺行之意宣王封申伯於謝命召穆公往營城邑故將徒役南行而行者作此言芃芃黍苗則唯隂雨能膏之悠悠南行則唯召伯能勞之也我任音壬我輦我車我牛叶魚其反我行既集蓋云歸哉叶將黎反賦也任負任者也輦人挽車也牛所以駕大車也集成也營謝之役既成而歸也我徒我御我師我旅我行既集蓋云歸處賦也徒步行者御乘車者五百人為旅五旅為師春秋傳曰君行師從卿行旅從肅肅謝功召伯營之烈烈征師召伯成之賦也肅肅嚴正之貌謝邑名申伯所封國也今在鄧州信陽軍功工役之事也營治也烈烈威武貌征行也原隰既平泉流既清召伯冇成王心則寧賦也土治曰平水治曰清言召伯營謝邑相其原隰之宜通其水泉之利此功既成宣王之心則安也黍苗五章章四句此宣王時詩與大雅嵩髙相表裏隰桑有阿其葉有難音那既見君子其樂音洛如何興也隰下濕之處宜桑者也阿美貌難盛貌皆言枝葉條垂之狀此喜見君子之詩言隰桑有阿則其葉冇難矣既見君子則其樂如何哉辭意大槩與菁莪相類然所謂君子則不知其何所指矣或曰比也下章放此隰桑有阿其葉有沃叶鬱縛反既見君子云何不樂興也沃光澤貌隰桑有阿其葉有幽叶於交反既見君子德音孔膠音交興也幽黑色也膠固也心乎愛叶許既反矣遐不謂矣中心藏之何日忘之賦也遐與何同表記作瑕鄭氏注曰瑕之言胡也謂猶告也言我中心誠愛君子而既見之則何不遂以告之而但中心藏之將使何日而忘之耶楚辭所謂思公子兮未敢言意蓋如此愛之根於中者深故發之遲而存之久也隰桑四章章四句白華音花菅音姦兮白茅束兮之子之逺俾我獨兮比也白華野菅也已漚為菅之子斥幽王也俾使也我申后自我也幽王娶申女以為后又得褒姒而黜申后故申后作此詩言白華為菅則白茅為束二物至微猶必相須為周何之子之逺而俾我獨耶英英白雲露彼菅茅叶莫侯反天步艱難之子不猶比也英英輕明之貌白雲水上輕清之氣當夜而上騰者也露即其散而下降者也步行也天步猶言時運也猶圖也或曰猶如也言雲之澤物無微不被今時運艱難而之子不圖不如白雲之露菅茅也滮符彪反池北流浸彼稻田叶地因反嘯歌傷懷念彼碩人比也滮流貌北流豐鎬之間水多北流碩人尊大之稱亦謂幽王也言小水微流尚能浸灌王之尊大而反不能通其寵澤所以使我嘯歌傷懷而念之也樵彼桑薪卬音昂烘于煁音忱維彼碩人實勞我心比也樵采也桑薪薪之善者也卬我烘燎也煁無釡之竈可燎而不可烹飪者也桑薪宜以烹飪而但為燎燭以比嫡后之尊而反見卑賤也鼓鐘于宮聲聞音問于外念子懆懆音慥視我邁邁比也懆懆憂貌邁邁不顧也鼓鐘于宮則聲聞于外矣念子懆懆而反視我邁邁何哉有鶖音秋在梁有鶴在林維彼碩人實勞我心比也鶖秃鶖也梁魚梁也蘇氏曰鶖鶴皆以魚為食然鶴之於鶖清濁則有閒矣今鶖在梁而鶴在林鶖則飽而鶴則飢矣幽王進褒姒而黜申后譬之飬鶖而棄鶴也鴛鴦在梁戢其左翼之子無良二三其德比也戢其左翼言不失其常也良善也二三其德則鴛鴦之不如也有扁音辨斯石履之卑兮之子之逺俾我疷音底叶喬移反兮比也扁卑貌俾使底病也有扁然而卑之石則履之者亦卑矣如妾之賤則寵之者亦賤矣是以之子之逺而俾我疷也白華八章章四句綿蠻黃鳥止于丘阿道之云逺我勞如何飲去聲之食音嗣之教之誨之命彼後車謂之載之比也綿蠻鳥聲阿曲阿也後車副車也此微賤勞苦而思有所託者為鳥言以自比也蓋曰綿蠻之黃鳥自言止于丘阿而不能前蓋道逺而勞甚矣當是時也有能飲之食之教之誨之又命後車以載之者乎綿蠻黃鳥止于丘隅豈敢憚行畏不能趨飲之食之教之誨之命彼後車謂之載之比也隅角憚畏也趨􅔂行也綿蠻黃鳥止于丘側豈敢憚行畏不能極飲之食之教之誨之命彼後車謂之載之比也側旁極至也國語云齊朝駕則夕極于魯國綿蠻三章章八句幡幡音翻瓠葉采之亨叶鋪郎反之君子有酒酌言嘗之賦也幡幡瓠葉貌此亦燕飲之詩言幡幡瓠葉采之亨之至薄也然君子有酒則亦以是酌而嘗之蓋述主人之謙辭言物雖薄而必與賔客共之也有兔斯首炮音庖之燔音煩叶汾乾反之君子有酒酌言獻叶虛言反之賦也有兔斯首一兔也猶數魚以尾也毛曰炮加火曰燔亦薄物也獻獻之於賔也有兔斯首燔之炙音隻叶陟略反之君子有酒酌言酢之賦也炕火曰炙謂以物貫之而舉於火也上以炙之酢報也賔既卒爵而酌主人有兔斯首燔之炮叶蒲侯反之君子有酒酌言酬音酬之賦也酬導飲也瓠葉四章章四句漸漸音巉之石維其髙矣山川悠逺維其勞矣武人東征不遑朝叶直髙反矣賦也漸漸髙峻之貌武人將帥也遑暇也言無朝旦之暇也將帥出征經歷險逺不堪勞苦而作此詩也漸漸之石維其卒音崒矣山川悠逺曷其沒叶莫筆反矣武人東征不遑出矣賦也卒崔嵬也謂山巔之末也曷何沒盡也言所登歷何時而可盡也不遑出謂但知深入不暇謀出也冇豕白蹢音的蒸涉波矣月離于畢俾滂沱矣武人東征不遑他音拖矣賦也蹢蹄蒸衆也離月所宿也畢星名豕涉波月離畢將雨之驗也張子曰豕之負塗曵泥其常性也今其足皆白衆與涉波而去水患之多可知矣此言久役又逢大雨甚勞苦而不暇及他事也漸漸之石三章章六句苕音條之華音花藝音云其黃矣心之憂矣維其傷矣比也苕陵苕也本草云即今之紫葳蔓生附於喬木之上其華黃赤色亦名凌霄詩人自以身逢周室之衰如苕附物而生雖榮不久故以為比而自言其心之憂傷也苕之華其葉青青音精知我如此不如無生叶桑經反比也青青盛貌然亦何能久哉牂音臧羊墳音焚首三星在罶音柳人可以食鮮上聲可以飽叶補苟反賦也牂羊牝羊也墳大也羊瘠則首大也罶笱也罶中無魚而水靜但見三星之光而已言饑饉之餘百物雕耗如此苟且得食足矣豈可望其飽哉苕之華三章章四句陳氏曰此詩其辭簡其情哀周室將亡不可救矣詩人傷之而已何草不黃何日不行叶户郎反何人不將經營四方興也草衰則黃將亦行也周室將亡征役不息行者苦之故作此詩言何草而不黃何日而不行何人而不將以經營於四方也哉何草不𤣥叶胡勻反何人不矜音鰥哀我征夫獨為匪民興也𤣥赤黑色也既黃而𤣥也無妻曰矜言從役過時而不得歸失其室家之樂也哀我征夫豈獨為匪民哉匪兕匪虎率彼曠野叶上與反哀我征夫朝夕不暇叶後五反賦也率循也曠空也言征夫非兕非虎何為使之循曠野而朝夕不得閒暇也有芃音蓬者狐與車叶率彼幽草有棧士板反之車行彼周道興也芃尾長貌棧車役車也周道大道也言不得休息也何草不黃四章章四句都人士之什十篇四十三章二百句詩經集傳卷五
