body:
  text: 詩經集傳卷六宋朱子撰大雅三說見小雅文王之什三之一文王在上於音烏下同昭于天叶鐵因反周雖舊邦其命維新有周不顯帝命不時叶上紙反文王陟降在帝左右叶羽已反賦也於歎辭昭明也命天命也不顯猶言豈不顯也帝上帝也不時猶言豈不時也左右旁側也周公追述文王之德明周家所以受命而代商者皆由於此以戒成王此章言文王既沒而其神在上昭明于天是以周邦雖自后稷始封千有餘年而其受天命則自今始也夫文王在上而昭于天則其德顯矣周雖舊邦而命則新則其命時矣故又曰有周豈不顯乎帝命豈不時乎蓋以文王之神在天一升一降無時不在上帝之左右是以子孫蒙其福澤而君有天下也春秋傳天王追命諸侯之辭曰叔父陟恪在我先王之左右以佐事上帝語意與此正相似或疑恪亦降字之誤理或然也亹亹音尾文王令聞音問不已陳錫哉周侯文王孫子叶奬里反文王孫子本支百世凡周之士不顯亦世賦也亹亹强勉之貌令聞善譽也陳猶敷也哉語辭侯維也本宗子也支庶子也文王非有所勉也純亦不已而人見其若有所勉耳其德不已故今既沒而其令聞猶不已也令聞不已是以上帝敷錫于周維文王孫子則使之本宗百世為天子攴庶百世為諸侯而又及其臣子使凡周之士亦世世修德與周匹休焉世之不顯厥猶翼翼思皇多士生此王國叶于逼反王國克生維周之楨音貞濟濟上聲多士文王以寧賦也猶謀翼翼勉敬也思語辭皇美楨幹也濟濟多貌此承上章而言其傳世豈不顯乎而其謀猷皆能勉敬如此也美哉此衆多之賢士而生於此文王之國也文王之國能生此衆多之士則足以為國之幹而文王亦賴以為安矣蓋言文王得人之盛而宜其傳世之顯也穆穆文王於緝熙敬止假上聲哉天命有商孫子商之孫子其麗不億上帝既命侯于周服叶蒲北反賦也穆穆深逺之意緝續熙明亦不已之意止語辭假大麗數也不億不止於億也侯維也言穆穆然文王之德不已其敬如此是以天命集焉以有商孫子觀之則可見矣蓋商之孫子其數不止於億然以上帝之命集於文王而今皆維服于周矣侯服于周天命靡常殷士膚敏祼音灌將于京叶居良反厥作祼將常服黼音甫冔音許王之藎音盡臣無念爾祖賦也諸侯之大夫入天子之國曰某士則殷士者商孫子之臣屬也膚美敏疾也祼灌鬯也將行也酌而送之也京周之京師也黼黼裳也冔殷冠也蓋先代之後統承先王修其禮物作賓於王家時王不敢變焉而亦所以為戒也王指成王也藎進也言其忠愛之篤進進無已也無念猶言豈得無念也爾祖文王也言商之孫子而侯服于周以天命之不可常也故殷之士助祭于周京而服商之服也於是呼王之藎臣而告之曰得無念爾祖文王之德乎蓋以戒王而不敢斥言猶所謂敢告僕夫云爾劉向曰孔子論詩至於殷士膚敏祼將于京喟然歎曰大哉天命善不可不傳於後嗣是以富貴無常蓋傷微子之事周而痛殷之亡也無念爾祖聿修厥德永言配命自求多福叶筆力反殷之未喪去聲師克配上帝宜鑒于殷駿音峻命不易去聲賦也聿發語辭永長配合也命天理也師衆也上帝天之主宰也駿大也不易言其難也言欲念爾祖在於自修其德而又常自省察使其所行無不合於天理則盛大之福自我致之冇不外求而得矣又言殷未失天下之時其德足以配乎上帝矣今其子孫乃如此宜以為鑒而自省焉則知天命之難保矣大學傳曰得衆則得國失衆則失國此之謂也命之不易無遏爾躬叶姑𢎞反宣昭義問有虞殷自天叶鐵因反上天之載無聲無臭叶初尤反儀刑文王萬邦作孚叶房尤反賦也遏絶宣布昭明義善也問聞通有又通虞度載事儀象刑法孚信也言天命之不易保故告之使無若紂之自絶於天而布明其善譽於天下又度殷之所以廢興者而折之於天然上天之事無聲無臭不可得而度也惟取法於文王則萬邦作而信之矣子思子曰維天之命於穆不已蓋曰天之所以為天也於乎不顯文王之德之純蓋曰文王之所以為文也純亦不已犬知天之所以為天又知文王之所以為文則夫與天同德者可得而言矣是詩首言文王在上於昭于天文王陟降在帝左右而終之以此其㫖深矣文王七章章八句東萊吕氏曰吕氏春秋引此詩以為周公所作味其辭意信非周公不能作也今按此詩一章言文王有顯德而上帝有成命也二章言天命集於文王則不唯尊榮其身又使其子孫百世為天子諸侯也三章言命周之福不唯及其子孫而又及其羣臣之後嗣也四章言天命既絶於商則不唯誅罰其身又使其子孫亦來臣服于周也五章言絶商之禍不唯及其子孫而又及其羣臣之後嗣也六章言周之子孫臣庶當以文王為法而以商為監也七章又言當以商為監而以文王為法也其於天人之際興亡之理丁寧反覆至深切矣故立之樂官而因以為天子諸侯朝㑹之樂蓋將以戒乎後世之君臣而又以昭先王之德於天下也國語以為兩君相見之樂特舉其一端而言耳然此詩之首章言文王之昭于天而不言其所以昭次章言其令聞不已而不言其所以聞至於四章然後所以昭明而不己者乃可得而見焉然亦多詠歎之言而語其所以為德之實則不越乎敬之一字而已然則後章所謂修厥德而儀刑之者豈可以他求哉亦勉於此而已矣明明在下赫赫在上叶辰羊反天難忱音諶斯不易去聲維王天位殷適音的使不挾子燮反四方賦也明明德之明也赫赫命之顯也忱信也不易難也天位天子之位也殷適殷之適嗣也挾有也此亦周公戒成王之詩將陳文武受命故先言在下者有明明之德則在上者有赫赫之命達於上下去就無常此天之所以難忱而為君之所以不易也紂居天位為殷嗣乃使之不得挾四方而有之蓋以此爾摯音至仲氏任音壬自彼殷商來嫁于周曰嬪音貧于京叶居良反乃及王季維德之行叶戶郎反大音泰任有身叶尸羊反生此文王賦也摯國名仲中女也任摯國姓也殷商商之諸侯也嬪婦也京周京也曰嬪于京疊言以釋上句之意猶曰釐降二女于媯汭嬪于虞也王季文王父也身懷孕也將言文王之聖而追本其所從來者如此蓋曰自其父母而已然矣維此文王小心翼翼昭事上帝聿懷多福叶筆力反厥德不回以受方國叶越逼反賦也小心翼翼恭慎之貌即前篇之所謂敬也文王之德於此為盛昭明懷來回邪也方國四方來附之國也天監在下有命既集叶昨合反文王初載天作之合在洽之陽在渭之涘音士叶羽已反文王嘉止大邦有子叶奬里反賦也監視集就載年合配也洽水名本在今同州郃陽夏陽縣今流已絶故去水而加邑渭水亦徑此入河也嘉昏禮也大邦莘國也子大姒也將言武王伐商之事故此又推其本而言天之監照實在於下其命既集於周矣故於文王之初年而默定其配所以洽陽渭涘當文王將昏之期而大邦有子也蓋曰非人之所能為矣大邦有子俔牽遍反天之妹文定厥祥親迎去聲于渭造舟為梁不顯其光賦也俔磬也韓詩作磬說文云俔譬也孔氏曰如今俗語譬喻物曰磬作然也文禮祥吉也言卜得吉而以納幣之禮定其祥也造作梁橋也作船於水比之而加版於其上以通行者即今之浮橋也傳曰天子造舟諸侯維舟大夫方舟士特舟張子曰造舟為梁文王所制而周世遂以為天子之禮也不顯顯也有命自天命此文王于周于京叶居良反纘女維莘長上聲子維行叶户郎反篤生武王保右音祐命爾燮伐大商賦也纘繼也莘國名長子長女大姒也行嫁篤厚也言既生文王而又生武王也右助燮和也言天既命文王於周之京矣而克纘大任之女事者維此莘國以其長女來嫁于我也天又篤厚之使生武王保之助之命之而使之順天命以伐商也殷商之旅其㑹如林矢于牧野維豫侯興叶音歆上帝臨女音汝無二爾心賦也如林言衆也書曰受率其旅若林矢陳也牧野在朝歌南七十里侯維二疑也爾武王也此章言武王伐紂之時紂衆㑹集如林以拒武王而皆陳于牧野則維我之師為有興起之勢耳然衆心猶恐武王以衆寡之不敵而有所疑也故勉之曰上帝臨女無二爾心蓋知天命之必然而贊其決也然武王非必有所疑也設言以見衆心之同非武王之得已耳牧野洋洋檀車煌煌駟騵音元彭彭叶鋪郎反維師尚父時維鷹揚涼音亮彼武王肆伐大商㑹朝清明叶謨郎反賦也洋洋廣大之貌檀堅木宜為車者也煌煌鮮明貌駵馬白腹曰騵彭彭强盛貌師尚父太公望為大師而號尚父也鷹揚如鷹之飛揚而將擊言其猛也涼漢書作亮佐助也肆縱兵也㑹朝㑹戰之旦也此章言武王師衆之盛將帥之賢伐商以除穢濁不崇朝而天下清明所以終首章之意也大明八章四章章六句四章章八句名義見小旻篇一章言天命無常惟德是與二章言王季大任之德以及文王三章言文王之德四章五章六章言文王大姒之德以及武王七章言武王伐紂八章言武王克商以終首章之意其章以六句八句相間又國語以此及下篇皆為兩君相見之樂說見上篇綿綿瓜瓞音垤民之初生自土沮音疽漆音七古公亶父音甫陶音桃復音福陶穴叶户橘反未有家室比也綿綿不絶貌大曰瓜小曰瓞瓜之近本初生者常小其蔓不絶至末而後大也民周人也自從土地也沮漆二水名在豳地古公號也亶父名也或曰字也後乃追稱大王焉陶窰竈也復重窰也穴土室也家門內之通名也豳地近西戎而苦寒故其俗如此此亦周公戒成王之詩追述大王始遷岐周以開王業而文王因之以受天命也此其首章言瓜之先小後大以比周人始生於漆沮之上而古公之時居於窰竈土室之中其國甚小至文王而後大也古公亶父來朝走馬叶滿補反率西水滸音虎至于岐下叶後五反爰及姜女聿來胥宇賦也朝早也走馬避狄難也滸水崖也漆沮之側也岐下岐山之下也姜女大王妃也胥相宇宅也孟子曰太王居邠狄人侵之事之以皮幣珠玉犬馬而不得免乃屬其耆老而告之曰狄人之所欲者吾土地也吾聞之也君子不以其所以養人者害人二三子何患乎無君我將去之去邠踰梁山邑于岐山之下居焉邠人曰仁人也不可失也從之者如歸市周原膴膴音武堇音謹荼如飴音移爰始爰謀叶謀悲反爰契音器我龜曰止曰時築室于茲叶津之反賦也周地名在岐山之南廣平曰原膴膴肥美貌蓳烏頭也荼苦菜蓼屬也飴餳也契所以然火而灼龜者也儀禮所謂楚焞是也或曰以刀刻龜甲欲鑽之處也言周原土地之美雖物之苦者亦甘於是大王始與豳人之從已者謀居之又契龜而卜之既得吉兆乃告其民曰可以止於是而築室矣或曰時謂土功之時也乃慰乃止乃左乃右叶羽已反乃疆乃理乃宣乃畝叶滿彼反自西徂東周爰執事叶上止反賦也慰安止居也左右東西列之也疆謂畫其大界理謂别其條理也宣布散而居也或曰導其溝洫也畝治其田疇也自西徂東自西水滸而徂東也周遍也言靡事不為也乃召司空乃召司徒俾立室家叶古胡反其繩則直縮音蹜版以載叶節力反作廟翼翼賦也司空掌營國邑司徒掌徒役之事繩所以為直几營度位處皆先以繩正之既正則束版而築也縮束也載上下相承也言以索束版投土築訖則升下而上以相承載也君子將營宫室宗廟為先廄庫為次居室為後翼翼嚴正也救音俱之陾陾音仍度入聲之薨薨築之登登削屢馮馮音慿百堵皆興鼛音臯鼓弗勝賦也救盛土於器也陾陾衆也度投土於版也薨薨衆聲也登登相應聲削屢牆成而削治重復也馮馮牆堅聲五版為堵興起也此言治宫室也鼛鼓長一丈二尺以鼓役事弗勝者言其樂事勸功鼓不能止也乃立臯門臯門有伉音抗叶苦郎反乃立應門應門將將音搶乃立冡土戎醜攸行叶戶郎反賦也傳曰王之郭門曰臯門伉髙貌王之正門曰應門將將嚴正也大王之時未有制度特作二門其名如此及周有天下遂尊以為天子之門而諸侯不得立焉冡土大社也亦大王所立而後因以為天子之制也戎醜大衆也起大事動大衆必有事乎社而後出謂之宜肆不殄音佃厥愠亦不隕音尹厥問柞音昨棫音域拔音佩矣行道兌吐外反矣混音昆夷駾音隊矣維其喙音諱矣賦也肆故今也猶言遂也承上起下之辭殄絶愠怒隕墜也間聞通謂聲譽也柞櫟也枝長葉盛叢生有刺棫白桵也小木亦叢生有刺拔挺拔而上不拳曲蒙密也兌通也始通道於柞棫之間也駾突喙息也言大王雖不能殄絶混夷之愠怒亦不隕墜已之聲聞蓋雖聖賢不能必人之不怒已但不廢其自修之實耳然大王始至此岐下之時林木深阻人物鮮少至於其後生齒漸繁歸附日衆則木拔道通混夷畏之而奔突竄伏維其喙息而已言德盛而混夷自服也蓋已為文王之時矣虞芮質厥成文王蹶音愧厥生叶桑經反豫曰有疏附叶上聲豫曰有先去聲後去聲叶下五反豫曰有奔奏音走叶宗五反豫曰有禦侮賦也虞芮二國名質正成平也傳曰虞芮之君相與爭田久而不平乃相與朝周入其境則耕者讓畔行者讓路入其邑男女異路斑白者不提挈入其朝士讓為大夫大夫讓為卿二國之君感而相謂曰我等小人不可以履君子之境乃相讓以其所爭田為閒田而退天下聞之而歸者四十餘國蘇氏曰虞在陜之平陸芮在同之馮翊平陸有間原焉則虞芮之所讓也蹶生未詳其義或曰蹶動而疾也生猶起也豫詩人自豫也率下親上曰疏附相道前後曰先後喻德宣譽曰奔奏武臣折衝曰禦侮言混夷既服而虞芮來質其訟之成於是諸侯歸周者衆而文王由此動其興起之勢是雖其德之盛然亦由有此四臣之助而然故各以豫曰起之其辭繁而不殺者所以深歎其得人之盛也綿九章章六句一章言在豳二章言至岐三章言定宅四章言授田居民五章言作宗廟六章言治宫室七章言作門社八章言至文王而服混夷九章遂言文王受命之事餘說見上篇芃芃音蓬棫音域朴音卜薪之槱音酉之濟濟上聲辟音璧王左右趣叶此苟反之興也芃芃木盛貌朴叢生也言根枝迫迮相附著也槱積也濟濟容貌之美也辟君也君王謂文王也此亦以詠歌文王之德言芃芃棫朴則薪之槱之矣濟濟辟王則左右趣之矣蓋德盛而人心歸附趣向之也濟濟辟王左右奉璋奉璋峩峩髦士攸宜叶牛何反賦也半圭曰璋祭祀之禮王祼以圭瓚諸臣助之亞祼以璋瓚左右奉之其判在內亦有趣向之意峩峩盛壯也髦俊也渒音譬彼涇音經舟蒸徒楫音接叶籍入反之周王于邁六師及之興也渒舟行貌涇水名蒸衆楫櫂于往邁行也六師六軍也言渒彼涇舟則舟中之人無不楫之周王于邁則六師之衆追而及之蓋衆歸其德不令而從也倬音卓彼雲漢為章于天叶鐵因反周王壽考遐不作人興也倬大也雲漢天河也在箕斗二星之間其長竟天章文章也文王九十七乃終故言壽考遐與何同作人謂變化鼓舞之也追音堆琢音卓其章金玉其相勉勉我王綱紀四方興也追雕也金曰雕玉曰琢相質也勉勉猶言不已也凡網罟張之為綱理之為紀追之琢之則所以美其文者至矣金之玉之則所以美其質者至矣勉勉我王則所以綱紀乎四方者至矣棫朴五章章四句此詩前三章言文王之德為人所歸後二章言文王之德有以振作綱紀天下之人而人歸之自此以下至假樂皆不知何人所作疑多出於周公也瞻彼旱麓音鹿榛楛音戶濟濟上聲豈弟君子干祿豈弟興也旱山名麓山足也榛似栗而小楛似荆而赤濟濟衆多也豈弟樂易也君子指文王也此亦以詠歌文王之德言旱山之麓則榛楛濟濟然矣豈弟君子則其干祿也豈弟矣干祿豈弟言其干祿之有道猶曰其爭也君子云爾瑟彼玉瓚才旱反黃流在中豈弟君子福祿攸降叶呼攻反金興也瑟縝密貌玉瓚圭瓚也以圭為柄黃金為勺青為外而朱其中也黃流鬱鬯也釀秬黍為酒築鬱金煮而和之使芬芳條鬯以瓚酌而祼之也攸所降下也言瑟然之玉瓚則必有黃流在其中豈弟之君子則必有福祿下其躬明寶器不薦於䙝味而黃流不注於瓦缶則知盛德必享於祿壽而福澤不降於淫人矣鳶音沿飛戾天叶鐵因反魚躍于淵叶一均反豈弟君子遐不作人興也鳶鴟類戾至也李氏曰枹朴子曰鳶之在下無力及至乎上聳身直翅而已蓋鳶之飛全不用力亦如魚躍怡然自得而不知其所以然也遐何通言鳶之飛則戾于天矣魚之躍則出于淵矣豈弟君子而何不作人乎言其必作人也清酒既載叶飾力反騂音觪牡既備叶蒲北反以享以祀叶逸織反以介景福叶筆力反賦也載在尊也備全具也承上章言有豈弟之德則祭必受福也瑟彼柞棫民所燎矣豈弟君子神所勞去聲矣興也瑟茂密貌燎爨也或曰熂燎除其旁草使木茂也勞慰撫也莫莫葛藟音壘施音異于條枚音梅豈弟君子求福不回興也莫莫盛貌回邪也旱麓六章章四句思齊音齊大任文王之母思媚周姜京室之婦音阜大姒嗣徽音則百斯男叶尼心反賦也思語辭齊莊媚愛也周姜大王之妃大姜也京周也大姒文王之妃也徽美也百男舉成數而言其多也此詩亦歌文王之德而推本言之曰此莊敬之大任乃文王之母實能媚於周姜而稱其為周室之婦至於大姒又能繼其美德之音而子孫衆多上有聖母所以成之者逺內有賢妃所以助之者深也惠于宗公神罔時怨神罔時恫音通刑于寡妻至于兄弟以御音迓于家邦叶卜工反賦也惠順也宗公宗廟先公也恫痛也刑儀法也寡妻猶言寡小君也御迎也言文王順于先公而鬼神歆之無怨恫者其儀法內施於閨門而至于兄弟以御于家邦也孔子曰家齊而後國治孟子曰言舉斯心加諸彼而已張子曰言接神人各得其道也雍雍音雍在宫肅肅在廟叶音貌不顯亦臨無射音亦亦保叶音鮑賦也雍雍和之至也肅肅敬之至也不顯幽隱之處也射與斁同厭也保猶守也言文王在閨門之內則極其和在宗廟之中則極其敬雖居幽隱亦常若有臨之者雖無厭射亦常有所守焉其純亦不已蓋如是肆戎疾不殄烈假上聲不瑕不聞亦式不諫亦入賦也肆故今也戎大也疾猶難也大難如羑里之囚及昆夷獫狁之屬也殄絶烈光假大瑕過也此兩句與不殄厥愠不隕厥問相表裏聞前聞也式法也承上章言文王之德如此故其大難雖不殄絶而光大亦無玷缺雖事之無所前聞者而亦無不合於法度雖無諫諍之者而亦未嘗不入於善傳所謂性與天合是也肆成人有德小子有造古之人無斁音亦譽髦斯士賦也冠以上為成人小子童子也造為也古之人指文王也譽名髦俊也承上章言文王之德見於事者如此故一時人材皆得其所成就蓋由其德純而不已故令此士皆有譽於天下而成其俊又之美也思齊五章二章章六句三章章四句皇矣上帝臨下有赫叶黑各反監觀四方求民之莫維此二國其政不獲叶胡郭反維彼四國爰究爰度入聲上帝耆之憎其式廓乃眷西顧此維與宅叶達各反賦也皇大臨視也赫威明也監亦視也莫定也二國夏商也不獲謂失其道也四國四方之國也究尋度謀也耆憎式廓未詳其義或曰耆致也憎當作增式廓猶言規模也此謂岐周之地也此詩叙大王大伯王季之德以及文王伐密伐崇之事也此其首章先言天之臨下甚明但求民之安定而已彼夏商之政既不得矣故求於四方之國苟上帝之所欲致者則增大其疆境之規模於是乃眷然顧視西土以此岐周之地與大王為居宅也作之屏音丙之其菑音緇其翳音意修之平之其灌其栵音例啓之辟音闢之其柳其椐音居叶紀庶反攘之剔之其檿音厭其柘叶都故反帝遷明德串音貫夷載路天立厥配受命既固賦也作拔起也屏去之也菑木立死者也翳自斃者也或曰小木蒙密蔽翳者也修平皆治之使疏密正直得宜也灌叢生者也栵行生者也啓辟芟除也柳河栁也似楊赤色生河邊椐匱也腫節似扶老可為杖者也攘剔謂穿剔去其繁冗使成長也檿山桑也與柘皆美材可為弓幹又可蠶也明德謂明德之君即大王也串夷載路未詳或曰串夷即昆夷載路謂滿路而去所謂昆夷駾矣者也配賢妃也謂大姜此章言大王遷於岐周之事蓋岐周之地本皆山林險阻無人之境而近於昆夷大王居之人物漸盛然後漸次開闢如此乃上帝遷此明德之君使居其地而昆夷逺遁天又為之立賢妃以助之是以受命堅固而卒成王業也帝省其山柞棫斯拔音佩松柏斯兌徒外反帝作邦作對自大音泰伯王季維此王季因心則友叶羽已反則友其兄叶虛王反則篤其慶叶祛羊反載錫之光受祿無喪去聲叶平聲奄有四方賦也拔兌見綿篇此亦言其山林之間道路通也對猶當也作對言擇其可當此國者以君之也大伯大王之長子王季大王之少子也因心非勉强也善兄弟曰友兄謂大伯也篤厚載則也奄字之義在忽遂之閒言帝省其山而見其木拔道通則知民之歸之者益衆矣於是既作之邦又與之賢君以嗣其業蓋自其初生大伯王季之時而已定矣於是大伯見王季生文王又知天命之有在故適吳不反大王沒而國傳於王季及文王而周道大興也然以大伯而避王季則王季疑於不友故又特言王季所以友其兄者乃因其心之自然而無待於勉强既受大伯之讓則益修其德以厚周家之慶而與其兄以讓德之光猶曰彰其知人之明不為徒讓耳其德如是故能受天祿而不失至於文武而奄有四方也維此王季帝度入聲其心貊音麥其德音其德克明克明克類克長克君王如字去聲此大邦克順克比音匕比去聲于文王其德靡悔叶虎洧反既受帝祉施音異于孫子叶奬里反賦也度能度物制義也貊春秋傳樂記皆作莫謂其莫然清靜也克明能察是非也克類能分善惡也克長教誨不倦也克君賞慶刑威也言其賞不僭故人以為慶刑不濫故人以為威也順慈和遍服也比上下相親也比于至于也悔遺恨也言上帝制王季之心使有尺寸能度義又清靜其德音使無非間之言是以王季之德能此六者至於文王而其德尤無遺恨是以既受上帝之福而延及于子孫也帝謂文王無然畔援音院無然歆羡誕先登于岸叶魚戰反密人不恭敢距大邦叶卜攻反侵阮徂共音恭王赫斯怒叶暖五反爰整其旅以按音遏徂旅以篤周祜音戶以對于天下叶後五反賦也帝謂文王設為天命文王之辭如下所言也無然猶言不可如此也畔離畔也援攀援也言舍此而取彼也歆欲之動也羡愛慕也言肆情以徇物也岸道之極至處也密密須氏也姞姓之國在今寧州阮國名在今涇州徂往也共阮國之地名今涇州之共池是也其旅周師也按遏也徂旅密師之往共者也祜福對答也人心有所畔援有所歆羡則溺於人欲之流而不能以自濟文王無是二者故獨能先知先覺以造道之極至蓋天實命之而非人力之所及也是以密人不恭敢違其命而擅興師旅以侵阮而往至于共則赫怒整兵而往遏其衆以厚周家之福而答天下之心蓋亦因其可怒而怒之初未嘗有所畔援歆羡也此文王征伐之始也依其在京叶居良反侵自阮疆陟我髙岡無矢我陵我陵我阿無飲我泉我泉我池叶徒何反度其鮮原居岐之陽在渭之將萬邦之方下民之王賦也依安貌京周京也矢陳鮮善將側方鄉也言文王安然在周之京而所整之兵既遏密人遂從阮疆而出以侵密所陟之岡即為我岡而人無敢陳兵於陵飲水於泉以拒我也於是相其髙原而徙都焉所謂程邑也其地於漢為扶風安陵今在京兆府咸陽縣帝謂文王豫懷明德不大聲以色不長夏以革不識不知順帝之則帝謂文王詢爾仇方同爾兄弟以爾鉤援音爰與爾臨衝以伐崇墉賦也豫設為上帝之自稱也懷春念也明德文王之明德也以猶與也夏革未詳則法也仇方讎國也兄弟與國也鉤援鉤梯也所以鉤引上城所謂雲梯者也臨臨車也在上臨下者也衝衝車也從旁衝突者也皆攻城之具也崇國名在今京兆府鄠縣墉城也史記崇侯虎譖西伯於紂紂囚西伯於羑里西伯之臣閎夭之徒求美女奇物善馬以獻紂紂乃赦西伯賜之弓矢鈇鉞得專征伐曰譖西伯者崇侯虎也西伯歸三年伐崇侯虎而作豐邑言上帝眷念文王而言其德之深微不暴著其形迹又能不作聰明以循天理故又命之以伐崇也吕氏曰此言文王德不形而功無迹與天同體而已雖興兵以伐崇莫非順帝之則而非我也臨衝間間叶胡員反崇墉言言執訊音信連連攸馘音虢安安叶於肩反是類是禡音罵是致是附叶上聲四方以無侮臨衝茀茀音弗叶分聿反崇墉仡仡音屹是伐是肆是絶是忽叶虛屈反四方以無拂叶分聿反賦也間間徐緩也言言高大也連連屬續狀馘割耳也軍法獲者不服則殺而獻其左耳安安不輕暴也類將出師祭上帝也禡至所征之地而祭始造軍法者謂黃帝及蚩尤也致致其至也附使之來附也茀茀强盛貌仡仡堅壯藐肆縱兵也忽滅拂戻也春秋傳曰文王伐崇三旬不降退修教而復伐之因壘而降言文王伐崇之初緩攻徐戰告祀羣神以致附來者而四方無不畏服及終不服則縱兵以滅之而四方無不順從也夫始攻之緩戰之徐也非力不足也非示之弱也將以致附而全之也及其終不下而肆之也則天誅不可以留而罪人不可以不得故也此所謂文王之師也皇矣八章章十二句一章二章言天命大王三章四章言天命王季五章六章言天命文王伐密七章八章言天命文王伐崇經始靈臺叶田飴反經之營之庶民攻之不日成之經始勿亟音棘庶民子來叶六直反賦也經度也靈臺文王所作謂之靈者言其倐然而成如神靈之所為也營表攻作也不日不終日也亟急也國之有臺所以望氛祲察災祥時觀游節勞佚也文王之臺方其經度營表之際而庶民已來作之所以不終日而成也雖文王心恐煩民戒令勿亟而民心樂之如子趣父事不召自來也孟子曰文王以民力為臺為沼而民歡樂之謂其臺曰靈臺謂其沼曰靈沼此之謂也王在靈囿叶音郁麀音憂鹿攸伏麀鹿濯濯音擢白鳥翯翯音鶴王在靈沼叶音灼於音烏牣音刃魚躍賦也靈囿臺之下有囿所以域養禽獸也麀牝鹿也伏言安其所處不驚擾也濯濯肥澤貌翯翯潔白貌靈沼囿之中冇沼也牣滿也魚滿而躍言多而得其所也虡音巨業維樅音匆賁音焚鼓維鏞音庸於論平聲鼓鐘於樂音洛辟音璧雍賦也虡植木以懸鐘磬其橫者曰栒業栒上大版刻之􅚃業如鋸齒者也樅業上懸鐘磬處以綵色為崇牙其狀樅樅然者也賁大鼓也長八尺鼓四尺中圍加三之一鏞大鐘也論倫也言得其倫埋也辟璧通雍澤也辟雍天子之學大射行禮之處也水旋丘如璧以節觀者故曰辟雍於論鼓鐘於樂辟雍鼉音䭾鼓逢逢音蓬矇音蒙瞍音叟奏公賦也鼉似蜥蜴長丈餘皮可冒鼓逢逢和也有眸子而無見曰矇無眸子曰瞍古者樂師皆以瞽者為之以其善聽而審於音也公事也聞鼉鼓之聲而知矇瞍方奏其事也靈臺四章二章章六句二章章四句東萊吕氏曰前二章樂文王有臺池鳥獸之樂也後二章樂文王有鐘鼓之樂也皆述民樂之辭也下武維周世有哲王三后在天王配于京叶居良反賦也下義未詳或曰字當作文言文王武王實造周也哲王通言大王王季也三后大王王季文王也在天既沒而其精神上與天合也王武王也配對也謂繼其位以對三后也京鎬京也此章美武王能纘大王王季文王之緒而有天下也王配于京世德作求永言配命成王之孚叶孚尤反賦也言武王能繼先王之德而長言合於天理故能成王者之信於天下也若暫合而遽離暫得而遽失則不足以成其信矣成王之孚下土之式永言孝思孝思維則賦也式則皆法也言武王所以能成王者之信而為四方之法者以其長言孝思而不忘是以其孝可為法耳若有時而忘之則其孝者僞耳何足法哉媚茲一人應侯順德永言孝思昭哉嗣服叶蒲北反賦也媚愛也一人謂武王應如丕應徯志之應侯維服事也言天下之人皆愛戴武王以為天子而所以應之維以順德是武王能長言孝思而明哉其嗣先王之事也昭茲來許繩其祖武於萬斯年受天之祜音戶賦也昭茲承上句而言茲哉聲相近古蓋通用也來後世也許猶所也繩繼武迹也言武王之道昭明如此來世能繼其迹則久荷天祿而不替矣受天之祜四方來賀於萬斯年不遐有佐賦也賀朝賀也周末秦强天子致胙諸侯皆賀遐何通佐助也蓋曰豈不有助乎云爾下武六章章四句或疑此詩有成王字當為康王以後之詩然考尋文意恐當只如舊說且其文體亦與上下篇血脈通貫非有誤也文王有聲通音聿駿音峻有聲遹求厥寧遹觀厥成文王蒸哉賦也遹義未詳疑與聿同發語辭駿大蒸君也此詩言文王遷豐武王遷鎬之事而首章推本之曰文王之有聲也甚大乎其有聲也蓋以求天下之安寧而觀其成功耳文王之德如足信乎其克君也哉文王受命有此武功既伐于崇作邑于豐文王蒸哉賦也伐崇事見皇矣篇作邑徙都也豐即崇國之地在今鄠縣杜陵西南築城伊淢音洫作豐伊匹匪棘其欲遹追來孝叶許六反或呼侯反王后蒸哉賦也淢城溝也方十里為成成間有溝深廣各八尺匹稱棘急也王后亦指文王也言文王營豐邑之城因舊溝為限而築之其作邑居亦稱其城而不侈大皆非急成已之所欲也特追先人之志而來致其孝耳王公伊濯維豐之垣音袁四方攸同王后維翰叶胡田反王后蒸哉賦也公功也濯著明也王之功所以著明者以其能築此豐之垣故爾四方於是來歸而以文王為楨幹也豐水東注維禹之績四方攸同皇王維辟皇王蒸哉賦也豐水東北流徑豐邑之東入渭而注于河績功也皇王有天下之號指武王也辟君也言豐水東注由禹之功故四方得以來同於此而以武王為君此武王未作鎬京時也鎬京辟雍自西自東自南自北無思不服叶蒲北反皇王蒸哉賦也鎬京武王所營也在豐水東去豐邑二十五里張子曰周家自后稷居邰公劉居豳大王邑岐而文王則遷于豐至武王又居于鎬當是時民之歸者日衆其地有不能容不得不遷也辟雍說見前篇張子曰靈臺辟雍文王之學也鎬京辟雍武王之學也至此始為天子之學矣無思不服心服也孟子曰天下不心服而玉者未之有也此言武王徙居鎬京講學行禮而天下自服也考卜維王宅是鎬京叶居良反維龜正叶諸盈反之武王成之武王蒸哉賦也考稽宅居正決也成之作邑居也張子曰此舉諡者追述其事之言也豐水有芑武王豈不仕詒厥孫謀以燕翼子叶奬里反武王蒸哉興也芑草名仕事詒遺燕安翼敬也子成王也鎬京猶在豐水下流故取以起興言豐水猶冇芑武王豈無所事乎詒厥孫謀以燕翼子則武王之事也謀及其孫則子可以無事矣或曰賦也言豐水之旁生物繁茂武王豈不欲冇事於此哉但以欲遺孫謀以安翼子故不得而不遷耳文王有聲八章章五句此詩以武功稱文王至于武王則言皇王維辟無思不服而已蓋文王既造其始則武王續而終之無難也又以見文王之文非不足於武而武王之有天下非以力取之也文王之什十篇六十六章四百一十四句鄭譜此以上為文武時詩以下為成王周公時詩今按文王首句即云文王在上則非文王之詩矣又曰無念爾祖則非武王之詩矣大明有聲并言文武者非一安得為文武之時所作乎蓋正雅皆成王周公以後之詩但此什皆為追述文武之德故譜因此而誤耳生民之什三之二厥初生民時維姜嫄音原叶魚倫反生民如何克禋音因克祀叶養里反以弗無子叶奬里反履帝武敏叶母鄙反歆攸介攸止載震載夙叶相即反載生載育叶曰逼反時維后稷賦也民人也謂周人也時是也姜嫄炎帝後姜姓有邰氏女名嫄為高辛之世妃精意以享謂之禋祀祀郊禖也弗之言祓也祓無子求有子也古者立郊禖蓋祭天於郊而以先媒配也變媒言禖者神之也其禮以𤣥鳥至之日用大牢祀之天子親往后率九嬪御乃禮天子所御帶以弓韣授以弓矢于郊禖之前也履踐也帝上帝也武迹敏栂歆動也猶驚異也介大也震娠也夙肅也生子者及月辰居側室也育養也姜嫄出祀郊禖見大人跡而履其拇遂歆歆然如有人道之感於是即其所大所止之處而震動有娠乃周人所由以生之始也周公制禮尊后稷以配天故作此詩以推本其始生之祥明其受命於天固有以異於常人也然巨跡之說先儒或頗疑之而張子曰天地之始固未嘗先有人也則人固冇化而生者矣蓋天地之氣生之也蘇氏亦曰凡物之異於常物者其取天地之氣常多故其生也或異麒麟之生異於犬羊蛟龍之生異於魚鱉物固有然者矣神人之生而有以異於人何足怪哉斯言得之矣誕彌厥月先生如達音闥不坼音拆不副音劈叶孚迫反無菑音災無害叶音曷以赫厥靈上帝不寧不康禋祀叶養里反居然生子叶奬里反賦也誕發語辭彌終也終十月之期也先生首生也逹小羊也羊子易生無留難也坼副皆裂也赫顯也不寧寧也不康康也居然猶徒然也凡人之生必圻副災害其母而首生之子尤難今姜嫄首生后稷如羊子之易無坼副災害之苦是顯其靈異也上帝豈不寧乎豈不康我之禋祀乎而使我無人道而徒然生是子也誕置之隘巷牛羊腓音肥字之誕置之平林㑹伐平林誕置之寒冰鳥覆去聲翼音異之鳥乃去矣后稷呱叶去聲矣實覃實訏叶去聲厥聲載路賦也隘狹腓芘字愛㑹值也值人伐木而收之覆蓋翼藉也以一翼覆之以一翼藉之也呱啼聲也覃長訏大載滿也滿路言其聲之大也無人道而生子或者以為不祥故棄之而有此異也於是始收而養之誕實匍音蒲匐克岐克嶷以就口食藝之荏音飪菽荏菽旆旆禾役穟穟音遂麻麥幪幪莫孔反瓜瓞唪唪音蚌賦也匍匐手足並行也岐嶷峻茂之狀就向也口食自能食也蓋六七歲時也藝樹也荏菽大豆也旆旆枝旟揚起也役列也穟穟苗美好之貌也幪幪然茂密也唪唪然多實也言后稷能食時已有種殖之志蓋其天性然也史記曰棄為兒時其遊戲好種殖麻麥麻麥美及為成人遂好耕農堯舉以為農師誕后稷之穡有相去聲之道叶徒口反茀音弗厥豐草音苟種去聲之黃茂叶莫口反實方實苞叶蒲苟反實種上聲實褎叶徐久反實發實秀叶思久反實堅實好叶訏口反實穎實栗即有邰音台家室賦也相助也言盡人力之助也茀治也種布之也黃茂嘉榖也方房也苞甲而未拆也此漬其種也種甲拆而可為種也褎漸長也發盡發也秀始穟也堅其實堅也好形味好也穎實繁碩而垂末也栗不秕也既收成見其實皆栗栗然不秕也邰后稷之母家也豈其或滅或遷而遂以其地封后稷與言后稷之穡如此故堯以其有功於民封於邰使即其母家而居之以主姜嫄之祀故周人亦世祀姜嫄焉誕降嘉種維秬音巨維秠音痞維穈音門維芑音起恆音亘之秬秠是穫是畝叶蒲洧反恆之穈芑是任音壬是負叶扶委反以歸肇祀叶養里反賦也降降是種於民也書曰稷降播種是也秬黑黍也秠黑黍一稃二米者也穈赤粱粟也芑白粱粟也恆遍也謂遍種之也任肩任也負背負也既成則穫而棲之於畝任負而歸以供祭祀也秬秠言穫畝穈芑言任負互文耳肇始也稷始受國為祭主故曰肇祀誕我祀如何或舂或揄音由或簸波我反或蹂音柔釋之叟叟音搜蒸之浮浮載謀載惟取蕭祭脂取羝音底以軷音鈸叶蒲昧反載燔載烈如字叶力制反以興嗣歲叶音雪又如字賦也我祀承上章而言后稷之祀也揄抒臼也簸揚去糠也蹂蹂禾取榖以繼之也釋淅米也叟叟聲也浮浮氣也謀卜日擇士也惟齊戒具修也蕭蒿也脂膟膋也宗廟之祭取蕭合膟膋爇之使臭達牆屋也羝牡羊也軷祭行道之神也燔傅諸火也烈貫之而加於火也四者皆祭祀之事所以興來歲而繼往歲也卬音昻盛音成于豆于豆于登其香始升上帝居歆胡臭亶時叶上止反后稷肇祀叶養里反庶無罪悔叶呼委反以迄音肸于今賦也卭我也木曰豆以薦菹醢也瓦曰登以薦大羹也居安也鬼神食氣曰歆胡何臭香亶誠也時言得其時也庶近迄至也此章言其尊祖配天之祭其香始升而上帝已安而饗之言應之疾也此何但芳臭之薦信得其時哉蓋自后稷之肇祀則庶無罪悔而至于今矣曽氏曰自后稷肇祀以來前後相承兢兢業業惟恐一有罪悔獲戾於天閲數百年而此心不易故曰庶無罪悔以迄於今言周人世世用心如此也生民八章四章章十句四章章八句此詩未詳所用豈郊祀之後亦有受釐頒胙之禮也歟舊說第三章八句第四章十句今按第三章當為十句第四章當為八句則去呱訏路音韻諧協呱聲載路文勢通貫而此詩八章皆以十句八句相間為次又二章以後七章以前每章章之首皆有誕字敦音圑彼行葦牛羊勿踐履方苞方體維葉泥泥音禰戚戚兄弟莫逺具爾或肆之筵或授之几興也敦聚貌勾萌之時也行道也勿戒止之辭也苞甲而未拆也體成形也泥泥柔澤貌戚戚親也莫猶勿也具俱也爾與邇同肆陳也疑此祭畢而燕父兄耆老之詩故言敦彼行葦而牛羊勿踐履則方苞方體而葉泥泥矣戚戚兄弟而莫逺具爾則或肆之筵而或授之兒矣此方言其開燕設席之初而殷勤篤厚之意藹然已見於言語之外矣讀者詳之肆筵設席叶祥勺反授几有緝御叶魚駕反或獻或酢洗爵奠斝音假叶居訝反醓音貪醢以薦叶即略反或燔或炙叶陟略反嘉殽脾音琵臄音劇或歌或咢音嶽賦也設席重席也緝續御侍也有相續代而侍者言不乏使也進酒於客曰獻客答之曰酢主人又洗爵酬客客受而奠之不舉也斝爵也夏曰盞殷曰斝周曰爵醓醢之多汁者也燔用肉炙用肝臄口上肉也歌者比於琴瑟也徒擊鼓曰咢言侍御獻酬飲食歌樂之盛也敦音雕弓既堅叶古因反四鍭音侯既鈞舍矢既均序賓以賢叶下珍反敦弓既句音姤既挾子協反四鍭四鍭如樹叶上主反序賓以不侮賦也敦雕通畫也天子雕弓堅猶徑也鍭金鏃翦羽矢也鈞參亭也謂參分之一在前二在後三訂之而平者前有鐵重也舍釋也謂發矢也均皆中也賢射多中也投壺曰某賢於某若干純竒則曰竒均則曰左右均是也句彀通謂引滿也射禮搢三挾一既挾四鍭則遍釋矣如樹如手就樹之言貫革而堅正也不侮敬也令弟子辭所謂無憮無敖無偝立無踰言者也或曰不以中病不中者也射以中多為雋以不侮為德言既燕而射以為樂也曽孫維主叶當口反酒醴維醹音乳叶奴口反酌以大斗叶腫庾反以祈黃耇叶果五反黃耇台背叶必墨反以引以翼壽考維祺音其以介景福叶筆力反賦也曽孫主祭者之稱今祭畢而燕故因而稱之也醹厚也大斗柄長三尺祈求也黃耇老人之稱以祈黃耇猶曰以介眉壽云耳古器物欵識云用蘄萬壽用蘄眉壽永命多福用蘄眉壽萬年無疆皆此類也台鮐也人老則背有鮐文引導翼輔祺吉也此頌禱之辭欲其飲此酒而得老壽又相引導輔翼以享壽祺介景福也行葦四章章八句毛七章二章章六句五章章四句鄭八章章四句毛首章以四句興二句不成文理二章又不協韻鄭首章有起興而無所興皆誤今正之如此既醉以酒既飽以德君子萬年介爾景福叶筆力反賦也德恩惠也君子謂王也爾亦指王也此父兄所以答行葦之詩言享其飲食恩意之厚而願其受福如此也既醉以酒爾殽既將君子萬年介爾昭明叶謨郎反賦也殽俎實也將行也亦奉持而進之意昭明猶光大也昭明有融髙朗令終令終有俶尺六反公尸嘉告叶姑沃反賦也融明之盛也春秋傳曰明而未融朗虛明也令終善終也洪範所謂考終命古器物銘所謂令終令命是也俶始也公尸君尸也周稱王而尸但曰公尸蓋因其舊如秦已稱皇帝而其男女猶稱公子公主也嘉告以善言告之謂嘏辭也蓋欲善其終者必善其始今固未終也而既有其始矣於是公尸以此告之其告維何籩豆靜嘉叶居何反朋友攸攝攝以威儀叶牛何反賦也靜嘉清潔而美也朋友指賓客助祭者說見楚茨篇攝檢也公尸告以汝之祭祀籩豆之薦既靜嘉矣而朋友相攝佐者又皆有威儀當神意也自此至終篇皆述尸告之辭威儀孔時叶上止反君子有孝子叶奬里反孝子不匱永錫爾類賦也孝子主人之嗣子也儀禮祭祀之終有嗣舉奠匱竭類善也言汝之威儀既得其宜又有孝子以舉奠孝子之孝誠而不竭則宜永錫爾以善矣東萊吕氏曰君子既孝而嗣子又孝其孝可謂源源不竭矣其類維何室家之壼音悃叶苦俊反君子萬年永錫祚𦙍音孕賦也壼宫中之巷也言深逺而嚴肅也祚福祿也𦙍子孫也錫之以善莫大於此其𦙍維何天被音備爾祿君子萬年景命有僕賦也僕附也言將使爾有子孫者先當使爾被天祿而為天命之所附屬下章乃言子孫之事其僕維何釐音離爾女士釐爾女士從以孫子叶奬里反賦也釐豫也女士女之有士行者謂生淑媛使為之妃也從隨也謂又生賢子孫也既醉八章章四句鳧音扶鷖音醫在涇公尸來燕來寧爾酒既清爾殽既馨公尸燕飲福祿來成興也鳧水鳥如鴨者鷖鷗也涇水名爾自歌工而指主人也馨香之逺聞也此祭之明日繹而賓尸之樂故言鳧鷖則在涇矣公尸則來燕來寧矣酒清殽馨則公尸燕飲而福祿來成矣鳧鷖在沙叶桑何反公尸來燕來宜叶牛何反爾酒既多爾殽既嘉叶居何反公尸燕飲福祿來為叶胡禾反興也為猶助也鳧鷖在渚公尸來燕來處爾酒既湑上聲爾殽伊脯公尸燕飲福祿來下叶後五反興也渚水中高地也湑酒之泲者也鳧鷖在潨音叢公尸來燕來宗既燕于宗福祿攸降叶乎攻反公尸燕飲福祿來崇興也潨水㑹也來宗之宗尊也于宗之宗廟也崇積而高大也鳧鷖在亹音門公尸來止熏熏叶眉貧反㫖酒欣欣燔炙芬芬叶豐勻反公尸燕飲無有後艱叶居銀反興也亹水流峽中兩岸如門也熏熏和說也欣欣樂也芬芬香也鳧鷖五章章六句假音嘉樂音洛君子叶音則顯顯令德宜民宜人受祿于天叶鐵因反保右音又命叶彌并反之自天申之賦也嘉美也君子指王也民庶民也人在位者也申重也言王之德既宜民人而受天祿矣而天之於王猶反覆眷顧之不厭既保之右之命之而又申重之也疑此即公尸之所以答鳧鷖者也干祿百福叶筆力反子孫千億穆穆皇皇宜君宜王不愆不忘率由舊章賦也穆穆敬也皇皇美也君諸侯也王天子也愆過率循也舊章先王之禮樂政刑也言王者干祿而得百福故其子孫之蕃至於千億適為天子庶為諸侯無不穆穆皇皇以遵先王之法者威儀抑抑德音秩秩無怨無惡去聲率由羣匹受福無疆四方之綱賦也抑抑密也秩秩有常也匹類也言有威儀聲譽之美又能無私怨惡以任衆賢是以能受無疆之福為四方之綱此與下章皆稱願其子孫之辭也或曰無怨無惡不為人所怨惡也之綱之紀燕及朋友叶羽已反百辟卿士媚于天子叶奬里反不解音懈于位民之攸塈音戲賦也燕安也朋友亦謂諸臣也解惰塈息也言人君能綱記四方而臣下賴之以安則百辟卿士媚而愛之維欲其不解于位而為民所安息也東萊吕氏曰君燕其臣臣媚其君此上下交而為泰之時也泰之時所憂者怠荒而已此詩所以終於不解於位民之攸塈也方嘉之又規之者蓋臯陶賡歌之意也民之勞逸在下而樞機在上上逸則下勞矣上勞則下逸矣不解于位乃民之所由休息也假樂四章章六句篤公劉匪居匪康乃埸音易乃疆乃積乃倉乃裹音果餱音侯糧音良于橐音託于囊思輯音集用光弓矢斯張干戈戚揚爰方啓行叶戶郎反賦也篤厚也公劉后稷之曾孫也事見豳風居安康寧也埸疆田畔也積露積也餱食糧糗也無底曰槖有底曰囊輯和戚斧揚鉞方始也舊說召康公以成王將涖政當戒以民事故詠公劉之事以告之曰厚哉公劉之於民也其在西戎不敢寧居治其田疇實其倉廩既富且强於是裹其餱糧思以輯和其民人而光顯其國家然後以其弓矢斧鉞之備爰始啓行而遷都於豳焉蓋亦不出其封內也篤公劉于胥斯原既庶既繁叶紛乾反既順乃宣而無永歎音灘陟則在巘音讞叶魚軒反復降在原何以舟叶之遙反之維玉及瑤音遙鞞必頂反琫音菶容刀叶徒招反賦也胥相也庶繁謂居之者衆也順安宣遍也言居之遍也無永歎得其所不思舊也巘山頂也舟帶也鞞刀鞘也琫刀上飾也容刀容飾之刀也或曰容刀如言容臭謂鞞琫之中容此刀耳言公劉至豳欲相土以居而帶此劎佩以上下於山原也東萊吕氏曰以如是之佩服而親如是之勞苦斯其所以為厚於民也歟篤公劉逝彼百泉瞻彼溥音普原乃陟南岡乃覯于京叶居良反京師之野叶上與反于時處處于時廬旅于時言言于時語語賦也溥大覯見也京高丘也師衆也京師高山而衆居也董氏曰所謂京師者蓋起於此其後世因以所都為京師也時是也處處居室也廬寄也旅賓旅也直言曰言論難曰語此章言營度邑居也自下觀之則往百泉而望廣原自上觀之則陟南岡而覯于京於是為之居室於是廬其賓旅於是言其所言於是語其所語無不於斯焉篤公劉于京斯依叶於豈反蹌蹌音搶濟濟上聲俾筵俾几既登乃依同上乃造音糙其曹執豕于牢酌之用匏音庖食音嗣之飲之君之宗之賦也依安也蹌蹌濟濟羣臣有威儀貌俾使也使人為之設筵几也登登筵也依依几也曹羣牧之處也以豕為殽用匏為爵儉以質也宗尊也主也嫡子孫主祭祀而族人尊之以為主也此章言宫室既成而落之既以飲食勞其羣臣而又為之君為之宗焉東萊吕氏曰既饗燕而定經制以整屬其民上則皆統於君下則各統於宗蓋古者建國立宗其事相須楚執戎蠻子而致邑立宗以誘其遺民即其事也篤公劉既溥既長既景乃岡相去聲其隂陽觀其流泉其軍三單音丹叶多涓反度其隰原徹田為糧度其夕陽豳居允荒賦也溥廣也言其芟夷墾辟土地既廣而且長也景考日景以正四方也岡登高以望也相視也隂陽向背寒暖之宜也流泉水泉灌溉之利也三單未詳徹通也一井之田九百畝八家皆私百畝同養公田耕則通力而作收則計畝而分也周之徹法自此始其後周公蓋因而修之耳山西曰夕陽允信荒大也此言辨土宜以授所徙之民定其軍賦與其稅法又度山西之田以廣之而豳人之居於此益大矣篤公劉于豳斯館叶古玩反涉渭為亂取厲取鍛丁亂反止基乃理爰衆爰有叶羽已反夾其皇澗遡其過平聲澗止旅乃密芮鞫音菊之即賦也館客舍也亂舟之截流橫渡者也厲砥鍛鐡止居基定也理疆理也衆人多也有財足也遡鄉也皇過二澗名芮水名出吳山西北東人涇周禮職方作汭鞫水外也此章又總叙其始終言其始來未定居之時涉渭取材而為舟以來往取厲取鍛而成宫室既止基於此矣乃疆理其田野則日益繁庶富足其居有夾澗者有遡澗者其止居之衆日以益密乃復即芮鞫而居之而豳地日以廣矣公劉六章章十句泂音回酌彼行潦音老挹音揖彼注茲可以餴音分饎音熾叶昌里反豈弟君子民之父母叶滿彼反興也泂逺也行潦流潦也餴蒸米一熟而以水沃之乃再蒸也饎酒食也君子指王也舊說以為召康公戒成王言逺酌彼行潦挹之於彼而注之於此尚可以餴饎况豈弟之君子豈不為民之父母乎傳曰豈以强教之弟以悅安之民皆有父之尊有母之親又曰民之所好好之民之所惡惡之此之謂民之父母泂酌彼行潦挹彼注茲可以濯罍音雷豈弟君子民之攸歸叶古回反興也濯滌也泂酌彼行潦挹彼注茲可以濯溉音蓋叶古氣反豈弟君子民之攸塈音戲溉興也亦滌也塈息也泂酌三章章五句有卷音權者阿飄風自南叶尼心反豈弟君子來游來歌以矢其音賦也卷曲也阿大陵也豈弟君子指王也矢陳也此詩舊說亦召康公作疑公從成王游歌於卷阿之上因王之歌而作此以為戒此章總叙以發端也伴音判奐音喚爾游矣優游爾休矣豈弟君子俾爾彌爾性似先公酋音囚矣賦也伴奐優游間暇之意爾君子皆指王也彌終也性猶命也酋終也言爾既件奐優游矣乂呼而告之言使爾終其壽命似先君善始而善終也自此至第四章皆極言壽考福祿之盛以廣王心而歆動之五章以後乃告以所以致此之由也爾土宇昄符版反章亦孔之厚叶狠口下主二反矣豈弟君子俾爾彌爾性百神爾主叶當口主庾二反矣賦也昄章大明也或曰昄當作版版章猶版圖也言爾上宇昄章既甚厚矣又使爾終其身常為天地山川鬼神之主也爾受命長矣茀音弗祿爾康矣豈弟君子俾爾彌爾性純嘏爾常矣賦也茀嘏皆福也常常享之也有馮音慿有翼有孝有德以引以翼豈弟君子四方為則賦也馮謂可為依者翼謂可為輔者孝謂能事親者德謂得於已者引導其前也翼相其左右也東萊吕氏曰賢者之行非一端必曰有孝有德何也蓋人主常與慈祥篤實之人處其所以興起善端涵養德性鎮其躁而消其邪日改月化有不在言語之間者矣言得賢以自輔如此則其德日修而四方以為則矣自此章以下乃言所以致上章福祿之由也顒顒魚容反卬卬五綱反如圭如璋令聞音問令望叶無方反豈弟君子四万為綱賦也顒顒卬卬尊嚴也如圭如璋純潔也令聞善譽也令望威儀可望法也承上章言得馮翼孝德之助則能如此而四方以為綱矣鳯凰于飛翽翽音諱其羽亦集爰止藹藹王多吉士維君子使媚于天子興也鳯凰靈鳥也雄曰鳯雌曰凰翽翽羽聲也鄭氏以為因時鳯凰至故以為喻理或然也藹藹衆多也媚順愛也鳯凰于飛則翽翽其羽而集於其所止矣藹藹王多吉士則維王之所使而皆媚于天子矣既曰君子又曰天子猶曰王于出征以佐天子云爾鳯凰于飛翽翽其羽亦傅音附于天叶鐵因反藹藹王多吉人維君子命叶彌并反媚于庶人興也媚于庶人順愛于民也鳯凰鳴矣于彼高岡梧桐生矣于彼朝陽菶菶音琫萋萋音妻雍雍喈喈叶居奚反比也又以興下章之事也山之東曰朝陽鳯凰之性非梧桐不棲非竹實不食菶菶萋萋梧桐生之盛也雍雍喈喈鳯凰鳴之和也君子之車既庶且多君子之馬既間且馳叶唐何反矢詩不多維以遂歌賦也承上章之興也菶菶萋萋則雍雍喈喈矣君子之車馬則既衆多而間習矣其意若曰是亦足以待天下之賢者而不厭其多矣遂歌蓋繼王之聲而遂歌之猶書所謂賡載歌也卷阿十章六章章五句四章章六句民亦勞止汔音肸可小康惠此中國以綏四方無縱詭音鬼隨以謹無良式遏寇虐憯音慘不畏明叶謨郎反柔逺能邇以定我王賦也汔幾也中國京師也四方諸夏也京師諸夏之根本也詭隨不顧是非而妄隨人也謹斂束之意憯曽也明天之明命也柔安也能順習也序說以此為召穆公刺厲王之詩以今考之乃同列相戒之辭耳未必專為刺王而發然其憂時感事之意亦可見矣蘇氏曰人未有無故而妄從人者維無良之人將悅其君而竊其權以為寇虐則為之故無縱詭隨則無良之人肅而寇虐無畏之人止然後柔逺能邇而王室定矣穆公名虎康公之後厲王名胡成王七世孫也民亦勞止汔可小休惠此中國以為民逑無縱詭隨以謹惛怓音鐃叶尼猶反式遏寇虐無俾民憂無棄爾勞以為王休賦也逑聚也惛怓猶歡譁也勞猶功也言無棄爾之前功也休美也民亦勞止汔可小息惠此京師以綏四國叶于逼反無縱詭隨以謹罔極式遏寇虐無俾作慝敬慎威儀以近有德賦也罔極為惡無窮極之人也有德有德之人也民亦勞止汔可小愒音器惠此中國俾民憂泄音異無縱詭隨以謹醜厲式遏寇虐無俾正敗叶蒲寐反戎雖小子而式𢎞大叶特計反賦也愒息泄去厲惡也正敗正道敗壞也戎汝也言汝雖小子而其所為甚廣大不可不謹也民亦勞止汔可小安惠此中國國無有殘無縱詭隨以謹繾綣式遏寇虐無俾正反王欲玉女是用大諫賦也繾綣小人之固結其君者也正反反於正也玉寶愛之意言王欲以女為玉而寶愛之故我用王之意大諫正於女蓋託為王意以相戒也民勞五章章十句上帝板板下民卒疸音亶出話不然為猶不逺靡聖管管不實于亶猶之未逺是用大諫叶音簡賦也板板反也卒盡疸病猶謀也管管無所依也亶誠也序以此為凡伯刺厲王之詩今考其意亦與前篇相類但責之益深切耳此章首言天反其常道而使民盡病矣而女之出言皆不合理為謀又不久逺其心以為無復聖人但恣已妄行而無所依據又不實之於誠信豈其謀之未逺而然乎世亂乃人所為而曰上帝板板者無所歸咎之辭耳天之方難叶泥渭反無然憲憲叶虛言反天之方蹶音愧無然泄泄音異辭之輯音集叶祖合反矣民之洽矣辭之懌叶弋灼反矣民之莫矣賦也憲憲欣欣也蹶動也泄泄猶沓沓也蓋弛緩之意孟子曰事君無義進退無禮言則非先王之道者猶沓沓也輯和洽合懌悅莫定也辭輯而懌則言必以先王之道矣所以民無不合無不定也我雖異事及爾同僚我即爾謀聽我囂囂音梟我言維服勿以為笑叶思邀反先民有言詢于芻初俱反蕘音饒賦也異事不同職也同僚同為王臣也春秋𫝊曰同官為僚即就也囂囂自得不肯受言之貌服事也猶曰我所言者乃今之急事也先民古之賢人也芻蕘采薪者古人尚詢及芻蕘况其僚友乎天之方虐無然謔謔老夫灌灌小子蹻蹻其略反匪我言耄音帽叶毛博反爾用憂謔多將熇熇叶許各反不可救藥賦也謔戲侮也老夫詩人自稱灌灌欵欵也蹻蹻驕貌耄老而昏也熇熇熾盛也蘇氏曰老者知其不可而盡其欵誠以告之少者不信而驕之故曰非我老耄而妄言乃汝以憂為戲耳夫憂未至而救之猶可為也苟俟其益多則如火之盛不可復救矣天之方懠音癠叶箋西反無為夸音誇毗威儀卒迷善人載尸民之方殿屎音犧則莫我敢葵喪去聲亂蔑資叶箋西反曽莫惠我師叶霜夷反賦也懠怒夸大毗附也小人之於人不以大言夸之則以諛言毗之也尸則不言不為飲食而已者也殿屎呻吟也葵揆也蔑猶滅也資與咨同嗟歎聲也惠順師衆也戒小人毋得夸毗使威儀迷亂而善人不得有所為也又言民方愁苦呻吟而莫敢揆度其所以然者是以至於散亂滅亡而卒無能惠我師者也天之牖民如塤音塤如篪音池如璋如圭如取如攜攜無曰益牖民孔易去聲叶夷益反民之多辟音僻無自立辟同上賦也牖開明也猶言天啓其心也塤唱而篪和璋判而圭合取求攜得而無所費皆言易也辟邪也言天之開民其易如此以明上之化下其易亦然今民既多邪辟矣豈可又自立邪辟以道之邪價音介人維藩叶分邅反大師維垣大邦維屏大宗維翰叶胡田反懷德維寧宗子維城無俾城壞叶胡罪胡威二反無獨斯畏叶紆㑹於非二反賦也價大也大德之人也藩籬師衆垣牆也大邦强國也屏樹也所以為蔽也大宗强族也翰幹也宗子同姓也言是六者皆君之所恃以安而德其本也有德則得是五者之助不然則親戚叛之而城壞城壞則藩垣屏翰皆壞而獨居獨居而所可畏者至矣敬天之怒無敢戲豫敬天之渝音俞無敢馳驅昊天曰明叶謨郎反及爾出王音往叶如字昊天曰旦叶得絹反及爾游衍叶怡戰反賦也渝變也王往通言出而有所往也旦亦明也衍寬縱之意言天之聰明無所不及不可以不敬也板板也難也蹶也虐也懠也其怒而變也甚矣而不之敬也亦知其有日監在茲者乎張子曰天體物而不遺猶仁體事而無不在也禮儀三百威儀三千無一事而非仁也昊天曰明及爾出王旲天曰旦及爾游衍無一物之不體也板八章章八句生民之什十篇六十一章四百三十三句詩經集傳卷六
