body:
  text: 詩經集傳卷七宋朱子撰蕩之什三之三蕩蕩上帝下民之辟音璧疾威上帝其命多辟音僻天生蒸民其命匪諶音忱或叶市隆反靡不有初鮮克有終叶諸深反賦也蕩蕩廣大貌辟君也􅔂威猶暴虐也多辟多邪辟也蒸衆諶信也言此蕩蕩之上帝乃下民之君也今此暴虐之上帝其命乃多邪僻者何哉蓋天生衆民其命有不可信者蓋其降命之初無有不善而人少能以善道自終是以致此大亂使天命亦罔克終如疾威而多僻也蓋始為怨天之辭而卒自解之如此劉康公曰民受天地之中以生所謂命也能者養之以福不能者敗以取禍此之謂也文王曰咨咨女音汝殷商曾是強禦曾是掊音抔克曾是在位曾是在服叶蒲北反天降慆音滔德女興是力賦也此設為文王之言也咨嗟也殷商紂也疆禦暴虐之臣也掊克聚斂之臣也服事也慆慢興起也力如力行之力詩人知厲王之將亡故為此詩託於文王所以嗟嘆殷紂者言此暴虐聚斂之臣在位用事乃天降慆慢之德而害民然非其自為之也乃汝興起此人而力為之耳文王曰咨咨女殷商而秉義類強禦多懟音隊流言以對寇攘式內侯作音詛侯祝音呪靡屆靡究賦也而亦女也義善懟怨也流言浮浪不根之言也侯維也作讀為詛詛祝怨謗也言汝當用善類而反任此暴虐多怨之人使用流言以應對則是為寇盜攘竊而反居內矣是以致怨謗之無極也文王曰咨咨女殷商女炮音庖烋音哮于中國叶于逼反斂怨以為德不明爾德時無背音貝無側爾德不明以無陪音培無卿賦也炮烋氣健貌斂怨以為德多為可怨之事而反自以為德也背後側旁陪二也言前後左右公卿之臣皆不稱其官如無人也文王曰咨咨女殷商天不湎音免爾以酒不義從式叶式吏反既愆爾止靡明靡晦叶呼洧反式號式呼去聲俾晝作夜叶羊茹反賦也湎飲酒變色也式用也言天不使爾沈湎於酒而惟不義是從而用也止容止也文王曰咨咨女殷商如蜩如螳音唐如沸如羮叶盧當反小大近喪去聲叶下聲人尚乎由行叶戶郎反內奰音避于中國覃及鬼方賦也蜩螳皆蟬也如蟬鳴如沸羮皆亂意也小者大者幾於喪亡矣尚且由此而行不知變也奰怒覃延也鬼方逺夷之國也言自近及逺無不怨怒也文王曰咨咨女殷商匪上帝不時叶上止反殷不用舊叶巨已反雖無老成人尚有典刑曾是莫聽大命以傾賦也老成人舊臣也典刑舊法也言非上帝為此不善之時但以殷不用舊致此禍爾雖無老成人與圖先王舊政然典刑尚在可以循守乃無聽用之者是以大命傾覆而不可侵也文王曰咨咨女殷商人亦有言顛沛之揭紀竭去例二反枝葉未有害許曷瑕憩二反本實先撥音跋叶方吠筆烈二反殷鑒不逺在夏后之世叶始制私列二反賦也顛沛仆拔也揭本根蹶起之貌撥猶絶也鑒視也夏后桀也言大木揭然將蹶枝葉未有折傷而其根本之實已先絶然後此木乃相隨而顛拔爾蘇氏曰商周之衰典刑未廢諸侯未畔四夷未起而其君先為不義以自絶於天莫可救止正猶此爾殷鑒在夏蓋為文王歎紂之辭然周鑒之在殷亦可知矣蕩八章章八句抑抑威儀維德之隅人亦有言靡哲不愚庶人之愚亦職維疾叶集二反哲人之愚亦維斯戾賦也抑抑密也隅廉角也鄭氏曰人密審於威儀者是其德必嚴正也故古之賢者道行心平可外占而知內如宫室之制內有繩直則外有亷隅也哲知庶衆職主戻反也衛武公作此詩使人日誦於其側以自警言抑抑威儀乃德之隅則有哲人之德者固必有哲人之威儀矣而今之所謂哲者未嘗有其威儀則是無哲而不愚矣夫衆人之愚蓋有稟賦之偏宜有是疾不足為怪哲人而愚則反戾其常矣無競維人四方其訓之有覺德行去聲四國順之訏音吁謨定命逺猶辰告叶古得反敬慎威儀維民之則賦也競強也覺直大也訏大謨謀也大謀謂不為一身之謀而有天下之慮也定審定不改易也命號令也猶圖也逺謀謂不為一時之計而為長久之規也辰時告戒也辰告謂以時播告也則法也言天地之性人為貴故能盡人道則四方皆以為訓有覺德行則四國皆順從之故必大其謀定其命逺圖時告敬其威儀然後可以為天下法也其在于今叶音經興迷亂于政叶音征顛覆厥德荒湛音耽于酒叶子小反女音汝雖湛樂音洛從弗念厥紹罔敷求先王克共音拱明刑叶胡光反賦也今武公自言已今日之所為也興尚也女武公使人誦詩而命已之辭也後凡言女言爾言小子者放此湛樂從言惟湛樂之是從也紹謂所承之緒也敷求先王廣求先王所行之道也共執刑法也肆皇天弗尚叶平聲如彼泉流無淪胥以亡夙興夜寐灑掃廷內維民之章修爾車馬弓矢戎兵叶晡亡反用戒戎作用逖音剔蠻方賦也弗尚厭棄之也淪陷胥相章表戒備戎兵作起逖逺也言天所不尚則無乃淪陷相與而亡如泉流之易乎是以內自庭除之近外及蠻方之逺細而寢興灑掃之常大而車馬戎兵之變慮無不周備無不飭也上章所謂訏謨定命逺猶辰告者於此見矣質爾人民謹爾侯度用戒不虞叶元具反慎爾出話敬爾威儀叶牛何反無不柔嘉叶居何反白圭之玷音點尚可磨也斯言之玷不可為叶吾禾反也賦也質成也定也侯度諸侯所守之法度也虞慮話言柔安嘉善玷缺也言既治民守法防意外之患矣又當謹其言語蓋玉之玷缺尚可磨鑢使平言語一失莫能救之其戒深切矣故南容一日三復此章而孔子以其兄之子妻之無易去聲由言無曰苟矣莫捫音門朕舌言不可逝叶音折矣無言不讎叶市又反無德不報叶蒲救反惠于朋友叶羽已反庶民小子叶奬里反子孫繩繩萬民靡不承賦也易輕捫持逝去讎答承奉也言不可輕易其言蓋無人為我執持其舌者故言語由己易致差失常當執持不可放去也且天下之理無有言而不讎無有德而不報者若爾能惠于朋友庶民小子則子孫繩繩而萬民無不承矣皆謹言之效也視爾友君子輯音集柔爾顔叶魚堅反不遐有愆相去聲在爾室尚不愧于屋漏無曰不顯莫豫云覯神之格叶剛鶴反思不可度入聲思矧可射音弋叶弋灼反思賦也輯和也遐何通愆過也尚庶幾也屋漏室西北隅也覯見也格至度測矧况也射斁通厭也言視爾友於君子之時和柔爾之顔色其戒懼之意常若自省曰豈不至於有過乎蓋常人之情其修於顯者無不如此然視爾獨居於室之時亦當庶幾不愧于屋漏然後可爾無曰此非顯明之處而莫豫見也當知鬼神之妙無物不體其至於是有不可得而測者不顯亦臨猶懼有失况可厭射而不敬乎此言不但修之於外又當戒謹恐懼乎其所不睹不聞也子思子曰君子不動而敬不言而信又曰夫微之顯誠之不可掩如此此正心誠意之極功而武公及之則亦聖賢之徒矣辟爾為德俾臧俾嘉叶居何反淑慎爾止不愆于儀叶牛何反不僭不賊鮮上聲不為則投我以桃報之以李彼童而角實虹音紅小子叶奬里反賦也辟君也指武公也止容止也僭差賊害則法也無角曰童虹潰亂也既戒以修德之事而又言為德而人法之猶投桃報李之必然也彼謂不必修德而可以服人者是牛羊之童者而求其角也亦徒潰亂汝而已豈可得哉荏音飪染柔木言緡之絲叶新夷反溫溫恭人維德之基其維哲人告之話言順德之行其維愚人覆謂我僭叶七尋反民各有心興也荏染柔貌柔木柔忍之木也緡綸也被之綸以為弓也話言古之善言也覆猶反也僭不信也民各有心言人心不同愚智相越之逺也於音烏乎音呼小子叶奬里反未知臧否音鄙匪手攜之言示之事叶上止反匪面命之言提其耳借曰未知亦既抱子同上民之靡盈誰夙知而莫音慕成賦也非徒手攜之也而又示之以事非徒面命之也而又提其耳所以喻之者詳且切矣假令言女未有知識則汝既長大而抱子宜有知矣人若不自盈滿能受教戒則豈有既早知而反晚成者乎昊天孔昭叶音灼我生靡樂音洛視爾夢夢音蒙我心慘慘音懆叶七各反誨爾諄諄音肫聽我藐藐音邈匪用為教叶入聲覆用為虐借曰未知亦聿既耄叶音莫賦也夢夢不明亂意也慘慘憂貌諄諄詳熟也藐藐忽略貌耄老也八十九十曰耄左史所謂年九十有五時也於乎小子告爾舊止聽用我謀庶無大悔叶虎委反天方艱難曰喪厥國叶于逼反取譬不逺昊天不忒回遹音聿其德俾民大棘賦也舊舊章也或曰久也止語辭庶幸悔恨忒差遹僻棘急也言天運方此艱難將喪厥國矣我之取譬夫豈逺哉觀天道禍福之不差忒則知之矣今汝乃回遹其德而使民至於困急則喪厥國也必矣抑十二章三章章八句九章章十句楚語左史倚相曰昔衛武公年數九十五矣猶針警於國曰自卿以下至于師長士苟在朝者無謂我老耄而舍我必恭恪於朝夕以交戒我在輿有旅賁之規位寧有官師之典倚几有誦訓之諫居寢有暬御之針臨事有瞽史之道宴居有師工之誦史不失書矇不失誦以訓御之於是作懿戒以自警及其沒也謂之睿聖武公韋昭曰懿讀為抑即此篇也董氏曰侯包言武公行年九十有五猶使人日誦是詩而不離於其側然則序説為刺厲王者誤矣菀音鬱彼桑柔其下侯旬捋力活反采其劉瘼音莫此下民不殄心憂倉音愴兄音况填兮倬彼昊天叶鐵因反寧不我矜比也菀茂旬遍劉殘殄絶也倉兄與愴恍同悲閔之意也填未詳舊説與陳塵同蓋言久也或疑與癲字同為病之義但召旻篇內二字並出又恐未然今姑闕之倬明貌舊説此為芮伯刺厲王而作春秋傳亦曰芮良夫之詩則其説是也以桑為比者桑之為物其葉最盛然及其采之也一朝而盡無黃落之漸故取以比周之盛時如葉之茂其隂無所不遍至於厲王肆行暴虐以敗其成業王室忽焉凋弊如桑之既采民失其蔭而受其病故君子憂之不絶於心悲閔之甚而至於病遂號天而訴之也四牡騤騤旟旐有翩叶批賓反亂生不夷靡國不泯叶彌鄰反民靡有黎具禍以燼叶咨辛反於音烏乎音呼有哀叶音依國步斯頻賦也夷平泯滅黎黑也謂黑首也具俱也燼灰燼也步猶運也頻急蹙也厲王之亂天下征役不息故其民見其車馬旌旗而厭苦之自此至第四章皆征役者之怨辭也國步蔑資天不我將叶子兩反靡所止疑音屹叶如字云徂何往君子實維秉心無競叶其兩反誰生厲階叶居奚反至今為梗音鯁叶古黨反賦也蔑滅資咨將養也疑讀如儀禮疑立之疑定也徂亦往也競爭厲怨梗病也言國將危亡天不我養居無所定徂無所往然非君子之有爭心也誰實為此禍階使至今為病乎蓋曰禍有根原其所從來也逺矣憂心殷殷念我土宇我生不辰逢天僤音亶怒叶暖五反自西徂東叶音丁靡所定處多我覯痻音民孔棘我圉賦也土鄉宇居辰時僤厚覯見痻病棘急圉邊也或曰禦也多矣我之見病也急矣我之在邊也為謀為毖叶音必亂况斯削告爾憂恤誨爾序爵誰能執熱逝不以濯其何能淑載胥及溺叶奴學反賦也毖慎况滋也序爵辨别賢否之道也執熱手執熱物也蘇氏曰王豈不謀且慎哉然而不得其道適所以長亂而自削耳故告之以其所當憂而誨之以序爵且曰誰能執熱而不濯者賢者之能已亂猶濯之能解熱耳不然則其何能善哉相與入於陷溺而已如彼遡風叶孚音反亦孔之僾音愛民有肅心荓音烹云不逮好是稼穡力民代食稼穡維寶代食維好賦也遡鄉僾唈肅進荓使也蘇氏曰君子視厲王之亂問然如遡風之人唈而不能息雖有欲進之心皆使之曰世亂矣非吾所能及也於是退而稼穡盡其筋力與民同事以代祿食而已當是時也仕進之憂甚於稼穡之勞故曰稼穡維寶代食維好言雖勞而無患也天降喪去聲亂滅我立王降此蟊賊稼穡卒癢音羊哀恫音通中國具贅音惴卒荒靡有旅力以念穹蒼賦也恫痛具俱也贅屬也言危也春秋傳曰君若綴旒然與此贅同卒盡荒虛也旅與膂同穹蒼天也穹言其形蒼言其色言天降喪亂固己滅我所立之王矣又降此蟊賦則我之稼穡又病而不得以代食矣哀此中國皆危盡荒是以危困之極無力以念天禍也此詩之作不知的在何時其言滅我立王則疑其共和之後也維此惠君民人所瞻叶側薑反秉心宣猶考慎其相去聲叶平聲維彼不順自獨俾臧自有肺腸俾民卒狂賦也惠順也順於義理也宣遍猶謀相輔狂惑也言彼順理之君所以為民所尊仰者以其能秉持其心周遍謀度考擇其輔相必衆以為賢而後用之彼不順理之君則自以為善而不考衆謀自有私見而不通衆志所以使民眩惑至於狂亂也瞻彼中林甡甡音莘其鹿朋友已譖音僭叶子林反不胥以榖人亦有言進退維谷興也甡甡衆多並行之貌譖不信也胥相榖善谷窮也言朋友相譖不能相善曾鹿之不如也言上無明君下有惡俗是以進退皆窮也維此聖人瞻言百里維彼愚人覆狂以喜匪言不能胡斯畏忌叶巨已反賦也聖人炳於幾先所視而言者無逺而不察愚人不知禍之將至而反狂以喜今用事者蓋如此我非不能言也如此畏忌何哉言王暴虐人不敢諫也維此良人弗求弗迪叶徒沃反維彼忍心是顧是復音伏民之貪亂寧為荼毒賦也迪進也忍殘忍也顧念復重也荼苦菜也味苦氣辛能殺物故謂之荼毒也言不求善人而進用之其所顧念重復而不已者乃忍心不仁之人民不堪命所以肆行貪亂而安為荼毒也大風有隧音遂有空大谷維此良人作為式榖維彼不順征以中垢音苟叶居六反興也隧道式用榖善也征以中垢未詳其義或曰征行也中隱暗也垢汚穢也大風之行有隧蓋多出於空谷之中以興下文君子小人所行亦各有道耳大風有隧貪人敗類聽言則對誦言如醉匪用其良覆俾我悖叶蒲寐反興也敗類猶言圯族也王使貪人為政我以其或能聽我之言而對之然亦知其不能聽也故誦言而中心如醉由王不用善人而反使我至此悖眊也厲王説榮夷公芮良夫曰王室其將卑乎夫榮公好專利而不備大難夫利百物之所生也天地之所載也而或專之其害多矣此詩所謂貪人其榮公也與芮伯之憂非一日矣嗟爾朋友豫豈不知而作如彼飛蟲時亦弋獲叶胡郭反既之隂去聲女反豫來赫叶黑各反賦也如彼飛蟲時亦弋穫言已之所言或亦有中猶曰千慮而一得也之往隂覆也赫威怒之貌我以言告女是往隂覆於女女反來加赫然之怒於已也張子曰隂往密告於女反謂我來恐動也亦通民之罔極職涼善背叶必墨反為民不利如云不克民之回遹音聿職競用力賦也職專也涼義未詳傳曰涼薄也鄭讀作諒信也疑鄭説為得之善背工為反覆也克勝也回遹邪僻也言民之所以貪亂而不知所止者專由此人名為直諒而實善背又為民所不利之事如恐不勝而力為之也又言民之所以邪僻者亦由此輩專競用力而然也反覆其言所以深惡之也民之未戾職盜為寇涼曰不可覆背善詈音利雖曰匪豫既作爾歌賦也戻定也民之所以未定者由有盜臣為之寇也蓋其為信也亦以小人為不可矣及其反背也則又工為惡言以詈君子是其色厲內荏真可謂穿窬之盜矣然其人又自文飾以為此非我言也則我已作爾歌矣言得其情且事已著明不可掩覆也桑柔十六章八章章八句八章章六句倬彼雲漢昭回于天叶鐵因反王曰於音烏乎音呼何辜今之人天降喪去聲亂飢饉薦音荐臻靡神不舉靡愛斯牲叶桑經反圭璧既卒寧莫我聽平聲賦也雲漢天河也昭光回轉也言其光隨天而轉也薦荐通重也臻至也靡神不舉所謂國有凶荒則索鬼神而祭之也圭璧禮神之玉也卒盡寧猶何也舊説以為宣王承厲王之烈內有撥亂之志遇災而懼側身修行欲消去之天下喜於王化復行百姓見憂故仍叔作此詩以美之言雲漢者夜晴則天河明故述王仰訴於天之辭如此也旱既大音泰甚蘊隆蟲蟲不殄禋祀自郊徂宫上下奠瘞靡神不宗后稷不克上帝不臨叶力中反耗斁音妒下土寧丁我躬賦也藴蓄隆盛也蟲蟲熱氣也殄絶也郊祀天地也宫宗廟也上祭天下祭地奠其禮瘞其物宗尊也克勝也言后稷欲救此旱災而不能勝也臨享也稷以親言帝以尊言也斁敗丁當也何以當我之身而有是災也或曰與其耗斁下土寧使災害當我身也亦通旱既大甚則不可推吐雷反兢兢業業如霆如雷周餘黎民靡有孑遺叶夷回反昊天上帝則不我遺胡不相畏先祖于摧音崔賦也推去也兢兢恐也業業危也如霆如雷言畏之甚也孑無右臂貌遺餘也言大亂之後周之餘民無復有半身之遺者而上天又降旱災使我亦不見遺摧滅也言先祖之祀將自此而滅也旱既大甚則不可沮上聲赫赫炎炎云我無所大命近止靡瞻靡顧叶果五反羣公先正則不我助叶牀所反父母先祖胡寧忍豫叶演女反賦也沮止也赫赫旱氣也炎炎熱氣也無所無所容也大命近止死將至也瞻仰顧望也羣公先正月令所謂雩祀百辟卿士之有益於民者以祈榖實者也於羣公先正但言其不見助至父母先祖則以恩望之矣所謂垂涕泣而道之也旱既大甚滌滌山川叶樞倫反旱魃音跋為虐如惔音談如焚叶符勻反我心憚暑憂心如熏羣公先正則不我聞叶微勻反昊天上帝寧俾我遁叶徒勻反賦也滌滌言山無木川無水如滌而除之也魃旱神也惔燎之也憚勞也畏也熏灼遁逃也言天又不肯使我得逃遁而去也旱既大甚黽勉畏去胡寧癲音顛我以旱憯七感反不知其故祈年孔夙方社不莫音慕昊天上帝則不我虞叶元具反敬恭明神宜無悔怒賦也黽勉畏去出無所之也癲病憯曾也祈年孟春祈榖于上帝孟冬祈來年于天宗是也方祭四方也社祭土神也虞度悔恨也言天曾不度我之心如我之敬事明神宜可以無恨怒也旱既大甚散無友紀鞫哉庶正疚哉冢宰叶奬里反趣七口反馬師氏膳夫左右叶羽已反靡人不周無不能止瞻卬音仰昊天云如何里賦也友紀猶言綱紀也或曰友疑作有鞫窮也庶正衆官之長也疚病也冢宰又衆長之長也趣馬掌馬之官師氏掌以兵守王門者膳夫掌食之官也歲凶年榖不登則趣馬不秣師氏弛其兵馳道不除祭事不縣膳夫徹膳左右布而不修大夫不食粱士飲酒不樂周救也無不能止言諸臣無有一人不周救百姓者無有自言不能而遂止不為也里憂也與漢書無俚之俚同聊賴之意也瞻卬昊天有嘒音暳其星大夫君子昭假音格無贏音盈大命近止無棄爾成何求為我以戾庶正叶諸盈反瞻卬昊天曷惠其寧賦也嘒明貌昭明假至也久旱而仰天以望雨則有嘒然之明星未有雨徵也然羣臣竭其精誠而助王以昭假于天者已無餘矣雖今死亡將近而不可以棄其前功當益其所以昭假者而修之固非求為我之一身而已乃所以定衆正也於是語終又仰天而訴之曰果何時而惠我以安寧乎張子曰不敢斥言雨者畏懼之甚且不敢必云爾雲漢八章章十句嵩音嵩高維嶽駿音峻極于天叶鐵因反維嶽降神生甫及申維申及甫維周之翰叶胡千反四國于蕃叶分邅反四方于宣賦也山大而高曰嵩嶽山之尊者東岱南霍西華北恆是也駿大也甫甫侯也即穆王時作吕刑者或曰此是宣王時人而作吕刑者之子孫也申申伯也皆薑姓之國也翰幹蕃蔽也宣王之舅申伯出封于謝而尹吉甫作詩以送之言嶽山高大而降其神靈和氣以生甫侯申伯實能為周之楨幹屏蔽而宣其德澤於天下也蓋申伯之先神農之後為唐虞四嶽總領方嶽諸侯而奉嶽神之祭能修其職嶽神享之故此詩推本申伯之所以生以為嶽降神而為之也亹亹申伯王纘之事于邑于謝南國是式叶失吏反王命召伯叶逋莫反定申伯之宅叶達各反登是南邦叶卜工反世執其功賦也舋舋強勉之貌纘繼也使之繼其先世之事也邑國都之處也謝在今鄧州南陽縣周之南土也式使諸侯以為法也召伯召穆公虎也登成也世執其功言使申伯後世常守其功也或曰大封之禮召公之世職也王命申伯式是南邦叶卜功反因是謝人以作爾庸王命召伯徹申伯土田叶地因反王命傅御遷其私人賦也庸城也言因謝邑之人而為國也鄭氏曰庸功也為國以起其功也徹定其經界正其賦稅也傳御申伯家臣之長也私人家人遷使就國也漢明帝送侯印與東平王蒼諸子而以手詔賜其國中傅蓋古制如此申伯之功召伯是營有俶音蓄其城寢廟既成既成藐藐王錫申伯叶逋各反四牡蹻蹻鉤膺濯濯賦也俶始作也藐藐深貌蹻蹻壯貌濯濯光明貌王遣申伯路車乘去聲馬叶滿補反我圖爾居莫如南土錫爾介圭以作爾寶叶音補往近王舅南土是保叶音補賦也介圭諸侯之封圭也近辭也申伯信邁王餞音賤于郿音眉申伯還南謝于誠歸王命召伯徹申伯土疆以峙音痔其粻音張式遄音椽其行叶户郎反賦也郿今在鳯翔府郿縣在鎬京之西岐周之東而申在鎬京之東南時王在岐周故餞于郿也言信邁誠歸以見王之數留疑於行之不果故也峙積粻糧遄連也召伯之營謝也則已斂其稅賦積其餱糧使廬市有止宿之委積故能使申伯無留行也申伯番番音波叶分邅反既入于謝徒御嘽嘽音灘周邦咸喜戎有良翰叶胡千反不顯申伯王之元舅文武是憲叶虛言反賦也番番武勇貌嘽嘽衆盛也戎女也申伯既入于謝周人皆以為喜而相謂曰女今有良翰矣元長憲法也言文武之士皆以申伯為法也或曰申伯能以文王武王為法也申伯之德柔惠且直揉汝又反此萬邦聞音問于四國叶于逼反吉甫作誦其詩孔碩其風肆好以贈申伯賦也揉治也吉甫尹吉甫周之卿士誦工師所誦之辭也碩大風聲肆遂也嵩高八章章八句天生蒸民有物有則民之秉彝音夷好是懿德天監有周昭假音格于下叶後五反保兹天子生仲山甫賦也蒸衆則法秉執彝常懿美監視昭明假至保祐也仲山甫樊侯之字也宣王命樊侯仲山甫築城于齊而尹吉甫作詩以送之言天生衆民有是物必有是則蓋自百骸九竅五臘而達之君臣父子夫婦長幼朋友無非物也而莫不有法焉如視之明聽之聰貌之恭言之順君臣有義父子有親之類是也是乃民所執之常性故其情無不好此美德者而况天之監視有周能以昭明之德感格于下故保佑之而為之生此賢佐曰仲山甫焉則所以鍾其秀氣而全其美德者又非特如凡民而己也昔孔子讀詩至此而贊之曰為此詩者其知道乎故有物必有則民之秉彝也故好是懿德而孟子引之以證性善之説其旨深矣讀者其致思焉仲山甫之德柔嘉維則令儀令色小心翼翼古訓是式威儀是力天子是若明命使賦賦也嘉美令善也儀威儀也色顔色也翼翼恭敬貌古訓先王之遺典也式法力勉若順賦布也東萊吕氏曰柔嘉維則不過其則也過其則斯為弱不得謂之柔嘉矣令儀令色小心翼翼言其表裏柔嘉也古訓是式威儀是力言其學問進修也天子是若明命使賦言其發而措之事業也此章蓋備舉仲山甫之德王命仲山甫式是百辟音璧纘戎祖考王躬是保出納王命王之喉舌賦政于外四方爰發叶方月反賦也式法戎女也王躬是保所謂保其身體者也然則仲山甫蓋以冢宰兼大保而大保抑其世官也與出承而布之也納行而復之也喉舌所以出言也發發而應之也東萊吕氏曰仲山甫之職外則總領諸侯內則輔養君德入則典司政本出則經營四方此章蓋備舉仲山甫之職肅肅王命仲山甫將之邦國若否音鄙仲山甫明叶謨郎反之既明且哲以保其身夙夜匪解音懈以事一人賦也肅肅嚴也將奉行也若順也順否猶臧否也明謂明於理哲謂察於事保身蓋順理以守身非趨利避害而偷以全軀之謂也解怠也一人天子也人亦有言柔則茹音汝之剛則吐之維仲山甫柔亦不茹剛亦不吐不侮矜音鰥寡叶果五反不畏強禦賦也人亦冇言世俗之言也茹納也不茹柔故不侮矜寡不吐剛故不畏疆禦以此觀之則仲山甫之柔嘉非軟美之謂而其保身未嘗枉道以徇人可知矣人亦有言德輶音酉如毛民鮮上聲克舉之我儀圖叶丁五反之維仲山甫舉之愛莫助叶牀五反之袞職有闕維仲山甫補之賦也輶輕儀度圖謀也哀職王職也天子龍袞不敢斥言王闕故曰袞職有闕也言人皆言德甚輕而易舉然人莫能舉也我於是謀度其能舉之者則惟仲山甫而已是以心誠愛之而恨其不能有以助之蓋愛之者秉彝好德之性也而不能助者能舉與否在彼而已固無待於人之助而亦非人之所能助也至於王職有闕失亦維仲山甫獨能補之蓋唯大人然後能格君心之非未有不能自舉其德而能補君之闕者也仲山甫出祖四牡業業征夫捷捷每懷靡及叶極業反四牡彭彭叶鋪郎反八鸞鏘鏘王命仲山甫城彼東方賦也祖行祭也業葉健貌捷捷疾貌東方齊也傳曰古者諸侯之居逼隘則王者遷其邑而定其居蓋去薄姑而遷於臨災也孔氏曰史記齊獻公元年徙薄姑都治臨災計獻公當夷王之時與此傳不合豈徙於夷王之時至是而始備其城郭之守歟四牡騤騤音逵八鸞喈喈音皆叶居奚反仲山甫徂齊式遄其歸吉甫作誦穆如清風叶孚愔反仲山甫永懷以慰其心賦也式遄其歸不欲其久於外也穆深長也清風清微之風化養萬物者也以其逺行而有所懷思故以此詩慰其心焉曾氏曰賦政於外雖仲山甫之職然保王躬補王闕尤其所急城彼東方其心永懷蓋有所不安者尹吉甫深知之作誦而告以遄歸所以安其心也蒸民八章章八句奕奕梁山維禹甸之有倬其道韓侯受命王親命之纘戎祖考無廢朕命夙夜匪解音懈叶訖力反虔共爾位朕命不易幹音幹不庭方以佐戎辟音壁賦也奕奕大也梁山韓之鎮也今在同州韓城縣甸治也倬明貌韓國名侯爵武王之後也受命蓋即位除喪以士服入見天子而聽命也纘繼戎女也言王錫命之使繼世而為諸侯也虔敬易改幹正也不庭方不來庭之國也辟君也此又戒之以修其職業之辭也韓侯初立來朝始受王命而歸詩人作此以送之序亦以為尹吉甫作今未有據下篇云召穆公凡伯者放此四牡奕奕孔修且張韓侯入覲以其介圭入覲于王王錫韓侯淑旗綏章簟茀錯衡叶户郎反玄袞赤舄鉤膺鏤音漏錫音羊鞹音廓鞃淺幭音覔鞗音條革金厄叶於栗反賦也修長張大也介圭封圭執之為贄以合瑞于王也淑善也交龍曰旗綏章染鳥羽或旄牛尾為之注於旗竿之首為表章者也鏤刻金也馬眉上飾曰錫今當盧也鞹去毛之革也鞃式中也謂兩較之間橫木可憑者以鞹持之使牢固也淺虎皮也幭覆式也字一作幦又作幎以冇毛之皮覆式上也鞗革轡首也金厄以金為環纏扼轡首也韓侯出祖出宿于屠顯父音甫餞之清酒百壺其殽維何炮音庖鱉鮮魚其蔌音速維何維筍音笋及蒲其贈維何乘去聲馬路車籩豆有且音疽侯氏燕胥賦也既覲而反國必祖者尊其所往去則如始行焉屠地名或曰即杜也顯父周之卿士也簌菜殽也筍竹萌也蒲蒲蒻也且多貌侯氏覲禮諸侯來朝者之稱胥相也或曰語辭韓侯取去聲妻汾音焚王之甥蹶音愧父音甫之子叶奬里反韓侯迎去聲止于蹶之里百兩音亮又如字彭彭叶蒲郎反八鸞鏘鏘不顯其光諸娣音第從之祁祁如雲韓侯顧之爛其盈門叶眉貧反賦也此言韓侯既覲而還遂以親迎也汾王厲王也厲王流于彘在汾水之上故時人以目王焉猶言莒郊公黎比公也蹶父周之卿士姞姓也諸娣諸侯一娶九女二國媵之皆有娣姪也祁祁徐靚也如雲衆多也蹶父孔武靡國不到為去聲韓姞音佶相去聲攸莫如韓樂音洛叶力告反孔樂韓土川澤訏訏音許魴鱮甫甫麀鹿噳噳音語有熊有羆有貓苖茅二音有虎慶既令居叶斤御斤於二反韓姞燕譽叶羊如羊諸二反賦也諱姞蹶父之子韓侯妻也相攸擇可嫁之所也訏訏甫甫大也噳噳衆也貓似虎而淺毛慶喜令善也喜其有此善居也燕安譽樂也溥彼韓城燕平聲師所完以先祖受命因時百蠻王錫韓侯其追其貊音麥奄受北國因以其伯實墉實壑實畝實籍獻其貔音毗皮赤豹黃羆賦也溥大也燕召公之國也師衆也追貊夷狄之國也墉城壑池籍稅也貔猛獸名韓初封時召公為司空王命以其衆為築此城如召伯營謝山甫城齊春秋諸侯城邢城楚丘之類也王以韓侯之先因是百蠻而長之故錫之追貊使為之伯以修其城池治其田畝正其稅法而貢其所有於王也韓奕六章章十二句江漢浮浮武夫滔滔叶他侯反匪安匪遊淮夷來求既出我車既設我旟匪安匪舒淮夷來鋪賦也浮浮水盛貌滔滔順流貌淮夷夷之在淮上者也鋪陳也陳師以伐之也宣王命召穆公平淮南之夷詩人美之此章總序其事言行者皆莫敢安徐而曰吾之來也惟淮夷是求是伐耳江漢湯湯音傷武夫洸洸音光經營四方告成于王四方既平王國庶定叶唐丁反時靡有爭叶災陘反王心載寧賦也洸洸武貌庶幸也此章言既伐而成功也江漢之滸音虎王命召虎式辟音闢四方徹我疆土匪疚匪棘王國來極于疆于理至于南海叶虎委反賦也虎召穆公名也辟與闢同徹井其田也疚病棘急也極中之表也居中而為四方所取正也言江漢既平王又命召公闢四方之侵地而治其疆界非以病之非以急之也但使其來取正於王國而已於是遂疆理之盡南海而止也王命召虎來旬來宣文武受命召公維翰叶胡千反無曰豫小子叶奬里反召公是似叶養里反肇敏戎公用錫爾祉賦也旬遍宣布也自江漢之滸言之故曰來召公召康公奭也翰幹也豫小子王自稱也肇開戎女公功也又言王命召虎來此江漢之滸遍治其事以布王命而曰昔文武受命惟召公為楨幹今女無曰以豫小子之故也但自為嗣女召公之事耳能開敏女功則我當錫女以祉福如下章所云也釐音離爾圭瓚才旱反秬音巨鬯音暢一卣音酉告于文人錫山土田叶地因反于周受命叶滿并反自召祖命虎拜稽首天子萬年叶彌因反賦也釐賜卣尊也文人先祖之有文德者謂文王也周岐周也召祖穆公之祖康公也此序王賜召公策命之辭言錫爾圭瓚秬鬯者使之以祀其先祖又告于文人而錫之山川土田以廣其封邑蓋古者爵人必於祖廟示不敢專也又使往受命於岐周從其祖康公受命於文王之所以寵異之而召公拜稽首以受王命之策書也人臣受恩無可以報謝者但言使君壽考而己虎拜稽首對揚王休叶虛久反作召公考叶去久反天子萬壽叶殖酉反明明天子叶奬里反令聞不已矢其文德洽此四國叶越逼反賦也對答揚稱休美考成矢陳也言穆公既受賜遂答稱天子之美命作康公之廟器而勒王策命之辭以考其成且祝天子以萬壽也古器物銘云􅌏拜稽首敢對揚天子休命用作朕皇考龔伯尊敦􅌏其眉壽萬年無疆語正相類但彼自祝其壽而此祝君壽耳既又美其君之令聞而進之以不已勸其君以文德而不欲其極意於武功古人愛君之心於此可見矣江漢六章章八句赫赫明明王命卿士叶音所南仲大音泰祖大師皇父音甫整我六師以修我戎叶音汝既敬既戒叶訖力反惠此南國叶越逼反賦也卿士即皇父之官也南仲見出車篇大祖始祖也大師皇父之兼官也我為宣王之自我也戎兵器也宣王自將以伐淮北之夷而命卿士之謂南仲為大祖兼大師而字皇父者整治其從行之六軍修其戎事以除淮夷之亂而惠此南方之國詩人作此以美之必言南仲大祖者稱其世功以美大之也王謂尹氏命程伯休父左右陳行音杭戒我師旅率彼淮浦省此徐土不留不處三事就緒音序賦也尹氏吉甫也蓋為內史掌策命卿大夫也程伯休父周大夫三事未詳或曰三農之事也言王詔尹氏策命陳伯休父為司馬使之左右陳其行列循淮浦而省徐州之土蓋伐淮北徐州之夷也上章既命皇父而此章又命程伯休父者蓋王親命大師以三公治其軍事而使內史命司馬以六卿副之耳赫赫業業叶宜却反有嚴天子王舒保作匪紹匪遊徐方繹騷叶蘇侯反震驚徐方如雷如霆徐方震驚賦也赫赫顯也業業大也嚴威也天子自將其威可畏也王舒保作未詳其義或曰舒徐保安作行也言王師舒徐而安行也紹糾緊也遊遨遊也繹連絡也騷擾動也夷厲以來周室衰弱至是而天子自將以征不庭其師始出不􅔂不徐而徐方之人皆已震動如雷霆作於其上不遑安矣王奮厥武如震如怒叶暖五反進厥虎臣闞音喊如虓音哮虎鋪平聲敦淮濆音焚仍執醜虜截彼淮浦王師之所賦也進鼓而進之也闞奮怒之貌虓虎之自怒也鋪布也布其師旅也敦厚也厚集其陳也仍就也老子曰攘臂而仍之截截然不可犯之貌王旅嘽嘽音灘如飛如翰如江如漢如山之苞叶鋪鉤反如川之流綿綿翼翼不測不克濯征徐國叶越逼反賦也嘽嘽衆盛貌翰羽苞本也如飛如翰疾也如江如漢衆也如山不可動也如川不可禦也綿綿不可絶也翼翼不可亂也不測不可知也不克不可勝也濯大也王猶允塞徐方既來叶六直反徐方既同天子之功四方既平徐方來庭徐方不回王曰還歸叶古回反賦也猶道允信塞實庭朝回違也還歸班師而歸也前篇召公帥師以出歸告成功故備載其褒賞之辭此篇王實親行故於卒章反復其辭以歸功於天子言王道甚大而逺方懷之非獨兵威然也序所謂因以為戒者是也常武六章章八句瞻卬音仰昊天則不我惠孔填不寧降此大厲邦靡有定士民其瘵音債叶側例反蟊音牟賊蟊疾靡有夷屆音戒叶居氣反罪罟不收靡有夷廖音抽賦也填久厲亂瘵病也蟊賊害苗之蟲也疾害夷平屆極罟網也此刺幽王嬖褒姒任奄人以致亂之詩首言昊天不惠而降亂無所歸咎之辭也蘇氏曰國有所定則民受其福無所定則受其病於是有小人為之蟊賊刑罪為之網罟凡此皆民之所以病也人有土田女音汝反有酉由二音之人有民人女覆奪之此宜無罪女反收殖酉殖由二反之彼宜有罪女覆説音脫之賦也反覆收拘説赦也哲夫成城哲婦傾城懿厥哲婦為梟為鴟婦有長舌維厲之階叶居奚反亂匪降自天叶鐵因反生自婦人匪教匪誨叶呼位反時維婦寺賦也哲知也城猶國也哲婦蓋指褒姒也傾覆懿美也梟鴟惡聲之鳥也長舌能多言者也階梯也寺奄人也言男子正位乎外為國家之主故有知則能立國婦人以無非無儀為善無所事哲哲則適以覆國而已故此懿美之哲婦而反為梟鴟蓋以其多言而能為禍亂之梯也若是則亂豈真自天降如首章之説哉特由此婦人而已蓋其言雖多而非有教誨之益者是惟婦人與奄人耳豈可近哉上文但言婦人之禍末句兼以奄人為言蓋二者常相倚而為姦不可不并以為戒也歐陽公嘗言宦者之禍甚於女寵其言尤為深切有國家者可不戒哉鞫人忮音志忒譖音僭始竟背音佩叶必墨反豈曰不極伊胡為慝如賈音古三倍君子是識婦無公事休其蠶織賦也鞫窮忮害忒變也譖不信也竟終背反極已慝惡也賈居貨者也三倍獲利之多也公事朝廷之事蠶織婦人之業言婦寺能以其智辨窮人之言其心忮害而變詐無常既以譖妄倡始於前而終或不驗於後則亦不復自謂其言之放恣無所極已而反曰是何足為慝乎夫商賈之利非君子之所宜識如朝廷之事非婦人之所宜與也今賈三倍而君子識其所以然婦人無朝廷之事而舍其蠶織以圖之則豈不為慝哉天何以刺叶音砌何神不富叶方味反舍音捨爾介狄維豫胥忌不弔不祥威儀不類人之云亡邦國殄瘁賦也刺責介大胥相弔閔也言天何用責王神何用不富王哉凡以王信用婦人之故也是必將有夷狄之大患今王舍之不忌而反以我之正言不諱為忌何哉夫天之降不祥庶幾王懼而自修今王遇災而不恤又不謹其威儀又無善人以輔之則國之殄瘁宜矣或曰介狄即指婦寺猶所謂女戎者也天之降罔維其優矣人之云亡心之憂矣天之降罔維其幾矣人之云亡心之悲矣賦也罔罟優多幾近也蓋承生章之意而重言之以警王也觱音必沸音弗檻胡覽反泉維其深矣心之憂矣寧自今矣不自我先不自我後叶下五反藐藐昊天無不克鞏叶音古無忝皇祖式救爾後興也觱沸泉涌貌檻泉泉正出者藐藐高逺貌鞏固也言泉水瀵涌上出其源深矣我心之憂亦非適今日然也然而禍亂之極適當此時蓋已無可為者惟天高逺雖若無意於物然其功用神明不測雖危亂之極亦無不能鞏固之者幽王苟能改過自新而不忝其祖則天意可回來者猶必可救而子孫亦蒙其福矣瞻卬七章三章章十句四章章八句旻天疾威天篤降喪去聲叶桑郎反癲音顛我飢饉民卒流亡我居圉音語卒荒賦也篤厚癲病卒盡也居國中也圉邊陲也此刺幽王任用小人以致飢饉侵削之詩也天降罪罟蟊賊內訌音紅昏椓音卓靡共音恭潰潰回遹實靖夷我邦叶卜工反賦也訌潰也昏椓昏亂椓喪之人也共與恭同一説與供同謂供其職也潰潰亂也回遹邪僻也靖治夷平也言此蟊賊昏椓者皆潰亂邪僻之人而王乃使之治平伐邦所以致亂也臯臯訿訿音紫曾不知其玷音店兢兢業業孔填不寧我位孔貶賦也臯臯頑慢之意訿訿務為謗毁也玷缺也填久也言小人在位所為如此而王不知其缺至於戒敬恐懼甚久而不寧者其位乃更見貶黜其顛倒錯亂之甚如此如彼歲旱草不潰茂如彼棲音西苴七如反我相去聲此邦無不潰止賦也潰遂也棲苴水中浮草棲於木上者言枯稿無潤澤也相視潰亂也維昔之富不如時維今之疚不如兹彼疏斯稗音敗胡不自替職兄音况斯引賦也時是疚病也疏糲也稗則精矣替廢也兄恍同引長也言昔之富未嘗若是之灸也而今之疚又未有若此之甚也彼小人之與君子如疏與稗其分審矣而曷不自替以避君子乎而使我心專為此故至於愴恍引長而不能自已也池之竭矣不云自頻泉之竭矣不云自中叶諸仍反溥斯害矣職兄斯𢎞不災我躬叶姑𢎞反賦也頻崖漙廣𢎞大也池水之鍾也泉水之發也故池之竭由外之不入泉之竭由內之不出言禍亂有所從起而今不云然也此其為害亦已廣矣是使我心専為此故至於愴恍日益𢎞大而憂之曰是豈不災及我躬也乎昔先王受命有如召公日辟音闢國百里今也日蹙音蹴國百里於音烏乎音呼哀哉維今之人不尚有舊叶巨已反賦也先王文武也召公康公也辟開蹙促也文王之世周公治內召公治外故周人之詩謂之周南諸侯之詩謂之召南所謂日辟國百里云者言文王之化自北而南至於江漢之間服從之國日以益衆及虞芮質成而其旁諸侯聞之相帥歸周者四十餘國焉今謂幽王之時蹙國蓋犬戎內侵諸侯外畔也又歎息哀痛而言今世雖亂豈不猶有舊德可用之人哉言有之而不用耳召旻七章四章章五句三章章七句因其首章稱旻天卒章稱召公故謂之召旻以别小旻也蕩之什十一篇九十二章七百六十九句詩經集傳卷七
