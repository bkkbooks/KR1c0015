body:
  text: 詩經集𫝊卷八宋朱子撰頌四頌者宗廟之樂歌大序所謂美盛徳之形容以其成功告於神明者也蓋頌與容古字通用故序以此言之周頌三十一篇多周公所定而亦或有康王以後之詩魯頌四篇商頌五篇因亦以類附焉凡五卷周頌清廟之什四之一於音烏穆清廟肅雝顯相去聲濟濟上聲多士秉文之徳對越在天駿奔走在廟不顯不承無射音亦於人斯賦也於歎辭穆深逺也清清静也肅敬雝和顯明相助也謂助祭之公卿諸侯也濟濟衆也多士與祭執事之人也越於也駿大而疾也承尊奉也斯語辭此周公既成洛邑而朝諸侯因率之以祀文王之樂歌言於穆哉此清静之廟其助祭之公侯皆敬且和而其執事之人又無不執行文王之徳既對越其在天之神而又駿奔走其在廟之主如此則是文王之徳豈不顯乎豈不承乎信乎其無有厭斁於人也清廟一章八句書稱王在新邑烝祭嵗文王騂牛一武王騂牛一實周公攝政之七年而此其升歌之辭也書大𫝊曰周公升歌清廟苟在廟中嘗見文王者愀然如復見文王焉樂記曰清廟之瑟朱弦而疏越壹偈而三歎有遺音者矣鄭氏曰朱弦練朱弦練則聲濁越瑟底孔也疏之使聲遅也倡發歌句也三歎三人從歎之耳漢因秦樂乾豆上奏登歌獨上歌不以筦絃亂人聲欲在位者徧聞之猶古清廟之歌也維天之命於音烏穆不已於同上乎音呼不顯文王之徳之純賦也天命即天道也不已言無窮也純不雜也此亦祭文王之詩言天道無窮而文王之徳純一不雜與天無閒以贊文王之徳之盛也子思子曰維天之命於穆不已蓋曰天之所以為天也於乎不顯文王之徳之純蓋曰文王之所以為文也純亦不已程子曰天道不已文王純於天道亦不已純則無二無雜不已則無間斷先後假以溢我我其收之駿惠我文王曾孫篤之何之為假聲之轉也恤之為溢字之訛也收受駿大恵順也曾孫後王也篤厚也言文王之神將何以恤我乎有則我當受之以大順文王之道後王又當篤厚之而不忘也維天之命一章八句維清緝熈文王之典肇禋音因迄音肸用有成維周之禎賦也清清明也緝續熈明肇始禋祀迄至也此亦祭文王之詩言所當清明而緝熈者文王之典也故自始祀至今有成實維周之禎祥也然此詩疑有闕文焉維清一章五句烈文辟音璧公錫茲祉福惠我無疆子孫保之賦也烈光也辟公諸侯也此祭於宗廟而獻助祭諸侯之樂歌言諸侯助祭使我獲福則是諸侯錫此祉福而惠我以無疆使我子孫保之也無封靡于爾邦維王其崇之念茲戎功繼序其皇之封靡之義未詳或曰封専利以自封殖也靡汰侈也崇尊尚也戎大皇大也言汝能無封靡于汝邦則王當尊汝又念汝有此助祭錫福之大功則使汝之子孫繼序而益大之也無競維人四方其訓之不顯維徳百辟其刑之於音烏乎音呼前王不忘又言莫强於人莫顯於徳先王之徳所以人不能忘者用此道也此戒飭而勸勉之也中庸引不顯惟徳百辟其刑之而曰故君子篤恭而天下平大學引於乎前王不忘而曰君子賢其賢而親其親小人樂其樂而利其利此以没世不忘也烈文一章十三句此篇以公疆兩韻相叶末審當從何讀意亦可互用也天作髙山大音秦王荒之彼作矣文王康之彼岨矣岐有夷之行叶戸郎反子孫保之賦也髙山謂岐山也荒治康安也岨險僻之意也夷平行路也此祭大王之詩言天作岐山而大王始治之大王既作而文王又安之於是彼險僻之岐山人歸者衆而有平易之道路子孫當世世保守而不失也天作一章七句昊天有成命二后受之成王不敢康夙夜基命宥密於音烏緝熈單厥心肆其靖之賦也二后文武也成王名誦武王之子也基積累於下以承藉乎上者也宥宏深也密静密也於歎辭靖安也此詩多道成王之徳疑祀成王之詩也言天祚周以天下既有定命而文武受之矣成王繼之又能不敢康寕而其夙夜積徳以承藉天命者又宏深而静密是能繼續光明文武之業而盡其心故今能安静天下而保其所受之命也國語叔向引此詩而言曰是道成王之徳也成王能明文昭定武烈者也以此證之則其為祀成王之詩無疑矣昊天有成命一章七句此康王以後之詩我將我享維羊維牛維天其右叶音由之賦也將奉享獻右尊也神坐東向在饌之右所以尊之也此宗祀文王於明堂以配上帝之樂歌言奉其牛羊以享上帝而曰天庶其降而在此牛羊之右乎蓋不敢必也儀式刑文王之典日靖四方伊嘏音假文王既右饗叶虚良反之儀式刑皆法也嘏鍚福也言我儀式刑文王之典以靖天下則此能錫福之文王既降而在此之右以饗我祭若有以見其必然矣我其夙夜畏天之威于時保之又言天與文王既皆右享我矣則我其敢不以夜畏天之威以保天與文王所以降鑒之意乎我將一章十句程子曰萬物本乎天人本乎祖故冬至祭天而以祖配之以冬至氣之始也萬物成形於帝而人成形於父故季秋享帝而以父配之以季秋成物之時也陳氏曰古者祭天於圜丘掃地而行事器用陶匏牡用犢其禮極簡聖人之意以為未足以盡其意之委曲故於季秋之月有大享之禮焉天即帝也郊而曰天所以尊之也故以后稷配焉后稷逺矣配稷於郊亦以尊稷也明堂而日帝所以親之也以文王配焉文王親也配文王於明堂亦以親文王也尊尊而親親周道備矣然則郊者古禮而明堂者周制也周公以義起之也東萊呂氏曰於天維庶其饗之不敢加一辭焉於文王則言儀式其典日靖四方天不待贊法文王所以法天也卒章惟言畏天之威而不及文王者統於尊也畏天所以畏文王也天與文王一也時邁其邦昊天其子之賦也邁行也邦諸侯之國也周制十有二年王廵守殷國柴望祭告諸侯畢朝諸此廵守而朝㑹祭告之樂歌也言我之以時廵行侯也天其子我乎哉盖不敢必也實右序有周薄言震之莫不震疊懷柔百神及河喬嶽允王維后右尊序次震動疊懼懐來柔安允信也既而曰天實右序有周矣是以使我薄言震之而四方諸侯莫不震懼又能懷柔百神以至於河之深廣嶽之崇髙而莫不感格則是信乎周王之為天下君矣明昭有周式序在位載戢干戈載櫜音髙弓矢我求懿徳肆于時夏允王保之戢聚櫜韜肆陳也夏中國也又言明昭乎我周也既以慶讓黜陟之典式序在位之諸侯又收歛其干戈弓矢而益求懿美之徳以布陳于中國則信乎王之能保天命也或曰此詩即所謂肆夏以其有肆于時夏之語而命之也時邁一章十五句春秋𫝊曰昔武王克商作頌曰載戢干戈而外𫝊又以為周文王之頌則此詩乃武王之世周公所作也外傳又曰金奏肆夏樊遏渠天子以饗元侯也韋昭注云肆夏一名樊韶夏一名遏納夏一名渠即周禮九夏之三也呂叔玉云肆夏時邁也樊遏執競也渠思文也執競武王無競維烈不顯成康上帝是皇賦也此祭武王成王康王之詩競强也言武王持其自强不息之心故其功烈之盛天下莫得而競豈不顯哉成王康王之徳亦上帝之所君也自彼成康奄有四方斤斤去聲其明叶謨郎反斤斤明之察也言成康之徳明著如此也鐘鼔喤喤音横磬筦音管將將音搶降福穰穰音攘喤喤和也將將集也穣穣多也言今作樂以祭而受福也降福簡簡威儀反反既醉既飽福祿來反簡簡大也反反謹重也反覆也言受福之多而愈益謹重是以既醉既飽而福禄之來反覆而不厭也執競一章十四句此昭王以後之詩國語説見前篇思文后稷克配彼天立我烝民莫匪爾極貽我來牟帝命率育叶日逼反無此疆爾界叶訖力反陳常于時夏賦也思詔辭文言有文徳也立粒通極至也徳之至也貽遺也來小麥牟大麥也率徧育飬也言后稷之徳真可配天蓋使我烝民得以粒食者莫非其徳之至也且其胎我民以來牟之種乃上帝之命以此徧飬下民者是以無冇遠近彼此之殊而得以陳其君臣父子之常道於中門也或曰此詩即所謂納夏者亦以其有時夏之語而命之也思文一章八句國語説見時邁篇清廟之什十篇十章九十五句周頌臣工之什四之二嗟嗟臣工敬爾在公王釐音離爾成來咨來茹音孺賦也嗟嗟重歎以深敕之也臣工羣臣百官也公公家也釐賜也成成法也茹度也此戒農官之詩先言王有成法以賜女女當來咨度也嗟嗟保介維莫音慕之春亦又何求如何新畬音余於音烏皇來牟將受厥明明昭上帝迄用康年命我衆人庤音峙乃錢音翦鎛音博奄觀銍音質艾音刈保介見月令呂覽其說不同然皆為籍田而言蓋農官之副也莫春斗柄建辰夏正之三月也畬三嵗田也於皇歎羙之辭來牟麥也明上帝之明賜也言麥將熟也迄至也康年猶豐年也衆人甸徒也庤具錢銑鏄鉏皆田器也銍穫禾短鎌也艾穫也此乃言所戒之事言三月則當治其新畬矣今如何哉然麥已將熟則可以受上帝之明賜而此明昭之上帝又將賜我新畬以豐年也於是命甸徒具農器以治其新畬而又將忽見其收成也臣工一章十五句噫嘻成王既昭假音格爾率時農夫播厥百榖駿發爾私終三十里亦服爾耕十千維耦叶音擬賦也噫嘻亦歎辭也昭明假格也爾田官也時是駿大發耕也私私田也三十里萬夫之地四旁有川内方三十三里有竒言三十里舉成數也耦二人並耕也此連上篇亦戒農官之辭昭假爾猶言格汝衆庶蓋成王始置田官而嘗戒命之也爾當率是農夫播其百榖使之大發其私田皆服其耕事萬人為耦而並耕也蓋耕本以二人為耦今合一川之衆為言故云萬人畢出幷力齊心如合一耦也此必鄉遂之官司稼之屬其職以萬夫為界者溝洫用貢法無公田故皆謂之私蘇氏曰民曰雨我公田遂及我私而君曰駿發爾私終三十里其上下之間交相忠愛如此噫嘻一章八句振鷺于飛于彼西雝我客戾止亦有斯容賦也振羣飛貌鷺白鳥雝澤也客謂二王之後夏之後把商之後宋於周為客天子有事膰焉有喪拜焉者也此二王之後來助祭之詩言鷺飛于西雝之水而我客來助祭者其容貌脩整亦如鷺之潔白也或曰興也在彼無惡在此無斁叶丁故反庶㡬夙夜叶羊茹反以永終譽彼其國也在國無惡之者在此無厭之者如是則庶幾其能夙夜以永終此譽矣陳氏日在彼不以我革其命而有惡於我知天命無常惟徳是與其心服也在我不以彼墜其命而有厭於彼崇徳象賢統承先王忠厚之至也振鷺一章八句豐年多黍多稌音杜亦有髙廩力錦反萬億及秭咨履反為酒為醴烝畀祖妣以洽百禮降福孔皆叶舉里反賦也稌稻也黍宜髙燥而寒稌宜下濕而暑黍稌皆熟則百榖無不熟矣亦助語辭數萬至萬曰億數億至億曰秭烝進畀予洽備皆徧也此秋冬報賽田事之樂歌蓋祀田祖先農方社之屬也言其收入之多至於可以供祭祀備百禮而神降之福將甚徧也豐年一章七句有瞽有瞽在周之庭賦也瞽樂官無目者也序以此為始作樂而合乎祖之詩兩句總序其事也設業設虡音巨崇牙樹羽應田縣鼔鞉音桃磬柷尺叔反圉音語既備乃奏叶音祖簫管備舉以上叶瞽字業虡崇牙見靈臺篇樹羽置五采之羽於崇牙之上也應小􅙽田大鼔也鄭氏曰田當作􅉧小鼔也縣鼓周制也夏后氏足鼔殷楹鼔周縣鼔鞉如鼔而小有柄兩耳持其柄摇之則旁耳還自擊磬石磬也柷狀如漆桶以木為之中有椎連底挏之令左右擊以起樂者也圉亦作敔狀如伏虎背上冇二十七鉏鋙刻以木長尺櫟之以止樂者也簫編小竹管為之管如篴併兩而吹之者也喤喤音横厥聲肅雝和鳴先祖是聽我客戾止永觀厥成以上叶庭字我客二王後也觀視也成樂闋也如簫韶九成之成獨言二王後者猶言虞賓在位我有嘉客蓋尤以是為盛耳有瞽一章十三句猗於宜反與音余漆沮七余反潛有多魚有鱣張連反有鮪叶于軌反鰷音條鱨音常鰋音偃鯉以享以祀叶逸織反以介景福叶筆力反賦也猗與歎辭潛槮也蓋積柴養魚使得隱藏避寒因以薄圍取之也或曰藏之深也鰷白鰷也月令季冬命漁師始漁天子親徃乃嘗魚先薦寢廟季春薦鮪于寢廟此其樂歌也潛一章六句有來雝雝與公叶篇内同至止肅肅相息亮反維辟音璧公天子穆穆賦也雝雝和也肅肅敬也相助祭也辟公諸侯也穆穆天子之容也此武王祭文王之詩言諸侯之來皆和且敬以助我之祭事而天子有穆穆之容也於音烏薦廣牡相同上予肆祀叶飬里反假古雅反哉皇考叶音口綏予孝子叶奬里反於歎辭廣牡大牲也肆陳假大也皇考文王也綏安也孝子武王自稱也言此和敬之諸侯薦大牲以助我之祭事而大哉之文王庶其享之以安我孝子之心也宣哲維人文武維后燕及皇天叶鐵因反克昌厥後宣通哲知燕安也此羙文王之徳宣哲則盡人之道文武則備君之徳故能安人以及於天而克昌其後嗣也蘓氏曰周人以諱事神文王名昌而此詩日克昌厥後何也曰周之所謂諱不以其名號之耳不遂廢其文也諱其名而廢其文者周禮之末失也綏我眉夀叶殖酉反介以繁祉既右音又烈考叶音口亦右文母叶滿彼反右尊也周禮所謂享右祭祀是也烈考猶皇考也文母大姒也言文王昌厥後而安之以眉夀助之以多福使我得以右於烈考文母也雝一章十六句周禮樂師及徹帥學士而歌徹説者以為即此詩論語亦曰以雍徹然則此蓋徹祭所歌而亦名為徹也載見音現辟音璧王曰求厥章龍旂陽陽和鈴央央音秧鞗音條革有鶬音槍休有烈光賦也載則也發語辭也章法度也交龍曰旂陽明也軾前曰和旂上曰鈴央央有鶬皆聲和也休羙也此諸侯助祭於武王廟之詩先言其來朝禀受法度其車服之盛如此率見昭考以孝以享叶虚良反昭考武王也廟制太祖居中左昭右穆周廟大王當穆武王當昭故書稱穆考文王而此詩及訪落皆謂武王為昭考此乃言王率諸侯以祭武王廟也以介眉壽永言保之思皇多祜音户烈文辟公綏以多福俾緝熈于純嘏叶音古思語辭皇大也羙也又言孝享以介眉夀而受多福是皆諸侯助祭有以致之使我得繼而明之以至於純嘏也蓋歸徳於諸侯之辭猶烈文之意也載見一章十四句有客有客亦白其馬叶滿補反有萋有且上聲敦音堆琢其旅賦也客微子也周既滅商封微子於宋以祀其先王而以客禮待之不敢臣也亦語辭也殷尚白脩其禮物仍殷之舊也萋且未詳傳曰敬慎貌敦琢選擇也旅其卿大夫從行者也此㣲子來見祖廟之詩而此一節言其始至也有客宿宿有客信信言授之縶音執以縶其馬一宿曰宿再宿曰信縶其馬愛之不欲其去也此一節言其將去也薄言追之左右綏之既有淫威降福孔夷追之已去而復還之愛之無已也左右綏之言所以安而留之者無方也滛威未詳舊説滛大也統承先王用天子禮樂所謂滛威也夷易也大也此一節言其留之也有客一章十二句於音烏皇武王無競維烈允文文王克開厥後嗣武受之勝殷遏劉耆音指定爾功賦也於歎辭皇大遏止劉殺耆致也周公象武王之功為大武之樂言武王無競之功實文王開之而武王嗣而受之勝殷止殺以致定其功也武一章七句春秋傳以此為大武之首章也大武周公象武王武功之舞歌此詩以奏之禮曰朱干玉戚冕而舞大武然𫝊以此詩為武王所作則篇内已有武王之諡而其説誤矣臣工之什十篇十章一百六句周頌閔予小子之什四之三閔予小子遭家不造叶徂候反嬛嬛音煢在疚音救於音烏乎音呼皇考叶袪候反永世克孝叶呼候反賦也成王免喪始朝於先王之廟而作此詩也閔病也予小子成王自稱也造成也嬛與煢同無所依怙之意疚哀病也匡衡曰煢煢在疚言成王喪畢思慕意氣未能平也蓋所以就文武之業崇大化之本也皇考武王也歎武王之終身能孝也念茲皇祖陟降庭叶去聲止維予小子夙夜敬止皇祖文王也承上文言武王之孝思念文王常若見其陟降於庭猶所謂見堯於牆見堯於羮也楚辭云三公揖讓登降堂只與此文勢正相似而匡衡引此句顔注亦云若神明臨其朝廷是也於乎皇王繼序思不忘皇王兼指文武也承上文言我之所以夙夜敬止者思繼此序而不忘耳閔予小子一章十一句此成王除喪朝廟所作疑後世遂以為嗣王朝廟之樂後三篇倣此訪予落止率時昭考於乎悠哉朕未有艾將予就之繼猶判渙維予小子未堪家多難去聲紹庭上下陟降厥家休矣皇考以保明其身賦也訪問落始悠逺也艾如夜未艾之艾判分渙散保安明顯也成王既朝於廟因作此詩以道延訪羣臣之意言我將謀之於始以循我昭考武王之道然而其道逺矣予不能及也將使予勉强以就之而所以繼之者猶恐其判渙而不合也則亦繼其上下於庭陟降於家庶幾頼皇考之休冇以保明吾身而已矣訪落一章十二句説同上篇敬之敬之天維顯思叶新夷反命不易去聲哉叶奬黎反無曰髙髙在上陟降厥士日監在茲叶津之反賦也顯明也思語辭也士事也成王受羣臣之戒而述其言曰敬之哉敬之哉天道甚明其命不易保也無謂其髙而不吾察當知其聰明明畏常若陟降於吾之所為而無日不臨監於此者不可以不敬也維予小子叶奬里反不聰敬止日就月將學有緝熈于光明叶謨郎反佛音弼時仔音茲肩示我顯徳行去聲叶户即反將進也佛弼通仔肩任也然此乃自為答之之言曰我不聰而未能敬也願學焉庶㡬日有所就月有所進續而明之以至於光明又頼羣臣輔助我所負荷之任而示我以顯明之徳行則庶乎其可及爾敬之一章十二句予其懲而毖後患莫予荓音俜蜂自求辛螫音釋肇允彼桃蟲拚音翻飛維鳥未堪家多難去聲予又集于蓼音了賦也慇有所傷而知戒也毖慎荓使也蜂小物而有毒肇始允信也桃蟲鷦鷯小鳥也拚飛貌鳥大鳥也鷦鷯之雛化而為鵰故古語曰鷦鷯生鵰言始小而終大也蓼辛苦之物也此亦訪落之意成王自言予何所懲而謹後患乎荓蜂而得辛螫信桃蟲而不知其能為大鳥此其所當懲者蓋指管蔡之事也然我方㓜冲未堪多難而又集于辛苦之地羣臣奈何捨我而弗助哉小毖一章八句蘇氏曰小毖者謹之於小也謹之於小則大患無由至矣載芟載柞音窄叶疾各反其耕澤澤音釋叶徒洛反賦也除草曰芟除木曰柞秋官柞氏掌攻草木是也澤澤解散也千耦其耘徂隰徂畛音眞耘去苗間草也隰為田之處也畛田畔也侯主侯伯侯亞侯旅侯彊侯以有嗿他感反其饁音曄思媚其婦有依其士有略其耜叶養里反俶載南畝叶滿委反主家長也伯長子也亞仲叔也旅衆子弟也彊民之有餘力而來助者遂人所謂以彊予任甿者也能左右之曰以太宰所謂聞民轉移執事者若今時傭力之人随主人所左右者也嗿衆飲食聲也媚順依愛士夫也言餉婦與耕夫相慰勞也略利俶始載事也播厥百榖寔函斯活叶呼酷反函含活生也既播之其寔含氣而生也驛驛其達叶佗悦反有厭其傑驛驛苗生貌達出土也厭受氣足也傑先長者也厭厭其苗緜緜其麃表驕反緜緜詳宻也麃耘也載穫濟濟上聲有實其積音漬叶上聲萬億及秭為酒為醴烝畀祖妣以洽百禮濟濟人衆貌實積之實也積露積也有飶音邲其香邦家之光有椒其馨胡考之寕飶芬香也未詳何物胡壽也以燕享賓客則邦家之所以光也以共飬耆老則胡考之所以安也匪且有且匪今斯今叶音經振古如茲無韻未詳且此振極也言非獨此處有此稼穡之事非獨今時有今豐年之慶蓋自極古以來已如此矣猶言自古有年也載芟一章三十一句此詩未詳所用然辭意與豐年相似其用應亦不殊畟畟音測良耜叶飬里反俶音蓄載南畆叶滿委反賦也畟畟嚴利也播厥百榖寔函斯活叶呼酷反説見前篇或來瞻女載筐及筥其饟式亮反伊黍或來瞻女婦子之來饁者也筐筥饟具也其笠伊糾叶其了反其鎛音博斯趙直了反以薅音髙荼蓼糾然笠之輕舉也趟刺薅去也荼陸草蓼水草一物而有水陸之異也今南方人猶謂蓼為辣荼或用以毒溪取魚即所謂荼毒也荼蓼朽止黍稷茂叶莫口反止毒草朽則土熟而苗盛穫之挃挃音窒積之栗栗其崇如墉其比去聲如櫛側瑟反以開百室挃挃穫聲也栗栗積之宻也櫛理髪器言密也百室一族之人也五家為比五比為閭四閭為族族人輩作相助故同時入榖也百室盈止婦子寜止盈滿寕安也殺時犉音淳牡有捄音求其角叶盧谷反以似以續續古之人黄牛黒唇曰犉捄曲貌續謂續先祖以奉祭祀良耜一章二十三句或疑思文臣工噫嘻豐年載芟良耜等篇即所謂豳頌者其詳見於豳風及大田篇之末亦未知其是否也絲衣其紑孚浮反載弁俅俅音求自堂徂基自羊徂牛鼐音奈鼎及鼒叶津之反兕觥其觩音求㫖酒思柔不吳音話不敖音傲胡考之休賦也絲衣祭服也紑潔貌載戴也弁爵弁也士祭於王之服仗俅恭順貌基門塾之基鼐大鼎鼒小鼎也思語辭柔和也吳諽也此亦祭而飲酒之詩言此服絲衣爵弁之人升門堂視壺濯籩豆之屬降徃於基告濯具又視牲從羊至牛反告充已乃舉鼎冪告潔禮之次也又能謹其威儀不諠諽不怠傲故能得夀考之福絲衣一章九句此詩或紑俅牛觩柔休並叶基韻或基鼒並叶紑韻於音烏鑠音爍王師遵養時晦時純熈矣是用大介我龍受之蹻蹻音矯王之造叶祖候反載用有嗣叶音祠寔維爾公允師賦也於歎辭鑠盛遵循熈光介甲也所謂一戎衣也龍寵也蹻蹻武貌造為載則公事允信也此亦頌武王之詩言其初有於鑠之師而不用退自循飬與時皆晦既純光矣然後一戎衣而天下大定後人於是寵而受此蹻蹻然王者之功其所以嗣之者亦惟武王之事是師爾酌一章八句酌即勺也内則十三舞勺即以此詩為節而舞也然此詩與賚般皆不用詩中字名篇疑取樂節之名如曰武宿夜云爾綏萬邦屢音慮豐年天命匪解音懈桓桓武王保有厥士于以四方克定厥家於音烏昭于天皇以閒之賦也綏安也桓桓武貌大軍之後必有凶年而武王克商刖除害以安天下故屢獲豐年之祥𫝊所謂周饑克殷而年豐是也然天命之於周久而不厭也故此桓桓之武王保有其士而用之於四方以定其家其徳上昭于天也閒字之義未詳傳曰閒代也言君天下以代商也此亦頌武王之功桓一章九句春秋傳以此為大武之六章則今之篇次蓋已失其舊矣又篇内已有武王之諡則其謂武王時作者亦誤矣序以為講武𩔖禡之詩豈後世取其義而用之於其事也歟文王既勤止我應受之敷時繹思我徂維求定時周之命於繹思賦也應當也敷布時是也繹尋繹也於歎辭繹思尋繹而思念也此頌文武之功而言其大封功臣之意也言文王之勤勞天下至矣其子孫受而有之然而不敢專也布此文王功徳之在人而可繹思者以賚有功而徃求天下之安定又以為凡此皆周之命而非復商之舊矣遂歎羙之而欲諸臣受封賞者繹思文王之徳而不忘也賚一章六句春秋傳以此為大武之三章而序以為大封於廟之詩説同上篇於音烏皇時周陟其髙山嶞音惰山喬嶽允猶翕音吸河敷天之下裒音抔時之對時周之命賦也髙山泛言山耳嶞則其狹而長者喬髙也嶽則其髙而大者允猶未詳或曰允信也猶與由同翕河河善泛溢今得其性故翕而不為暴也裒聚也對答也言羙哉此周也其廵守而登此山以柴望又道於河以周四嶽凡以敷天之下莫不有望於我故聚而朝之方嶽之下以答其意耳般一章七句般義未詳閔予小子之什十一篇一百三十六句魯頌四之四魯少皥之墟在禹貢徐州蒙羽之野成王以封周公長子伯禽今襲慶東平府沂宻海等州即其地也成王以周公有大勲勞於天下故賜伯禽以天子之禮樂魯於是乎有頌以為廟樂其後又自作詩以羙其君亦謂之頌舊説皆以為伯禽十九世孫僖公申之詩今無所考獨閟宮一篇為僖公之詩無疑耳夫以其詩之僭如此然夫子猶録之者蓋其體固列國之風而所歌者乃當時之事則猶未純於天子之頌若其所歌之事又皆有先王禮樂教化之遺意焉則其文疑若猶可予也况夫子魯人亦安得而削之哉然因其實而著之而其是非得失自有不可揜者亦春秋之法也或曰魯之無風何也先儒以為時王襃周公之後比於先代故廵守不陳其詩而其篇序不列於大師之職是以宋魯無風其或然歟或謂夫子有所諱而削之則左氏所記當時列國大夫賦詩及吳季子觀周樂皆無曰魯風者其説不得通矣駉駉音扄牡馬叶滿補反在坰音扄之野叶上與反薄言駉者叶章與反有驈音聿有皇有驪音離有黄以車彭彭叶鋪郎反思無疆思馬斯臧賦也駉駉腹幹肥張貌邑外謂之郊郊外謂之牧牧外謂之野野外謂之林林外謂之坰驪馬白跨曰驈黄白曰皇純黒曰驪黄騂曰黄彭彭盛貌思無疆言其思之深廣無窮也臧善也此詩言僖公牧馬之盛由其立心之逺故美之曰思無疆則思馬斯臧矣衛文公秉心塞淵而牝三千亦此意也駉駉牡馬在坰之野薄言駉者有騅音隹有駓音丕有騂有騏以車伾伾思無期思馬斯才叶前西反賦也倉白雜毛曰騅黄白雜毛曰駓赤黄曰騂青黒曰騏伾伾有力也無期猶無疆也才材力也駉駉牡馬在坰之野薄言駉者有驒音䭾有駱有駵音留有雒以車繹繹叶弋灼反思無斁叶弋灼反思馬斯作賦也青驪驎曰驒色有深淺斑駁如魚鱗今之連錢驄也白馬黑鬛曰駱赤身黒鬣曰駵黒身白鬛曰雒繹繹不絶貌斁厭也作奮起也駉駉牡馬在坰之野薄言駉者有駰音因有騢音遐叶洪孤反有驔音簞有魚以車袪袪音區思無邪叶祥余反思馬斯徂賦也隂白雜毛曰駰隂淺黒色今泥驄也彤白雜毛曰騢豪骭曰驔毫在骭而白也二目白曰魚似魚目也袪袪彊健也徂行也孔子曰詩三百一言以蔽之日思無邪蓋詩之言羙惡不同或勸或懲皆有以使人得其情性之正然其明白簡切通於上下未有若此言者故特稱之以為可當三百篇之義以其要為不過乎此也學者誠能深味其言而審於念慮之閒必使無所思而不出於正則日用云為莫非天理之流行矣蘇氏曰昔之為詩者未必知此也孔子讀詩至此而有合於其心焉是以取之蓋斷章云爾駉四章章八句有駜音邲有駜駜彼乘去聲黄夙夜在公在公明明叶謨郎反振振鷺鷺于下叶後五反鼓咽咽音淵醉言舞于胥樂音洛兮興也駜馬肥強貌明明辨治也振振羣飛貌鷺鷺羽舞者所持或坐或伏如鷺之下也咽與淵同鼓聲之深長也或曰鷺亦興也胥相也醉而起舞以相樂也此燕飲而頌禱之辭也有駜有駜駜彼乗牡夙夜在公在公飲酒振振鷺鷺于飛鼓咽咽醉言歸于胥樂兮興也鷺于飛舞者振作鷺羽如飛也有駜有駜駜彼乘駽音絢夙夜在公在公載燕自今以始嵗其有叶羽已反君子有榖詒孫子叶奬里反于胥樂兮興也青驪曰駽今鐡驄也載則也有有年也榖善也或曰禄也詒遺也頌禱之辭也有駜三章章九句思樂音洛泮音判水薄采其芹音勤魯侯戾止言觀其旂叶其斤反其旂笩笩音斾鸞聲噦噦音嚖無小無大從公于邁賦其事以起興也思發語辭也泮水泮宫之水也諸侯之學鄉射之宮謂之泮宮其東西南方有水形如半璧以其半於辟廱故曰泮水而宫亦以名也芹水菜也戻至也笩筏飛揚也噦噦和也此飲於泮宫而頌禱之辭也思樂泮水薄采其藻魯侯戾止其馬蹻蹻其馬蹻蹻其音昭昭叶之繞反載色載笑匪怒伊教賦其事以起興也蹻蹻盛貌色和顔色也思樂泮水薄采其茆叶謨九反魯侯戾止在泮飲酒既飲㫖酒永錫難老叶魯吼反順彼長道叶徒吼反屈此羣醜賦其事以起興也茆鳬葵也葉大如手赤圓而湑江南人謂之蓴菜者也長道猶大道也屈服醜衆也此章以下皆頌禱之辭也穆穆魯侯敬明其徳敬慎威儀維民之則允文允武昭假音格烈祖靡有不孝自求伊祜音户賦也昭明也假與格同烈祖周公魯公也明明魯侯克明其徳既作泮宮淮夷攸服叶蒲北反矯矯虎臣在泮獻馘音虢叶况璧反淑問如臯陶叶夷周反在泮獻囚賦也矯矯武貌馘所格者之左耳也淑善也問訊囚也囚所虜𫉬者蓋古者出兵受成於學及其反也釋奠於學而以訊馘告故詩人因魯侯在泮而願其有是功也濟濟上聲多士克廣徳心桓桓于征狄音剔彼東南叶尼心反烝烝皇皇不吳音話不揚不告于訩音凶在泮獻功賦也廣推而大之也徳心善意也狄猶逿也東南謂淮夷也烝烝皇皇盛也不吳不揚肅也不告于訩師克而和不爭功也角弓其觩束矢其搜戎車孔博徒御無斁叶弋灼反既克淮夷孔淑不逆叶宜脚反式固爾猶淮夷卒獲叶黄郭反賦也觩弓健貌五十矢為束或曰百矢也搜矢疾聲也慱廣大也無斁言競勸也逆違命也蓋能審同其謀猶則淮夷終無不獲矣翩彼飛鴞音梟集于泮林食我桑黮音甚懐我好音憬音耿彼淮夷來獻其琛敕金反元龜象齒大賂南金興也鴞惡聲之鳥也黮桑實也憬覺悟也琛寳也元龜尺二寸賂遺也南金荆揚之金也此章前四句興後四句如行葦首章之例也泮水八章章八句閟音秘宮有侐音洫實實枚枚赫赫姜嫄音元其徳不回上帝是依叶音隈無災無害彌月不遲叶陳回反是生后稷降之百福叶筆力反黍稷重平聲穋音六叶六直反稙音陟稺菽麥叶訖力反奄有下國叶于逼反俾民稼穡有稷有黍有稻有秬音巨奄有下土纘禹之緒音序賦也閟深閉也宮廟也侐清静也實實鞏固也枚枚礱密也時蓋脩之故詩人歌詠其事以為頌禱之辭而推本后稷之生而下及於僖公耳回邪也依猶眷顧也説見生民篇先種曰稙後種曰稺奄有下國封於邰也緒業也禹治洪水既平后稷乃播種百榖后稷之孫實維大音泰王居岐之陽實始翦商至于文武纘大王之緒致天之屆于牧之野叶上與反無貳無虞上帝臨女音汝敦音堆商之旅克咸厥功叶居古反王曰叔父建爾元子叶子古反俾侯于魯大啓爾宇為周室輔賦也翦斷也大王自豳徙居岐陽四方之民咸歸徃之於是而王迹始著蓋有翦商之漸矣屆極也猶言窮極也虞慮也無貳無虞上帝臨女猶大明云上帝臨女無貳爾心也敦治之也咸同也言輔佐之臣同有其功而周公亦與焉也王成王也叔父周公也元子魯公伯禽也啓聞宇居也乃命魯公俾侯于東錫之山川土田附庸周公之孫莊公之子叶奬里反龍旂承祀叶飬里反六轡耳耳春秋匪解音懈叶訖力反享祀不忒皇皇后帝皇祖后稷享以騂犧虚宜虚何二反是饗是宜牛竒牛何二反降福既多章移當何二反周公皇祖亦其福女音汝賦也附庸猶屬城也小國不能自達於天子而附於大國也上章既告周公以封伯禽之意此乃言其命魯公而封之也莊公之子其一閔公其一僖公知此是僖公者閔公在位不久未有可頌此必是僖公也耳耳柔從也春秋錯舉四時也忒過差也成王以周公有大功於王室故命魯公以夏正孟春郊祀上帝配以后稷牲用騂牡皇祖謂羣公此章以後皆言僖公致敬郊廟而神降之福國人稱願之如此也秋而載嘗夏而福衡叶户即反白牡騂剛犧尊將將音搶毛炰音庖胾音恣羮叶盧當反籩豆大房萬舞洋洋孝孫有慶叶袪羊反俾爾熾而昌俾爾壽而臧保彼東方魯邦是常不虧不崩不震不騰三壽作朋如岡如陵賦也嘗秋祭名楅衡施於牛角所以止觸也周禮封人云凡祭飾其牛牲設其楅衡是也秋將嘗而夏楅衡其牛言夙戒也白牡周公之牲也騂剛魯公之牲也白牡殷牲也周公有王禮故不敢與文武同魯公則無所嫌故用騂剛犠尊畫牛於尊腹也或曰尊作牛形鑿其背以受酒也毛炰周禮封人祭祀冇毛炰之豚注云爓去其毛而炰之也胾切肉也羮大羮鉶羮也大羮大古之羮湆煑肉汁不和盛之以豋貴其質也鉶羮肉汁之有菜和者也盛之鉶器故曰鉶羮大房半體之爼足下有跗如堂房也萬舜名震騰驚動也三壽未詳卿氏曰三卿也或曰願公壽與岡陵等而為三也公車千乘去聲叶神陵反朱英綠縢音滕二矛重平聲弓叶姑𢎞反公徒三萬貝胄朱綅音織叶息稜反烝徒增增戎狄是膺荆舒是懲則莫我敢承俾爾昌而熾俾爾壽而富叶方未反黄髪台背叶蒲寐反壽胥與試俾爾昌而大叶特計反俾爾耆而艾叶五計反萬有千嵗眉壽無有害叶暇憩反賦也千乘大國之賦也成方十里出莗車一乘卬士三人左持弓右持矛中人御歩卒七十二人將重車者二十五人千乘之地則三百十六里有竒也朱英所以餙矛緑縢所以約弓也二矛夷矛酋矛也重弓備折壊也徒歩卒也三萬舉成數也車千乘法當用十萬人而為歩卒者七萬二千人然大國之賦適滿千乘荀盡用之是舉國而行也故其用之大國三軍而已三軍謂車三百七十五乘三萬七千五百人其為歩卒不過二萬七千人舉其中而以成數言故曰三萬也貝冑貝飾胄也朱綅所以綴也增増衆也戎西戎狄北狄膺當也荆楚之别號舒其與國也懲艾承禦也僖公嘗從齊桓公伐楚故以此羙之而祝其昌大壽考也壽胥與試之義未詳王氏曰壽考者相與為公用也蘇氏曰願其壽而相與試其才力以為用也泰山巖巖叶魚咸反魯邦所詹奄有龜蒙遂荒大東至于海邦叶卜工反淮夷來同莫不率從魯侯之功賦也泰山魯之望也詹與瞻同龜蒙二山名荒奄也大東極東也海邦近海之國也保有鳧繹叶弋灼反遂荒徐宅叶逹各反至于海邦淮夷蠻貊叶莫博反及彼南夷莫不率從莫敢不諾魯侯是若賦也鳧繹二山名宅居也謂徐國也諾應辭若順也泰山龜蒙鳧繹魯之所有其餘則國之東南勢相連屬可以服從之國也天錫公純嘏叶果五反眉壽保魯居常與許復周公之宇魯侯燕喜令妻壽母叶滿委反宜大夫庶士邦國是有叶羽已反既多受祉黄髪兒齒賦也常或作嘗在薛之旁許許田也魯朝宿之邑也皆魯之故地見侵於諸侯而未復者故魯人以是願僖公也令妻令善之妻聲姜也壽母壽考之母成風也閔公八嵗被弑必是未娶其母叔姜亦應未老此言令妻壽母又可見公為僖公無疑也有常有也兒齒齒落更生細者亦夀徵也徂來之松新甫之柏叶逋莫反是斷音短是度入聲是尋是尺叶尺約反松桷音角有舄叶七約反路寢孔碩叶常約反新廟奕奕叶弋灼反奚斯所作孔曼音萬且碩同上萬民是若賦也徂宋新甫二山名八尺曰尋舄大貌路寢正寢也新廟僖公所修之廟奚斯公子魚也作者敎䕶屬功課章程也曼長碩大也萬民是若順萬民之望也閟宮九章五章章十七句内第四章脱一句二章章八句二章章十句舊説八章二章章十七句一章十二句一章三十八句二章章八句二章章十句多寡不均雜亂無次蓋不知第四章有脫句而然今正其誤魯頌四篇二十四章二百四十三句商頌四之五契為舜司徒而封於商傳十四世而湯有天下其後三宗迭興及紂無道為武王所滅封其庶兄微子啓於宋脩其禮樂以奉商後其地在禹貢徐州泗濱西及豫州盟豬之野其後政衰商之禮樂日以放失七世至戴公時大夫正考甫得商頌十二篇於周大師歸以祀其先王至孔子編詩而又亡其七篇然其存者亦多闕文疑義今不敢强通也商都亳宋都商丘皆在今應天府毫州界猗音醫與音余那與置我鞉音祧鼔奏鼓簡簡衎我烈祖賦也猗歎辭那多置陳也簡簡和大也衎樂也烈祖湯也記曰商人尚聲臭味未成滌蕩其聲樂三然後出迎牲即此是也舊説以此為祀成湯之樂也湯孫奏假綏我思成鞉鼓淵淵叶於中反嚖嘒管聲既和且平依我磬聲於音烏赫湯孫叶思倫反穆穆厥聲湯孫主祀之時王也假與格同言奏樂以格於祖考也綏安也思成未詳鄭氏曰安我以所思而成之人謂神明來格也禮記曰齊之日思其居處思其笑語思其志意思其所樂思其所嗜齊三日乃見其所為齊者祭之日入室僾然必有見乎其位周旋出户肅然必有聞乎其容聲出户而聼愾然必有聞乎其歎息之聲此之謂思成蘇氏曰其所見聞本非有也生於思耳此二說近是蓋齊而思之祭而如有見聞則成此人矣鄭注頗有脱誤今正之淵淵深逺也嘒嘒清亮也磬玉磬也堂上升歌之樂非石磬也穆穆羙也庸鼔有斁萬舞有奕我有嘉客亦不夷懌庸鏞過斁然盛也奕奕然有次序也蓋上文言鞉鼓管籥作於堂下其聲依堂上之玉磬無相奪倫者至於此則九獻之後鐘鼓交作萬舞陳於庭而祀事畢矣嘉客先代之後來助祭者也夷悦也亦不夷懌者言皆悦懌也自古在昔先民有作溫恭朝夕執事有恪恪敬也言恭敬之道古人所行不可忘也閔馬父曰先聖王之傳恭猶不敢專稱曰自古古曰在昔昔曰先民顧予烝甞湯孫之將將奉也言湯其尚顧我烝甞哉此湯孫之所奉者致其丁寕之意庶發其顧之也那一章二十二句閔馬父曰正考甫校商之名頌以那為首其輯之亂曰云云即此詩也嗟嗟烈祖有秩斯祜音户申錫無疆及爾斯所賦也烈祖湯也秋常申重也爾主祭之君蓋自歌者指之也斯所猶言此處也此亦祀成湯之樂言嗟嗟烈祖有秩秩無窮之福可以申錫於無疆是以及於爾今王之所而脩其祭祀如下所云也既載清酤叶候五反賚我思成叶音常亦有和羮叶音郎既戒既平叶音旁鬷音奏假音假無言叶音昻時靡有爭叶音章綏我眉壽黄耉無疆酟酒賚與也思成義見上篇和羮味之調節也戒夙戒也平猶和也儀禮於祭祀燕享之始每言羮定蓋以羮熟為節然後行禮定即戒平之謂也鬷中庸作奏正與上篇義冋蓋古聲奏族相近族聲轉平而為鬷耳無言無爭肅敬而齊一也言其載清酤而既與我以思成矣及進和羮而肅敬之至則又安我以眉壽黄耇之福也約軧音祈錯衡叶户郎反八鸞鶬鶬音搶以假音格以享叶虚良反我受命溥將自天降康豐年穰穰來假來饗叶虚良反降福無疆約軧錯衡八鸞見采芑篇鶬見載見篇言助祭之諸侯乘是車以假以享於祖宗之廟也溥廣將大也穰穰多也言我受命既廣大而天降以豐年黍稷之多使得以祭也假之而祖考來假享之而祖考來饗則降福無疆矣顧予烝甞湯孫之將説見前篇烈祖一章二十二句天命𤣥鳥降而生商宅殷土芒芒古帝命武湯正域彼四方賦也𤣥鳥鳦也春分𤣥烏降髙辛氏之妃有娀氏女簡狄祈於郊禖鳦遺卵簡狄吞之而生契其後世遂為有商氏以有天下事見史記宅居也殷地名芒芒大貌古猶昔也帝上帝也武湯以其有武徳號之也正治也域封境也此亦祭祀宗廟之樂而追叙商人之所由生以及其有天下之初也方命厥后奄有九有叶羽已反商之先后受命不殆叶飬里反在武丁孫子叶奬里反方命厥後四方諸侯無不受命也九有九州也武丁髙宗也言商之先后受天命不危殆故今武丁孫子猶賴其福武丁孫子武王靡不勝音升龍旂十乘大糦音熾是承武王湯號而其後世亦以自稱也龍旂諸侯所建交龍之旂也大糦黍稷也承卷也言武丁孫子今襲湯號者其武無所不勝於是諸侯無不菶黍稷以來助祭也邦畿千里維民所止肇域彼四海叶虎洧反止居肇閒也言王畿之内民之所止不過千里而其封域則極乎四海之廣也四海來假音格來假祈祈景員維河殷受命咸宜叶牛何反百禄是何音荷叶如字未假與格同祈祈衆多貌景員維河之義詳或曰景山名商所都也見殷武卒章春秋傳亦曰商湯有景亳之命是也員與下篇幅隕義同蓋言周也河大河也言景山四周皆大河也何任也春秋傳作荷𤣥鳥一章二十二句濬哲維商長發其祥洪水芒芒禹敷下土方外大國是疆幅隕音員既長有娀音崧方將帝立子生商賦也濬深哲知長久也方四方也外大國逺諸侯也幅猶言邉幅也隕讀作員謂周也有娀契之母家也將大也言商世世有濬哲之君其受命之祥發見也久矣方禹冶洪水以外大國為中國之竟而幅員廣大之時有娀氏始大故帝立其女之子而造商室也蓋契於是時始為舜司徒掌布五教於四方而商之受命實基於此𤣥王桓撥叶必烈反受小國是逹叶他悦反受大國是逹率履不越遂視既發叶方月反相土烈烈海外有截賦也𤣥王契也𤣥者深微之稱或曰以𤣥鳥降而生也王者追尊之號桓武撥治逹通也受小國大國無所不逹言其無所不宜也率循履禮越過發應也言契能循禮不過越遂視其民則既發以應之矣相土契之孫也截整齊也至是而商益大四方諸侯歸之截然整齊矣其後湯以七十里起豈嘗中衰也與帝命不違至于湯齊湯降不遲聖敬日躋音賫昭假遲遲上帝是祗帝命式于九圍賦也湯齊之義未詳蘇氏曰至湯而王業成與天命㑹也降猶生也遲遲久也祗敬式法也九圍九州也商之先祖既有明徳天命未嘗去之以至於湯湯之生也應期而降適當其時其聖敬又日躋升以至昭假于天久而不息惟上帝是敬故帝命之使為法於九州也受小球音求大球為下國綴音贅旒音流何音賀天之休不競不絿音求不剛不柔敷政優優百禄是遒音囚賦也小球大球之義未詳或曰小國大國所贄之玉也鄭氏曰小球鎮圭尺有二寸大球大圭三尺也皆天子之所執也下國諸侯也綴猶結也旒旗之埀者也言為天子而為諸侯所係屬如旗之縿為旒所綴著也何荷競强絿緩也優優寛裕之意遒聚也受小共音恭叶居勇反大共為下國駿音峻厖音忙叶莫孔反何天之龍叶丑勇反敷奏其勇不震不動叶徳總反不戁音赧不竦音聳百祿是總賦也小共大共駿厖之義未詳或曰小國大國所共之貢也鄭氏曰共執也猶小球大球也蘇氏曰共珙通合珙之玉也傳曰駿大也厖厚也董氏曰齊詩作駿駹謂馬也龍寵也敷奏其勇猶言大進其武功也戁恐竦懼也武王載旆有虔秉鉞音越如火烈烈則莫我敢曷音遏叶何竭反苞有三蘖叶五竭反莫遂莫逹叶他悦反九有有截韋顧既伐叶房越反昆吾夏桀賦也武王湯也䖍敬也言恭行天討也曷遏通或曰曷誰何也苞本也蘖旁生萌蘖也言一本生三蘖也本則夏桀蘖則韋也顧也昆吾也皆桀之黨也鄭氏曰韋彭姓顧昆吾已姓言湯既受命載旆秉鉞以征不義桀與三蘖皆不能遂其惡而天下截然歸商矣初伐韋次伐顧次伐昆吾乃伐夏桀當時用師之序如此昔在中葉有震且業允也天子叶奬里反降于卿士寔維阿衡叶户郎反寔左音佐右音又商王賦也葉世震懼業危也承上文而言昔在則前乎此矣豈謂湯之前世中衰時與允也天子指湯也降言天賜之也卿士則伊尹也言至於湯得伊尹而有天下也阿衡伊尹官號也長發七章一章八句四章章七句一章九句一章六句序以此為大禘之詩蓋祭其祖之所出而以其祖配也蘓氏曰大禘之祭所及者逺故其詩厯言商之先后又及其卿士伊尹蓋與祭於禘者也商書曰茲予大享于先王爾祖其從與享之是禮也豈其起於商之世歟今按大禘不及羣廟之主此宜為裕祭之詩然經無明文不可考也撻彼殷武奮伐荆楚冞面規反入其阻裒音抔荆之旅有截其所湯孫之緒音序賦也撻疾貌殷武殷王之武也冞冒裒聚湯孫謂髙宗舊説以此為祀髙宗之樂蓋自盤庚没而殷道哀楚人叛之髙宗撻然用武以伐其國入其險阻以致其衆盡平其地使截然齊一皆髙宗之功也易曰髙宗伐鬼方三年克之蔬謂此歟維女音女荆楚居國南鄉昔有成湯自彼氐音堤羌莫敢不來享叶虚良反莫敢不來王曰商是常賦也氏羌夷秋國在西方享獻也世見曰王蘇氏曰既克之則告之曰爾雖逺亦居吾國之南耳昔成湯之世雖氐羌之逺猶莫敢不來朝曰此商之常禮也况汝荆楚曷敢不至哉天命多辟音璧設都于禹之績嵗事來辟勿予禍適音謫稼穡匪觧音懈叶訖力反賦也多辟諸侯也來辟來王也適謫通言天命諸侯各建都邑於禹所治之地而皆以嵗事來至於商以祈王之不譴曰我之稼穡不敢解也庶可以免咎矣言荆楚既平而諸候畏服也天命降監下與濫叶下民有嚴叶五聞反不僭不濫不敢怠遑命于下國叶越逼反封建厥福叶筆力反賦也監視嚴威也僭賞之差也刑之過也遑暇封大也言天命降監不在乎他皆在民之視聽則下民亦有嚴矣惟賞不僭刑不濫而不敢怠遑則天命之以天下而大建其福此髙宗所以受命而中興也商邑翼翼四方之極赫赫厥聲濯濯厥靈壽考且寜以保我後生叶桑經反賦也商邑王都也翼翼整敕貌極表也赫赫頸盛也濯濯光明也言髙宗中興之盛如此壽考且寜云者蓋髙宗之享國五十有九年我後生謂後嗣子孫也陟彼景山叶所旗反松柏丸丸叶胡員反是斷音短是遷方斵音卓是虔松桷音角有梴五連反旅楹有閑叶胡田反寢成孔安叶於連反賦也景山名商所却也丸丸直也遷徙方正也䖍亦截也挺長貌旅衆也閑閑然而大也寢廟中之寢也安所以安髙宗之神也此盖特為百世不遷之廟不在三昭三穆之數既成始祔而祭之之詩也然此章與閟宮之卒章文意略同未詳何謂殷武六章三章章六句二章章七句一章五句商頌五篇十六章一百五十四句詩經集傳卷八
