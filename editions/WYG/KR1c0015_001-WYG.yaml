body:
  text: 詩經集傳卷一宋朱子撰國風一國者諸侯所封之域而風者民俗歌謠之詩也謂之風者以其被上之化以有言而其言又足以感人如物因風之動以有聲而其聲又足以動物也是以諸侯采之以貢於天子天子受之而列於樂官於以考其俗尚之美惡而知其政治之得失焉舊説二南為正風所以用之閨門鄉黨邦國而化天下也十三國為變風則亦領在樂官以時存肄備觀省而垂監戒耳合之凡十五國云周南一之一周國名南南方諸侯之國也周國本在禹貢雍州境内岐山之陽后稷十三世孫古公亶父始居其地傳子王季歴至孫文王昌辟國寖廣於是徙都于豐而分岐周故地以為周公旦召公奭之采邑且使周公為政於國中而召公宣布於諸侯於是德化大成於内而南方諸侯之國江沱汝漢之間莫不從化葢三分天下而有其二焉至子武王發又遷于鎬遂克商而有天下武王崩子成王誦立周公相之制作禮樂乃采文王之世風化所及民俗之詩被之筦弦以為房中之樂而又推之以及於鄉黨邦國所以著明先王風俗之盛而使天下後世之脩身齊家治國平天下者皆得以取法焉葢其得之國中者雜以南國之詩而謂之周南言自天子之國而被於諸侯不但國中而已也其得之南國者則直謂之召南言自方伯之國被於南方而不敢以繋於天子也岐周在今鳯翔府岐山縣豐在今京兆府鄠縣終南山北南方之國即今興元府京西湖北等路諸州鎬在豐東二十五里小序曰關雎麟趾之化王者之風故繋之周公南言化自北而南也鵲巢騶虞之德諸侯之風也先王之所以教故繋之召公斯言得之矣關關雎音疽鳩在河之洲窈音杳窕徒了反淑女君子好逑音求興也關關雌雄相應之和聲也雎鳩水鳥一名王雎状類鳬鷖今江淮間有之生有定耦而不相亂耦常並遊而不相狎故毛傳以為摰而有别列女傳以為人未嘗見其乘居而匹處者葢其性然也河北方流水之通名洲水中可居之地也窈窕幽閒之意淑善也女者未嫁之稱蓋指文王之妃太姒為處子時而言也君子則指文王也好亦善也逑匹也毛傳云摯字與至通言其情意深至也興者先言他物以引起所詠之辭也周之文王生有聖德又得聖女姒氏以為之配宫中之人於其始至見其有幽閒貞静之徳故作是詩言彼關關然之雎鳩則相與和鳴於河洲之上矣此窈窕之淑女則豈非君子之善匹乎言其相與和樂而恭敬亦若雎鳩之情摯而有别也後凡言興者其文意皆放此云漢匡衡曰窈窕淑女君子好逑言能致其貞淑不貳其操情欲之感無介乎容儀宴私之意不形乎動静夫然後可以配至尊而為宗廟主此綱紀之首王化之端也可謂善説詩矣參初金反差初宜反荇音杏菜左右流之窈窕淑女寤寐求之求之不得寤寐思服叶蒲北反悠哉悠哉輾音展轉反側興也參差長短不齊之貌荇接余也根生水底莖如釵股上青下白葉紫赤圓徑寸餘浮在水面或左或右言無方也流順水之流而取之也或寤或寐言無時也服猶懷也悠長也輾者轉之半轉者輾之周反者輾之過側者轉之留皆臥不安席之意此章本其未得而言彼參差之荇菜則當左右無方以流之矣此窈窕之淑女則當寤寐不忘以求之矣葢此人此德世不常有求之不得則無以配君子而成其内治之美故其憂思之深不能自己至於如此也參差荇菜左右采叶此禮反之窈窕淑女琴瑟友叶羽已反之參差荇菜左右芼音帽叶音邈之窈窕淑女鐘鼓樂音洛之興也采取而擇之也芼熟而薦之也琴五弦或七弦瑟二十五弦皆絲屬樂之小者也友者親愛之意也鐘金屬鼓革屬樂之大者也樂則和平之極也此章据今始得而言彼參差之荇菜旣得之則當采擇而亨芼之矣此窈窕之淑女既得之則當親愛而娯樂之矣葢此人此德世不常有幸而得之則有以配君子而成内治故其喜樂尊奉之意不能自己又如此云關雎三章一章四句二章章八句孔子曰關雎樂而不淫哀而不傷愚謂此言為此詩者得其性情之正聲氣之和也葢德如雎鳩摯而有别則后妃性情之正固可以見其一端矣至於寤寐反側琴瑟鐘鼓極其哀樂而皆不過其則焉則詩人性情之正又可以見其全體也獨其聲氣之和有不可得而聞者雖若可恨然學者姑即其辭而玩其理以養心焉則亦可以得學詩之本矣匡衡曰妃匹之際生民之始萬福之原婚姻之禮正然後品物遂而天命全孔子論詩以關雎為始言大上者民之父母后夫人之行不侔乎天地則無以奉神靈之統而理萬物之宜自上世以來三代興廢未有不由此者也葛之覃兮施音異于中谷維葉萋萋黄鳥于飛集于灌木共鳴喈喈叶居奚反賦也葛草名蔓生可為絺綌者覃延施移也中谷谷中也萋萋盛貎黄鳥鸝也灌木叢木也喈喈和聲之逺聞也賦者敷陳其事而直言之者也葢后妃既成絺綌而賦其事追叙初夏之時葛葉方盛而有黄鳥鳴於其上也後凡言賦者放此葛之覃兮施于中谷維葉莫莫是刈音乂是濩音鑊爲絺音癡爲綌音隙叶去略反服之無斁音亦叶弋灼反賦也莫莫茂密貎刈斬濩煑也精曰絺麤曰綌斁厭也此言盛夏之時葛既成矣於是治以為布而服之無厭蓋親執其勞而知其成之不易所以心誠愛之雖極垢弊而不忍厭棄也言告師氏言告言歸薄汚我私薄澣音緩我衣害音曷澣害否如字歸寧父母賦也言辭也師女師也薄猶少也汚煩撋之以去其汚猶治亂而曰亂也澣則濯之而已私燕服也衣禮服也害何也寧安也謂問安也上章既成絺綌之服矣此章遂告其師氏使告于君子以將歸寜之意且曰盍治其私服之汚而澣其禮服之衣乎何者當澣而何者可以未澣乎我將服之以歸寜於父母矣葛覃三章章六句此詩后妃所自作故無贊美之辭然於此可以見其已貴而能勤已富而能儉已長而敬不弛於師傅已嫁而孝不衰於父母是皆德之厚而人所難也小序以為后妃之本庶幾近之采采卷上聲耳不盈頃音傾筐嗟我懷人寘彼周行叶户郎反賦也采采非一采也卷耳枲耳葉如鼠耳叢生如盤頃欹也筐竹器懷思也人蓋謂文王也寘舍也周行大道也后妃以君子不在而思念之故賦此詩託言方采卷耳未滿頃筐而心適念其君子故不能復采而寘之大道之旁也陟彼崔音摧嵬音巍我馬虺音灰隤音頽我姑酌彼金罍維以不永懷叶胡隈反賦也陟升也崔嵬土山之戴石者虺隤馬罷不能升高之病姑且也罍酒器刻為雲雷之象以黄金飾之永長也之此又託言欲登此崔嵬之山以望所懷之人而徃從則馬罷病而不能進於是且酌金罍之酒而欲其不至於長以為念也陟彼高岡我馬𤣥黄我姑酌彼兕音似觥音肱叶古黄反維以不永傷賦也山脊曰岡𤣥黄𤣥馬而黄病極而變色也兕野牛一角青色重千斤觥爵也以兕角為爵也陟彼砠音疽矣我馬瘏音塗矣我僕痡音敷矣云何吁矣賦也石山戴土曰砠瘏馬病不能進也痡人病不能行也吁憂歎也爾雅注引此作旴張目望遠也詳見何人斯篇卷耳四章章四句此亦后妃所自作可以見其貞静専一之至矣豈當文王朝㑹征伐之時羑里拘幽之日而作歟然不可考矣南有樛音鳩木葛藟音壘纍音雷之樂音洛只音紙君子福履綏之興也南南山也木下曲曰樛藟葛類纍猶繫也只語助辭君子自衆妾而指后妃猶言小君内子也履禄綏安也后妃能逮下而無嫉妒之心故衆妾樂其徳而稱願之曰南有樛木則葛藟纍之矣樂只君子則福履綏之矣南有樛木葛藟荒之樂只君子福履將之興也荒奄也將猶扶助也南有樛木葛藟縈烏營反之樂只君子福履成之興也縈旋成就也樛木三章章四句螽音終斯羽詵詵音莘兮宜爾子孫振振音眞兮比也螽斯蝗屬長而青長角長股能以股相切作聲一生九十九子詵詵和集貌爾指螽斯也振振盛貎比者以彼物比此物也后妃不妒忌而子孫衆多故衆妾以螽斯之羣處和集而子孫衆多比之言其有是德而宜有是福也後凡言比者放此螽斯羽薨薨兮宜爾子孫繩繩兮比也薨薨羣飛聲繩繩不絶貎螽斯羽揖揖音緝兮宜爾子孫蟄蟄兮比也揖揖㑹聚也蟄蟄亦多意螽斯三章章四句桃之夭夭音腰灼灼其華音花之子于歸宜其室家興也桃木名華紅實可食夭夭少好之貌灼灼華之盛也木少則華盛之子是子也此指嫁者而言也婦人謂嫁曰歸周禮仲春令㑹男女然則桃之有華正婚姻之時也宜者和順之意室謂夫婦所居家謂一門之内文王之化自家而國男女以正婚姻以時故詩人因所見以起興而歎其女子之賢知其必有以宜其室家也桃之夭夭有蕡音文其實之子于歸宜其家室興也蕡實之盛也家室猶室家也桃之夭夭其葉蓁蓁音臻之子于歸宜其家人興也蓁蓁葉之盛也家人一家之人也桃夭三章章四句肅肅兔罝音嗟又子余反與夫叶椓之丁丁音爭赳赳武夫公侯干城興也肅肅整飭貌罝罟也丁丁椓杙聲也赳赳武貌干盾也干城皆所以扞外而衛内者化行俗美賢才衆多雖罝兔之野人而其才之可用猶如此故詩人因其所事以起興而美之而文王德化之盛因可見矣肅肅兔罝施于中逵赳赳武夫公侯好仇叶渠之反興也逵九達之道仇與逑同匡衡引關雎亦作仇字公侯善匹猶曰聖人之耦則非特干城而已歎美之無已也下章放此肅肅兔罝施于中林赳赳武夫公侯腹心興也中林林中腹心同心同德之謂則又非特好仇而已也兔罝三章章四句采采芣音浮苢音以薄言采叶此禮反之采采芣苢薄言有叶羽已反之賦也芣苢車前也大葉長穂好生道旁采始求之也有既得之也化行俗美家室和平婦人無事相與采此芣苢而賦其事以相樂也采之未詳何用或曰其子治産難采采芣苢薄言掇都奪反之采采芣苢薄言捋力活反之賦也掇拾也捋取其子也采采芣苢薄言袺音結之采采芣苢薄言襭音絜之賦也祮以衣貯之而執其祍也襭以衣貯之而扱其衽於帶間也芣苢三章章四句南有喬木不可休息漢有游女不可求思漢之廣叶古曠反矣不可泳叶于誑反思江之永叶弋亮反矣不可方叶甫妄反思興而比也上竦無枝曰喬思語辭也篇内同漢水出興元府嶓冢山至漢陽軍大别山入江江漢之俗其女好㳺漢魏以後猶然如大堤之曲可見也泳潛行也江水出永康軍岷山東流與漢水合東北入海永長也方桴也文王之化自近而遠先及於江漢之間而有以變其淫亂之俗故其出游之女人望見之而知其端莊靜一非復前日之可求矣因以喬木起興江漢為比而反復詠歎之也翹翹音喬錯薪言刈其楚之子于歸言秣其馬叶滿補反漢之廣矣不可泳思江之永矣不可方思興而比也翹翹秀起之貌錯雜也楚木名荆屬之子指游女也秣飼也以錯薪起興而欲秣其馬則悦之至以江漢為比而歎其終不可求則敬之深翹翹錯薪言刈其蔞音閭之子于歸言秣其駒漢之廣矣不可泳思江之永矣不可方思興而比也蔞蔞蒿也葉似艾青白色長數寸生水澤中駒馬之小者漢廣三章章八句遵彼汝墳伐其條枚音梅未見君子惄音溺如調音周飢賦也遵循也汝水出汝州天息山徑蔡潁州入淮墳大防也枝曰條榦曰枚惄飢意也調一作輖重也汝旁之國亦先被文王之化者故婦人喜其君子行役而歸因記其未歸之時思望之情如此而追賦之也遵彼汝墳伐其條肄音異旣見君子不我遐棄賦也斬而復生曰肄遐遠也伐其枚而又伐其肄則踰年矣至是乃見其君子之歸而喜其不逺棄我也魴音房魚赬音蟶尾王室如燬音毁下同雖則如燬父母孔邇比也魴魚名身廣而薄少力細鱗赬赤也魚勞則尾赤魴尾本白而今赤則勞甚矣王室指紂所都也燬焚也父母指文王也孔甚邇近也是時文王三分天下有其二而率商之叛國以事紂故汝墳之人猶以文王之命供紂之役其家人見其勤苦而勞之曰汝之勞既如此而王室之政方酷烈而未已雖其酷烈而未已然文王之德如父母然望之甚近亦可以忘其勞矣此序所謂婦人能閔其君子猶勉之以正者蓋曰雖其别離之久思念之深而其所以相告語者猶有尊君親上之意而無情愛狎昵之私則其德澤之深風化之美皆可見矣一説父母甚近不可以懈於王事而貽其憂亦通汝墳三章章四句麟之趾振振音眞公子叶奬里反于音吁嗟麟兮興也麟麕身牛尾馬蹄毛蟲之長也趾足也麟之足不踐生草不履生蟲振振仁厚貌于嗟歎辭文王后妃德脩于身而子孫宗族皆化於善故詩人以麟之趾興公之子言麟性仁厚故其趾亦仁厚文王后妃仁厚故其子亦仁厚然言之不足故又嗟歎之言是乃麟也何必麕身牛尾而馬蹄然後為王者之瑞哉麟之定音訂振振公姓于嗟麟兮興也定額也麟之額未聞或曰有額而不以抵也公姓公孫也姓之為言生也麟之角叶盧谷反振振公族于嗟麟兮興也麟一角角端有肉公族公同高祖祖廟未毁有服之親麟之趾三章章三句序以為關雎之應得之周南之國十一篇三十四章百五十九句按此篇首五詩皆言后妃之德關雎舉其全體而言也葛覃卷耳言其志行之在已樛木螽斯美其德惠之及人皆指其一事而言也其辭雖主於后妃然其實則皆所以著明文王身脩家齊之效也至於桃夭兔罝芣苢則家齊而國治之效漢廣汝墳則以南國之詩附焉而見天下已有可平之漸矣若麟之趾則又王者之瑞有非人力所致而自至者故復以是終焉而序者以為關雎之應也夫其所以至此后妃之德固不為無所助矣然妻道無成則亦豈得而專之哉今言詩者或乃専美后妃而不本於文王其亦誤矣召南一之二召地名召公奭之采邑也舊説扶風雍縣南有召亭即其地今雍縣析為岐山天興二縣未知召亭的在何縣餘已見周南篇維鵲有巢維鳩居叶姬御反之之子于歸百兩如字又音亮御音迓叶魚據反之興也鵲鳩皆鳥名鵲善為巢其巢最為完固鳩性拙不能為巢或有居鵲之成巢者之子指夫人也兩一車也一車兩輪故謂之兩御迎也諸侯之子嫁於諸侯送御皆百兩也南國諸侯被文王之化能正心脩身以齊其家其女子亦被后妃之化而有専静純一之德故嫁於諸侯而其家人美之曰維鵲有巢則鳩來居之是以之子于歸而百兩迎之也此詩之意猶周南之有關雎也維鵲有巢維鳩方之之子于歸百兩將之興也方有之也將送也維鵲有巢維鳩盈之之子于歸百兩成之興也盈滿也謂衆媵姪娣之多成成其禮也鵲巢三章章四句于以采蘩于沼于沚于以用之公侯之事叶上止反也賦也于於蘩白蒿也沼池也沚渚也事祭事也南國被文王之化諸侯夫人能盡誠敬以奉祭祀而其家人叙其事以美之也或曰蘩所以生蠶蓋古者后夫人有親蠶之禮此詩亦猶周南之有葛覃也于以采蘩于澗之中于以用之公侯之宫賦也山夾水曰澗宫廟也或曰即記所謂公桑蠶室也被音備之僮僮音同夙夜在公被之祁祁薄言還音旋歸賦也被首飾也編髮為之僮僮竦敬也夙早也公公所也祁祁舒遲貎去事有儀也祭義曰及祭之後陶陶遂遂如將復入然不欲遽去愛敬之無已也或曰公即所謂公桑也采蘩三章章四句喓喓音腰草蟲趯趯阜螽未見君子憂心忡忡音充亦既見止亦既覯止我心則降音杭叶乎攻反賦也喓喓聲也草蟲蝗屬竒音青色趯趯躍貎阜螽蠜也忡忡猶衝衝也止語辭覯遇降下也南國被文王之化諸侯大夫行役在外其妻獨居感時物之變而思其君子如此亦若周南之卷耳也陟彼南山言采其蕨未見君子憂心惙惙音拙亦既見止亦既覯止我心則説音悦賦也登山蓋託以望君子蕨鼈也初生無葉時可食亦感時物之變也惙憂貎陟彼南山言采其薇未見君子我心傷悲亦既見止亦既覯止我心則夷賦也薇似蕨而差大有芒而味苦山間人食之謂之迷蕨胡氏曰疑即莊子所謂迷陽者夷平也草蟲三章章七句于以采蘋南澗之濵于以采藻于彼行潦音老賦也蘋水上浮萍也江東人謂之䕯濵厓也藻聚藻也生水底莖如釵股葉如蓬蒿行潦流潦也南國被文王之化大夫妻能奉祭祀而其家人叙其事以美之也于以盛音成之維筐及筥音舉于以湘之維錡音螘及釡音父賦也方曰筐圓曰筥湘烹也蓋粗熟而淹以為葅也錡釡屬有足曰錡無足曰釡此足以見其循序有常嚴敬整飭之意于以奠之宗室牖下叶後五反誰其尸之有齊音齋季女賦也奠置也宗室大宗之廟也大夫士祭於宗室牖下室西南隅所謂奥也尸主也齊敬貌季少也祭祀之禮主婦主薦豆實以葅醢少而能敬尤見其質之美而化之所從來者遠矣采蘋三章章四句蔽芾音廢甘棠勿翦勿伐召伯所茇音鈸賦也蔽芾盛貌甘棠杜棃也白者為棠赤者為杜翦翦其枝葉也伐伐其條榦也伯方伯也茇草舍也召伯循行南國以布文王之政或舍甘棠之下其後人思其德故愛其樹而不忍傷也蔽芾甘棠勿翦勿敗叶蒲寐反召伯所憩音器賦也敗折憩息也勿敗則非特勿伐而已愛之愈乆而愈深也下章放此蔽芾甘棠勿翦勿拜叶變制反召伯所説音税賦也拜屈說舍也勿拜則非特勿敗而已甘棠三章章三句厭入聲浥音邑行露豈不夙夜叶羊茹反謂行多露賦也厭浥濕意行道夙早也南國之人遵召伯之教服文王之化有以革其前日滛亂之俗故女子有能以禮自守而不為強暴所汚者自􅄒已志作此詩以絶其人言道間之露方濕我豈不欲早夜而行乎畏多露之沾濡而不敢爾蓋以女子早夜獨行或有強暴侵陵之患故託以行多露而畏其沾濡也誰謂雀無角叶盧谷反何以穿我屋誰謂女音汝無家叶音谷何以速我獄雖速我獄室家不足興也家謂以媒聘求為室家之禮也速召致也貞女之自守如此然猶或見訟而召致於獄因自訴而言人皆謂雀有角故能穿我屋以興人皆謂汝於我嘗有求為室家之禮故能致我於獄然不知汝雖能致我於獄而求為室家之禮初未嘗備如雀雖能穿屋而實未嘗有角也誰謂鼠無牙叶五紅反何以穿我墉誰謂女無家叶各空反何以速我訟叶祥容反雖速我訟亦不女從興也牙牡齒也墉牆也言汝雖能致我於訟然其求為室家之禮有所不足則我亦終不汝從矣行露三章一章三句二章章六句羔羊之皮叶蒲何反素絲五紽音駝退食自公委音威蛇音移叶唐何反委蛇賦也小曰羔大曰羊皮所以為裘大夫燕居之服素白也紽未詳蓋以絲飾裘之名也退食退朝而食於家也自公從公門而出也委蛇自得之貌南國化文王之政在位皆節儉正直故詩人美其衣服有常而從容自得如此也羔羊之革叶訖力反素絲五緎音域委蛇委蛇自公退食賦也革猶皮也緎裘之縫界也羔羊之縫音逢素絲五總音宗委蛇委蛇退食自公賦也縫縫皮合之以為裘也總亦未詳羔羊三章章四句殷音隱其靁在南山之陽何斯違斯莫敢或遑振振音眞君子歸哉歸哉興也殷靁聲也山南曰陽何斯斯此人也違斯斯此所也遑暇也振振信厚也南國被文王之化婦人以其君子從役在外而思念之故作此詩言殷殷然靁聲則在南山之陽矣何此君子獨去此而不敢少暇乎於是又美其德且冀其早畢事而還歸也殷其靁在南山之側叶莊力反何斯違斯莫敢遑息振振君子歸哉歸哉興也息止也殷其靁在南山之下叶後五反何斯違斯莫或遑處上聲振振君子歸哉歸哉興也殷其靁三章章六句摽音殍有梅其實七兮求我庶士迨其吉兮賦也摽落也梅木名華白實似杏而酢庶衆迨及也吉吉日也南國被文王之化女子知以貞信自守懼其嫁不及時而有強暴之辱也故言梅落而在樹者少以見時過而大晚矣求我之衆士其必有及此吉日而來者乎摽有梅其實三叶疏簪反兮求我庶士迨其今兮賦也梅在樹者三則落者又多矣今今日也蓋不待吉矣摽有梅頃音傾筐墍許器反之求我庶士迨其謂之賦也墍取也頃筐取之則落之盡矣謂之則但相告語而約可定矣摽有梅三章章四句嘒音噦彼小星三五在東肅肅宵征夙夜在公寔命不同興也嘒微貌三五言其稀蓋初昏或將旦時也肅肅齊遫貌宵夜征行也寔與實同命謂天所賦之分也南國夫人承后妃之化能不妒忌以惠其下故其衆妾美之如此蓋衆妾進御於君不敢當夕見星而徃見星而還故因所見以起興其於義無所取特取在東在公兩字之相應耳遂言其所以如此者由其所賦之分不同於貴者是以深以得御於君爲夫人之惠而不敢致怨於徃來之勤也嘒彼小星維參所森反與昴叶力求反肅肅宵征抱衾與裯音儔寔命不猶興也參昴西方二宿之名衾被也裯襌被也興亦取與昴與裯二字相應猶亦同也小星二章章五句呂氏曰夫人無妒忌之行而賤妾安於其命所謂上好仁而下必好義者也江有汜音祀叶羊里反之子歸不我以不我以其後也悔叶虎洧反興也水決復入為汜今江陵漢陽安復之間蓋多有之之子媵妾指嫡妻而言也婦人謂嫁曰歸我媵自我也能左右之曰以謂挾已而偕行也是時汜水之旁媵有待年於國而嫡不與之偕行者其後嫡被后妃夫人之化乃能自悔而迎之故媵見江水之有汜而因以起興言江猶有汜而之子之歸乃不我以雖不我以然其後也亦悔矣江有渚之子歸不我與不我與其後也處興也渚小洲也水岐成渚與猶以也處安也得其所安也江有沱音跎之子歸不我過音戈不我過其嘯也歌興也沱江之别者過謂過我而與俱也嘯蹙口出聲以舒憤懣之氣言其悔時也歌則得其所處而樂也江有汜三章章五句陳氏曰小星之夫人惠及媵妾而媵妾盡其心江沱之嫡惠不及媵妾而媵妾不怨蓋父雖不慈子不可以不孝各盡其道而已矣野有死麕俱倫反與春叶白茅包叶補苟反之有女懷春吉士誘之興也麕獐也鹿屬無角懐春當春而有懐也吉士猶美士也南國被文王之化女子有貞潔自守不為強暴所汚者故詩人因所見以興其事而美之或曰賦也言美士以白茅包其死麕而誘懐春之女也林有樸蒲木反􅈪音速野有死鹿白茅純音豚束有女如玉興也樸􅈪小木也鹿獸名有角純束猶包之也如玉者美其色也上三句興下一句也或曰賦也言以樸􅈪藉死鹿束以白茅而誘此如玉之女也舒而脱脱音兑兮無感我帨音税兮無使尨美邦反也吠符廢反賦也舒遲緩也脱脱舒緩貌感動帨巾尨犬也此章乃述女子拒之之辭言姑徐徐而來毋動我之帨毋驚我之犬以甚言其不能相及也其凛然不可犯之意蓋可見矣野有死麕三章二章章四句一章三句何彼穠音濃與雝叶矣唐棣音第之華曷不肅雝王姬之車興也穠盛也猶曰戎戎也唐棣栘也似白楊肅敬雝和也周王之女姬姓故曰王姬王姬下嫁於諸侯車服之盛如此而不敢挾貴以驕其夫家故見其車者知其能敬且和以執婦道於是作詩以美之曰何彼戎戎而盛乎乃唐棣之華也此何不肅肅而敬雝雝而和乎乃王姬之車也此乃武王以後之詩不可的知其何王之世然文王大姒之教久而不衰亦可見矣何彼穠矣華如桃李平王之孫齊侯之子叶奬里反興也李木名華白實可食舊説平正也武王女文王孫適齊侯之子或曰平王即平王宜臼齊侯即襄公諸兒事見春秋未知孰是以桃李二物興男女二人也其釣維何維絲伊緡齊侯之子平王之孫叶須倫反興也伊亦維也緡綸也絲之合而為綸猶男女之合而為昏也何彼穠矣三章章四句彼茁音拙者葭音加壹發五豝音巴于音吁嗟乎騶虞叶音牙賦也茁生出壯盛之貌葭蘆也亦名葦發發矢豝牡豕也一發五豝猶言中必疊雙也騶虞獸名白虎黒文不食生物者也南國諸侯承文王之化脩身齊家以治其國而其仁民之餘恩又有以及於庶類故其春田之際草木之茂禽獸之多至於如此而詩人述其事以美之且歎美之曰此其仁心自然不由勉強是即眞所謂騶虞矣彼茁者蓬壹發五豵音宗于嗟乎騶虞叶五紅反賦也蓬草名一嵗曰豵亦小豕也騶虞二章章三句文王之化始於關雎而至於麟趾則其化之入人者深矣形於鵲巢而及於騶虞則其澤之及物者廣矣蓋意誠心正之功不息而乆則其熏蒸透徹融液周徧自有不能已者非智力之私所能及也故序以騶虞為鵲巢之應而見王道之成其必有所傳矣召南之國十四篇四十章百七十七句愚按鵲巢至采蘋言夫人大夫妻以見當時國君大夫被文王之化而能脩身以正其家也甘棠以下又見由方伯能布文王之化而國君能脩之家以及其國也其辭雖無及於文王者然文王明德新民之功至是而其所施者溥矣抑所謂其民皥皥而不知為之者與唯何彼穠矣之詩為不可曉當闕所疑耳周南召南二國凡二十五篇先儒以為正風今姑從之孔子謂伯魚曰女為周南召南矣乎人而不為周南召南其猶正牆面而立也與儀禮鄉飲酒鄉射燕禮皆合樂周南關雎葛覃卷耳召南鵲巢采蘩采蘋燕禮又有房中之樂鄭氏注曰弦歌周南召南之詩而不用鐘磬云房中者后夫人之所諷誦以事其君子程子曰天下之治正家為先天下之家正則天下治矣二南正家之道也陳后妃夫人大夫妻之德推之士庶人之家一也故使邦國至於鄉黨皆用之自朝廷至於委巷莫不謳吟諷誦所以風化天下詩經集傳卷一
